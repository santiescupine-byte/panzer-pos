      showToast("Config de franquicia guardada ✓","ok"); cargarFrCfg(frCfgSede);
    }catch(e){ showToast(""+(e.message||e),"err"); } finally{ setBusy(false); }
  };

  const PASOS=[['liquidaciones','Liquidaciones'],['maquinas','Máquinas'],['conteo','Conteo físico'],['gastos','Gastos'],['reparto','Reparto'],['resumen','Cierre']];
  const idxPaso=PASOS.findIndex(p=>p[0]===paso);
  const irA=(d)=>{ const n=idxPaso+d; if(n>=0&&n<PASOS.length) setPaso(PASOS[n][0]); };
  const num=(v,set)=> <input className="input" style={{margin:0}} type="number" value={v} onChange={e=>set(e.target.value)}/>;

  return (
    <div>
      {(()=>{ const sub=(paso==='historial'||paso==='contadores'||paso==='pendientes'||paso==='frhist'||paso==='frmaq'); return (
      <div className="toolbar">
        <div className="sec-title" style={{marginRight:"auto"}}>Recaudo / Tesorería</div>
        {!sub && rol==='admin' && <button className="btn btn-ghost btn-sm" onClick={abrirPendientes}>📥 Pendientes</button>}
        {!sub && rol==='admin' && <button className="btn btn-ghost btn-sm" onClick={abrirContadores}>🔧 Contadores</button>}
        {!sub && rol==='admin' && <button className="btn btn-ghost btn-sm" onClick={abrirFrConfig}>🏭 Franquicias</button>}
        {!sub && paso==='fr' && <button className="btn btn-ghost btn-sm" onClick={verFrHistorial}>📚 Historial</button>}
        {!sub && paso!=='fr' && <button className="btn btn-ghost btn-sm" onClick={verHistorial}>📚 Historial</button>}
        {sub && <button className="btn btn-ghost btn-sm" onClick={()=>setPaso(esFranquicia?'fr':'inicio')}>← Volver</button>}
      </div>
      );})()}

      {/* INICIO */}
      {paso==='inicio' && (
        <div className="card" style={{maxWidth:460}}>
          <div className="card-t">Iniciar ciclo de recaudo</div>
          <label className="label">Sede</label>
          <select className="select" value={sede} onChange={e=>setSede(e.target.value)}>
            <option value="">— Elige sede —</option>
            {sedes.filter(s=>!s.es_bodega).map(s=><option key={s.id} value={s.nombre}>{s.nombre}</option>)}
          </select>
          {!esFranquicia && (<div>
            <label className="label">Tesorero</label>
            <select className="select" value={tesorero} onChange={e=>setTesorero(e.target.value)}>
              <option value="">— Elige tesorero —</option>
              {tesoreros.map(t=><option key={t.id} value={t.nombre}>{t.nombre}</option>)}
            </select>
          </div>)}
          {sede && esFranquicia && <div className="card" style={{background:"var(--amber-d)",border:"1px solid rgba(37,99,235,.3)",marginBottom:10}}><b style={{color:"var(--amber)"}}>🏭 Sede franquicia.</b> <span className="muted">Liquidación mensual: contadores de máquina, reparto {frPctFranq}/{frPctPanzer}{frPctAmort?("/"+frPctAmort):""}, devoluciones y productos.</span></div>}
          {sede && !esFranquicia && <div className="muted" style={{marginBottom:10}}>Base configurada de {sede}: <b>{fmt(baseConfigurada)}</b></div>}
          {esFranquicia
            ? <button className="btn btn-amber" style={{width:"100%"}} disabled={busy||!sede} onClick={iniciarFranquicia}>{busy?"Cargando…":"Abrir liquidación de franquicia →"}</button>
            : <button className="btn btn-amber" style={{width:"100%"}} disabled={busy} onClick={iniciar}>{busy?"Cargando…":"Iniciar ciclo →"}</button>}
        </div>
      )}

      {/* STEPPER */}
      {idxPaso>=0 && (<div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
          {PASOS.map((p,i)=>(<div key={p[0]} onClick={()=>setPaso(p[0])} style={{cursor:"pointer",padding:"6px 12px",borderRadius:20,fontSize:12,fontWeight:700,background:i===idxPaso?"var(--amber)":"var(--sf2)",color:i===idxPaso?"#fff":(i<idxPaso?"var(--green)":"var(--td)")}}>{i<idxPaso?"✓ ":""}{p[1]}</div>))}
        </div>
        <div className="muted" style={{marginBottom:10}}>{sede} · Tesorero {tesorero}</div>

        {/* LIQUIDACIONES */}
        {paso==='liquidaciones' && (<div>
          <div className="toolbar">
            <div className="muted" style={{marginRight:"auto"}}>Importa las pendientes del POS/operadores o agrega manual. Cuenta el efectivo de cada una.</div>
            <button className="btn btn-ghost btn-sm" onClick={nuevaManual}>＋ Manual</button>
          </div>
          {pend.length>0 && (
            <div className="card">
              <div className="card-t">Pendientes por importar ({pend.length})</div>
              {pend.map(p=>(
                <label key={p.id} className="check" style={{display:"flex",gap:8,padding:"4px 0"}}>
                  <input type="checkbox" checked={!!impSel[p.id]} onChange={e=>setImpSel(s=>({...s,[p.id]:e.target.checked}))}/>
                  <span>{p.operador} · {p.num_recibo||"s/recibo"} · valor {fmt(p.valor)} · {p.fecha||""}</span>
                </label>
              ))}
              <button className="btn btn-amber btn-sm" style={{marginTop:8}} onClick={importar}>Importar seleccionadas</button>
            </div>
          )}
          <div className="card" style={{padding:0,overflowX:"auto"}}>
            <table className="tbl">
              <thead><tr><th>Operador</th><th>Recibo</th><th className="num">Valor</th><th className="num">QR</th><th className="num">Efectivo esperado</th><th className="num">Efectivo contado</th><th className="num">Descuadre</th><th></th></tr></thead>
              <tbody>
                {liqs.length===0 && <tr><td colSpan="8"><div className="empty">Sin liquidaciones aún.</div></td></tr>}
                {liqs.map((l,i)=>{ const d=descuadreDe(l); return (
                  <tr key={i}>
                    <td className="row-name">{l.operador}</td>
                    <td className="muted">{l.num_recibo||"—"}</td>
                    <td className="num">{fmt(l.valor)}</td>
                    <td className="num">{fmt(l.qr)}</td>
                    <td className="num">{fmt(efEsperado(l))}</td>
                    <td className="num" style={{width:130}}><input className="input" style={{margin:0,textAlign:"right"}} type="number" value={l.efectivo_contado} onChange={e=>setLiqContado(i,e.target.value)} placeholder="Contar"/></td>
                    <td className="num" style={{fontWeight:700,color:d===0?"var(--muted)":(d>0?"var(--green)":"var(--red)")}}>{l.efectivo_contado===""?"—":fmt(d)}</td>
                    <td><button className="btn btn-ghost btn-sm" onClick={()=>quitarLiq(i)}>✕</button></td>
                  </tr>
                );})}
              </tbody>
            </table>
          </div>
        </div>)}

        {/* MAQUINAS */}
        {paso==='maquinas' && (
          <div className="card" style={{padding:0,overflowX:"auto"}}>
            <table className="tbl">
              <thead><tr><th>Máquina</th><th className="num">GEN ant.</th><th className="num">GEN actual</th><th className="num">Producido</th><th className="num">Tok ant.</th><th className="num">Tok actual</th><th className="num">Token día</th><th className="num">Mone día</th></tr></thead>
              <tbody>
                {maquinas.map((m,i)=>(
                  <tr key={i}>
                    <td className="row-name">{m.nombre}</td>
                    <td className="num muted">{fmt(m.gen_anterior)}</td>
                    <td className="num" style={{width:120}}><input className="input" style={{margin:0,textAlign:"right"}} type="number" value={m.gen_actual} onChange={e=>setMaq(i,{gen_actual:e.target.value})}/></td>
                    <td className="num" style={{fontWeight:700}}>{fmt((Number(m.gen_actual)||0)-m.gen_anterior)}</td>
                    <td className="num muted">{m.gen_token_anterior}</td>
                    <td className="num" style={{width:100}}><input className="input" style={{margin:0,textAlign:"right"}} type="number" value={m.gen_token_actual} onChange={e=>setMaq(i,{gen_token_actual:e.target.value})}/></td>
                    <td className="num" style={{width:90}}><input className="input" style={{margin:0,textAlign:"right"}} type="number" value={m.token_dia} onChange={e=>setMaq(i,{token_dia:e.target.value})}/></td>
                    <td className="num" style={{width:110}}><input className="input" style={{margin:0,textAlign:"right"}} type="number" value={m.mone_dia} onChange={e=>setMaq(i,{mone_dia:e.target.value})}/></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}

        {/* CONTEO FISICO */}
        {paso==='conteo' && (
          <div className="card" style={{maxWidth:520}}>
            <div className="card-t">Conteo físico (después de vaciar y mezclar todas las máquinas)</div>
            <label className="label">Tokens físicos contados</label>
            {num(conteo.tokens_fisicos,(v)=>setConteo(c=>({...c,tokens_fisicos:v})))}
            <div className="muted" style={{margin:"4px 0 10px"}}>Σ Token día de máquinas: <b>{sumTokenDia}</b> · Diferencia: <b style={{color:difTokens?"var(--red)":"var(--green)"}}>{difTokens}</b></div>
            <label className="label">Efectivo en monedas contado ($)</label>
            {num(conteo.efectivo_total_monedas,(v)=>setConteo(c=>({...c,efectivo_total_monedas:v})))}
            <div className="muted" style={{marginTop:4}}>Σ Mone día de máquinas: <b>{fmt(sumMoneDia)}</b> · Diferencia: <b style={{color:difMonedas?"var(--red)":"var(--green)"}}>{fmt(difMonedas)}</b></div>
          </div>
        )}

        {/* GASTOS */}
        {paso==='gastos' && (
          <div className="card">
            <div className="card-t">Gastos de caja menor</div>
            {gastos.map((g,i)=>(
              <div key={i} style={{display:"flex",gap:8,marginBottom:8}}>
                <input className="input" style={{margin:0,flex:1}} value={g.concepto} onChange={e=>setGasto(i,{concepto:e.target.value})} placeholder="Concepto"/>
                <input className="input" style={{margin:0,width:130}} type="number" value={g.monto} onChange={e=>setGasto(i,{monto:e.target.value})} placeholder="Monto"/>
                <button className="btn btn-ghost btn-sm" onClick={()=>delGasto(i)}>✕</button>
              </div>
            ))}
            <button className="btn btn-ghost btn-sm" onClick={addGasto}>＋ Agregar gasto</button>
            <div style={{marginTop:10,fontWeight:700}}>Total gastos: {fmt(totalGastos)}</div>
          </div>
        )}

        {/* REPARTO */}
        {paso==='reparto' && (<div>
          <div className="card" style={{maxWidth:560}}>
            <div className="card-t">Base de efectivo</div>
            <div className="muted">Base configurada: <b>{fmt(baseConfigurada)}</b> · Esperada (− gastos): <b>{fmt(baseEsperada)}</b></div>
            <label className="label">Base recogida (efectivo de la base anterior)</label>
            {num(reparto.baseRecogida,(v)=>setReparto(r=>({...r,baseRecogida:v})))}
            <div className="muted" style={{margin:"-4px 0 10px"}}>Diferencia base: <b style={{color:difBase?"var(--red)":"var(--green)"}}>{fmt(difBase)}</b></div>
            <label className="label">Base nueva que se deja</label>
            {num(reparto.baseNueva,(v)=>setReparto(r=>({...r,baseNueva:v})))}
          </div>
          <div className="card">
            <div className="card-t">Control de tokens por operador</div>
            <div style={{display:"flex",gap:8,marginBottom:10}}>
              <button className={"btn btn-sm "+(reparto.modo==='operadores'?'btn-amber':'btn-ghost')} onClick={()=>setReparto(r=>({...r,modo:'operadores'}))}>Por operador</button>
              <button className={"btn btn-sm "+(reparto.modo==='sede'?'btn-amber':'btn-ghost')} onClick={()=>setReparto(r=>({...r,modo:'sede'}))}>Por sede</button>
            </div>
            <div style={{overflowX:"auto"}}>
              <table className="tbl">
                <thead><tr><th>Operador</th><th className="num">Saldo ant.</th><th className="num">Vendidos</th><th className="num">Dev.</th><th className="num">Membresía</th><th className="num">Saldo esperado</th></tr></thead>
                <tbody>
                  {controlTokens.length===0 && <tr><td colSpan="6"><div className="empty">Aún no hay operadores. Vuelve al paso <b>Liquidaciones</b> e importa o agrega las liquidaciones del turno — los operadores aparecerán aquí automáticamente con su saldo de tokens.</div></td></tr>}
                  {controlTokens.map(c=>(
                    <tr key={c.nombre}>
                      <td className="row-name">{c.nombre}</td>
                      <td className="num muted">{c.saldoAnterior}</td>
                      <td className="num">{c.vendidos}</td>
                      <td className="num">{c.devTokens}</td>
                      <td className="num">{c.membresia}</td>
                      <td className="num" style={{fontWeight:700,color:(c.saldoEsperado!=null&&c.saldoEsperado<0)?"var(--red)":"var(--t)"}}>{c.saldoEsperado==null?<span className="muted">base sede</span>:c.saldoEsperado}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div style={{marginTop:10,display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
              <div style={{flex:"1 1 200px"}}>
                <label className="label">Ajuste de tokens (+ ingresan / − salen a otra sede)</label>
                <input className="input" style={{margin:0}} type="number" value={reparto.ajusteTokens} onChange={e=>setReparto(r=>({...r,ajusteTokens:e.target.value}))}/>
              </div>
              <div style={{flex:"2 1 240px"}}>
                <label className="label">Motivo del ajuste (opcional)</label>
                <input className="input" style={{margin:0}} value={reparto.ajusteMotivo} onChange={e=>setReparto(r=>({...r,ajusteMotivo:e.target.value}))}/>
              </div>
            </div>
            <div className="card" style={{marginTop:10,display:"flex",justifyContent:"space-between",fontWeight:700}}>
              <span>Tokens disponibles (base)</span><span style={{color:"var(--amber)"}}>{tokensDisponibles}</span>
            </div>
            <div className="muted" style={{fontSize:12,marginTop:-4}}>= {tokensFis} máquinas {totSaldoEsp>=0?"+ ":"− "}{Math.abs(totSaldoEsp)} saldos {ajusteNum>=0?"+ ":"− "}{Math.abs(ajusteNum)} ajuste</div>
            {faltanteMaqTokens!==0 && <div style={{marginTop:8,fontWeight:700,color:faltanteMaqTokens>0?"var(--red)":"var(--amber)"}}>{faltanteMaqTokens>0?("⚠ Faltan "+faltanteMaqTokens+" tokens (contadores de máquina dicen más que lo contado físico) · ≈ "+fmt(faltanteMaqTokens*5000)):("Sobran "+Math.abs(faltanteMaqTokens)+" tokens físicos vs contadores")}</div>}
            {opsNegativos.length>0 && <div style={{marginTop:6,color:"var(--red)",fontWeight:700}}>⚠ {opsNegativos.length} operador(es) con saldo negativo (vendieron más de lo que tenían): {opsNegativos.map(o=>o.nombre).join(", ")}</div>}
            {faltanteMaqTokens===0 && opsNegativos.length===0 && <div style={{marginTop:8,color:"var(--green)",fontWeight:700}}>✓ Tokens cuadran</div>}
          </div>

          <div className="card">
            <div className="card-t">🪙 Tokens que quedan para el próximo ciclo</div>
            {reparto.modo==='sede' ? (
              <div>
                <label className="label">Base de tokens que queda en la sede</label>
                <input className="input" type="number" value={reparto.baseTokensSede!=null?reparto.baseTokensSede:String(tokensDisponibles)} onChange={e=>setReparto(r=>({...r,baseTokensSede:e.target.value}))}/>
                <div className="muted" style={{fontSize:12,marginTop:-4}}>Disponibles para dejar: <b>{tokensDisponibles}</b>. Ajústalo si dejaste otra cantidad.</div>
              </div>
            ) : (
              <div>
                <div className="muted" style={{fontSize:12,marginBottom:8}}>Cuántos tokens le dejas a cada operador para arrancar el próximo ciclo:</div>
                {controlTokens.map(c=>{ const def=c.saldoEsperado!=null?Math.max(0,c.saldoEsperado):0; const val=(reparto.ops&&reparto.ops[c.nombre]!=null)?reparto.ops[c.nombre]:String(def); return (
                  <div key={c.nombre} style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                    <span className="row-name" style={{flex:1}}>{c.nombre}</span>
                    <input className="input" style={{margin:0,width:120,textAlign:"right"}} type="number" value={val} onChange={e=>setReparto(r=>({...r,ops:{...(r.ops||{}),[c.nombre]:e.target.value}}))}/>
                  </div>
                );})}
                {(()=>{ const rep=controlTokens.reduce((a,c)=>{ const def=c.saldoEsperado!=null?Math.max(0,c.saldoEsperado):0; const v=(reparto.ops&&reparto.ops[c.nombre]!=null&&reparto.ops[c.nombre]!=="")?Number(reparto.ops[c.nombre]):def; return a+(Number(v)||0); },0); const sin=tokensDisponibles-rep; return (
                  <div className="card" style={{marginTop:8,display:"flex",justifyContent:"space-between",fontWeight:700}}><span>Disponibles {tokensDisponibles} · Repartidos {rep}</span><span style={{color:sin===0?"var(--green)":"var(--amber)"}}>Sin repartir: {sin}</span></div>
                );})()}
              </div>
            )}
          </div>
        </div>)}

        {/* RESUMEN / CIERRE */}
        {paso==='resumen' && (
          <div className="card" style={{maxWidth:560}}>
            <div className="card-t">Resumen del ciclo</div>
            {[['Liquidaciones',liqs.length],['Efectivo de liquidaciones',fmt(efLiquidaciones)],['Monedas de máquinas',fmt(monedasFis)],['Total recaudo',fmt(totalRecaudo)],['Gastos',fmt(totalGastos)],['A consignar',fmt(aConsignar)],['Descuadre efectivo',fmt(totalDescuadre)],['Base de tokens (nueva)',tokensDisponibles],['Faltante tokens máquina',faltanteMaqTokens],['Operadores con saldo negativo',opsNegativos.length]].map(([l,v])=>(
              <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid var(--bd)"}}><span className="muted">{l}</span><b>{v}</b></div>
            ))}
            <button className="btn btn-amber" style={{width:"100%",marginTop:14}} disabled={busy} onClick={cerrar}>{busy?"Cerrando…":"✅ Cerrar ciclo y guardar"}</button>
          </div>
        )}

        <div className="toolbar" style={{marginTop:14}}>
          <button className="btn btn-ghost btn-sm" disabled={idxPaso<=0} onClick={()=>irA(-1)}>← Atrás</button>
          {idxPaso<PASOS.length-1 && <button className="btn btn-amber btn-sm" style={{marginLeft:"auto"}} onClick={()=>irA(1)}>Siguiente →</button>}
        </div>
      </div>)}

      {/* ===== FRANQUICIA: LIQUIDACIÓN MENSUAL ===== */}
      {paso==='fr' && (
        <div>
          <div className="toolbar">
            <div className="muted" style={{marginRight:"auto"}}>🏭 <b>{sede}</b> · Liquidación mensual</div>
            <select className="select" style={{maxWidth:150,margin:0}} value={frMes} onChange={e=>setFrMes(Number(e.target.value))}>
              {MESES.map((m,i)=><option key={i} value={i+1}>{m}</option>)}
            </select>
            <input className="input" style={{maxWidth:90,margin:0}} type="number" value={frAnio} onChange={e=>setFrAnio(Number(e.target.value))}/>
          </div>

          {(!frMaqs||!frMaqs.length) ? (
            <div className="card"><div className="empty">Esta franquicia no tiene máquinas configuradas.<br/>{rol==='admin' ? <button className="btn btn-amber btn-sm" style={{marginTop:8}} onClick={abrirFrConfig}>🏭 Configurar máquinas</button> : "Pídele al admin que las configure."}</div></div>
          ) : (<div>
            {/* Contadores de máquina */}
            <div className="card" style={{padding:0,overflowX:"auto"}}>
              <table className="tbl">
                <thead><tr><th>Máquina</th><th>Tipo</th><th className="num">Valor anterior</th><th className="num">Valor actual</th><th className="num">Recaudo</th></tr></thead>
                <tbody>
                  {frRows.map((m,i)=>(
                    <tr key={m.nombre}>
                      <td className="row-name">{m.nombre}</td>
                      <td>{m.es_lavadora ? <span className="pill">Lavado</span> : <span className="pill pill-off">Otro</span>}</td>
                      <td className="num muted">{fmt(m.anterior)}</td>
                      <td className="num"><input className="input" style={{margin:0,textAlign:"right",maxWidth:160}} type="number" value={m.actual} onChange={e=>frSetMaq(i,{actual:e.target.value})}/></td>
                      <td className="num"><b>{fmt(m.dif)}</b></td>
                    </tr>
                  ))}
                  <tr style={{borderTop:"2px solid var(--bd)"}}><td colSpan="4" style={{fontWeight:800}}>RECAUDO TOTAL DEL MES</td><td className="num" style={{fontWeight:800}}>{fmt(frRecaudo)}</td></tr>
                </tbody>
              </table>
            </div>

            <div style={{display:"flex",gap:12,flexWrap:"wrap",marginTop:12}}>
              {/* Ajustes */}
              <div className="card" style={{flex:"1 1 280px"}}>
                <div className="card-t">Ajustes</div>
                <label className="label">Devoluciones (se restan a Panzer)</label>
                <input className="input" type="number" value={frDevol} onChange={e=>setFrDevol(e.target.value)} placeholder="0"/>
                <div style={{display:"flex",alignItems:"center",marginTop:10,marginBottom:6}}>
                  <span className="label" style={{margin:0,marginRight:"auto"}}>Productos / membresías (se suman a Panzer)</span>
                  <button className="btn btn-ghost btn-sm" onClick={frAddProd}>＋ Agregar</button>
                </div>
                {frProds.length===0 && <div className="muted" style={{fontSize:12}}>Sin productos. Agrega los que vendiste en la franquicia este mes.</div>}
                {frProds.map((p,i)=>(
                  <div key={i} style={{display:"flex",gap:6,marginBottom:6,alignItems:"center"}}>
                    <input className="input" style={{margin:0,flex:"1 1 90px"}} placeholder="Concepto" value={p.concepto} onChange={e=>frSetProd(i,{concepto:e.target.value})}/>
                    <input className="input" style={{margin:0,width:54,textAlign:"center"}} type="number" placeholder="cant" value={p.cantidad} onChange={e=>frSetProd(i,{cantidad:e.target.value})}/>
                    <input className="input" style={{margin:0,width:100,textAlign:"right"}} type="number" placeholder="v.unit" value={p.valor_unitario} onChange={e=>frSetProd(i,{valor_unitario:e.target.value})}/>
                    <button className="btn btn-danger btn-sm" onClick={()=>frDelProd(i)}>✕</button>
                  </div>
                ))}
                {frProds.length>0 && <div className="muted" style={{textAlign:"right",fontWeight:700}}>Total productos: {fmt(frProductos)}</div>}
                <label className="label" style={{marginTop:10}}>Notas</label>
                <input className="input" value={frNotas} onChange={e=>setFrNotas(e.target.value)} placeholder="Opcional"/>
              </div>

              {/* Resumen / reparto */}
              <div className="card" style={{flex:"1 1 280px"}}>
                <div className="card-t">Reparto del mes</div>
                {[
                  ['Recaudo total',fmt(frRecaudo)],
                  ['Franquiciado ('+frPctFranq+'%)',fmt(frValFranq)],
                  ['Panzer ('+frPctPanzer+'%)',fmt(frValPanzer)],
                ].concat(frPctAmort?[['Amortización ('+frPctAmort+'%)',fmt(frValAmort)]]:[]).concat([
                  ['– Devoluciones','-'+fmt(frDevolNum)],
                  ['+ Productos','+'+fmt(frProductos)],
                ]).map(([l,v])=>(
                  <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid var(--bd)"}}><span className="muted">{l}</span><b>{v}</b></div>
                ))}
                <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0",fontSize:18}}><span style={{fontWeight:800}}>TOTAL A PAGAR PANZER</span><b style={{color:"var(--green)"}}>{fmt(frTotalPanzer)}</b></div>
                <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0"}}><span className="muted">Total franquiciado</span><b>{fmt(frTotalFranq)}</b></div>
                <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0"}}><span className="muted">% Ocupación ({frNLavado} máq.{frMaqOcupCfg>0?" config":" lavado"})</span><b style={{color:frOcupacion>=100?"var(--green)":(frOcupacion>=40?"var(--amber)":"var(--red)")}}>{Math.round(frOcupacion)}%</b></div>
                {frPctAmort>0 && <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0"}}><span className="muted">Amortización acumulada</span><b>{fmt(frAmortAcumNuevo)}{frAmortObjetivo?(" / "+fmt(frAmortObjetivo)):""}</b></div>}
                <button className="btn btn-amber" style={{width:"100%",marginTop:14}} disabled={busy} onClick={frCerrar}>{busy?"Cerrando…":"✅ Cerrar liquidación del mes"}</button>
              </div>
            </div>
          </div>)}
          <div className="toolbar" style={{marginTop:14}}>
            <button className="btn btn-ghost btn-sm" onClick={()=>{setPaso('inicio');setSede("");}}>← Volver</button>
          </div>
        </div>
      )}

      {/* ===== FRANQUICIA: HISTORIAL MENSUAL ===== */}
      {paso==='frhist' && (
        <div className="card" style={{padding:0,overflowX:"auto"}}>
          <table className="tbl">
            <thead><tr><th>Mes</th><th>Sede</th><th className="num">Recaudo</th><th className="num">Ocupación</th><th className="num">Total Panzer</th><th className="num">Franquiciado</th><th></th></tr></thead>
            <tbody>
              {frHist===null && <tr><td colSpan="7"><div className="empty">Cargando…</div></td></tr>}
              {frHist&&frHist.length===0 && <tr><td colSpan="7"><div className="empty">Sin liquidaciones de franquicia todavía.</div></td></tr>}
              {(frHist||[]).map(h=>(
                <tr key={h.id}>
                  <td className="muted">{MESES[(h.mes||1)-1]} {h.anio}</td>
                  <td className="row-name">{h.sede}</td>
                  <td className="num">{fmt(h.recaudo_total)}</td>
                  <td className="num">{Math.round(Number(h.ocupacion)||0)}%</td>
                  <td className="num" style={{color:"var(--green)"}}>{fmt(h.total_panzer)}</td>
                  <td className="num">{fmt(h.total_franquiciado)}</td>
                  <td><button className="btn btn-ghost btn-sm" onClick={()=>abrirReporte(h.sede,h.anio,h.mes)}>📊 Reporte</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {/* ===== FRANQUICIA: REPORTE VISUAL AL FRANQUICIADO ===== */}
      {paso==='frreporte' && frReporte && (()=>{
        const rep=frReporte;
        const byM={}; (rep.hist||[]).filter(h=>h.anio===rep.anio).forEach(h=>byM[h.mes]=h);
        const cur=byM[rep.mes]||{};
        const upTo=Math.max(rep.mes, ...(rep.hist||[]).filter(h=>h.anio===rep.anio).map(h=>h.mes), 1);
        const months=Array.from({length:upTo},(_,i)=>i+1);
        const recSerie=months.map(m=>Number((byM[m]||{}).recaudo_total)||0);
        const ocuSerie=months.map(m=>Number((byM[m]||{}).ocupacion)||0);
        const kfmt=v=> v>=1000000 ? (v/1000000).toFixed(1).replace(/\.0$/,'')+'M' : (v>=1000 ? Math.round(v/1000)+'k' : ''+Math.round(v));
        const maqs=(cur.maquinas||[]);
        // dims gráficas
        const W=660,H=190,pad=30,n=months.length||1;
        const maxR=Math.max(...recSerie,1), bw=(W-pad*2)/n;
        const maxO=Math.max(100,...ocuSerie);
        const cx=i=> pad + bw*i + bw/2;
        const ly=v=> (H-pad) - (v/maxO)*(H-pad-22);
        const C={amber:'#f59e0b',amberD:'#b45309',dark:'#111827',muted:'#6b7280',green:'#16a34a',bd:'#e5e7eb',bg:'#ffffff',soft:'#fff7ed'};
        const lbl=m=>MESES[m-1].slice(0,3);
        return (
        <div>
          <div className="muted" style={{marginBottom:10}}>Reporte para el franquiciado · <b>{rep.sede}</b></div>
          {/* TARJETA QUE SE CONVIERTE EN IMAGEN */}
          <div id="fr-reporte-card" style={{width:680,maxWidth:"100%",background:C.bg,color:C.dark,borderRadius:16,overflow:"hidden",border:"1px solid "+C.bd,fontFamily:"inherit"}}>
            {/* Banner */}
            <div style={{background:"linear-gradient(135deg,#111827,#1f2937)",color:"#fff",padding:"18px 22px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div>
                <div style={{fontSize:22,fontWeight:900,letterSpacing:1,color:C.amber}}>ASÍ VA TU PANZER</div>
                <div style={{fontSize:14,opacity:.85,marginTop:2}}>{rep.sede}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:18,fontWeight:800}}>{MESES[rep.mes-1]}</div>
                <div style={{fontSize:13,opacity:.8}}>{rep.anio}</div>
              </div>
            </div>
            {/* KPIs */}
            <div style={{display:"flex",gap:10,padding:"16px 18px"}}>
              {[['Recaudo del mes',fmt(cur.recaudo_total||0),C.dark],['Lo que recibes',fmt(cur.total_franquiciado||0),C.green],['Ocupación',Math.round(cur.ocupacion||0)+'%',C.amberD]].map(([l,v,col])=>(
                <div key={l} style={{flex:1,background:C.soft,border:"1px solid "+C.bd,borderRadius:12,padding:"12px 14px"}}>
                  <div style={{fontSize:12,color:C.muted,fontWeight:600}}>{l}</div>
                  <div style={{fontSize:20,fontWeight:900,color:col,marginTop:4}}>{v}</div>
                </div>
              ))}
            </div>
            {/* Desglose del mes */}
            <div style={{padding:"0 18px 10px"}}>
              <div style={{fontSize:14,fontWeight:800,marginBottom:6}}>Desglose del mes</div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <tbody>
                  {[
                    ['Recaudo total',fmt(cur.recaudo_total||0),C.dark],
                    ['Franquiciado ('+(cur.pct_franquiciado||0)+'%)',fmt(cur.val_franquiciado||0),C.dark],
                    ['Panzer ('+(cur.pct_panzer||0)+'%)',fmt(cur.val_panzer_bruto||0),C.dark],
                  ].concat((Number(cur.pct_amortizacion)>0)?[['Amortización ('+cur.pct_amortizacion+'%)',fmt(cur.val_amortizacion||0),C.dark]]:[])
                   .concat([
                    ['Devoluciones','− '+fmt(cur.devoluciones||0),'#dc2626'],
                    ['Productos','+ '+fmt(cur.productos||0),C.green],
                  ]).map(([l,v,col])=>(
                    <tr key={l} style={{borderTop:"1px solid "+C.bd}}>
                      <td style={{padding:"5px 0",color:C.muted}}>{l}</td>
                      <td style={{padding:"5px 0",textAlign:"right",fontWeight:700,color:col}}>{v}</td>
                    </tr>
                  ))}
                  <tr style={{borderTop:"2px solid "+C.dark,background:C.soft}}>
                    <td style={{padding:"8px",fontWeight:800}}>TOTAL A PAGAR PANZER</td>
                    <td style={{padding:"8px",textAlign:"right",fontWeight:900,fontSize:16,color:C.amberD}}>{fmt(cur.total_panzer||0)}</td>
                  </tr>
                  <tr style={{borderTop:"1px solid "+C.bd}}>
                    <td style={{padding:"6px 0",fontWeight:700}}>Total franquiciado</td>
                    <td style={{padding:"6px 0",textAlign:"right",fontWeight:800,color:C.green}}>{fmt(cur.total_franquiciado||0)}</td>
                  </tr>
                </tbody>
              </table>
            </div>
            {/* Gráfica recaudo mensual */}
            <div style={{padding:"4px 18px 8px"}}>
              <div style={{fontSize:14,fontWeight:800,marginBottom:4}}>Recaudo mensual {rep.anio}</div>
              <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height:"auto",display:"block"}}>
                {recSerie.map((v,i)=>{ const bh=(v/maxR)*(H-pad-22); const x=pad+bw*i+bw*0.18, y=(H-pad)-bh, w=bw*0.64;
                  return (<g key={i}>
                    <rect x={x} y={y} width={w} height={Math.max(0,bh)} rx={3} fill={i===rep.mes-1?C.amber:"#fcd9a3"}/>
                    {v>0 && <text x={x+w/2} y={y-4} textAnchor="middle" fontSize="10" fontWeight="700" fill={C.dark}>{kfmt(v)}</text>}
                    <text x={x+w/2} y={H-pad+14} textAnchor="middle" fontSize="10" fill={C.muted}>{lbl(months[i])}</text>
                  </g>); })}
                <line x1={pad} y1={H-pad} x2={W-pad} y2={H-pad} stroke={C.bd}/>
              </svg>
            </div>
            {/* Gráfica ocupación */}
            <div style={{padding:"4px 18px 16px"}}>
              <div style={{fontSize:14,fontWeight:800,marginBottom:4}}>Evolución de ocupación</div>
              <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height:"auto",display:"block"}}>
                <line x1={pad} y1={ly(100)} x2={W-pad} y2={ly(100)} stroke={C.bd} strokeDasharray="4 4"/>
                <text x={W-pad} y={ly(100)-4} textAnchor="end" fontSize="9" fill={C.muted}>100%</text>
                {n>1 && <polyline points={ocuSerie.map((v,i)=>cx(i)+','+ly(v)).join(' ')} fill="none" stroke={C.amber} strokeWidth="2.5"/>}
                {ocuSerie.map((v,i)=>(<g key={i}>
                  <circle cx={cx(i)} cy={ly(v)} r={i===rep.mes-1?5:3.5} fill={C.amberD}/>
                  <text x={cx(i)} y={ly(v)-9} textAnchor="middle" fontSize="10" fontWeight="700" fill={C.amberD}>{Math.round(v)}%</text>
                  <text x={cx(i)} y={H-pad+14} textAnchor="middle" fontSize="10" fill={C.muted}>{lbl(months[i])}</text>
                </g>))}
                <line x1={pad} y1={H-pad} x2={W-pad} y2={H-pad} stroke={C.bd}/>
              </svg>
            </div>
            {/* Detalle por máquina */}
            {maqs.length>0 && (
              <div style={{padding:"0 18px 18px"}}>
                <div style={{fontSize:14,fontWeight:800,marginBottom:6}}>Detalle por máquina · {MESES[rep.mes-1]}</div>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12.5}}>
                  <thead><tr style={{color:C.muted,textAlign:"left"}}><th style={{padding:"4px 0",fontWeight:600}}>Máquina</th><th style={{padding:"4px 0",fontWeight:600,textAlign:"right"}}>Contador anterior</th><th style={{padding:"4px 0",fontWeight:600,textAlign:"right"}}>Contador actual</th><th style={{padding:"4px 0",fontWeight:600,textAlign:"right"}}>Recaudo</th></tr></thead>
                  <tbody>
                    {maqs.map((m,i)=>(<tr key={i} style={{borderTop:"1px solid "+C.bd}}>
                      <td style={{padding:"5px 0"}}>{m.nombre}{m.es_lavadora===false?" (otro)":""}</td>
                      <td style={{padding:"5px 0",textAlign:"right",color:C.muted}}>{fmt(m.anterior||0)}</td>
                      <td style={{padding:"5px 0",textAlign:"right"}}>{fmt(m.actual||0)}</td>
                      <td style={{padding:"5px 0",textAlign:"right",fontWeight:700}}>{fmt(m.dif||0)}</td>
                    </tr>))}
                    <tr style={{borderTop:"2px solid "+C.bd}}>
                      <td style={{padding:"6px 0",fontWeight:800}} colSpan="3">RECAUDO TOTAL</td>
                      <td style={{padding:"6px 0",textAlign:"right",fontWeight:800,color:C.amberD}}>{fmt(maqs.reduce((a,m)=>a+(Number(m.dif)||0),0))}</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            )}
            {maqs.length===0 && (
              <div style={{padding:"0 18px 18px"}}>
                <div style={{fontSize:14,fontWeight:800,marginBottom:6}}>Detalle por máquina · {MESES[rep.mes-1]}</div>
                <div style={{fontSize:12.5,color:C.muted,background:C.soft,border:"1px solid "+C.bd,borderRadius:10,padding:"10px 12px"}}>Detalle de contadores por máquina no disponible para este mes (dato histórico). Los meses liquidados en el sistema incluyen contador anterior y actual de cada máquina.</div>
              </div>
            )}
            <div style={{background:C.dark,color:"#9ca3af",fontSize:11,padding:"8px 18px",textAlign:"center"}}>Panzer Carwash · Reporte generado {new Date().toLocaleDateString('es-CO')}</div>
          </div>
          {/* Acciones (no entran en la imagen) */}
          <div className="toolbar" style={{marginTop:14}}>
            <button className="btn btn-amber" disabled={frShare} onClick={compartirReporte}>{frShare?"Generando…":"📲 Compartir imagen"}</button>
            <button className="btn btn-ghost" onClick={()=>{ setFrReporte(null); setPaso(esFranquicia?'fr':'frhist'); }}>← Volver</button>
            <button className="btn btn-ghost" style={{marginLeft:"auto"}} onClick={()=>{ setFrReporte(null); setSede(""); setPaso('inicio'); }}>Terminar</button>
          </div>
        </div>
        );
      })()}

      {/* ===== FRANQUICIA: CONFIG (máquinas + reparto, solo admin) ===== */}
      {paso==='frmaq' && (
        <div>
          <div className="card" style={{background:"var(--amber-d)",border:"1px solid rgba(37,99,235,.3)",marginBottom:12}}>
            <b style={{color:"var(--amber)"}}>⚠ Zona de admin.</b> <span className="muted">Configura máquinas, el reparto % y la amortización de cada franquicia. El "contador" es el último valor leído (= valor anterior del próximo mes); aquí lo siembras la primera vez.</span>
          </div>
          <div className="toolbar">
            <select className="select" style={{maxWidth:240,margin:0}} value={frCfgSede} onChange={e=>{setFrCfgSede(e.target.value);cargarFrCfg(e.target.value);}}>
              {franquicias.length===0 && <option value="">— No hay franquicias —</option>}
              {franquicias.map(s=><option key={s.id} value={s.nombre}>{s.nombre}</option>)}
            </select>
          </div>
          {frCfgSede && (<div>
            {/* Reparto / config */}
            <div className="card">
              <div className="card-t">Reparto y amortización</div>
              <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                <div style={{flex:"1 1 110px"}}><label className="label">% Franquiciado</label><input className="input" type="number" value={frCfg.fr_pct_franquiciado} onChange={e=>setFrCfg(c=>({...c,fr_pct_franquiciado:e.target.value}))}/></div>
                <div style={{flex:"1 1 110px"}}><label className="label">% Panzer</label><input className="input" type="number" value={frCfg.fr_pct_panzer} onChange={e=>setFrCfg(c=>({...c,fr_pct_panzer:e.target.value}))}/></div>
                <div style={{flex:"1 1 110px"}}><label className="label">% Amortización</label><input className="input" type="number" value={frCfg.fr_pct_amortizacion} onChange={e=>setFrCfg(c=>({...c,fr_pct_amortizacion:e.target.value}))}/></div>
              </div>
              <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                <div style={{flex:"1 1 140px"}}><label className="label">Capacidad/máquina ($)</label><input className="input" type="number" value={frCfg.fr_capacidad_maquina} onChange={e=>setFrCfg(c=>({...c,fr_capacidad_maquina:e.target.value}))}/></div>
                <div style={{flex:"1 1 140px"}}><label className="label">Objetivo amortización</label><input className="input" type="number" value={frCfg.fr_amort_objetivo} onChange={e=>setFrCfg(c=>({...c,fr_amort_objetivo:e.target.value}))}/></div>
                <div style={{flex:"1 1 140px"}}><label className="label">Amortización acumulada</label><input className="input" type="number" value={frCfg.fr_amort_acumulado} onChange={e=>setFrCfg(c=>({...c,fr_amort_acumulado:e.target.value}))}/></div>
              </div>
              <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                <div style={{flex:"1 1 220px"}}><label className="label"># Máquinas para % ocupación</label><input className="input" type="number" value={frCfg.fr_maquinas_ocupacion} onChange={e=>setFrCfg(c=>({...c,fr_maquinas_ocupacion:e.target.value}))}/><div className="muted" style={{fontSize:12,marginTop:-4}}>0 = usar las lavadoras registradas. Ponlo manual si el divisor de ocupación es distinto (ej. máquinas planeadas).</div></div>
              </div>
              {(Number(frCfg.fr_pct_franquiciado)||0)+(Number(frCfg.fr_pct_panzer)||0)+(Number(frCfg.fr_pct_amortizacion)||0)!==100 && <div className="muted" style={{color:"var(--amber)",marginTop:6}}>⚠ Los porcentajes suman {(Number(frCfg.fr_pct_franquiciado)||0)+(Number(frCfg.fr_pct_panzer)||0)+(Number(frCfg.fr_pct_amortizacion)||0)}% (deberían sumar 100).</div>}
            </div>
            {/* Máquinas */}
            <div className="card" style={{marginTop:12}}>
              <div className="toolbar"><div className="card-t" style={{marginRight:"auto"}}>Máquinas</div><button className="btn btn-ghost btn-sm" onClick={frCfgAddMaq}>＋ Máquina</button></div>
              {frCfgMaqs===null ? <div className="empty">Cargando…</div> : (
                <div style={{overflowX:"auto"}}>
                  <table className="tbl">
                    <thead><tr><th>Nombre</th><th>Cuenta para ocupación</th><th className="num">Contador (valor anterior)</th><th></th></tr></thead>
                    <tbody>
                      {frCfgMaqs.length===0 && <tr><td colSpan="4"><div className="empty">Sin máquinas. Agrega Máquina 1, Aspiradora, etc.</div></td></tr>}
                      {frCfgMaqs.map((m,i)=>(
                        <tr key={i}>
                          <td><input className="input" style={{margin:0,minWidth:120}} value={m.nombre} onChange={e=>frCfgSetMaq(i,{nombre:e.target.value})} placeholder="Máquina 1"/></td>
                          <td><label className="check" style={{display:"flex",gap:6,alignItems:"center"}}><input type="checkbox" checked={m.es_lavadora} onChange={e=>frCfgSetMaq(i,{es_lavadora:e.target.checked})}/><span className="muted">{m.es_lavadora?"Sí (lavado)":"No (aspiradora/canillita)"}</span></label></td>
                          <td className="num"><input className="input" style={{margin:0,textAlign:"right",maxWidth:160}} type="number" value={m.contador} onChange={e=>frCfgSetMaq(i,{contador:e.target.value})}/></td>
                          <td><button className="btn btn-danger btn-sm" onClick={()=>frCfgDelMaq(i)}>✕</button></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
            <div className="toolbar" style={{marginTop:12}}>
              <button className="btn btn-amber" disabled={busy} onClick={guardarFrConfig}>{busy?"Guardando…":"💾 Guardar configuración"}</button>
            </div>
          </div>)}
        </div>
      )}

      {/* HISTORIAL */}
      {/* ===== LIQUIDACIONES PENDIENTES (ver/borrar, solo admin) ===== */}
      {paso==='pendientes' && (
        <div>
          <div className="card" style={{background:"var(--amber-d)",border:"1px solid rgba(37,99,235,.3)",marginBottom:12}}>
            <b style={{color:"var(--amber)"}}>📥 Liquidaciones pendientes por importar.</b> <span className="muted">Aquí puedes borrar las que ya no vas a usar (ej. quedaron de días que no se cerró completo) para que no se acumulen.</span>
          </div>
          <div className="toolbar">
            <select className="select" style={{maxWidth:240,margin:0}} value={pendSede} onChange={e=>{setPendSede(e.target.value);cargarPendientes(e.target.value);}}>
              <option value="">🏬 Todas las sedes</option>
              {sedes.filter(s=>!s.es_bodega).map(s=><option key={s.id} value={s.nombre}>{s.nombre}</option>)}
            </select>
            {pendSede && (pendList||[]).length>0 && <button className="btn btn-danger btn-sm" style={{marginLeft:"auto"}} onClick={borrarTodasPend}>🗑 Borrar todas las de {pendSede} ({(pendList||[]).length})</button>}
          </div>
          {pendList===null ? <div className="empty">Cargando…</div> : (
            <div className="card" style={{padding:0,overflowX:"auto"}}>
              <table className="tbl">
                <thead><tr><th>Fecha</th><th>Sede</th><th>Operador</th><th>Recibo</th><th className="num">Valor</th><th>Origen</th><th></th></tr></thead>
                <tbody>
                  {pendList.length===0 && <tr><td colSpan="7"><div className="empty">No hay liquidaciones pendientes{pendSede?(" en "+pendSede):""}.</div></td></tr>}
                  {pendList.map(l=>(
                    <tr key={l.id}>
                      <td className="muted" style={{whiteSpace:"nowrap"}}>{l.fecha||fLocalDia(l.created_at)}</td>
                      <td>{l.sede}</td>
                      <td className="row-name">{l.operador}</td>
                      <td className="muted">{l.num_recibo||"—"}</td>
                      <td className="num">{fmt(l.valor)}</td>
                      <td className="muted">{l.origen}</td>
                      <td><button className="btn btn-danger btn-sm" onClick={()=>borrarPend(l)}>✕</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
          {pendList && pendList.length>0 && <div className="muted" style={{marginTop:8}}>{pendList.length} pendiente(s){pendSede?(" en "+pendSede):" en total"}.</div>}
        </div>
      )}

      {/* ===== CONTADORES DE MÁQUINA (solo admin) ===== */}
      {paso==='contadores' && (
        <div>
          <div className="card" style={{background:"var(--amber-d)",border:"1px solid rgba(37,99,235,.3)",marginBottom:12}}>
            <b style={{color:"var(--amber)"}}>⚠ Zona de admin.</b> <span className="muted">Edita los contadores GEN y tokens de cada máquina (úsalo solo cuando se quema/cambia una máquina y el contador se reinicia). Esto define el "anterior" del próximo ciclo.</span>
          </div>
          <div className="toolbar">
            <select className="select" style={{maxWidth:240,margin:0}} value={contSede} onChange={e=>{setContSede(e.target.value);cargarContadores(e.target.value);}}>
              {sedes.filter(s=>!s.es_bodega).map(s=><option key={s.id} value={s.nombre}>{s.nombre}</option>)}
            </select>
          </div>
          {contMaqs===null ? <div className="empty">Cargando…</div> : (
            <div className="card" style={{padding:0,overflowX:"auto"}}>
              <table className="tbl">
                <thead><tr><th>Máquina</th><th className="num">Contador GEN (pesos)</th><th className="num">Contador tokens</th></tr></thead>
                <tbody>
                  {contMaqs.map((m,i)=>(
                    <tr key={m.nombre}>
                      <td className="row-name">{m.nombre}</td>
                      <td className="num"><input className="input" style={{margin:0,textAlign:"right",maxWidth:180}} type="number" value={m.gen_actual} onChange={e=>setCont(i,{gen_actual:e.target.value})}/></td>
                      <td className="num"><input className="input" style={{margin:0,textAlign:"right",maxWidth:140}} type="number" value={m.gen_token_actual} onChange={e=>setCont(i,{gen_token_actual:e.target.value})}/></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
          <div className="toolbar" style={{marginTop:12}}>
            <button className="btn btn-amber" disabled={busy||contMaqs===null} onClick={guardarContadores}>{busy?"Guardando…":"💾 Guardar contadores"}</button>
          </div>
        </div>
      )}

      {paso==='historial' && (
        <div className="card" style={{padding:0,overflowX:"auto"}}>
          <table className="tbl">
            <thead><tr><th>Fecha</th><th>Sede</th><th>Tesorero</th><th className="num">Total recaudo</th><th className="num">A consignar</th><th className="num">Descuadre</th><th></th></tr></thead>
            <tbody>
              {histo===null && <tr><td colSpan="7"><div className="empty">Cargando…</div></td></tr>}
              {histo&&histo.length===0 && <tr><td colSpan="7"><div className="empty">Sin ciclos cerrados todavía.</div></td></tr>}
              {(histo||[]).map(c=>{
                const rp=c.reparto||{}; const hasAlert=((rp.controlTokens||[]).some(o=>o.saldoEsperado!=null&&o.saldoEsperado<0)) || Number(c.total_descuadre)!==0 || Number(c.tokens_perdidos)>0 || (c.resumen&&Number(c.resumen.faltanteMaqTokens)!==0);
                return (
                <tr key={c.id} style={{cursor:"pointer"}} onClick={()=>verDetalle(c)}>
                  <td className="muted">{c.fecha}</td>
                  <td className="row-name">{c.sede} {hasAlert ? <span className="pill pill-off" style={{marginLeft:4}}>⚠ revisar</span> : <span style={{color:"var(--green)"}}>✓</span>}</td>
                  <td className="muted">{c.tesorero}</td>
                  <td className="num">{fmt(c.total_recaudo)}</td><td className="num">{fmt(c.a_consignar)}</td>
                  <td className="num" style={{color:Number(c.total_descuadre)?"var(--red)":"var(--green)"}}>{fmt(c.total_descuadre)}</td>
                  <td><button className="btn btn-ghost btn-sm" onClick={e=>{e.stopPropagation();verDetalle(c);}}>Ver</button></td>
                </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      {/* manual liquidación */}
      {manual && (
        <div className="modal-bg" onClick={()=>setManual(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-t">Liquidación manual</div>
            <label className="label">Operador</label>
            <select className="select" value={manual.operador} onChange={e=>setManual({...manual,operador:e.target.value})}>
              <option value="">— Elige —</option>
              {cajerosDeSede.map(c=><option key={c.id} value={c.nombre}>{c.nombre}</option>)}
            </select>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <div style={{flex:"1 1 100px"}}><label className="label">Recibo</label><input className="input" value={manual.num_recibo} onChange={e=>setManual({...manual,num_recibo:e.target.value})}/></div>
              <div style={{flex:"1 1 100px"}}><label className="label">Valor</label><input className="input" type="number" value={manual.valor} onChange={e=>setManual({...manual,valor:e.target.value})}/></div>
              <div style={{flex:"1 1 100px"}}><label className="label">QR</label><input className="input" type="number" value={manual.qr} onChange={e=>setManual({...manual,qr:e.target.value})}/></div>
              <div style={{flex:"1 1 100px"}}><label className="label">Devoluciones</label><input className="input" type="number" value={manual.devoluciones} onChange={e=>setManual({...manual,devoluciones:e.target.value})}/></div>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <div style={{flex:"1 1 90px"}}><label className="label">Tok base</label><input className="input" type="number" value={manual.tokens_base} onChange={e=>setManual({...manual,tokens_base:e.target.value})}/></div>
              <div style={{flex:"1 1 90px"}}><label className="label">Tok vend.</label><input className="input" type="number" value={manual.tokens_vendidos} onChange={e=>setManual({...manual,tokens_vendidos:e.target.value})}/></div>
              <div style={{flex:"1 1 90px"}}><label className="label">Dev tok</label><input className="input" type="number" value={manual.dev_tokens} onChange={e=>setManual({...manual,dev_tokens:e.target.value})}/></div>
              <div style={{flex:"1 1 90px"}}><label className="label">Tok memb.</label><input className="input" type="number" value={manual.tokens_membresia} onChange={e=>setManual({...manual,tokens_membresia:e.target.value})}/></div>
            </div>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={()=>setManual(null)}>Cancelar</button>
              <button className="btn btn-amber" onClick={guardarManual}>Agregar</button>
            </div>
          </div>
        </div>
      )}

      {/* detalle de ciclo */}
      {detalle && (()=>{
        const c=detalle.ciclo; const rep=c.reparto||{}; const ct=rep.controlTokens||[];
        const sumTD=detalle.maquinas.reduce((a,m)=>a+(Number(m.token_dia)||0),0);
        const sumMD=detalle.maquinas.reduce((a,m)=>a+(Number(m.mone_dia)||0),0);
        // ---- ALERTAS del ciclo (réplica del admin del recaudo) ----
        const totVend=detalle.liquidaciones.reduce((a,l)=>a+(Number(l.tokens_vendidos)||0),0);
        const totDev=detalle.liquidaciones.reduce((a,l)=>a+(Number(l.dev_tokens)||0),0);
        const tokEgr=totVend+totDev; const difEgr=sumTD-tokEgr; const difEgrAbs=Math.abs(difEgr);
        const difTokFis=sumTD-(Number(c.tokens_fisicos)||0);
        const difMon=sumMD-(Number(c.efectivo_total_monedas)||0);
        const descEf=detalle.liquidaciones.reduce((a,l)=>a+(Number(l.descuadre)||0),0);
        const opsNeg=ct.filter(o=>o.saldoEsperado!=null && o.saldoEsperado<0);
        const ajuste=Number(rep.ajusteTokens)||0;
        const alertas=[];
        if(difEgrAbs>30) alertas.push(['danger','🚨 Descuadre alto de tokens: egresaron '+tokEgr+' (vendidos+dev) vs '+sumTD+' que entraron a máquinas → diferencia '+(difEgr>0?'+':'')+difEgr]);
        else if(difEgrAbs>10) alertas.push(['warning','⚠️ Revisar tokens: egresados '+tokEgr+' vs máquinas '+sumTD+' → diferencia '+(difEgr>0?'+':'')+difEgr]);
        if(difTokFis!==0) alertas.push(['danger','🚨 '+Math.abs(difTokFis)+' tokens de diferencia: contadores '+sumTD+' vs físico contado '+(Number(c.tokens_fisicos)||0)+' ('+(difTokFis>0?'faltan físicos':'sobran físicos')+')']);
        if(difMon!==0) alertas.push(['warning','⚠️ '+fmt(Math.abs(difMon))+' de diferencia en monedas: contadores '+fmt(sumMD)+' vs físico '+fmt(c.efectivo_total_monedas)]);
        if(descEf!==0) alertas.push(['warning','⚠️ Descuadre de efectivo en liquidaciones: '+fmt(descEf)]);
        if(opsNeg.length) alertas.push(['danger','🚨 '+opsNeg.length+' operador(es) con saldo negativo (vendieron más de lo que tenían): '+opsNeg.map(o=>o.nombre+' ('+o.saldoEsperado+')').join(', ')]);
        if(ajuste!==0) alertas.push(['warning',(ajuste<0?'📤 Retiro':'📥 Ingreso')+' de tokens: '+(ajuste>0?'+':'')+ajuste+(rep.ajusteMotivo?(' — '+rep.ajusteMotivo):'')]);
        return (
        <div className="modal-bg" onClick={()=>setDetalle(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:800,maxHeight:"88vh",overflowY:"auto"}}>
            <div className="modal-t">Ciclo {c.sede} · {c.fecha}</div>
            <div className="muted" style={{marginBottom:10}}>Tesorero {c.tesorero||"—"} · Reparto: {rep.modoReparto||"—"}{(c.resumen&&c.resumen.importado)?" · (importado de Sheets)":""}</div>

            <div style={{marginBottom:14}}>
              <div className="card-t">🚨 Alertas / Revisar</div>
              {alertas.length===0
                ? <div style={{padding:"11px 14px",borderRadius:10,background:"var(--green-d)",color:"var(--green)",fontWeight:800,border:"1px solid rgba(16,185,129,.3)"}}>✓ Sin alertas — el ciclo cuadra</div>
                : alertas.map(([niv,txt],i)=>{ const col=niv==='danger'?"var(--red)":"var(--amber)"; const bg=niv==='danger'?"var(--red-d)":"var(--amber-d)"; return (
                    <div key={i} style={{padding:"11px 14px",borderRadius:10,marginBottom:6,background:bg,color:col,fontWeight:700,border:"1px solid "+col,fontSize:13}}>{txt}</div>
                  );})}
            </div>

            <div className="cards" style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
              {[['Total recaudo',fmt(c.total_recaudo)],['A consignar',fmt(c.a_consignar)],['Gastos',fmt(c.total_gastos)],['Descuadre',fmt(c.total_descuadre)],['Tokens físicos',c.tokens_fisicos],['Base tokens',(rep.tokensTotalBase!=null?rep.tokensTotalBase:'—')]].map(([l,v])=>(
                <div key={l} className="card" style={{flex:"1 1 110px",padding:10}}><div className="muted" style={{fontSize:11}}>{l}</div><div style={{fontSize:16,fontWeight:800}}>{v}</div></div>
              ))}
            </div>

            <div className="card-t">Liquidaciones ({detalle.liquidaciones.length})</div>
            <div style={{overflowX:"auto"}}><table className="tbl"><thead><tr><th>Operador</th><th className="num">Valor</th><th className="num">QR</th><th className="num">Efectivo</th><th className="num">Contado</th><th className="num">Descuadre</th></tr></thead>
              <tbody>{detalle.liquidaciones.map((l,i)=>(<tr key={i}><td className="row-name">{l.operador}</td><td className="num">{fmt(l.valor)}</td><td className="num">{fmt(l.qr)}</td><td className="num">{fmt(l.efectivo)}</td><td className="num">{fmt(l.efectivo_contado)}</td><td className="num" style={{color:Number(l.descuadre)?"var(--red)":"var(--green)"}}>{fmt(l.descuadre)}</td></tr>))}</tbody></table></div>

            <div className="card-t" style={{marginTop:14}}>Máquinas ({detalle.maquinas.length})</div>
            <div style={{overflowX:"auto"}}><table className="tbl"><thead><tr><th>Máquina</th><th className="num">Producido</th><th className="num">Tokens prod.</th><th className="num">Token día</th><th className="num">Mone día</th></tr></thead>
              <tbody>{detalle.maquinas.map((m,i)=>(<tr key={i}><td className="row-name">{m.nombre}</td><td className="num">{fmt(m.producido)}</td><td className="num">{m.producido_tokens}</td><td className="num">{m.token_dia}</td><td className="num">{fmt(m.mone_dia)}</td></tr>))}</tbody></table></div>
            <div className="muted" style={{fontSize:12,marginTop:4}}>Σ Token día <b>{sumTD}</b> vs físico <b>{c.tokens_fisicos}</b> · Σ Mone día <b>{fmt(sumMD)}</b> vs monedas <b>{fmt(c.efectivo_total_monedas)}</b></div>

            {ct.length>0 && <div>
              <div className="card-t" style={{marginTop:14}}>Control de tokens por operador</div>
              <div style={{overflowX:"auto"}}><table className="tbl"><thead><tr><th>Operador</th><th className="num">Saldo ant.</th><th className="num">Vendidos</th><th className="num">Dev</th><th className="num">Memb.</th><th className="num">Saldo esp.</th></tr></thead>
                <tbody>{ct.map((o,i)=>(<tr key={i}><td className="row-name">{o.nombre}</td><td className="num muted">{o.historial?o.historial.saldo:0}</td><td className="num">{o.vendidosEsteC}</td><td className="num">{o.devTokensEsteC}</td><td className="num">{o.membresiaEsteC}</td><td className="num" style={{fontWeight:700,color:(o.saldoEsperado!=null&&o.saldoEsperado<0)?"var(--red)":"var(--t)"}}>{o.saldoEsperado==null?"base sede":o.saldoEsperado}</td></tr>))}</tbody></table></div>
            </div>}

            {detalle.gastos.length>0 && <div>
              <div className="card-t" style={{marginTop:14}}>Gastos ({detalle.gastos.length})</div>
              {detalle.gastos.map((g,i)=>(<div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid var(--bd)"}}><span>{g.concepto||"—"}</span><b>{fmt(g.monto)}</b></div>))}
            </div>}

            <div className="modal-actions"><button className="btn btn-ghost" onClick={()=>setDetalle(null)}>Cerrar</button></div>
          </div>
        </div>
        );
      })()}
    </div>
  );
}

// ============================================================
// SECCIÓN: REPUESTOS — inventario central + solicitudes a administración
// ============================================================
function Repuestos({showToast, quien, rol}){
  const esAdmin = true;   // acceso total para admin Y supervisor (solo estos dos roles entran al back office)
  const money=n=>"$"+(Number(n)||0).toLocaleString("es-CO");
  const [sub,setSub]=useState("inventario");   // 'inventario' | 'solicitudes'
  const [reps,setReps]=useState(null);
  const [sols,setSols]=useState([]);
  const [sedes,setSedes]=useState([]);
  const [editing,setEditing]=useState(null);    // repuesto en edición (admin)
  const [cargar,setCargar]=useState(null);       // {repuesto} para sumar stock (admin)
  const [cargarCant,setCargarCant]=useState("");
  const [nuevaSol,setNuevaSol]=useState(null);   // modal nueva solicitud

  const loadReps=()=>db.listRepuestos().then(setReps).catch(()=>setReps([]));
  const loadSols=()=>db.listSolicitudes(esAdmin?{}:{solicitante:quien}).then(setSols).catch(()=>setSols([]));
  useEffect(()=>{ loadReps(); loadSols(); db.listSedes().then(setSedes).catch(()=>{}); },[]);

  const all=reps||[];
  const valorTotal=all.reduce((a,r)=>a+(Number(r.stock)||0)*(Number(r.costo)||0),0);
  const bajos=all.filter(r=>Number(r.stock)<=Number(r.stock_minimo)&&Number(r.stock_minimo)>0);
  const solPend=sols.filter(s=>s.estado==='pendiente').length;

  const guardarRep=async()=>{
    const r=editing; if(!(r.nombre||"").trim()){ showToast("Ponle nombre al repuesto","err"); return; }
    try{ await db.saveRepuesto(r); setEditing(null); loadReps(); showToast("Repuesto guardado","ok"); }
    catch(e){ showToast(""+(e.message||e),"err"); }
  };
  const borrarRep=async(r)=>{ if(!confirm("¿Quitar \""+r.nombre+"\" del inventario?")) return; try{ await db.deleteRepuesto(r.id); loadReps(); }catch(e){ showToast(""+(e.message||e),"err"); } };
  const hacerCargar=async()=>{ const c=Number(cargarCant)||0; if(c<=0){ setCargar(null); return; } try{ await db.cargarRepuesto(cargar.repuesto.id,c); setCargar(null); setCargarCant(""); loadReps(); showToast("Stock cargado","ok"); }catch(e){ showToast(""+(e.message||e),"err"); } };

  // ---- nueva solicitud ----
  const abrirSol=()=>{ const s0=(sedes.find(x=>!x.es_bodega)||sedes[0]||{}).nombre||""; setNuevaSol({sede:s0,nota:"",lineas:[{key:uid(),repuesto_id:"",nombre:"",cantidad:1}]}); };
  const setLinea=(k,patch)=>setNuevaSol(s=>({...s,lineas:s.lineas.map(l=>l.key===k?{...l,...patch}:l)}));
  const addLinea=()=>setNuevaSol(s=>({...s,lineas:[...s.lineas,{key:uid(),repuesto_id:"",nombre:"",cantidad:1}]}));
  const delLinea=(k)=>setNuevaSol(s=>({...s,lineas:s.lineas.filter(l=>l.key!==k)}));
  const enviarSol=async()=>{
    const items=nuevaSol.lineas
      .map(l=>{ const rep=all.find(x=>x.id===l.repuesto_id); return {repuesto_id:l.repuesto_id||"", nombre:rep?rep.nombre:(l.nombre||"").trim(), cantidad:Number(l.cantidad)||1}; })
      .filter(i=>i.nombre);
    if(!items.length){ showToast("Agrega al menos un repuesto","err"); return; }
    try{ await db.crearSolicitud(nuevaSol.sede, quien, nuevaSol.nota.trim(), items); setNuevaSol(null); loadSols(); showToast("Solicitud enviada a administración","ok"); }
    catch(e){ showToast(""+(e.message||e),"err"); }
  };
  const resolver=async(s,estado)=>{ try{ await db.resolverSolicitud(s.id,estado,quien); loadSols(); showToast(estado==='aprobada'?"Solicitud aprobada":"Solicitud rechazada","ok"); }catch(e){ showToast(""+(e.message||e),"err"); } };

  const itemsTxt=s=>(s.solicitud_items||[]).map(i=>i.cantidad+"× "+i.nombre).join(", ")||"—";
  const pillSol=e=> e==='aprobada'?<span className="pill pill-prod">Aprobada</span> : e==='rechazada'?<span className="pill pill-off">Rechazada</span> : <span className="pill pill-token">Pendiente</span>;

  return (
    <div>
      <div className="toolbar">
        <div className="sec-title" style={{marginRight:"auto"}}>Repuestos</div>
        <div style={{display:"flex",gap:6,background:"var(--sf2)",borderRadius:10,padding:4}}>
          <button className={"btn btn-sm "+(sub==='inventario'?'btn-amber':'btn-ghost')} onClick={()=>setSub('inventario')}>🔩 Inventario</button>
          <button className={"btn btn-sm "+(sub==='solicitudes'?'btn-amber':'btn-ghost')} onClick={()=>setSub('solicitudes')}>📨 Solicitudes{solPend>0?(" ("+solPend+")"):""}</button>
        </div>
      </div>

      {/* ===== INVENTARIO ===== */}
      {sub==='inventario' && (<div>
        <div className="cards" style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:14}}>
          <div className="card" style={{flex:"1 1 160px"}}><div className="muted">Tipos de repuesto</div><div style={{fontSize:24,fontWeight:800}}>{all.length}</div></div>
          <div className="card" style={{flex:"1 1 160px"}}><div className="muted">Valor del inventario</div><div style={{fontSize:24,fontWeight:800,color:"var(--green)"}}>{money(valorTotal)}</div></div>
          <div className="card" style={{flex:"1 1 160px"}}><div className="muted">Stock bajo</div><div style={{fontSize:24,fontWeight:800,color:bajos.length?"var(--red)":"var(--green)"}}>{bajos.length}</div></div>
        </div>
        {esAdmin && <div className="toolbar"><button className="btn btn-amber btn-sm" style={{marginLeft:"auto"}} onClick={()=>setEditing({nombre:"",categoria:"",unidad:"unidad",costo:0,stock:0,stock_minimo:0})}>＋ Nuevo repuesto</button></div>}
        {reps===null ? <div className="empty">Cargando…</div> : (
          <div className="card" style={{padding:0,overflowX:"auto"}}>
            <table className="tbl">
              <thead><tr><th>Repuesto</th><th>Categoría</th><th>Stock</th><th>Costo unit.</th><th>Valor</th>{esAdmin&&<th></th>}</tr></thead>
              <tbody>
                {all.length===0 && <tr><td colSpan={esAdmin?6:5}><div className="empty">No hay repuestos. {esAdmin?"Agrega el primero.":""}</div></td></tr>}
                {all.map(r=>{ const bajo=Number(r.stock)<=Number(r.stock_minimo)&&Number(r.stock_minimo)>0; return (
                  <tr key={r.id}>
                    <td className="row-name">{r.nombre}</td>
                    <td className="muted">{r.categoria||"—"}</td>
                    <td style={{fontWeight:700,color:bajo?"var(--red)":"var(--t)"}}>{Number(r.stock)||0} {r.unidad||""}{bajo?" ⚠":""}</td>
                    <td className="muted">{money(r.costo)}</td>
                    <td style={{fontWeight:700}}>{money((Number(r.stock)||0)*(Number(r.costo)||0))}</td>
                    {esAdmin&&<td style={{whiteSpace:"nowrap"}}><div className="actions">
                      <button className="btn btn-ghost btn-sm" onClick={()=>{setCargar({repuesto:r});setCargarCant("");}} title="Cargar stock (compra/entrada)">＋ Cargar</button>
                      <button className="btn btn-ghost btn-sm" onClick={()=>setEditing({...r})}>Editar</button>
                      <button className="btn btn-danger btn-sm" onClick={()=>borrarRep(r)}>✕</button>
                    </div></td>}
                  </tr>
                );})}
              </tbody>
            </table>
          </div>
        )}
      </div>)}

      {/* ===== SOLICITUDES ===== */}
      {sub==='solicitudes' && (<div>
        <div className="toolbar">
          <div className="muted" style={{marginRight:"auto"}}>{esAdmin?"Todas las solicitudes":"Tus solicitudes"}</div>
          <button className="btn btn-amber btn-sm" onClick={abrirSol}>＋ Nueva solicitud</button>
        </div>
        <div className="card" style={{padding:0,overflowX:"auto"}}>
          <table className="tbl">
            <thead><tr><th>Fecha</th><th>Sede</th><th>Solicita</th><th>Repuestos</th><th>Estado</th>{esAdmin&&<th></th>}</tr></thead>
            <tbody>
              {sols.length===0 && <tr><td colSpan={esAdmin?6:5}><div className="empty">Sin solicitudes.</div></td></tr>}
              {sols.map(s=>(
                <tr key={s.id}>
                  <td className="muted">{fLocalDia(s.created_at)}</td>
                  <td>{s.sede||"—"}</td>
                  <td className="muted">{s.solicitado_por||"—"}</td>
                  <td>{itemsTxt(s)}{s.nota?<div className="muted" style={{fontSize:12}}>📝 {s.nota}</div>:null}</td>
                  <td>{pillSol(s.estado)}</td>
                  {esAdmin&&<td style={{whiteSpace:"nowrap"}}>{s.estado==='pendiente'
                    ? <div className="actions"><button className="btn btn-amber btn-sm" onClick={()=>resolver(s,'aprobada')}>Aprobar</button><button className="btn btn-ghost btn-sm" onClick={()=>resolver(s,'rechazada')}>Rechazar</button></div>
                    : <span className="muted">{s.resuelto_por||""}</span>}</td>}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>)}

      {/* editor de repuesto */}
      {editing && (
        <div className="modal-bg" onClick={()=>setEditing(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-t">{editing.id?"Editar repuesto":"Nuevo repuesto"}</div>
            <label className="label">Nombre</label>
            <input className="input" autoFocus value={editing.nombre} onChange={e=>setEditing({...editing,nombre:e.target.value})} placeholder="Ej. Rodamiento 6203"/>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              <div style={{flex:"1 1 160px"}}><label className="label">Categoría</label><input className="input" value={editing.categoria||""} onChange={e=>setEditing({...editing,categoria:e.target.value})} placeholder="Ej. Motor, Eléctrico…"/></div>
              <div style={{flex:"1 1 100px"}}><label className="label">Unidad</label><input className="input" value={editing.unidad||""} onChange={e=>setEditing({...editing,unidad:e.target.value})} placeholder="unidad"/></div>
            </div>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              <div style={{flex:"1 1 120px"}}><label className="label">Costo unitario</label><input className="input" type="number" value={editing.costo} onChange={e=>setEditing({...editing,costo:e.target.value})}/></div>
              <div style={{flex:"1 1 90px"}}><label className="label">Stock</label><input className="input" type="number" value={editing.stock} onChange={e=>setEditing({...editing,stock:e.target.value})}/></div>
              <div style={{flex:"1 1 90px"}}><label className="label">Stock mín.</label><input className="input" type="number" value={editing.stock_minimo} onChange={e=>setEditing({...editing,stock_minimo:e.target.value})}/></div>
            </div>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={()=>setEditing(null)}>Cancelar</button>
              <button className="btn btn-amber" onClick={guardarRep}>Guardar</button>
            </div>
          </div>
        </div>
      )}

      {/* cargar stock */}
      {cargar && (
        <div className="modal-bg" onClick={()=>setCargar(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:360}}>
            <div className="modal-t">＋ Cargar stock — {cargar.repuesto.nombre}</div>
            <div className="muted" style={{marginBottom:8}}>Stock actual: <b>{Number(cargar.repuesto.stock)||0}</b>. ¿Cuántas unidades entran?</div>
            <input className="input" type="number" autoFocus value={cargarCant} onChange={e=>setCargarCant(e.target.value)} placeholder="Cantidad que entra"/>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={()=>setCargar(null)}>Cancelar</button>
              <button className="btn btn-amber" onClick={hacerCargar}>Cargar</button>
            </div>
          </div>
        </div>
      )}

      {/* nueva solicitud */}
      {nuevaSol && (
        <div className="modal-bg" onClick={()=>setNuevaSol(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-t">📨 Nueva solicitud de repuestos</div>
            <label className="label">Sede</label>
            <select className="select" value={nuevaSol.sede} onChange={e=>setNuevaSol({...nuevaSol,sede:e.target.value})}>
              {sedes.map(s=><option key={s.id} value={s.nombre}>{s.nombre}{s.es_bodega?" (bodega)":""}</option>)}
            </select>
            <label className="label">Repuestos que necesitas</label>
            {nuevaSol.lineas.map(l=>(
              <div key={l.key} style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
                <select className="select" style={{margin:0,flex:1}} value={l.repuesto_id} onChange={e=>setLinea(l.key,{repuesto_id:e.target.value})}>
                  <option value="">— Otro (escribir) —</option>
                  {all.map(r=><option key={r.id} value={r.id}>{r.nombre}</option>)}
                </select>
                {!l.repuesto_id && <input className="input" style={{margin:0,flex:1}} value={l.nombre} onChange={e=>setLinea(l.key,{nombre:e.target.value})} placeholder="Nombre del repuesto"/>}
                <input className="input" style={{margin:0,width:70}} type="number" value={l.cantidad} onChange={e=>setLinea(l.key,{cantidad:e.target.value})}/>
                <button className="btn btn-ghost btn-sm" onClick={()=>delLinea(l.key)}>✕</button>
              </div>
            ))}
            <button className="btn btn-ghost btn-sm" onClick={addLinea}>＋ Agregar repuesto</button>
            <label className="label" style={{marginTop:10}}>Nota (opcional)</label>
            <input className="input" value={nuevaSol.nota} onChange={e=>setNuevaSol({...nuevaSol,nota:e.target.value})} placeholder="Para qué equipo / urgencia…"/>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={()=>setNuevaSol(null)}>Cancelar</button>
              <button className="btn btn-amber" onClick={enviarSol}>Enviar solicitud</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// SECCIÓN: TAREAS — asignaciones a empleados con fecha límite y casilla "hecho"
