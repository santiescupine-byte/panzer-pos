    input,select,button,textarea{font-family:inherit;}
    input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none;}

    ::selection{background:rgba(245,158,11,0.25);}
    #loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s;}
    #loading.hide{opacity:0;pointer-events:none;}
    .loader{width:40px;height:40px;border:3px solid var(--bd);border-top-color:var(--amber);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px;}

    .app{max-width:1000px;margin:0 auto;min-height:100vh;}
    .header{background:linear-gradient(135deg,var(--sf),var(--sf2));border-bottom:1px solid var(--bd);padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;}
    .header img{height:28px;}
    .header h1{font-size:17px;font-weight:800;color:var(--tb);}
    .header-sub{font-size:11px;color:var(--td);}
    .header-badge{margin-left:auto;padding:4px 12px;border-radius:20px;font-size:10px;font-weight:800;background:var(--amber-d);color:var(--amber);letter-spacing:.5px;}
    .demo-banner{background:var(--amber-d);border-bottom:1px solid rgba(245,158,11,.25);color:var(--amber);font-size:11px;font-weight:600;text-align:center;padding:6px;}

    .tabs{display:flex;gap:6px;padding:12px 20px 0;overflow-x:auto;scrollbar-width:none;}
    .tabs::-webkit-scrollbar{display:none;}
    .tab{flex-shrink:0;padding:10px 18px;border-radius:10px 10px 0 0;font-size:14px;font-weight:700;border:1px solid transparent;background:transparent;color:var(--td);cursor:pointer;white-space:nowrap;}
    .tab.active{background:var(--sf);border-color:var(--bd);border-bottom-color:var(--sf);color:var(--amber);}
    .page{padding:20px;}
    .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
    .toolbar .input{margin-bottom:0;flex:1;min-width:160px;}
    .toolbar .select{margin-bottom:0;width:auto;min-width:140px;}
    .card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:18px;margin-bottom:12px;}
    .label{font-size:12px;font-weight:600;color:var(--td);margin-bottom:6px;display:block;letter-spacing:.3px;}
    .input,.select,.textarea{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:10px;padding:11px 13px;color:var(--tb);font-size:14px;outline:none;margin-bottom:12px;}

    .pin-dot.on{background:var(--amber);border-color:var(--amber);}
    .pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
    .pin-key{padding:18px 0;border-radius:12px;border:1px solid var(--bd);background:var(--sf2);color:var(--tb);font-size:22px;font-weight:700;cursor:pointer;user-select:none;text-align:center;}

    .toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:400;padding:12px 18px;border-radius:12px;font-size:13px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.4);}
    .toast.ok{background:var(--green);color:#fff;}
    .toast.err{background:var(--red);color:#fff;}
    .modal-actions{display:flex;gap:10px;margin-top:18px;}
    .modal-actions .btn{flex:1;}
  </style>

// ---- Generador de ventas DEMO (últimos 30 días) para que los informes muestren datos ----
let _demoVentas = null;
function demoVentas(){
  if(_demoVentas) return _demoVentas;
  const out=[];
  const vendibles = DEMO.productos.filter(p=>p.activo);
  const sedesVenta = DEMO.sedes.filter(s=>!s.es_bodega && s.activo).map(s=>s.nombre);
  const opsBySede={};
  DEMO.empleados.filter(e=>e.rol==='cajero'||e.rol==='tesorero').forEach(e=>e.sedes.forEach(s=>{(opsBySede[s]=opsBySede[s]||[]).push(e.nombre);}));
  const hoy=new Date(); hoy.setHours(12,0,0,0);
  let recibo=1000;
  const rnd=(a,b)=>a+Math.floor(Math.random()*(b-a+1));
  for(let d=29; d>=0; d--){
    const fecha=new Date(hoy); fecha.setDate(hoy.getDate()-d);
    for(const sede of sedesVenta){
      const nV=rnd(3,8);
      for(let v=0; v<nV; v++){
        const ops=opsBySede[sede]||['Operador'];
        const operador=ops[rnd(0,ops.length-1)];
        const items=[];
        const nItems=rnd(1,3);
        for(let it=0; it<nItems; it++){
          const p=vendibles[rnd(0,vendibles.length-1)];
          const precio=p.precio_variable?rnd(15,45)*1000:p.precio;
          if(precio<=0) continue;
          const cant=rnd(1,2);
          items.push({producto_id:p.id,nombre:p.nombre,categoria:p.categoria,tipo:p.tipo,cantidad:cant,precio_unit:precio,costo:p.costo||0,iva:!!p.iva,subtotal:precio*cant});
        }
        if(!items.length) continue;
        const bruto=items.reduce((s,i)=>s+i.subtotal,0);
        const descuento=Math.random()<0.15?Math.round(bruto*0.1/500)*500:0;
        const total=bruto-descuento;
        const r=Math.random();
        let ef=0,qr=0,tj=0;
        if(r<0.5) ef=total; else if(r<0.8) qr=total; else tj=total;
        out.push({id:'v'+recibo,recibo:'R-'+String(recibo).padStart(6,'0'),fecha:fecha.toISOString(),sede,operador,items,bruto,descuento,total,pago_efectivo:ef,pago_qr:qr,pago_tarjeta:tj});
        recibo++;
      }
    }
  }
  _demoVentas=out;
  return out;
}

// ============================================================
// CAPA DE DATOS (Supabase o demo)

const db = {
  // ---- SEDES ----
  async listSedes(){
    if(DEMO_MODE) return [...DEMO.sedes].sort((a,b)=>a.orden-b.orden);
    const {data,error}=await sb.from('sedes').select('*').order('orden');
    if(error) throw error; return data;
  },
  async saveSede(s){
    if(DEMO_MODE){
      if(s.id){ DEMO.sedes=DEMO.sedes.map(x=>x.id===s.id?{...x,...s}:x); }

      return;

    const row={nombre:s.nombre,es_bodega:s.es_bodega,activo:s.activo,orden:s.orden};
    if(s.id) { const {error}=await sb.from('sedes').update(row).eq('id',s.id); if(error) throw error; }

  // ---- VENTAS (para informes) ----
  // f = {desde, hasta (ISO date), sede, operador, tipoPago}
  async getVentas(f){
    if(DEMO_MODE){
      return demoVentas().filter(v=>{
        const d=v.fecha.slice(0,10);
        if(f.desde && d<f.desde) return false;
        if(f.hasta && d>f.hasta) return false;
        if(f.sede && v.sede!==f.sede) return false;
        if(f.operador && v.operador!==f.operador) return false;
        if(f.tipoPago==='efectivo' && v.pago_efectivo<=0) return false;
        if(f.tipoPago==='qr' && v.pago_qr<=0) return false;
        if(f.tipoPago==='tarjeta' && v.pago_tarjeta<=0) return false;
        return true;
      });
    }
    let q=sb.from('ventas').select('*, venta_items(*, productos(categoria))').eq('anulada',false).order('created_at');
    // Convertir los límites del día LOCAL a instantes UTC (created_at se guarda en UTC).
    // Así una venta de la noche (que en UTC cae al día siguiente) no se pierde del informe.
    if(f.desde) q=q.gte('created_at', new Date(f.desde+'T00:00:00').toISOString());
    if(f.hasta) q=q.lte('created_at', new Date(f.hasta+'T23:59:59.999').toISOString());
    if(f.sede) q=q.eq('sede', f.sede);
    if(f.operador) q=q.eq('operador', f.operador);
    const {data,error}=await q;
    if(error) throw error;
    // normalizar a la forma que usan los informes
    return (data||[]).filter(v=>{
      if(f.tipoPago==='efectivo') return v.pago_efectivo>0;
      if(f.tipoPago==='qr') return v.pago_qr>0;
      if(f.tipoPago==='tarjeta') return v.pago_tarjeta>0;
      return true;
    }).map(v=>{
      const items=(v.venta_items||[]).map(i=>({producto_id:i.producto_id,nombre:i.nombre_producto,categoria:(i.productos&&i.productos.categoria)||'—',tipo:i.tipo,cantidad:Number(i.cantidad),precio_unit:Number(i.precio_unit),costo:0,iva:false,subtotal:Number(i.subtotal)}));
      const bruto=items.reduce((s,i)=>s+i.subtotal,0);
      return {id:v.id,recibo:v.numero_recibo||('#'+v.id.slice(0,6)),fecha:v.created_at,sede:v.sede,operador:v.operador,items,bruto,descuento:Math.max(0,bruto-Number(v.total)),total:Number(v.total),pago_efectivo:Number(v.pago_efectivo),pago_qr:Number(v.pago_qr),pago_tarjeta:Number(v.pago_tarjeta)};

    const {data:inv}=await sb.from('inventario').select('producto_id,cantidad,stock_minimo').eq('sede',sede);

  async transferirStock(producto_id, origen, destino, cantidad){
    if(DEMO_MODE){
      const p=DEMO.productos.find(x=>x.id===producto_id);
      if(p){ p.stock=p.stock||{}; p.stock[origen]=(Number(p.stock[origen])||0)-cantidad; p.stock[destino]=(Number(p.stock[destino])||0)+cantidad; }
      return;

    const {error}=await sb.rpc('transferir_stock',{p_producto_id:producto_id,p_origen:origen,p_destino:destino,p_cantidad:cantidad,p_operador:null});

  // ---- Eliminar recibo (solo back office): devuelve artículos al stock ----
  async anularVenta(venta, motivo){
    if(DEMO_MODE){

      venta.items.forEach(it=>{

        const p=DEMO.productos.find(x=>x.id===it.producto_id);

      _demoVentas=demoVentas().filter(v=>v.id!==venta.id);

    const {error}=await sb.rpc('anular_venta',{p_venta_id:venta.id, p_operador:null, p_motivo:motivo||'Recibo eliminado'});
    if(error) throw error;
  },
  // ---- Login del back office (solo rol admin) ----
  async loginAdmin(pin){
    if(DEMO_MODE){
      const e=DEMO.empleados.find(x=>x.pin===pin && x.activo);
      return e ? {nombre:e.nombre, rol:e.rol} : null;
    }
    const {data,error}=await sb.from('empleados').select('nombre,rol').eq('pin',pin).eq('activo',true).maybeSingle();
    if(error||!data) return null;
    return {nombre:data.nombre, rol:data.rol};
  },
};

// ============================================================
function App(){
  const [tab,setTab]=useState("informes");
  const [toast,setToast]=useState(null);
  const [auth,setAuth]=useState(null);   // admin autenticado
  const [pin,setPin]=useState("");
  const [busy,setBusy]=useState(false);
  const showToast=(msg,type="ok")=>{ setToast({msg,type}); setTimeout(()=>setToast(null),2400); };

  const intentar=async(p)=>{
    setBusy(true);
    try{
      const u=await db.loginAdmin(p);
      if(!u){ showToast("PIN incorrecto","err"); setPin(""); }
      else if(u.rol!=='admin'){ showToast("Acceso solo para administradores","err"); setPin(""); }
      else { setAuth(u); setPin(""); }
    }catch(e){ showToast(""+(e.message||e),"err"); }
    setBusy(false);
  };
  const salir=()=>{ setAuth(null); setPin(""); setTab("informes"); };

  // ---- LOGIN (PIN solo admin) ----
  if(!auth){
    const tecla=d=>setPin(prev=>(prev+d).slice(0,4));
    const borrar=()=>setPin(prev=>prev.slice(0,-1));
    return (
      <div className="app">
        {DEMO_MODE && <div className="demo-banner">MODO DEMO — PIN admin de prueba: 6262</div>}
        {toast && <div className={"toast "+toast.type}>{toast.msg}</div>}
        <div className="login-wrap">
          <div style={{textAlign:"center",marginBottom:18}}>
            <img src="https://santiescupine-byte.github.io/panzer-vip/Panzer%20Logo%20FINAL.png" style={{width:150}} alt="Panzer"/>
            <p className="muted" style={{marginTop:8,fontSize:13}}>Back Office — Administración</p>
          </div>
          <div className="card">
            <div className="card-t" style={{justifyContent:"center"}}>🔒 PIN de administrador</div>
            <div className="pin-dots">{[0,1,2,3].map(i=><div key={i} className={"pin-dot"+(i<pin.length?" on":"")}/>)}</div>
            <div className="pinpad">
              {["1","2","3","4","5","6","7","8","9"].map(d=>(<div key={d} className="pin-key" onClick={()=>tecla(d)}>{d}</div>))}
              <div className="pin-key back" onClick={borrar}>⌫</div>
              <div className="pin-key zero" onClick={()=>tecla("0")}>0</div>
            </div>
            <button className="btn btn-amber" style={{width:"100%",marginTop:16}} disabled={pin.length<4||busy} onClick={()=>intentar(pin)}>
              {busy?"Verificando…":"Entrar"}
            </button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="app">
      {DEMO_MODE && <div className="demo-banner">MODO DEMO — los cambios no se guardan (conecta Supabase para que persistan)</div>}

function Productos({showToast}){
  const [prods,setProds]=useState(null);
  const [cats,setCats]=useState([]);
  const [sedes,setSedes]=useState([]);
  const [q,setQ]=useState("");
  const [filtroCat,setFiltroCat]=useState("");
  const [editing,setEditing]=useState(null);

  const load=async()=>{
    try{
      const [p,c,s]=await Promise.all([db.listProductos(),db.listCategorias(),db.listSedes()]);
      setProds(p); setCats(c); setSedes(s);
    }catch(e){ showToast(""+(e.message||e),"err"); }
  };
  useEffect(()=>{ load(); },[]);

  const guardar=async(p)=>{
    try{ await db.saveProducto(p); setEditing(null); await load(); showToast("Producto guardado"); }
    catch(e){ showToast(""+(e.message||e),"err"); }
  };
  const eliminar=async(p)=>{
    if(!window.confirm("¿Eliminar \""+p.nombre+"\"?")) return;
    try{ await db.deleteProducto(p.id); await load(); showToast("Producto eliminado"); }
    catch(e){ showToast(""+(e.message||e),"err"); }
  };

  if(!prods) return <div className="empty">Cargando…</div>;
  const filtrados=prods.filter(p=>
    (!filtroCat||p.categoria===filtroCat) &&
    (!q||p.nombre.toLowerCase().includes(q.toLowerCase()) || (p.codigo_barras||"").includes(q))
  );

  return (
    <div>
      <div className="toolbar">
        <div className="sec-title" style={{marginRight:"auto"}}>Productos <span className="muted">({prods.length})</span></div>
        <button className="btn btn-amber" onClick={()=>setEditing({nombre:"",tipo:"producto",categoria:cats[0]?.nombre||"",precio:0,costo:0,codigo_barras:"",controla_stock:true,precio_variable:false,iva:true,activo:true,stock:{}})}>+ Nuevo producto</button>
      </div>
      <div className="toolbar">
        <input className="input" placeholder="Buscar por nombre o código…" value={q} onChange={e=>setQ(e.target.value)}/>
        <select className="select" value={filtroCat} onChange={e=>setFiltroCat(e.target.value)}>
          <option value="">Todas las categorías</option>
          {cats.map(c=><option key={c.id} value={c.nombre}>{c.nombre}</option>)}
        </select>
      </div>
      <div className="card" style={{padding:0,overflowX:"auto"}}>
        <table className="tbl">
          <thead><tr><th>Producto</th><th>Categoría</th><th>Tipo</th><th>Precio</th><th>Stock total</th><th></th></tr></thead>
          <tbody>
            {filtrados.length===0 && <tr><td colSpan="6"><div className="empty">Sin productos.</div></td></tr>}
            {filtrados.map(p=>{
              const stockTotal=p.controla_stock?Object.values(p.stock||{}).reduce((s,v)=>s+(Number(v)||0),0):null;
              return (
                <tr key={p.id} className={p.activo?"":"inactive"}>
                  <td><div className="row-name">{p.nombre}</div>{p.codigo_barras&&<div className="muted">#{p.codigo_barras}</div>}</td>
                  <td className="muted">{p.categoria}</td>
                  <td><span className={"pill pill-"+(p.tipo==="token"?"token":p.tipo==="servicio"?"serv":"prod")}>{p.tipo}</span></td>
                  <td>{p.precio_variable?<span className="muted">Variable</span>:fmt(p.precio)}</td>
                  <td>{stockTotal==null?<span className="muted">—</span>:<b style={{color:stockTotal<=0?"var(--red)":"var(--tb)"}}>{stockTotal}</b>}</td>
                  <td><div className="actions">
                    <button className="btn btn-ghost btn-sm" onClick={()=>setEditing({...p,stock:{...p.stock}})}>Editar</button>
                    <button className="btn btn-danger btn-sm" onClick={()=>eliminar(p)}>✕</button>
                  </div></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      {editing && <ProductoModal p={editing} cats={cats} sedes={sedes} allProds={prods} onClose={()=>setEditing(null)} onSave={guardar}/>}
    </div>
  );
}

function ProductoModal({p,cats,sedes,allProds,onClose,onSave}){
  const [f,setF]=useState(p);
  const set=(k,v)=>setF(prev=>({...prev,[k]:v}));
  const setStock=(sede,v)=>setF(prev=>({...prev,stock:{...prev.stock,[sede]:v===""?null:Number(v)}}));
  const isDispo=s=>(f.dispo?.[s])!==false;   // disponible por defecto (si no hay dato)
  const setDispo=(sede,v)=>setF(prev=>({...prev,dispo:{...(prev.dispo||{}),[sede]:v}}));
  // ---- artículo compuesto (combo) ----
  const [esCompuesto,setEsCompuesto]=useState((p.componentes||[]).length>0);
  const comps=f.componentes||[];
  const addComp=()=>setF(prev=>({...prev,componentes:[...(prev.componentes||[]),{componente_id:"",cantidad:1}]}));
  const setComp=(i,k,v)=>setF(prev=>{const arr=[...(prev.componentes||[])];arr[i]={...arr[i],[k]:v};return {...prev,componentes:arr};});
  const delComp=i=>setF(prev=>({...prev,componentes:(prev.componentes||[]).filter((_,j)=>j!==i)}));
  const toggleCompuesto=on=>{ setEsCompuesto(on); if(!on){ setF(prev=>({...prev,componentes:[]})); } else if(!(f.componentes||[]).length){ addComp(); } };
  const valido=f.nombre.trim().length>0;
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-t">{p.id?"Editar producto":"Nuevo producto"}</div>
        <label className="label">Nombre</label>
        <input className="input" value={f.nombre} onChange={e=>set("nombre",e.target.value)}/>
        <div className="grid2">
          <div>
            <label className="label">Categoría</label>
            <select className="select" value={f.categoria} onChange={e=>set("categoria",e.target.value)}>
              {cats.map(c=><option key={c.id} value={c.nombre}>{c.nombre}</option>)}
            </select>
          </div>
          <div>
            <label className="label">Tipo</label>
            <select className="select" value={f.tipo} onChange={e=>set("tipo",e.target.value)}>
              <option value="producto">Producto</option>
              <option value="servicio">Servicio</option>
              <option value="token">Token</option>
              <option value="combo">Combo</option>
            </select>
          </div>
        </div>
        <div className="grid2">
          <div>
            <label className="label">Precio</label>
            <input className="input" type="number" value={f.precio} disabled={f.precio_variable} onChange={e=>set("precio",Number(e.target.value)||0)}/>
          </div>
          <div>
            <label className="label">Costo</label>
            <input className="input" type="number" value={f.costo} onChange={e=>set("costo",Number(e.target.value)||0)}/>
          </div>
        </div>
        <label className="label">Código de barras</label>
        <input className="input" value={f.codigo_barras||""} onChange={e=>set("codigo_barras",e.target.value)}/>
        <label className="check"><input type="checkbox" checked={!!f.precio_variable} onChange={e=>set("precio_variable",e.target.checked)}/> Precio variable (se pide al vender)</label>
        <label className="check"><input type="checkbox" checked={!!f.iva} onChange={e=>set("iva",e.target.checked)}/> Aplica IVA (19%)</label>
        <label className="check"><input type="checkbox" checked={!!f.controla_stock} onChange={e=>set("controla_stock",e.target.checked)}/> Controla inventario</label>
        <label className="check"><input type="checkbox" checked={!!f.activo} onChange={e=>set("activo",e.target.checked)}/> Activo</label>
        <label className="check"><input type="checkbox" checked={f.vende_pos!==false} onChange={e=>set("vende_pos",e.target.checked)}/> Se vende en el POS (visible en la caja)</label>
        <label className="check"><input type="checkbox" checked={!!f.fabricable} onChange={e=>set("fabricable",e.target.checked)}/> Es fabricable (aparece en Producción)</label>
        <div style={{marginTop:10}}>
          <label className="label">Disponibilidad por sede{f.controla_stock?" y stock":""}</label>
          <div className="muted" style={{marginTop:-6,marginBottom:8}}>Marca en qué tiendas se vende este producto.{f.controla_stock?" Y la cantidad en stock de cada una.":""}</div>
          {sedes.map(s=>(
            <div key={s.id} className="stockgrid" style={{gridTemplateColumns:f.controla_stock?"1fr 90px":"1fr"}}>
              <label className="check" style={{padding:"4px 0"}}>
                <input type="checkbox" checked={isDispo(s.nombre)} onChange={e=>setDispo(s.nombre,e.target.checked)}/>
                {s.nombre}{s.es_bodega&&<span className="pill pill-bodega" style={{marginLeft:6}}>bodega</span>}
              </label>
              {f.controla_stock && <input className="input" type="number" value={f.stock?.[s.nombre]??""} placeholder="0" disabled={!isDispo(s.nombre)} onChange={e=>setStock(s.nombre,e.target.value)}/>}
            </div>
          ))}
        </div>

        <label className="check" style={{marginTop:12}}><input type="checkbox" checked={esCompuesto} onChange={e=>toggleCompuesto(e.target.checked)}/> Artículo compuesto (combo)</label>
        {esCompuesto && (
          <div style={{marginTop:4}}>
            <div className="muted" style={{marginBottom:8}}>Al vender este combo se descuentan del inventario sus componentes (no el combo).</div>
            {comps.map((c,i)=>(
              <div key={i} style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
                <select className="select" style={{margin:0,flex:1}} value={c.componente_id} onChange={e=>setComp(i,"componente_id",e.target.value)}>
                  <option value="">Componente…</option>
                  {(allProds||[]).filter(x=>x.id!==f.id).map(x=><option key={x.id} value={x.id}>{x.nombre}</option>)}
                </select>
                <input className="input" type="number" style={{margin:0,width:70,textAlign:"center"}} value={c.cantidad} onChange={e=>setComp(i,"cantidad",Number(e.target.value)||1)}/>
                <button className="btn btn-danger btn-sm" onClick={()=>delComp(i)}>✕</button>
              </div>
            ))}
            <button className="btn btn-ghost btn-sm" onClick={addComp}>+ Agregar componente</button>
          </div>
        )}

        <div className="modal-actions">
          <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
          <button className="btn btn-amber" disabled={!valido} onClick={()=>onSave(f)}>Guardar</button>
        </div>
      </div>
    </div>
  );
}

function Empleados({showToast}){

  const [editing,setEditing]=useState(null);
  const load=async()=>{ try{ const [e,s]=await Promise.all([db.listEmpleados(),db.listSedes()]); setEmps(e); setSedes(s); }catch(e){ showToast(""+(e.message||e),"err"); } };
  useEffect(()=>{ load(); },[]);
  const guardar=async(e)=>{ try{ await db.saveEmpleado(e,sedes); setEditing(null); await load(); showToast("Empleado guardado"); }catch(er){ showToast(""+(er.message||er),"err"); } };
  const eliminar=async(e)=>{ if(!window.confirm("¿Eliminar a "+e.nombre+"?")) return; try{ await db.deleteEmpleado(e.id); await load(); showToast("Empleado eliminado"); }catch(er){ showToast(""+(er.message||er),"err"); } };
  if(!emps) return <div className="empty">Cargando…</div>;
  const toggleSede=(nombre)=>setEditing(prev=>({...prev,sedes:prev.sedes.includes(nombre)?prev.sedes.filter(x=>x!==nombre):[...prev.sedes,nombre]}));
  return (
    <div>

              <option value="gerente">Gerente</option>
              <option value="admin">Administrador</option>

            <div className="muted" style={{marginTop:-6,marginBottom:12}}>Con este PIN el empleado entra al POS. Déjalo vacío si aún no lo asignas.</div>
            <label className="label">Sedes asignadas</label>

            </div>

              <button className="btn btn-ghost" onClick={()=>setEditing(null)}>Cancelar</button>

            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// SECCIÓN: CHEQUEOS DE INVENTARIO (historial + ranking de descuadres)
// ============================================================
function Chequeos({showToast}){
  const [sedes,setSedes]=useState([]);
  const [emps,setEmps]=useState([]);
  const [sede,setSede]=useState("");
  const [operador,setOperador]=useState("");
  const [lista,setLista]=useState(null);
  const [detalle,setDetalle]=useState(null);

  useEffect(()=>{ db.listSedes().then(setSedes).catch(()=>{}); db.listEmpleados().then(setEmps).catch(()=>{}); },[]);
  const cargar=async()=>{ setLista(null); try{ setLista(await db.listChequeos({sede,operador})); }catch(e){ showToast(""+(e.message||e),"err"); setLista([]); } };
  useEffect(()=>{ cargar(); },[sede,operador]);

  if(lista===null) return (
    <div><div className="filterbar"><div className="fld"><label className="label">Sede</label><select className="select" value={sede} onChange={e=>setSede(e.target.value)}><option value="">Todas</option>{sedes.map(s=><option key={s.id} value={s.nombre}>{s.nombre}</option>)}</select></div></div><div className="empty">Cargando…</div></div>
  );

  // ranking de operadores con más descuadres (suma de n_descuadres)
  const rank={};
  lista.forEach(c=>{ const o=rank[c.operador]||(rank[c.operador]={operador:c.operador,desc:0,chequeos:0}); o.desc+=c.n_descuadres; o.chequeos++; });
  const ranking=Object.values(rank).sort((a,b)=>b.desc-a.desc).slice(0,5);

  return (
    <div>
      <div className="filterbar">
        <div className="fld"><label className="label">Sede</label>
          <select className="select" value={sede} onChange={e=>setSede(e.target.value)}>
            <option value="">Todas las tiendas</option>
            {sedes.filter(s=>!s.es_bodega).map(s=><option key={s.id} value={s.nombre}>{s.nombre}</option>)}
          </select>
        </div>
        <div className="fld"><label className="label">Colaborador</label>
          <select className="select" value={operador} onChange={e=>setOperador(e.target.value)}>
            <option value="">Todos</option>
            {emps.filter(e=>e.rol==='cajero'||e.rol==='tesorero').map(e=><option key={e.id} value={e.nombre}>{e.nombre}</option>)}
          </select>
        </div>
      </div>

      {ranking.length>0 && (
        <div className="card" style={{marginBottom:14}}>
          <div className="sec-title" style={{fontSize:15,marginBottom:10}}>⚠ Operadores con más descuadres</div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            {ranking.map((r,i)=>(
              <div key={r.operador} style={{flex:"1 1 150px",background:"var(--sf2)",border:"1px solid var(--bd)",borderRadius:10,padding:"10px 14px"}}>
                <div style={{fontWeight:700,color:"var(--tb)"}}>{i===0?"🥇 ":""}{r.operador}</div>
                <div className="muted"><b style={{color:r.desc>0?"var(--red)":"var(--green)"}}>{r.desc}</b> descuadres · {r.chequeos} chequeos</div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div className="card" style={{padding:0,overflowX:"auto"}}>
        <table className="tbl">
          <thead><tr><th>Fecha</th><th>Sede</th><th>Colaborador</th><th className="num">Base recibida</th><th className="num">Descuadres</th><th></th></tr></thead>
          <tbody>
            {lista.length===0 && <tr><td colSpan="6"><div className="empty">Sin chequeos en el periodo/filtros.</div></td></tr>}
            {lista.map(c=>(
              <tr key={c.id} style={{cursor:"pointer"}} onClick={()=>setDetalle(c)}>
                <td className="muted">{fLocalDia(c.created_at)} {fLocalHora(c.created_at)}</td>
                <td>{c.sede}</td>
                <td className="row-name">{c.operador}</td>
                <td className="num">{fmt(c.base_recibida)}</td>
                <td className="num">{c.n_descuadres>0 ? <span className="pill pill-off">{c.n_descuadres}</span> : <span className="pill pill-prod">0</span>}</td>
                <td><div className="actions"><button className="btn btn-ghost btn-sm" onClick={e=>{e.stopPropagation();setDetalle(c);}}>Ver</button></div></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {detalle && (
        <div className="modal-bg" onClick={()=>setDetalle(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-t">Chequeo — {detalle.sede}</div>
            <div className="muted" style={{marginBottom:12}}>{detalle.operador} · {fLocalDia(detalle.created_at)} {fLocalHora(detalle.created_at)}</div>
            <div className="kpis">
              <div className="kpi"><div className="kpi-label">Base recibida</div><div className="kpi-value green">{fmt(detalle.base_recibida)}</div></div>
              <div className="kpi"><div className="kpi-label">Descuadres</div><div className="kpi-value" style={{color:detalle.n_descuadres>0?"var(--red)":"var(--green)"}}>{detalle.n_descuadres}</div></div>
            </div>
            {detalle.n_descuadres>0 ? (
              <div className="card" style={{padding:0,overflowX:"auto",marginTop:6}}>
                <table className="tbl">
                  <thead><tr><th>Producto</th><th className="num">Sistema</th><th className="num">Contado</th><th className="num">Dif.</th></tr></thead>
                  <tbody>{(detalle.descuadres||[]).map((d,i)=>(
                    <tr key={i}><td className="row-name">{d.nombre}</td><td className="num">{d.sistema}</td><td className="num">{d.contado}</td><td className="num" style={{color:d.diferencia<0?"var(--red)":"var(--green)",fontWeight:800}}>{d.diferencia>0?"+":""}{d.diferencia}</td></tr>
                  ))}</tbody>
                </table>
              </div>
            ) : <div className="empty">Todo cuadró en este chequeo.</div>}
            <div className="modal-actions"><button className="btn btn-ghost" onClick={()=>setDetalle(null)}>Cerrar</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

function Inventario({showToast}){
  const [sedes,setSedes]=useState([]);
  const [cats,setCats]=useState([]);
  const [sede,setSede]=useState("");
  const [inv,setInv]=useState(null);
  const [q,setQ]=useState("");
  const [cat,setCat]=useState("");
  const [soloBajo,setSoloBajo]=useState(false);
  const [transfer,setTransfer]=useState(null);

  useEffect(()=>{ db.listSedes().then(s=>{ setSedes(s); const def=s.find(x=>!x.es_bodega)||s[0]; if(def) setSede(def.nombre); }).catch(()=>{}); db.listCategorias().then(setCats).catch(()=>{}); },[]);
  const cargar=async()=>{ if(!sede) return; setInv(null); try{ setInv(await db.getInventario(sede)); }catch(e){ showToast(""+(e.message||e),"err"); setInv([]); } };
  useEffect(()=>{ cargar(); },[sede]);

  const bodega = sedes.find(s=>s.es_bodega);
  const estado = r => r.stock<=0 ? "agotado" : (r.minimo>0 && r.stock<=r.minimo) ? "bajo" : "ok";
  const guardarMin=async(r,val)=>{
    const m=Math.max(0,Number(val)||0);
    try{ await db.setMinimo(r.id,sede,m); setInv(prev=>prev.map(x=>x.id===r.id?{...x,minimo:m}:x)); }
    catch(e){ showToast(""+(e.message||e),"err"); }
  };
  const abrirTransfer=async()=>{
    if(!bodega) return;
    let bodegaStock={};
    try{ const bi=await db.getInventario(bodega.nombre); bi.forEach(r=>{ bodegaStock[r.id]=r.stock; }); }catch(e){}
    setTransfer({origen:bodega.nombre, destino: sede!==bodega.nombre?sede:"", cantidades:{}, bodegaStock});
  };
  const hacerTransfer=async(t)=>{
    const items=Object.entries(t.cantidades||{}).filter(([id,c])=>Number(c)>0);
    if(!t.destino || !items.length) return;
    try{
      for(const [pid,c] of items){ await db.transferirStock(pid, t.origen, t.destino, Number(c)); }
      setTransfer(null); await cargar();
      showToast(items.length+" producto(s) transferido(s) a "+t.destino);
    }catch(e){ showToast(""+(e.message||e),"err"); }
  };

  if(inv===null && sede) return (
    <div>
      <div className="filterbar"><div className="fld"><label className="label">Sede</label><select className="select" value={sede} onChange={e=>setSede(e.target.value)}>{sedes.map(s=><option key={s.id} value={s.nombre}>{s.nombre}{s.es_bodega?" (bodega)":""}</option>)}</select></div></div>
      <div className="empty">Cargando inventario…</div>
    </div>
  );

  const rows=(inv||[]).filter(r=>(!q||r.nombre.toLowerCase().includes(q.toLowerCase())) && (!cat||r.categoria===cat) && (!soloBajo||estado(r)!=="ok"));
  const nBajo=(inv||[]).filter(r=>(!cat||r.categoria===cat) && estado(r)!=="ok").length;

  return (
    <div>
      <div className="filterbar">
        <div className="fld">
          <label className="label">Sede</label>
          <select className="select" value={sede} onChange={e=>setSede(e.target.value)}>
            {sedes.map(s=><option key={s.id} value={s.nombre}>{s.nombre}{s.es_bodega?" (bodega)":""}</option>)}
          </select>
        </div>
        <div className="fld">
          <label className="label">Categoría</label>
          <select className="select" value={cat} onChange={e=>setCat(e.target.value)}>
            <option value="">Todas las categorías</option>
            {cats.map(c=><option key={c.id} value={c.nombre}>{c.nombre}</option>)}
          </select>
        </div>
        <div className="fld" style={{flex:1,minWidth:160}}><label className="label">Buscar</label><input className="input" placeholder="Producto…" value={q} onChange={e=>setQ(e.target.value)}/></div>
        <label className="check" style={{alignSelf:"center"}}><input type="checkbox" checked={soloBajo} onChange={e=>setSoloBajo(e.target.checked)}/> Solo stock bajo {nBajo>0&&<span className="pill pill-off" style={{marginLeft:4}}>{nBajo}</span>}</label>
        {bodega && <button className="btn btn-amber" style={{alignSelf:"flex-end"}} onClick={abrirTransfer}>⇄ Transferir desde {bodega.nombre}</button>}
      </div>

      {nBajo>0 && !soloBajo && <div className="muted" style={{marginBottom:12}}>⚠ {nBajo} producto(s) en o por debajo del mínimo en {sede}. <a style={{color:"var(--amber)",cursor:"pointer"}} onClick={()=>setSoloBajo(true)}>Ver solo esos</a></div>}

      <div className="card" style={{padding:0,overflowX:"auto"}}>
        <table className="tbl">
          <thead><tr><th>Producto</th><th>Categoría</th><th className="num">Stock</th><th className="num">Mínimo</th><th>Estado</th></tr></thead>
          <tbody>
            {rows.length===0 && <tr><td colSpan="5"><div className="empty">Sin productos.</div></td></tr>}
            {rows.map(r=>{
              const st=estado(r);
              return (
                <tr key={r.id}>
                  <td className="row-name">{r.nombre}</td>
                  <td className="muted">{r.categoria}</td>
                  <td className="num"><b style={{color:st==="agotado"?"var(--red)":st==="bajo"?"var(--amber)":"var(--tb)"}}>{r.stock}</b></td>
                  <td className="num"><input className="input" type="number" style={{margin:0,width:80,textAlign:"right",padding:"6px 8px"}} value={r.minimo} onChange={e=>guardarMin(r,e.target.value)}/></td>
                  <td>{st==="agotado"?<span className="pill pill-off">Agotado</span>:st==="bajo"?<span className="pill pill-token">Stock bajo</span>:<span className="pill pill-prod">OK</span>}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {transfer && <TransferModal t={transfer} setT={setTransfer} bodega={bodega} sedes={sedes} inv={inv} onClose={()=>setTransfer(null)} onConfirm={hacerTransfer}/>}
    </div>
  );
}

function TransferModal({t,setT,bodega,sedes,inv,onClose,onConfirm}){
  const [q,setQ]=useState("");
  const prods=(inv||[]).filter(p=>!q||p.nombre.toLowerCase().includes(q.toLowerCase()));
  const setCant=(id,v)=>setT(prev=>({...prev,cantidades:{...(prev.cantidades||{}),[id]:v.replace(/[^0-9]/g,"")}}));
  const nSel=Object.values(t.cantidades||{}).filter(c=>Number(c)>0).length;
  const valido = t.destino && nSel>0;
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-t">⇄ Transferir desde {t.origen}</div>
        <div className="muted" style={{marginBottom:10}}>Elige la sede destino y escribe cuánto enviar de cada producto. Se descuenta de {t.origen} y se suma al destino.</div>
        <label className="label">Sede destino</label>
        <select className="select" value={t.destino} onChange={e=>setT(prev=>({...prev,destino:e.target.value}))}>
          <option value="">Seleccionar…</option>
          {sedes.filter(s=>s.nombre!==t.origen).map(s=><option key={s.id} value={s.nombre}>{s.nombre}</option>)}
        </select>
        <input className="input" placeholder="Buscar producto…" value={q} onChange={e=>setQ(e.target.value)}/>
        <div style={{maxHeight:"40vh",overflowY:"auto",border:"1px solid var(--bd)",borderRadius:10,padding:"4px 8px",marginBottom:12}}>
          {prods.map(p=>(
            <div key={p.id} className="stockgrid" style={{gridTemplateColumns:"1fr 78px",padding:"4px 0"}}>
              <span style={{fontSize:13}}>{p.nombre} <span className="muted">· bodega: {t.bodegaStock?.[p.id]??0}</span></span>
              <input className="input" type="number" inputMode="numeric" style={{margin:0,textAlign:"center"}} placeholder="0" value={t.cantidades?.[p.id]??""} onChange={e=>setCant(p.id,e.target.value)}/>
            </div>
          ))}
          {prods.length===0 && <div className="muted" style={{padding:"10px 0"}}>Sin productos.</div>}
        </div>
        <div className="modal-actions">
          <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
          <button className="btn btn-amber" disabled={!valido} onClick={()=>onConfirm(t)}>Transferir{nSel?(" "+nSel):""}</button>
        </div>
      </div>
    </div>
  );
}

const isoDay = d => d.toISOString().slice(0,10);
function rangoPreset(preset){
  const hoy=new Date(); hoy.setHours(0,0,0,0);
  const d=new Date(hoy);
  if(preset==='hoy') return {desde:isoDay(hoy),hasta:isoDay(hoy)};
  if(preset==='ayer'){ d.setDate(d.getDate()-1); return {desde:isoDay(d),hasta:isoDay(d)}; }
  if(preset==='semana'){ d.setDate(d.getDate()-d.getDay()); return {desde:isoDay(d),hasta:isoDay(hoy)}; }
  if(preset==='mes'){ const x=new Date(hoy.getFullYear(),hoy.getMonth(),1); return {desde:isoDay(x),hasta:isoDay(hoy)}; }
  if(preset==='mes_pasado'){ const a=new Date(hoy.getFullYear(),hoy.getMonth()-1,1); const b=new Date(hoy.getFullYear(),hoy.getMonth(),0); return {desde:isoDay(a),hasta:isoDay(b)}; }
  if(preset==='30dias'){ d.setDate(d.getDate()-29); return {desde:isoDay(d),hasta:isoDay(hoy)}; }
  return {desde:isoDay(hoy),hasta:isoDay(hoy)};
}

            <option value="tarjeta">Tarjeta</option>
          </select>

        {[["resumen","Resumen"],["articulo","Por artículo"],["categoria","Por categoría"],["empleado","Por empleado"],["pago","Por tipo de pago"],["recibos","Recibos"],["descuentos","Descuentos"],["impuestos","Impuestos"],["caja","Caja"]].map(([k,l])=>(

        ))}
      </div>

      {ventas===null ? <div className="empty">Cargando informe…</div> : <ReporteVista sub={sub} ventas={ventas} showToast={showToast} recargar={cargar}/>}
    </div>
  );
}

function ReporteVista({sub,ventas,showToast,recargar}){
  const [detalle,setDetalle]=useState(null);   // recibo abierto en el panel de detalle
  const [borrando,setBorrando]=useState(false);
  if(!ventas.length) return <div className="empty">No hay ventas en el periodo/filtros seleccionados.</div>;
  const allItems=ventas.flatMap(v=>v.items.map(i=>({...i,sede:v.sede,operador:v.operador})));
  const bruto=ventas.reduce((s,v)=>s+v.bruto,0);
  const descuentos=ventas.reduce((s,v)=>s+v.descuento,0);
  const netas=bruto-descuentos;
  const costo=allItems.reduce((s,i)=>s+i.costo*i.cantidad,0);
  const beneficio=netas-costo;

  if(sub==='resumen'){
    // agrupar bruto por día
    const porDia={};
    ventas.forEach(v=>{ const d=fLocalDia(v.fecha); porDia[d]=(porDia[d]||0)+v.bruto; });
    const dias=Object.keys(porDia).sort();
    const max=Math.max(...dias.map(d=>porDia[d]),1);
    return (
      <div>
        <div className="kpis">
          <div className="kpi"><div className="kpi-label">Ventas brutas</div><div className="kpi-value">{fmt(bruto)}</div></div>
          <div className="kpi"><div className="kpi-label">Descuentos</div><div className="kpi-value red">-{fmt(descuentos)}</div></div>
          <div className="kpi"><div className="kpi-label">Ventas netas</div><div className="kpi-value green">{fmt(netas)}</div></div>
          <div className="kpi"><div className="kpi-label">Beneficio bruto</div><div className="kpi-value amber">{fmt(beneficio)}</div></div>
          <div className="kpi"><div className="kpi-label">Nº de ventas</div><div className="kpi-value">{ventas.length}</div></div>
        </div>
        <div className="chart-wrap">
          <div className="label" style={{marginBottom:14}}>Ventas brutas por día</div>
          <div className="chart" style={{paddingBottom:20}}>
            {dias.map(d=>(
              <div key={d} className="bar" style={{height:(porDia[d]/max*100)+"%"}} title={d+": "+fmt(porDia[d])}>
                <span className="bar-lbl">{d.slice(8,10)}/{d.slice(5,7)}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  if(sub==='articulo' || sub==='categoria'){
    const key = sub==='articulo' ? 'nombre' : 'categoria';
    const g={};
    allItems.forEach(i=>{ const k=i[key]||'—'; const o=g[k]||(g[k]={nombre:k,cant:0,neto:0,costo:0}); o.cant+=i.cantidad; o.neto+=i.subtotal; o.costo+=i.costo*i.cantidad; });
    const rows=Object.values(g).sort((a,b)=>b.neto-a.neto);
    return (
      <div className="card" style={{padding:0,overflowX:"auto"}}>
        <table className="tbl">
          <thead><tr><th>{sub==='articulo'?'Artículo':'Categoría'}</th><th className="num">Cantidad</th><th className="num">Ventas netas</th><th className="num">Beneficio</th></tr></thead>
          <tbody>{rows.map(r=>(
            <tr key={r.nombre}><td className="row-name">{r.nombre}</td><td className="num">{r.cant}</td><td className="num">{fmt(r.neto)}</td><td className="num">{fmt(r.neto-r.costo)}</td></tr>
          ))}</tbody>
        </table>
      </div>
    );
  }

  if(sub==='empleado'){
    const g={};
    ventas.forEach(v=>{ const o=g[v.operador]||(g[v.operador]={nombre:v.operador,n:0,total:0}); o.n++; o.total+=v.total; });
    const rows=Object.values(g).sort((a,b)=>b.total-a.total);
    return (
      <div className="card" style={{padding:0,overflowX:"auto"}}>
        <table className="tbl">
          <thead><tr><th>Colaborador</th><th className="num">Nº ventas</th><th className="num">Total vendido</th><th className="num">Ticket prom.</th></tr></thead>
          <tbody>{rows.map(r=>(
            <tr key={r.nombre}><td className="row-name">{r.nombre}</td><td className="num">{r.n}</td><td className="num">{fmt(r.total)}</td><td className="num">{fmt(Math.round(r.total/r.n))}</td></tr>
          ))}</tbody>
        </table>
      </div>
    );
  }

  if(sub==='pago'){
    const ef=ventas.reduce((s,v)=>s+v.pago_efectivo,0);
    const qr=ventas.reduce((s,v)=>s+v.pago_qr,0);
    const tj=ventas.reduce((s,v)=>s+v.pago_tarjeta,0);
    const tot=ef+qr+tj||1;
    const row=(l,v)=>(<tr><td className="row-name">{l}</td><td className="num">{fmt(v)}</td><td className="num">{(v/tot*100).toFixed(1)}%</td></tr>);
    return (
      <div className="card" style={{padding:0,overflowX:"auto"}}>
        <table className="tbl">
          <thead><tr><th>Tipo de pago</th><th className="num">Total</th><th className="num">%</th></tr></thead>
          <tbody>{row("Efectivo",ef)}{row("QR / Transferencia",qr)}{row("Tarjeta",tj)}</tbody>
        </table>
      </div>
    );
  }

  if(sub==='recibos'){
    const rows=[...ventas].sort((a,b)=>b.fecha.localeCompare(a.fecha)).slice(0,200);
    const metodo=v=>v.pago_efectivo>0?"Efectivo":v.pago_qr>0?"QR":"Tarjeta";
    const eliminar=async(v)=>{
      if(!window.confirm("¿Eliminar el recibo "+v.recibo+" por "+fmt(v.total)+"?\n\nLos artículos volverán al stock de "+v.sede+" y la venta se quitará de los informes.")) return;
      setBorrando(true);
      try{ await db.anularVenta(v,"Recibo eliminado desde back office"); setDetalle(null); await recargar(); showToast("Recibo eliminado y stock devuelto"); }
      catch(e){ showToast(""+(e.message||e),"err"); }
      setBorrando(false);
    };
    return (
      <div>
        <div className="kpis">
          <div className="kpi"><div className="kpi-label">Recibos</div><div className="kpi-value">{ventas.length}</div></div>
          <div className="kpi"><div className="kpi-label">Total facturado</div><div className="kpi-value green">{fmt(ventas.reduce((s,v)=>s+v.total,0))}</div></div>
        </div>
        <div className="card" style={{padding:0,overflowX:"auto"}}>
          <table className="tbl">
            <thead><tr><th>Recibo</th><th>Fecha</th><th>Sede</th><th>Colaborador</th><th className="num">Total</th><th>Pago</th><th></th></tr></thead>
            <tbody>{rows.map(v=>(
              <tr key={v.id} style={{cursor:"pointer"}} onClick={()=>setDetalle(v)}>
                <td className="row-name" style={{color:"var(--green)"}}>{v.recibo}</td>
                <td className="muted">{fLocalDia(v.fecha)} {fLocalHora(v.fecha)}</td>
                <td>{v.sede}</td><td className="muted">{v.operador}</td>
                <td className="num">{fmt(v.total)}</td>
                <td><span className="chip">{metodo(v)}</span></td>
                <td><div className="actions"><button className="btn btn-danger btn-sm" onClick={e=>{e.stopPropagation();eliminar(v);}}>Eliminar</button></div></td>
              </tr>
            ))}</tbody>
          </table>
          {ventas.length>200 && <div className="muted" style={{padding:12}}>Mostrando los 200 más recientes de {ventas.length}.</div>}
        </div>
        {detalle && <ReciboDetalle v={detalle} metodo={metodo} borrando={borrando} onClose={()=>setDetalle(null)} onEliminar={()=>eliminar(detalle)}/>}
      </div>
    );
  }

  if(sub==='descuentos'){
    const conDesc=ventas.filter(v=>v.descuento>0).sort((a,b)=>b.descuento-a.descuento);
    return (
      <div>
        <div className="kpis"><div className="kpi"><div className="kpi-label">Total descuentos</div><div className="kpi-value red">-{fmt(descuentos)}</div></div><div className="kpi"><div className="kpi-label">Ventas con descuento</div><div className="kpi-value">{conDesc.length}</div></div></div>
        <div className="card" style={{padding:0,overflowX:"auto"}}>
          <table className="tbl">
            <thead><tr><th>Recibo</th><th>Fecha</th><th>Sede</th><th className="num">Bruto</th><th className="num">Descuento</th></tr></thead>
            <tbody>{conDesc.slice(0,200).map(v=>(
              <tr key={v.id}><td className="row-name">{v.recibo}</td><td className="muted">{fLocalDia(v.fecha)}</td><td>{v.sede}</td><td className="num">{fmt(v.bruto)}</td><td className="num" style={{color:"var(--red)"}}>-{fmt(v.descuento)}</td></tr>
            ))}</tbody>
          </table>
        </div>
      </div>
    );
  }

  if(sub==='impuestos'){
    // IVA incluido en el precio: base = subtotal/1.19, iva = subtotal - base
    let base=0,iva=0,exento=0;
    allItems.forEach(i=>{ if(i.iva){ const b=i.subtotal/1.19; base+=b; iva+=i.subtotal-b; } else { exento+=i.subtotal; } });
    return (
      <div>
        <div className="kpis">
          <div className="kpi"><div className="kpi-label">Base gravable</div><div className="kpi-value">{fmt(Math.round(base))}</div></div>
          <div className="kpi"><div className="kpi-label">IVA 19% recaudado</div><div className="kpi-value amber">{fmt(Math.round(iva))}</div></div>
          <div className="kpi"><div className="kpi-label">Ventas exentas</div><div className="kpi-value">{fmt(Math.round(exento))}</div></div>
        </div>
      </div>
    );
  }

  if(sub==='caja'){
    // efectivo recibido por sede y por día
    const g={};
    ventas.forEach(v=>{ if(v.pago_efectivo>0){ const o=g[v.sede]||(g[v.sede]={sede:v.sede,efectivo:0,n:0}); o.efectivo+=v.pago_efectivo; o.n++; } });
    const rows=Object.values(g).sort((a,b)=>b.efectivo-a.efectivo);
    const totalEf=rows.reduce((s,r)=>s+r.efectivo,0);
    return (
      <div>
        <div className="kpis"><div className="kpi"><div className="kpi-label">Efectivo recaudado</div><div className="kpi-value green">{fmt(totalEf)}</div></div></div>
        <div className="card" style={{padding:0,overflowX:"auto"}}>
          <table className="tbl">
            <thead><tr><th>Sede</th><th className="num">Ventas en efectivo</th><th className="num">Efectivo recaudado</th></tr></thead>
            <tbody>{rows.map(r=>(
              <tr key={r.sede}><td className="row-name">{r.sede}</td><td className="num">{r.n}</td><td className="num">{fmt(r.efectivo)}</td></tr>
            ))}</tbody>
          </table>
        </div>
      </div>
    );
  }
  return null;
}

// Panel de detalle de un recibo (estilo Loyverse) con opción de eliminar
function ReciboDetalle({v,metodo,borrando,onClose,onEliminar}){
  const iva = v.items.reduce((s,i)=> s + (i.iva ? (i.subtotal - i.subtotal/1.19) : 0), 0);
  const pagoLabel = v.pago_efectivo>0?"Efectivo":v.pago_qr>0?"QR / Transferencia":"Tarjeta";
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div style={{textAlign:"center",marginBottom:6}}>
          <div className="kpi-value" style={{fontSize:30}}>{fmt(v.total)}</div>
          <div className="muted">Total</div>
        </div>
        <div className="muted" style={{marginBottom:14}}>Colaborador: <b style={{color:"var(--t)"}}>{v.operador}</b> · Sede: <b style={{color:"var(--t)"}}>{v.sede}</b></div>
        <div className="card" style={{padding:14,marginBottom:14}}>
          {v.items.map((i,idx)=>(
            <div key={idx} className="result-row" style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid var(--bd)"}}>
              <div><div style={{fontWeight:600,color:"var(--tb)"}}>{i.nombre}</div><div className="muted">{i.cantidad} × {fmt(i.precio_unit)}</div></div>
              <div style={{fontWeight:700}}>{fmt(i.subtotal)}</div>
            </div>
          ))}
          <div style={{display:"flex",justifyContent:"space-between",padding:"10px 0 0",fontWeight:800,color:"var(--tb)"}}><span>Total</span><span>{fmt(v.total)}</span></div>
          {v.descuento>0 && <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",color:"var(--red)"}}><span>Descuento</span><span>-{fmt(v.descuento)}</span></div>}
          <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",color:"var(--td)"}}><span>IVA 19%</span><span>{fmt(Math.round(iva))}</span></div>
          <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",color:"var(--td)"}}><span>{pagoLabel}</span><span>{fmt(v.total)}</span></div>
        </div>
        <div className="muted" style={{marginBottom:14}}>{fLocalDia(v.fecha)} {fLocalHora(v.fecha)} · {v.recibo}</div>
        <div className="modal-actions">
          <button className="btn btn-ghost" onClick={onClose}>Cerrar</button>
          <button className="btn btn-danger" disabled={borrando} onClick={onEliminar}>{borrando?"Eliminando…":"🗑 Eliminar recibo"}</button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// SECCIÓN: PRODUCCIÓN (insumos, recetas, producir, historial)
// ============================================================
const UNIDADES=["g","kg","ml","L","unidad"];
// factor para pasar de "kg equivalente" a la unidad del insumo (g/ml van en milésimas)
const convInsumo=u=>(u==='g'||u==='ml')?1000:1;

function Produccion({showToast}){
  const [sub,setSub]=useState("insumos");
  const [clave,setClave]=useState(null);    // clave verificada (fórmulas desbloqueadas) o null
  const [existe,setExiste]=useState(true);
  const [modal,setModal]=useState(null);     // 'unlock' | 'setclave'
  useEffect(()=>{ db.claveFormulasExiste().then(setExiste).catch(()=>{}); },[]);
  const onUnlock=()=>setModal('unlock');
  return (
    <div>
      <div className="subnav">
        {[["insumos","Insumos"],["recetas","Recetas"],["producir","Producir"],["historial","Historial"]].map(([k,l])=>(
          <div key={k} className={"subnav-btn"+(sub===k?" on":"")} onClick={()=>setSub(k)}>{l}</div>
        ))}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,flexWrap:"wrap"}}>
        {clave
          ? <><span className="pill pill-prod">🔓 Fórmulas desbloqueadas</span><button className="btn btn-ghost btn-sm" onClick={()=>setClave(null)}>Bloquear</button></>
          : <><span className="pill pill-off">🔒 Fórmulas protegidas</span><button className="btn btn-amber btn-sm" onClick={onUnlock}>Desbloquear fórmulas</button></>}
        <button className="btn btn-ghost btn-sm" style={{marginLeft:"auto"}} onClick={()=>setModal('setclave')}>{existe?"Cambiar clave":"Definir clave"}</button>
      </div>

      {sub==="insumos"   && <Insumos showToast={showToast}/>}
      {sub==="recetas"   && <Recetas showToast={showToast} clave={clave} onUnlock={onUnlock}/>}
      {sub==="producir"  && <Producir showToast={showToast} clave={clave} onUnlock={onUnlock}/>}
      {sub==="historial" && <HistorialProd showToast={showToast} clave={clave} onUnlock={onUnlock}/>}

      {modal==='unlock' && <ClaveModal titulo="Desbloquear fórmulas" label="Clave de fórmulas" onClose={()=>setModal(null)}
        onOk={async(c)=>{ if(await db.verificarClaveFormulas(c)){ setClave(c); setModal(null); showToast("Fórmulas desbloqueadas"); } else { showToast("Clave incorrecta","err"); } }}/>}
      {modal==='setclave' && <SetClaveModal existe={existe} onClose={()=>setModal(null)}
        onOk={async(actual,nueva)=>{ try{ await db.setClaveFormulas(actual,nueva); setExiste(true); setClave(nueva); setModal(null); showToast("Clave guardada"); }catch(e){ showToast(""+(e.message||e),"err"); } }}/>}
    </div>
  );
}

function ClaveModal({titulo,label,onClose,onOk}){
  const [c,setC]=useState(""); const [busy,setBusy]=useState(false);
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:360}}>
        <div className="modal-t">🔒 {titulo}</div>
        <label className="label">{label}</label>
        <input className="input" type="password" autoFocus value={c} onChange={e=>setC(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&c){setBusy(true);onOk(c);}}}/>
        <div className="modal-actions">
          <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
          <button className="btn btn-amber" disabled={!c||busy} onClick={()=>{setBusy(true);onOk(c);}}>Entrar</button>
        </div>
      </div>
    </div>
  );
}

function SetClaveModal({existe,onClose,onOk}){
  const [actual,setActual]=useState(""); const [nueva,setNueva]=useState(""); const [n2,setN2]=useState("");
  const valido = nueva.length>=4 && nueva===n2 && (!existe || actual.length>0);
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:380}}>
        <div className="modal-t">🔑 {existe?"Cambiar clave de fórmulas":"Definir clave de fórmulas"}</div>
        <div className="muted" style={{marginBottom:10}}>Esta clave solo la conoces tú. Se guarda encriptada en el servidor; protege las recetas.</div>
        {existe && <><label className="label">Clave actual</label><input className="input" type="password" value={actual} onChange={e=>setActual(e.target.value)}/></>}
        <label className="label">Nueva clave (mín. 4)</label>
        <input className="input" type="password" value={nueva} onChange={e=>setNueva(e.target.value)}/>
        <label className="label">Repetir nueva clave</label>
        <input className="input" type="password" value={n2} onChange={e=>setN2(e.target.value)}/>
        {nueva && n2 && nueva!==n2 && <div className="muted" style={{color:"var(--red)"}}>No coinciden.</div>}
        <div className="modal-actions">
          <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
          <button className="btn btn-amber" disabled={!valido} onClick={()=>onOk(actual,nueva)}>Guardar clave</button>
        </div>
      </div>
    </div>
  );
}

function Insumos({showToast}){
  const [items,setItems]=useState(null);
  const [editing,setEditing]=useState(null);
  const [carga,setCarga]=useState(null);
  const load=async()=>{ try{ setItems(await db.listInsumos()); }catch(e){ showToast(""+(e.message||e),"err"); } };
  useEffect(()=>{ load(); },[]);
  const guardar=async(i)=>{ try{ await db.saveInsumo(i); setEditing(null); await load(); showToast("Insumo guardado"); }catch(e){ showToast(""+(e.message||e),"err"); } };
  const eliminar=async(i)=>{ if(!window.confirm("¿Eliminar \""+i.nombre+"\"?")) return; try{ await db.deleteInsumo(i.id); await load(); showToast("Insumo eliminado"); }catch(e){ showToast(""+(e.message||e),"err"); } };
  const cargar=async(c)=>{ try{ await db.entradaInsumo(c.id,Number(c.cantidad),c.costo?Number(c.costo):0,c.nota); setCarga(null); await load(); showToast("Entrada registrada"); }catch(e){ showToast(""+(e.message||e),"err"); } };
  if(!items) return <div className="empty">Cargando…</div>;
  const bajos=items.filter(i=>Number(i.stock)<=Number(i.stock_minimo) && Number(i.stock_minimo)>0).length;
  return (
    <div>
      <div className="toolbar">
        <div className="sec-title" style={{marginRight:"auto"}}>Insumos <span className="muted">({items.length})</span></div>
        {bajos>0 && <span className="pill pill-off">⚠ {bajos} bajo mínimo</span>}
        <button className="btn btn-amber" onClick={()=>setEditing({nombre:"",unidad:"g",costo:0,stock:0,stock_minimo:0,activo:true})}>+ Nuevo insumo</button>
      </div>
      <div className="card" style={{padding:0,overflowX:"auto"}}>
        <table className="tbl">
          <thead><tr><th>Insumo</th><th>Unidad</th><th className="num">Costo/u</th><th className="num">Stock</th><th className="num">Mínimo</th><th></th></tr></thead>
          <tbody>
            {items.length===0 && <tr><td colSpan="6"><div className="empty">Sin insumos. Crea uno.</div></td></tr>}
            {items.map(i=>{ const bajo=Number(i.stock)<=Number(i.stock_minimo)&&Number(i.stock_minimo)>0; return (
              <tr key={i.id} className={i.activo?"":"inactive"}>
                <td className="row-name">{i.nombre}</td>
                <td className="muted">{i.unidad}</td>
                <td className="num">{fmt(i.costo)}</td>
                <td className="num"><b style={{color:bajo?"var(--amber)":"var(--tb)"}}>{Number(i.stock)}</b></td>
                <td className="num muted">{Number(i.stock_minimo)}</td>
                <td><div className="actions">
                  <button className="btn btn-ghost btn-sm" onClick={()=>setCarga({id:i.id,nombre:i.nombre,unidad:i.unidad,cantidad:"",costo:i.costo,nota:""})}>+ Cargar</button>
                  <button className="btn btn-ghost btn-sm" onClick={()=>setEditing({...i})}>Editar</button>
                  <button className="btn btn-danger btn-sm" onClick={()=>eliminar(i)}>✕</button>
                </div></td>
              </tr>
            );})}
          </tbody>
        </table>
      </div>
      {editing && (
        <div className="modal-bg" onClick={()=>setEditing(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-t">{editing.id?"Editar insumo":"Nuevo insumo"}</div>
            <label className="label">Nombre</label>
            <input className="input" value={editing.nombre} onChange={e=>setEditing({...editing,nombre:e.target.value})}/>
            <div className="grid2">
              <div><label className="label">Unidad</label><select className="select" value={editing.unidad} onChange={e=>setEditing({...editing,unidad:e.target.value})}>{UNIDADES.map(u=><option key={u} value={u}>{u}</option>)}</select></div>
              <div><label className="label">Costo por unidad</label><input className="input" type="number" value={editing.costo} onChange={e=>setEditing({...editing,costo:Number(e.target.value)||0})}/></div>
            </div>
            <div className="grid2">
              <div><label className="label">Stock actual</label><input className="input" type="number" value={editing.stock} onChange={e=>setEditing({...editing,stock:Number(e.target.value)||0})}/></div>
              <div><label className="label">Stock mínimo (alerta)</label><input className="input" type="number" value={editing.stock_minimo} onChange={e=>setEditing({...editing,stock_minimo:Number(e.target.value)||0})}/></div>
            </div>
            <label className="check"><input type="checkbox" checked={editing.activo!==false} onChange={e=>setEditing({...editing,activo:e.target.checked})}/> Activo</label>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={()=>setEditing(null)}>Cancelar</button>
              <button className="btn btn-amber" disabled={!editing.nombre.trim()} onClick={()=>guardar(editing)}>Guardar</button>
            </div>
          </div>
        </div>
      )}
      {carga && (
        <div className="modal-bg" onClick={()=>setCarga(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-t">Cargar inventario — {carga.nombre}</div>
            <div className="muted" style={{marginBottom:10}}>Registra una entrada (compra) de este insumo. Suma al stock.</div>
            <label className="label">Cantidad ({carga.unidad})</label>
            <input className="input" type="number" value={carga.cantidad} onChange={e=>setCarga({...carga,cantidad:e.target.value})}/>
            <label className="label">Costo por unidad (opcional, actualiza el costo)</label>
            <input className="input" type="number" value={carga.costo} onChange={e=>setCarga({...carga,costo:e.target.value})}/>
            <label className="label">Nota (opcional)</label>
            <input className="input" value={carga.nota} onChange={e=>setCarga({...carga,nota:e.target.value})} placeholder="Proveedor, factura…"/>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={()=>setCarga(null)}>Cancelar</button>
              <button className="btn btn-amber" disabled={!(Number(carga.cantidad)>0)} onClick={()=>cargar(carga)}>Cargar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Recetas({showToast,clave,onUnlock}){
  const [prods,setProds]=useState([]);
  const [insumos,setInsumos]=useState([]);
  const [pid,setPid]=useState("");
  const [items,setItems]=useState([]);
  const [cargando,setCargando]=useState(false);
  useEffect(()=>{ db.listProductos().then(setProds).catch(()=>{}); db.listInsumos().then(setInsumos).catch(()=>{}); },[]);
  useEffect(()=>{ if(!pid||!clave){ setItems([]); return; } setCargando(true); db.getReceta(pid,clave).then(r=>{ setItems(r); setCargando(false); }).catch(e=>{ setCargando(false); showToast(""+(e.message||e),"err"); }); },[pid,clave]);
  const insNombre=id=>{ const i=insumos.find(x=>x.id===id); return i?i.unidad:""; };
  const add=()=>setItems(prev=>[...prev,{insumo_id:"",cantidad:0}]);
  const set=(i,k,v)=>setItems(prev=>{const a=[...prev];a[i]={...a[i],[k]:v};return a;});
  const del=i=>setItems(prev=>prev.filter((_,j)=>j!==i));
  const guardar=async()=>{ try{ await db.saveReceta(pid,items,clave); showToast("Receta guardada"); }catch(e){ showToast(""+(e.message||e),"err"); } };
  // cantidad = % en peso. Costo por kg = Σ costo_insumo × (%/100) × conv(unidad)
  const costoKg=items.reduce((s,it)=>{ const ins=insumos.find(x=>x.id===it.insumo_id); return s+(ins?Number(ins.costo)*(Number(it.cantidad||0)/100)*convInsumo(ins.unidad):0); },0);
  const totalPct=items.reduce((s,it)=>s+Number(it.cantidad||0),0);
  const fabricables=prods.filter(p=>p.fabricable);
  const [nuevoProd,setNuevoProd]=useState("");
  const [creando,setCreando]=useState(false);
  const crearProd=async()=>{
    const nombre=nuevoProd.trim(); if(!nombre) return; setCreando(true);
    try{
      await db.saveProducto({nombre,tipo:"producto",categoria:"PRODUCCIÓN",precio:0,costo:0,codigo_barras:null,controla_stock:true,activo:true,fabricable:true,vende_pos:false,stock:{},dispo:{},componentes:[]});
      const ps=await db.listProductos(); setProds(ps);
      const nuevo=ps.find(p=>p.nombre===nombre && p.fabricable && p.vende_pos===false);
      if(nuevo) setPid(nuevo.id);
      setNuevoProd(""); showToast("Producto de producción creado");
    }catch(e){ showToast(""+(e.message||e),"err"); }
    setCreando(false);
  };
  if(!clave) return (
    <div className="card" style={{textAlign:"center",padding:"36px 18px"}}>
      <div style={{fontSize:40,marginBottom:8}}>🔒</div>
      <div style={{fontWeight:800,color:"var(--tb)"}}>Recetas protegidas</div>
      <div className="muted" style={{margin:"6px 0 16px"}}>Ingresa tu clave de fórmulas para ver o editar las recetas.</div>
      <button className="btn btn-amber" onClick={onUnlock}>Desbloquear fórmulas</button>
    </div>
  );
  return (
    <div>
      <div className="toolbar"><div className="sec-title" style={{marginRight:"auto"}}>Recetas de producción</div></div>
      <div className="muted" style={{marginBottom:10}}>Define el <b>% en peso</b> de cada insumo (deben sumar 100%). Al fabricar, indicas los kilos y el sistema calcula cuánto tomar de cada uno.</div>
      <div className="card">
        <label className="label">Producto fabricable</label>
        <select className="select" value={pid} onChange={e=>setPid(e.target.value)}>
          <option value="">Seleccionar producto…</option>
          {fabricables.map(p=><option key={p.id} value={p.id}>{p.nombre}{p.vende_pos===false?" (solo producción)":""}</option>)}
        </select>
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          <input className="input" style={{margin:0,flex:1}} placeholder="Nuevo producto de producción (otras industrias)…" value={nuevoProd} onChange={e=>setNuevoProd(e.target.value)}/>
          <button className="btn btn-ghost" style={{whiteSpace:"nowrap"}} disabled={!nuevoProd.trim()||creando} onClick={crearProd}>+ Crear</button>
        </div>
        {pid && !cargando && (
          <div>
            {items.map((it,i)=>(
              <div key={i} style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
                <select className="select" style={{margin:0,flex:1}} value={it.insumo_id} onChange={e=>set(i,"insumo_id",e.target.value)}>
                  <option value="">Insumo…</option>
                  {insumos.map(x=><option key={x.id} value={x.id}>{x.nombre} ({x.unidad})</option>)}
                </select>
                <input className="input" type="number" style={{margin:0,width:80,textAlign:"center"}} value={it.cantidad} onChange={e=>set(i,"cantidad",Number(e.target.value)||0)} placeholder="0"/>
                <span className="muted" style={{width:14}}>%</span>
                <button className="btn btn-danger btn-sm" onClick={()=>del(i)}>✕</button>
              </div>
            ))}
            <button className="btn btn-ghost btn-sm" onClick={add}>+ Agregar insumo</button>
            <div className="result-row" style={{marginTop:10}}><span className="result-label">Suma de porcentajes</span><span className="result-value" style={{color:Math.abs(totalPct-100)<0.01?"var(--green)":"var(--red)"}}>{totalPct}% {Math.abs(totalPct-100)<0.01?"✓":"(debe ser 100%)"}</span></div>
            <div className="result-row" style={{borderTop:"1px solid var(--bd)"}}><span className="result-label">Costo por kilo producido</span><span className="result-value amber">{fmt(Math.round(costoKg))}</span></div>
            <button className="btn btn-amber" style={{width:"100%",marginTop:12}} onClick={guardar}>Guardar receta</button>
          </div>
        )}
      </div>
    </div>
  );
}

function Producir({showToast,clave,onUnlock}){
  const [prods,setProds]=useState([]);
  const [insumos,setInsumos]=useState([]);
  const [sedes,setSedes]=useState([]);
  const [pid,setPid]=useState("");
  const [cantidad,setCantidad]=useState(1);
  const [sede,setSede]=useState("");
  const [nota,setNota]=useState("");
  const [receta,setReceta]=useState([]);
  const [busy,setBusy]=useState(false);
  useEffect(()=>{ db.listProductos().then(setProds).catch(()=>{}); db.listInsumos().then(setInsumos).catch(()=>{}); db.listSedes().then(s=>{ setSedes(s); const b=s.find(x=>x.es_bodega)||s[0]; if(b) setSede(b.nombre); }).catch(()=>{}); },[]);
  useEffect(()=>{ if(pid&&clave) db.getReceta(pid,clave).then(setReceta).catch(()=>setReceta([])); else setReceta([]); },[pid,clave]);
  const ins=id=>insumos.find(x=>x.id===id)||{};
  const n=Number(cantidad)||0;
  const consumoDe=r=>{ const i=ins(r.insumo_id); return (Number(r.cantidad||0)/100)*n*convInsumo(i.unidad); };  // r.cantidad = % peso
  const costoTotal=receta.reduce((s,r)=>{ const i=ins(r.insumo_id); return s+(Number(i.costo||0)*consumoDe(r)); },0);
  const producir=async()=>{
    setBusy(true);
    try{ const costo=await db.producir(pid,n,sede,"ADMIN",nota); showToast("Producido "+n+" kg — costo "+fmt(Math.round(costo||0))); setNota(""); setCantidad(1); const ins2=await db.listInsumos(); setInsumos(ins2); }
    catch(e){ showToast(""+(e.message||e),"err"); }
    setBusy(false);
  };
  const valido = pid && n>0 && sede;
  return (
    <div>
      <div className="toolbar"><div className="sec-title" style={{marginRight:"auto"}}>Producir</div></div>
      <div className="card">
        <div className="grid2">
          <div><label className="label">Producto a fabricar</label>
            <select className="select" value={pid} onChange={e=>setPid(e.target.value)}>
              <option value="">Seleccionar…</option>
              {prods.filter(p=>p.fabricable).map(p=><option key={p.id} value={p.id}>{p.nombre}{p.vende_pos===false?" (solo producción)":""}</option>)}
            </select>
          </div>
          <div><label className="label">Kilos a fabricar</label><input className="input" type="number" min="0" step="0.1" value={cantidad} onChange={e=>setCantidad(e.target.value)}/></div>
        </div>
        <label className="label">Sede destino (dónde queda el producto)</label>
        <select className="select" value={sede} onChange={e=>setSede(e.target.value)}>{sedes.map(s=><option key={s.id} value={s.nombre}>{s.nombre}{s.es_bodega?" (bodega)":""}</option>)}</select>
        <label className="label">Nota (opcional)</label>
        <input className="input" value={nota} onChange={e=>setNota(e.target.value)} placeholder="Lote, observación…"/>

        {!clave && pid && (
          <div className="muted" style={{padding:"10px 0"}}>🔒 Detalle de fórmula oculto. <a style={{color:"var(--amber)",cursor:"pointer"}} onClick={onUnlock}>Desbloquear</a> para ver insumos y costo. Igual puedes producir (consume la receta automáticamente).</div>
        )}
        {clave && pid && receta.length===0 && <div className="muted" style={{padding:"8px 0",color:"var(--amber)"}}>Este producto no tiene receta. Defínela en la pestaña Recetas.</div>}
        {clave && receta.length>0 && (
          <div className="card" style={{padding:0,overflowX:"auto",marginTop:8}}>
            <table className="tbl">
              <thead><tr><th>Insumo</th><th className="num">Necesita</th><th className="num">Disponible</th></tr></thead>
              <tbody>
                {receta.map((r,i)=>{ const x=ins(r.insumo_id); const nec=Math.round(consumoDe(r)*1000)/1000; const falta=Number(x.stock||0)<nec; return (
                  <tr key={i}><td className="row-name">{x.nombre} <span className="muted">({Number(r.cantidad)}%)</span></td><td className="num">{nec} {x.unidad}</td><td className="num" style={{color:falta?"var(--red)":"var(--green)"}}>{Number(x.stock||0)} {x.unidad}</td></tr>
                );})}
              </tbody>
            </table>
          </div>
        )}
        {clave && <div className="result-row" style={{marginTop:10,borderTop:"1px solid var(--bd)"}}><span className="result-label" style={{fontWeight:800,color:"var(--tb)"}}>Costo del lote</span><span className="result-value amber" style={{fontSize:18}}>{fmt(Math.round(costoTotal))}</span></div>}
        <button className="btn btn-amber" style={{width:"100%",marginTop:12}} disabled={!valido||busy} onClick={producir}>{busy?"Produciendo…":"✅ Producir"}</button>
      </div>
    </div>
  );
}

function HistorialProd({showToast,clave,onUnlock}){
  const [items,setItems]=useState(null);
  const [det,setDet]=useState(null);
  useEffect(()=>{ db.listProducciones().then(setItems).catch(()=>setItems([])); },[]);
  const verDetalle=async(p)=>{
    if(!clave){ onUnlock(); return; }
    try{ const ins=await db.getProduccionInsumos(p.id,clave); setDet({...p,insumos:ins}); }
    catch(e){ showToast(""+(e.message||e),"err"); }
  };
  if(!items) return <div className="empty">Cargando…</div>;
  return (
    <div>
      <div className="toolbar"><div className="sec-title" style={{marginRight:"auto"}}>Historial de producción <span className="muted">({items.length})</span></div></div>
      <div className="card" style={{padding:0,overflowX:"auto"}}>
        <table className="tbl">
          <thead><tr><th>Fecha</th><th>Producto</th><th className="num">Cantidad</th><th>Sede</th><th className="num">Costo</th><th></th></tr></thead>
          <tbody>
            {items.length===0 && <tr><td colSpan="6"><div className="empty">Aún no hay producciones.</div></td></tr>}
            {items.map(p=>(
              <tr key={p.id} style={{cursor:"pointer"}} onClick={()=>verDetalle(p)}>
                <td className="muted">{fLocalDia(p.created_at)} {fLocalHora(p.created_at)}</td>
                <td className="row-name">{p.producto_nombre}</td>
                <td className="num">{Number(p.cantidad)}</td>
                <td>{p.sede}</td>
                <td className="num">{fmt(p.costo_total)}</td>
                <td><button className="btn btn-ghost btn-sm" onClick={e=>{e.stopPropagation();verDetalle(p);}}>{clave?"Ver":"🔒 Ver"}</button></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {det && (
        <div className="modal-bg" onClick={()=>setDet(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-t">{det.producto_nombre} — {Number(det.cantidad)} und.</div>
            <div className="muted" style={{marginBottom:10}}>{fLocalDia(det.created_at)} {fLocalHora(det.created_at)} · {det.sede} · Costo {fmt(det.costo_total)}</div>
            <div className="card" style={{padding:0}}>
              <table className="tbl">
                <thead><tr><th>Insumo consumido</th><th className="num">Cantidad</th><th className="num">Costo</th></tr></thead>
                <tbody>{(det.insumos||[]).map((d,i)=>(
                  <tr key={i}><td className="row-name">{d.insumo_nombre}</td><td className="num">{Number(d.cantidad)}</td><td className="num">{fmt(d.costo)}</td></tr>
                ))}</tbody>
              </table>
            </div>
            <div className="modal-actions"><button className="btn btn-ghost" onClick={()=>setDet(null)}>Cerrar</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
setTimeout(()=>document.getElementById('loading').classList.add('hide'),400);
  </script>
