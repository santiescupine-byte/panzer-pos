<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Panzer — POS Cajero</title>
  <link rel="manifest" href="manifest-operador.json">
  <script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}</script>
  <meta name="theme-color" content="#080c14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Panzer POS">
  <meta name="apple-mobile-web-app-title" content="Panzer POS">
  <link rel="apple-touch-icon" href="icon-512.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#080c14;--sf:#0f1520;--sf2:#161e2e;--sf3:#1c2640;
      --bd:#243049;--bd2:#2d3d5a;
      --blue:#3b82f6;--blue-d:rgba(59,130,246,0.12);
      --amber:#f59e0b;--amber-d:rgba(245,158,11,0.12);
      --green:#10b981;--green-d:rgba(16,185,129,0.10);
      --red:#ef4444;--red-d:rgba(239,68,68,0.10);
      --purple:#8b5cf6;
      --t:#e2e8f0;--td:#64748b;--tb:#f8fafc;
      --font:'Outfit',system-ui,sans-serif;--r:14px;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    body{background:var(--bg);overflow-x:hidden;font-family:var(--font);color:var(--t);}
    input,select,button,textarea{font-family:inherit;}
    input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none;}
    input[type="number"]{-moz-appearance:textfield;}
    ::selection{background:rgba(59,130,246,0.25);}
    #loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s;}
    #loading.hide{opacity:0;pointer-events:none;}
    .loader{width:40px;height:40px;border:3px solid var(--bd);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:96px;}
    .header{background:linear-gradient(135deg,var(--sf),var(--sf2));border-bottom:1px solid var(--bd);padding:14px 18px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:50;}
    .header img{height:26px;}
    .header h1{font-size:16px;font-weight:700;color:var(--tb);}
    .header-sub{font-size:11px;color:var(--td);}
    .header-badge{margin-left:auto;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;background:var(--blue-d);color:var(--blue);}
    .page{padding:14px;}
    .card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:18px;margin-bottom:12px;}
    .card-t{font-size:15px;font-weight:700;color:var(--tb);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
    .label{font-size:12px;font-weight:600;color:var(--td);margin-bottom:6px;display:block;letter-spacing:.3px;}
    .input,.select{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;color:var(--tb);font-size:15px;outline:none;margin-bottom:12px;}
    .select{-webkit-appearance:none;}
    .input:focus,.select:focus{border-color:var(--blue);}
    .btn-primary{width:100%;background:linear-gradient(135deg,var(--blue),#2563eb);border:none;border-radius:12px;padding:14px 20px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
    .btn-primary:disabled{opacity:.4;cursor:default;}
    .btn-secondary{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:12px;padding:13px 20px;color:var(--t);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
    .demo-banner{background:var(--amber-d);border-bottom:1px solid rgba(245,158,11,.25);color:var(--amber);font-size:11px;font-weight:600;text-align:center;padding:6px;}
    /* PIN pad */
    .pin-dots{display:flex;gap:12px;justify-content:center;margin:8px 0 20px;}
    .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--bd2);transition:.15s;}
    .pin-dot.on{background:var(--blue);border-color:var(--blue);}
    .pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
    .pin-key{padding:18px 0;border-radius:12px;border:1px solid var(--bd);background:var(--sf2);color:var(--tb);font-size:22px;font-weight:700;cursor:pointer;user-select:none;text-align:center;}
    .pin-key:active{background:var(--sf3);}
    .pin-key.zero{grid-column:2;}
    .pin-key.back{background:transparent;border-color:transparent;color:var(--td);font-size:18px;}
    .search{position:relative;margin-bottom:10px;}
    .search input{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:10px;padding:11px 14px 11px 38px;color:var(--tb);font-size:14px;outline:none;}
    .search input:focus{border-color:var(--blue);}
    .search .ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--td);font-size:15px;}
    .header-x{background:var(--sf2);border:1px solid var(--bd);border-radius:10px;padding:8px 12px;color:var(--t);font-size:12px;font-weight:700;cursor:pointer;}
    /* Menú lateral (drawer) de acciones */
    .drawer-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;}
    .drawer{position:fixed;top:0;left:0;height:100vh;width:260px;max-width:82vw;background:linear-gradient(180deg,var(--sf),var(--sf2));border-right:1px solid var(--bd);z-index:201;padding:18px 14px;display:flex;flex-direction:column;gap:8px;animation:drawerIn .2s ease;box-shadow:0 0 30px rgba(0,0,0,.5);}
    @keyframes drawerIn{from{transform:translateX(-105%);}to{transform:translateX(0);}}
    .drawer-item{display:flex;align-items:center;gap:10px;padding:14px;border-radius:12px;font-size:15px;font-weight:700;color:var(--t);background:var(--sf2);border:1px solid var(--bd);cursor:pointer;text-align:left;width:100%;}
    /* Categorías */
    .cats{display:flex;gap:8px;overflow-x:auto;padding:4px 0 10px;scrollbar-width:none;}
    .cats::-webkit-scrollbar{display:none;}
    .cat{flex-shrink:0;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;border:1px solid var(--bd);background:var(--sf2);color:var(--td);cursor:pointer;white-space:nowrap;}
    .cat.active{background:var(--blue-d);border-color:var(--blue);color:var(--blue);}
    /* Grid productos */
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .prod{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:14px;cursor:pointer;display:flex;flex-direction:column;gap:6px;min-height:96px;justify-content:space-between;position:relative;transition:border-color .15s,transform .05s;}
    .prod:active{transform:scale(.97);}
    .prod.disabled{opacity:.45;cursor:not-allowed;}
    .prod-name{font-size:14px;font-weight:700;color:var(--tb);line-height:1.25;}
    .prod-price{font-size:15px;font-weight:800;color:var(--blue);}
    .prod-tag{position:absolute;top:8px;right:8px;font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;}
    .tag-token{background:var(--amber-d);color:var(--amber);}
    .tag-serv{background:rgba(139,92,246,.15);color:var(--purple);}
    .prod-stock{font-size:10px;font-weight:600;color:var(--td);}
    .prod-stock.low{color:var(--red);}
    .prod-stock.out{color:var(--red);font-weight:800;}
    /* Carrito flotante */
    .cartbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--sf);border-top:1px solid var(--bd);padding:12px 16px calc(12px + env(safe-area-inset-bottom));z-index:80;display:flex;gap:12px;align-items:center;}
    .cartbar-info{flex:1;}
    .cartbar-count{font-size:11px;color:var(--td);font-weight:600;}
    .cartbar-total{font-size:22px;font-weight:800;color:var(--tb);}
    .cartbar-btn{background:linear-gradient(135deg,var(--green),#059669);border:none;border-radius:12px;padding:14px 22px;color:#fff;font-size:15px;font-weight:800;cursor:pointer;}
    .cartbar-btn:disabled{opacity:.4;}
    /* Sheet (modal inferior) */
    .sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:150;display:flex;align-items:flex-end;justify-content:center;}
    .sheet{background:var(--sf);width:100%;max-width:480px;border-radius:20px 20px 0 0;border-top:1px solid var(--bd);max-height:88vh;overflow-y:auto;padding:18px 16px calc(18px + env(safe-area-inset-bottom));animation:up .25s ease;}
    @keyframes up{from{transform:translateY(100%);}to{transform:translateY(0);}}
    .sheet-handle{width:40px;height:4px;background:var(--bd2);border-radius:2px;margin:0 auto 14px;}
    .citem{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd);}
    .citem:last-child{border-bottom:none;}
    .citem-name{flex:1;font-size:14px;font-weight:600;color:var(--tb);}
    .citem-sub{font-size:11px;color:var(--td);}
    .qty{display:flex;align-items:center;gap:10px;}
    .qty button{width:30px;height:30px;border-radius:8px;border:1px solid var(--bd);background:var(--sf2);color:var(--tb);font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .qty span{min-width:22px;text-align:center;font-weight:700;font-size:15px;}
    .pay-opts{display:flex;gap:8px;margin-bottom:12px;}
    .pay-opt{flex:1;padding:12px;border-radius:10px;border:1px solid var(--bd);background:var(--sf2);color:var(--td);font-size:13px;font-weight:700;cursor:pointer;text-align:center;}
    .pay-opt.active{background:var(--blue-d);border-color:var(--blue);color:var(--blue);}
    .result-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--bd);}
    .result-row:last-child{border-bottom:none;}
    .result-label{font-size:13px;color:var(--td);}
    .result-value{font-size:15px;font-weight:700;color:var(--tb);}
    .toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:300;padding:12px 18px;border-radius:12px;font-size:13px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.4);}
    .toast.ok{background:var(--green);color:#fff;}
    .toast.err{background:var(--red);color:#fff;}
    .empty{text-align:center;padding:40px 20px;color:var(--td);}
  </style>
</head>
<body>
  <div id="loading"><div class="loader"></div>
    <img src="https://santiescupine-byte.github.io/panzer-vip/Panzer%20Logo%20FINAL.png" style="width:150px;margin-bottom:10px;" alt="Panzer">
    <div style="font-size:13px;color:#64748b;">Cargando POS...</div>
  </div>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <!-- Cliente de Supabase por CDN (no requiere build) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Lector y generador de QR para el módulo VIP -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <!-- Catálogo real importado de Loyverse (define window.PANZER_CATALOGO) -->
  <script src="catalogo_demo.js"></script>

  <script type="text/babel">
const {useState,useEffect} = React;

// ============================================================
// CONFIGURACIÓN
// ============================================================
// 1) Pega aquí los datos de tu proyecto Supabase (Project Settings → API).
//    Mientras estén vacíos, la app funciona en MODO DEMO (datos de prueba).
const SUPABASE_URL = 'https://gmwqxqeiocjcpablxjcn.supabase.co';        // ej: https://xxxx.supabase.co
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdtd3F4cWVpb2NqY3BhYmx4amNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMzYwMDksImV4cCI6MjA5NTkxMjAwOX0.O_fSFAHUiZtDNIRShumewEqkPExITBRuxVO2qbMuzxY';   // la clave "anon public"

// 2) URL del Apps Script del sistema de recaudo (para enviar la liquidación al cerrar turno
//    y el reporte de chequeo de inventario).
const API_URL = 'https://script.google.com/macros/s/AKfycbyANxSp6rnaIY9UZxHlT3TzENnxpmbS8oDtUSxYZ5TTmgvDdhshQS2KZ2XAaS7AmnAq/exec';

// 3) Correo fijo de administración que recibe el reporte de descuadres del chequeo de inventario.
const CORREO_REPORTES = 'info@kemilabo.com';

const DEMO_MODE = !(SUPABASE_URL && SUPABASE_ANON_KEY);
const sb = DEMO_MODE ? null : supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ---- Datos demo (sedes/operadores y productos de ejemplo) ----
const DEMO_CONFIG = {
  tesoreros: [],
  sedes: {
    "Toberín":   { operadores:["Johan","Kevin","Nicolas","Rodrigo"] },
    "San Felipe":{ operadores:["Camilo","Andrea","Luis","Sergio"] },
    "Suba":      { operadores:["Pedro","María","Felipe"] },
  },
};
// Empleados demo con PIN y sedes (en Supabase viven en la tabla empleados/empleado_sedes,
// se administran desde el back office). PINs de prueba.
const DEMO_EMPLEADOS = [
  { nombre:"Johan",  pin:"1234", sedes:["Toberín"] },
  { nombre:"Camilo", pin:"5678", sedes:["San Felipe"] },
  { nombre:"Andrea", pin:"4321", sedes:["San Felipe","Bello"] },
];
// Catálogo real de Loyverse (lo carga catalogo_demo.js). Si no está, usamos ejemplos.
const CATALOGO = (typeof window!=="undefined" && window.PANZER_CATALOGO) ? window.PANZER_CATALOGO : null;

// Normaliza nombres de sede para cruzar recaudo (getConfig) con tiendas Loyverse.
// "Toberín" → "TOBERIN", "San Felipe" → "SAN FELIPE".
const normSede = s => (s||"").normalize("NFD").replace(/[̀-ͯ]/g,"").trim().toUpperCase();

// Devuelve los productos del catálogo real con el stock de la sede pedida.
function productosDeSede(sede){
  if(!CATALOGO) return DEMO_PRODUCTOS_FALLBACK.map(p=>({...p}));
  const ns = normSede(sede);
  // mapa stock por sede normalizada
  const sedeKey = CATALOGO.sedes.find(k=>normSede(k)===ns) || null;
  return CATALOGO.productos.map((p,i)=>{
    const stock = (sedeKey!=null) ? p.stock[sedeKey] : null;
    return {
      id: "lv-"+(p.ref||i),
      nombre: p.nombre,
      tipo: p.tipo,
      categoria: p.categoria,
      precio: p.precio,
      precio_variable: p.precio_variable,
      costo: p.costo,
      codigo_barras: p.codigo_barras,
      controla_stock: p.controla_stock,
      iva: p.iva,
      stock: p.controla_stock ? (stock ?? 0) : null,
      stock_minimo: 0,
    };
  });
}

// Stock en memoria por sede (para descontar en demo sin perder el original).
const DEMO_STOCK = {}; // sede → { id → cantidad }
function demoStock(sede){
  const ns = normSede(sede);
  if(!DEMO_STOCK[ns]){
    DEMO_STOCK[ns] = {};
    productosDeSede(sede).forEach(p=>{ if(p.controla_stock) DEMO_STOCK[ns][p.id]=p.stock; });
  }
  return DEMO_STOCK[ns];
}

const DEMO_PRODUCTOS_FALLBACK = [
  { id:"d1", nombre:"Token de lavado", tipo:"token",    categoria:"TOKENS",     precio:5000,  controla_stock:false, stock:null },
  { id:"d4", nombre:"Ambientador",     tipo:"producto", categoria:"SNACKS",     precio:8000,  controla_stock:true,  stock:12 },
];

// ============================================================
// CAPA DE DATOS (Supabase o demo)
// ============================================================
async function apiGet(action, params={}){
  const url=new URL(API_URL); url.searchParams.set('action',action);
  for(const [k,v] of Object.entries(params)) url.searchParams.set(k,v);
  try{ const r=await fetch(url.toString()); return await r.json(); }catch(e){ return null; }
}
// POST al Apps Script (header text/plain como en el sistema de recaudo) — con timeout
async function apiPost(action, body, timeoutMs=25000){
  const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),timeoutMs);
  try{
    const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,...body}),signal:ctrl.signal});
    clearTimeout(t);
    return await r.json();
  }catch(e){ clearTimeout(t); return {ok:false,error:String(e)}; }
}

// ---- Cola local de liquidaciones (para que NUNCA se pierda una si Google falla) ----
const LIQ_KEY='panzer_liq_pendientes';
function liqPendientes(){ try{ return JSON.parse(localStorage.getItem(LIQ_KEY)||'[]'); }catch(e){ return []; } }
function liqSave(arr){ try{ localStorage.setItem(LIQ_KEY, JSON.stringify(arr)); }catch(e){} }
function liqEncolar(liq){ const a=liqPendientes(); a.push(liq); liqSave(a); }

const db = {
  async getConfig(){
    const data = await apiGet('getConfig');
    if(data && data.sedes) return data;
    return DEMO_CONFIG; // fallback si no hay conexión
  },
  // Enviar reporte de chequeo de inventario: lo GUARDA (back office) y manda el correo
  async enviarChequeo({sede, operador, items, descuadres, base}){
    const fecha = new Date().toISOString();
    // 1) Guardar el chequeo para verlo en el back office
    try{ await this.guardarChequeo({sede, operador, fecha, base_recibida: base||0, total_items: items.length, n_descuadres: descuadres.length, descuadres}); }catch(e){}
    // 2) Enviar el correo a administración vía Apps Script
    return apiPost('chequeoInventario', {
      sede, operador, correo: CORREO_REPORTES, fecha,
      total_items: items.length, base_recibida: base || 0,
      descuadres,  // [{nombre, sistema, contado, diferencia}]
    });
  },
  // Registrar la liquidación de turno en el sistema de recaudo.
  // El Apps Script espera los campos ANIDADOS en `liquidacion` (igual que la app del tesorero),
  // con fecha/hora/estado. No mandar plano o responde "Datos incompletos".
  // Intenta enviar UNA liquidación (varios intentos). Devuelve true/false; no lanza.
  async postLiquidacion(liquidacion, intentos=3){
    for(let i=1;i<=intentos;i++){
      const res = await apiPost('guardarLiquidacionOperador', { liquidacion });
      if(res && res.success) return true;
      if(i<intentos) await new Promise(r=>setTimeout(r,1500));
    }
    return false;
  },
  // Guarda la liquidación también en Supabase (recaudo_liquidaciones), en PARALELO a Sheets.
  // Best-effort durante la transición: si falla, Sheets sigue siendo la red de seguridad.
  async postLiquidacionSupabase(liq){
    if(DEMO_MODE || !sb) return;
    try{
      await sb.from('recaudo_liquidaciones').insert({
        sede:liq.sede, operador:liq.operador, num_recibo:liq.numRecibo,
        tokens_base:Number(liq.tokensBase)||0, tokens_vendidos:Number(liq.tokensVendidos)||0,
        dev_tokens:Number(liq.devTokens)||0, tokens_membresia:Number(liq.tokensMembresia)||0,
        tokens_restantes:Number(liq.tokensRestantes)||0, valor:Number(liq.valor)||0,
        qr:Number(liq.qr)||0, devoluciones:Number(liq.devoluciones)||0, efectivo:Number(liq.efectivo)||0,
        observaciones:liq.observaciones||null, estado:'pendiente', origen:'pos',
        fecha:liq.fecha||null, hora:liq.hora||null,
      });
    }catch(e){ /* no bloquea: Sheets es el respaldo */ }
  },
  async enviarLiquidacion(payload){
    const liquidacion = { ...payload,
      fecha: new Date().toLocaleDateString('es-CO'),
      hora: new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'}),
      estado: 'pendiente',
    };
    // Guardado INSTANTÁNEO: se encola en local (garantía, no se pierde) y se sincroniza
    // con Supabase y Sheets en SEGUNDO PLANO. La UI nunca espera a la red → nunca se congela.
    liqEncolar(liquidacion);
    (async()=>{
      try{ await db.postLiquidacionSupabase(liquidacion); }catch(e){}   // red de seguridad (Supabase)
      try{ await db.reintentarLiqPendientes(); }catch(e){}              // envía a Sheets y saca de la cola
    })();
    return { success:true };
  },
  // Reenvía las liquidaciones que quedaron en cola (1 intento c/u; las que fallan quedan).
  async reintentarLiqPendientes(){
    const arr=liqPendientes(); if(!arr.length) return { enviadas:0, pendientes:0 };
    const quedan=[]; let env=0;
    for(const liq of arr){ const ok=await db.postLiquidacion(liq,1); if(ok) env++; else quedan.push(liq); }
    liqSave(quedan);
    return { enviadas:env, pendientes:quedan.length };
  },
  // ¿este operador hizo un chequeo VIGENTE en esta sede? (dentro de las últimas 12 h, = turno más largo)
  async chequeoVigente(sede, operador){
    const HORAS = 12;
    const desde = new Date(Date.now() - HORAS*60*60*1000).toISOString();
    if(DEMO_MODE){

  async retirarMuestra(sede, operador, items){
    if(DEMO_MODE){

      items.forEach(it=>{ if(it.producto_id in st) st[it.producto_id]=(Number(st[it.producto_id])||0)-it.cantidad; });
      return;
    }
    for(const it of items){
      const { error } = await sb.rpc('ajustar_inventario',{

        p_cantidad:-Math.abs(it.cantidad), p_operador:operador, p_nota:'Retiro para muestra/demostración (POS)'

    if(DEMO_MODE) return;
    for(const it of items){

        p_id:it.id, p_cantidad_recibida:it.cantidad, p_operador:operador, p_nota:it.nota||null
      });
      if(error) throw error;
    }
  },
};

};

// Interruptor del backend VIP: 'supabase' (nuevo, rápido) | 'google' (Apps Script viejo, respaldo)
const VIP_BACKEND = 'supabase';
async function vipApiGoogle(params, timeoutMs=45000){
  const url = VIP_APPS_SCRIPT_URL + '?' + new URLSearchParams(params).toString();
  const ctrl = new AbortController(); const t = setTimeout(()=>ctrl.abort(), timeoutMs);
  try{ const r = await fetch(url,{signal:ctrl.signal}); clearTimeout(t); return await r.json(); }
  catch(e){ clearTimeout(t); return { ok:false, error: e.name==='AbortError'?'timeout':'Error de conexión' }; }
}
// Mismo contrato (mismas acciones y formato de respuesta) pero contra los RPCs de Supabase.
async function vipApiSupabase(params){
  if(DEMO_MODE) return { ok:false, error:'demo' };
  const a=params.accion;
  const map={
    consultar_cliente:   ['vip_consultar',       {p_id_vip:params.id_vip}],

    recargar_saldo:      ['vip_recargar',         {p_id_vip:params.id_vip,p_monto:Number(params.monto),p_operador:params.operador,p_sede:params.sede,p_membresia:params.membresia||null}],
    crear_cliente:       ['vip_crear',            {p_nombre:params.nombre,p_telefono:params.telefono,p_membresia:params.membresia,p_operador:params.operador,p_sede:params.sede}],
    verificar_cupon:     ['vip_verificar_cupon',  {p_id_cupon:params.id_cupon,p_id_cliente:params.id_cliente}],
    canjear_cupon:       ['vip_canjear_cupon',    {p_id_cupon:params.id_cupon,p_id_cliente:params.id_cliente,p_sede:params.sede,p_operador:params.operador}],
    reporte_turno:       ['vip_reporte_turno',    {p_operador:params.operador,p_sede:params.sede,p_desde:(params.fecha_desde? new Date(Number(params.fecha_desde)).toISOString() : null)}],
  };
  const m=map[a]; if(!m) return { ok:false, error:'acción no soportada: '+a };
  try{ const {data,error}=await sb.rpc(m[0],m[1]); if(error) return { ok:false, error:error.message }; return data; }
  catch(e){ return { ok:false, error:'Error de conexión' }; }
}

function nextReciboDemo(){

}

      return [...prev,{producto_id:p.id,key,nombre:p.nombre,tipo:p.tipo,precio,controla_stock:p.controla_stock,cantidad:1}];
    });
  };
  const addToCart=p=>{
    if(p.precio_variable){ setPrecioModal(p); return; }  // abre teclado numérico
    agregarAlCarrito(p, p.precio);
  };
  const confirmarPrecio=(monto)=>{
    if(precioModal && monto>0) agregarAlCarrito(precioModal, monto);
    setPrecioModal(null);
  };
  const changeQty=(key,delta)=>{
    setCart(prev=>prev.flatMap(c=>{
      if((c.key||c.producto_id)!==key) return [c];
      const nueva=c.cantidad+delta;
      if(nueva<=0) return [];
      return [{...c,cantidad:nueva}];
    }));
  };
  // Fija la cantidad exacta (escrita con teclado). Mínimo 1.
  const setQty=(key,n)=>{
    setCart(prev=>prev.map(c=>{
      if((c.key||c.producto_id)!==key) return c;
      const nn=Math.max(1, Math.floor(Number(n)||0));
      return {...c,cantidad:nn};
    }));
  };
  // Separa 1 unidad de una línea a su propia línea (para darle descuento distinto al resto).
  const separarUnidad=(key)=>setCart(prev=>{
    const i=prev.findIndex(c=>(c.key||c.producto_id)===key);
    if(i<0 || prev[i].cantidad<=1) return prev;
    const c=prev[i];
    const orig={...c, cantidad:c.cantidad-1};
    const nuevo={...c, key:c.producto_id+"-"+Date.now(), cantidad:1, descId:'', descPct:0, descNombre:null};
    const out=prev.slice(); out[i]=orig; out.splice(i+1,0,nuevo); return out;
  });

  // ---- cálculos con descuentos ----
  const lineFull = c => c.precio*c.cantidad;
  const lineDescMonto = c => c.descPct ? Math.round(lineFull(c)*c.descPct/100) : 0;
  const lineNet = c => lineFull(c) - lineDescMonto(c);
  const brutoCart = cart.reduce((s,c)=>s+lineFull(c),0);
  const subNet = cart.reduce((s,c)=>s+lineNet(c),0);                  // tras descuentos de línea
  const descTicketMonto = descTicket ? Math.round(subNet*descTicket.porcentaje/100) : 0;
  const totalCart = subNet - descTicketMonto;                          // total NETO a cobrar
  const descTotal = brutoCart - totalCart;                             // descuento total
  const countCart=cart.reduce((s,c)=>s+c.cantidad,0);

  const cobrar=async(pago)=>{
    setBusy(true);
    try{
      const items=cart.map(c=>({...c, descuento: lineDescMonto(c)}));
      const res=await db.registrarVenta({turno,sede,operador,items,pago,descuentoTicket:descTicketMonto});
      // refrescar stock
      const prods=await db.getProductos(sede);
      setProductos(prods);
      const esMembresia=c=>(c.nombre||'').trim().toUpperCase().startsWith('MEMBRESIA');
      const montoMembresias=cart.filter(esMembresia).reduce((s,c)=>s+lineNet(c),0);
      const montoTokens=cart.filter(c=>c.tipo==="token" && !esMembresia(c)).reduce((s,c)=>s+lineNet(c),0);
      const montoProductos=totalCart-montoTokens-montoMembresias;
      setVentasTurno(prev=>[...prev,{total:totalCart, count:countCart, pago, tokens:montoTokens, productos:montoProductos, membresias:montoMembresias, descuento:descTotal, recibo:res&&res.recibo, ts:Date.now()}]);
      setCart([]); setShowCart(false); setDescTicket(null);
      showToast("Venta registrada "+fmt(totalCart),"ok");
    }catch(e){ showToast(""+(e.message||e),"err"); }
    setBusy(false);
  };

  // -------- LOGIN (PIN) --------
  if(!turno){
    const tecla=d=>{ setPin(prev=>(prev+d).slice(0,4)); };
    const borrar=()=>setPin(prev=>prev.slice(0,-1));
    return (
      <div className="app">
        {DEMO_MODE && <div className="demo-banner">MODO DEMO — PINs de prueba: 1234 (Johan), 5678 (Camilo), 4321 (Andrea)</div>}
        {toast && <div className={"toast "+toast.type}>{toast.msg}</div>}
        <div className="page">
          <div style={{textAlign:"center",padding:"28px 0 16px"}}>
            <img src="https://santiescupine-byte.github.io/panzer-vip/Panzer%20Logo%20FINAL.png" style={{width:150,marginBottom:10}} alt="Panzer"/>
            <p style={{fontSize:14,color:"var(--td)"}}>Punto de venta — Cajero</p>
          </div>

          {!pinEmp ? (
            <div className="card">
              <div className="card-t" style={{justifyContent:"center"}}>🔒 Ingresa tu PIN</div>
              <div className="pin-dots">
                {[0,1,2,3].map(i=><div key={i} className={"pin-dot"+(i<pin.length?" on":"")}/>)}
              </div>
              <div className="pinpad">
                {["1","2","3","4","5","6","7","8","9"].map(d=>(
                  <div key={d} className="pin-key" onClick={()=>tecla(d)}>{d}</div>
                ))}
                <div className="pin-key back" onClick={borrar}>⌫</div>
                <div className="pin-key zero" onClick={()=>tecla("0")}>0</div>
              </div>
              <button className="btn-primary" style={{marginTop:16}} disabled={pin.length<4||busy} onClick={()=>intentarPin(pin)}>
                {busy?"Verificando...":"Entrar"}
              </button>
            </div>
          ) : (
            <div className="card">
              <div className="card-t">Hola, {pinEmp.nombre} 👋</div>
              <label className="label">¿En qué sede vas a trabajar?</label>
              {pinEmp.sedes.map(s=>(
                <button key={s} className="btn-secondary" style={{marginBottom:10}} disabled={busy} onClick={()=>abrir(s,pinEmp.nombre,pinEmp.rol)}>{s}</button>
              ))}
              <button className="btn-secondary" style={{marginTop:6,opacity:.7}} onClick={()=>{setPinEmp(null);setPin("");}}>← Volver</button>
            </div>
          )}
        </div>
      </div>
    );
  }

  // -------- CHEQUEO DE INVENTARIO (obligatorio antes de vender) --------
  if(!chequeoHecho){
    return (
      <div className="app">
        {DEMO_MODE && <div className="demo-banner">MODO DEMO — datos de prueba (sin Supabase)</div>}
        {toast && <div className={"toast "+toast.type}>{toast.msg}</div>}
        <ChequeoInventario
          productos={productos.filter(p=>p.controla_stock)}
          sede={sede} operador={operador} showToast={showToast}
          onCancelar={cerrarCaja}
          onListo={()=>setChequeoHecho(true)}/>
      </div>
    );
  }

  // -------- POS --------
  return (
    <div className="app">
      {DEMO_MODE && <div className="demo-banner">MODO DEMO — datos de prueba (sin Supabase)</div>}
      {toast && <div className={"toast "+toast.type}>{toast.msg}</div>}
      <div className="header">
        <img src="https://santiescupine-byte.github.io/panzer-vip/Panzer%20Logo%20FINAL.png" alt="P"/>
        <div>
          <h1>{sede}</h1>
          <div className="header-sub">{operador} · Caja abierta</div>
        </div>
        <button className="header-x" style={{marginLeft:"auto"}} onClick={()=>setMenuOpen(true)}>☰ Menú{pendTransito>0?(" ("+pendTransito+")"):""}</button>
      </div>

      {liqPend>0 && (
        <div style={{background:"var(--amber-d)",color:"var(--amber)",fontSize:13,fontWeight:700,padding:"8px 14px",display:"flex",alignItems:"center",gap:10,borderBottom:"1px solid rgba(245,158,11,.25)"}}>
          ⚠ {liqPend} liquidación(es) sin enviar (se reenvían solas)
          <button className="header-x" style={{marginLeft:"auto"}} onClick={reenviarLiq}>Reenviar ahora</button>
        </div>
      )}

      {tareasPend>0 && (
        <div style={{background:tareasVenc>0?"var(--red-d)":"var(--amber-d)",color:tareasVenc>0?"var(--red)":"var(--amber)",fontSize:13,fontWeight:700,padding:"8px 14px",display:"flex",alignItems:"center",gap:10,borderBottom:"1px solid "+(tareasVenc>0?"rgba(239,68,68,.25)":"rgba(245,158,11,.25)")}}>
          📋 Tienes {tareasPend} tarea{tareasPend>1?"s":""} pendiente{tareasPend>1?"s":""}{tareasVenc>0?(" · "+tareasVenc+" vencida"+(tareasVenc>1?"s":"")+" 🔴"):""}
          <button className="header-x" style={{marginLeft:"auto"}} onClick={()=>setShowTareas(true)}>Ver</button>
        </div>
      )}

      {/* Menú lateral de acciones */}
      {menuOpen && (
        <div className="drawer-bg" onClick={()=>setMenuOpen(false)}>
          <div className="drawer" onClick={e=>e.stopPropagation()}>
            <div className="card-t" style={{marginBottom:6}}>Menú</div>
            <button className="drawer-item" onClick={()=>{setMenuOpen(false);setShowVip(true);}}>💳 Membresías</button>
            <button className="drawer-item" onClick={()=>{setMenuOpen(false);setShowRecepcion(true);}}>📦 Recibir mercancía{pendTransito>0?(" ("+pendTransito+")"):""}</button>
            <button className="drawer-item" onClick={()=>{setMenuOpen(false);setShowTareas(true);}}>📋 Mis tareas{tareasPend>0?(" ("+tareasPend+")"):""}</button>
            <button className="drawer-item" onClick={()=>{setMenuOpen(false);setShowRecibos(true);}}>🧾 Mis recibos</button>
            <button className="drawer-item" onClick={()=>{setMenuOpen(false);setShowMaq(true);}}>🔧 Máquinas</button>
            <div style={{marginTop:"auto",paddingTop:10}}>
              <button className="drawer-item" style={{background:"var(--red-d)",borderColor:"var(--red)",color:"var(--red)"}} onClick={()=>{setMenuOpen(false);setShowCierre(true);}}>🔒 Cerrar caja</button>
            </div>
          </div>
        </div>
      )}

      <div className="page">
        <div className="search">
          <span className="ico">🔍</span>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar producto o código de barras…"/>
        </div>
        <div className="cats">
          {cats.map(c=><div key={c} className={"cat"+(c===cat?" active":"")} onClick={()=>setCat(c)}>{c}</div>)}
        </div>

        {visibles.length===0 && <div className="empty">No hay productos en esta categoría.</div>}
        <div className="grid">
          {visibles.map(p=>(
            <div key={p.id} className="prod" onClick={()=>addToCart(p)}>
              {p.tipo==="token" && <span className="prod-tag tag-token">TOKEN</span>}
              {p.tipo==="servicio" && <span className="prod-tag tag-serv">SERVICIO</span>}
              <div className="prod-name">{p.nombre}</div>
              <div className="prod-price">{p.precio_variable?"Precio variable":fmt(p.precio)}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Barra de carrito */}
      {countCart>0 && (
        <div className="cartbar">
          <div className="cartbar-info">
            <div className="cartbar-count">{countCart} artículo{countCart!==1?"s":""}</div>
            <div className="cartbar-total">{fmt(totalCart)}</div>
          </div>
          <button className="cartbar-btn" onClick={()=>setShowCart(true)}>Ver carrito →</button>
        </div>
      )}

      {/* Sheet carrito + cobro */}
      {showCart && (
        <CartSheet cart={cart} total={totalCart} bruto={brutoCart} descTotal={descTotal} busy={busy}
          descuentos={descuentos} descTicket={descTicket} setDescTicket={setDescTicket} onLineDesc={setLineDesc}
          lineFull={lineFull} lineNet={lineNet}
          onClose={()=>setShowCart(false)} onQty={changeQty} onSetQty={setQty} onSplit={separarUnidad} onCobrar={cobrar}/>
      )}

      {/* Sheet cierre de caja → liquidación */}
      {showCierre && (
        <CierreSheet ventas={ventasTurno} sede={sede} operador={operador} turno={turno} showToast={showToast}
          onClose={()=>setShowCierre(false)} onCerrar={cerrarCaja} onPend={refrescarLiqPend}/>
      )}

      {/* Teclado para precio variable */}
      {precioModal && (
        <PrecioSheet producto={precioModal} onClose={()=>setPrecioModal(null)} onConfirm={confirmarPrecio}/>
      )}

      {/* Sheet de máquinas / reporte de mantenimiento */}
      {showMaq && (
        <MaquinasSheet sede={sede} operador={operador} showToast={showToast} onClose={()=>setShowMaq(false)}/>
      )}

      {/* Sheet "mis últimos recibos" */}
      {showTareas && (
        <TareasSheet sede={sede} operador={operador} showToast={showToast} onClose={()=>{setShowTareas(false);refrescarTareas();}}/>
      )}

      {showRecibos && (
        <RecibosSheet sede={sede} operador={operador} onClose={()=>setShowRecibos(false)}/>
      )}

      {/* Módulo VIP / Membresías */}
      {showVip && (
        <VipSheet sede={sede} operador={operador} showToast={showToast} onClose={()=>setShowVip(false)}/>
      )}

      {/* Sheet recepción de mercancía de proveedor */}
      {showRecepcion && (
        <RecepcionSheet sede={sede} operador={operador} productos={productos} showToast={showToast}
          onClose={()=>setShowRecepcion(false)}
          onSaved={()=>{ db.getProductos(sede).then(setProductos).catch(()=>{}); db.transferenciasEnTransito(sede).then(a=>setPendTransito(a.length)).catch(()=>{}); }}/>
      )}
    </div>
  );
}

// ============================================================
// PANTALLA: CHEQUEO DE INVENTARIO (al iniciar turno)
// ============================================================
function ChequeoInventario({productos,sede,operador,showToast,onCancelar,onListo}){
  const [counts,setCounts]=useState({});       // id → string
  const [base,setBase]=useState("");           // valor de base recibida (efectivo del turno anterior)
  const [q,setQ]=useState("");
  const [busy,setBusy]=useState(false);

  const set=(id,v)=>setCounts(prev=>({...prev,[id]:v.replace(/[^0-9-]/g,"")}));
  const contados=productos.filter(p=>counts[p.id]!==undefined && counts[p.id]!=="").length;
  const total=productos.length;
  const visibles=productos.filter(p=>!q||p.nombre.toLowerCase().includes(q.toLowerCase()));
  const baseNum=Number(base)||0;
  const listo = contados===total && base!=="";

  // El operador NO ve el resultado de la comparación (para poder detectar fraudes).
  // Solo cuenta, se compara en silencio y se envía el reporte a administración.
  const enviarYAbrir=async()=>{
    setBusy(true);
    const descuadres=[];
    productos.forEach(p=>{
      const contado=Number(counts[p.id]); const sistema=Number(p.stock)||0;
      if(contado!==sistema) descuadres.push({nombre:p.nombre, sistema, contado, diferencia:contado-sistema});
    });
    try{
      const items=productos.map(p=>({nombre:p.nombre, sistema:Number(p.stock)||0, contado:Number(counts[p.id])}));
      await db.enviarChequeo({sede, operador, items, descuadres, base:baseNum});
    }catch(e){ /* no bloquear la apertura si el envío falla */ }
    setBusy(false);
    showToast("Inventario enviado","ok");
    onListo();
  };

  const btnTxt = busy ? "Enviando…"
    : base==="" ? "Ingresa la base recibida"
    : contados<total ? ("Faltan "+(total-contados)+" por contar")
    : "Enviar y abrir caja";

  return (
    <div className="page">
      <div className="header" style={{borderRadius:14,marginBottom:14}}>
        <div>
          <h1>Chequeo de inventario</h1>
          <div className="header-sub">{sede} · {operador}</div>
        </div>
        <div className="header-badge" style={{background:contados===total?"var(--green-d)":"var(--amber-d)",color:contados===total?"var(--green)":"var(--amber)"}}>{contados}/{total}</div>
      </div>

      <div className="card">
        <label className="label">💵 Valor de base recibida</label>
        <input className="input" type="number" inputMode="numeric" placeholder="$0" style={{marginBottom:4}}
          value={base} onChange={e=>setBase(e.target.value.replace(/[^0-9]/g,""))}/>
        <div style={{fontSize:12,color:"var(--td)"}}>Efectivo que recibes del turno anterior. {baseNum>0 && <b style={{color:"var(--tb)"}}>{fmt(baseNum)}</b>}</div>
      </div>

      <p style={{fontSize:13,color:"var(--td)",marginBottom:12}}>Cuenta físicamente cada producto y escribe la cantidad. Debes contar todos para abrir la caja.</p>
      <div className="search">
        <span className="ico">🔍</span>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar producto…"/>
      </div>
      <div className="card" style={{padding:"4px 0"}}>
        {visibles.map(p=>(
          <div key={p.id} className="citem" style={{padding:"10px 14px"}}>
            <div style={{flex:1}}><div className="citem-name">{p.nombre}</div></div>
            <input className="input" type="number" inputMode="numeric" style={{margin:0,width:90,textAlign:"center"}}
              placeholder="—" value={counts[p.id]??""} onChange={e=>set(p.id,e.target.value)}/>
          </div>
        ))}
      </div>

      <button className="btn-primary" style={{marginTop:14}} disabled={!listo||busy} onClick={enviarYAbrir}>{btnTxt}</button>
      <button className="btn-secondary" style={{marginTop:10}} onClick={onCancelar}>Cancelar y salir</button>
    </div>
  );
}

// SHEET: TECLADO PARA PRECIO VARIABLE

  const [val,setVal]=useState("");
  const tecla=d=>setVal(prev=>(prev+d).replace(/^0+/,"").slice(0,9));
  const borrar=()=>setVal(prev=>prev.slice(0,-1));
  const monto=Number(val)||0;
  return (
    <div className="sheet-bg" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle"/>
        <div className="card-t" style={{justifyContent:"center"}}>{producto.nombre}</div>
        <div style={{textAlign:"center",fontSize:36,fontWeight:800,color:monto>0?"var(--tb)":"var(--td)",margin:"4px 0 18px"}}>{fmt(monto)}</div>
        <div className="pinpad">
          {["1","2","3","4","5","6","7","8","9"].map(d=>(
            <div key={d} className="pin-key" onClick={()=>tecla(d)}>{d}</div>
          ))}
          <div className="pin-key back" onClick={borrar}>⌫</div>
          <div className="pin-key" onClick={()=>tecla("0")}>0</div>
          <div className="pin-key" onClick={()=>tecla("000")}>000</div>
        </div>
        <button className="btn-primary" style={{marginTop:16}} disabled={monto<=0} onClick={()=>onConfirm(monto)}>
          Agregar {monto>0?fmt(monto):""}
        </button>

      </div>
    </div>
  );
}

// ============================================================
// SHEET: CIERRE DE CAJA → LIQUIDACIÓN (formato del recaudo)
// Auto: sede, operador, Nº recibo, valor total, QR/tarjeta, efectivo esperado.
// Manual: control de tokens, devoluciones $, observaciones.
// ============================================================
function CierreSheet({ventas,sede,operador,turno,showToast,onClose,onCerrar}){
  // Nº de recibo = el de la última venta del turno (el mismo que se ve en el back office)
  const numRecibo = ventas.length ? (ventas[ventas.length-1].recibo || '—') : '—';
  // manuales (control de tokens + devoluciones + observaciones)
  const [tokensBase,setTokensBase]=useState("");
  const [tokensVendidos,setTokensVendidos]=useState("");
  const [devTokens,setDevTokens]=useState("");
  const [tokensMembresia,setTokensMembresia]=useState("");
  const [devoluciones,setDevoluciones]=useState("");
  const [observaciones,setObservaciones]=useState("");
  const [sending,setSending]=useState(false);
  const [memAuto,setMemAuto]=useState(false);   // tokens membresía traídos del módulo VIP

  // Auto-llenar "tokens membresía" con los canjes VIP del turno (reporte_turno → tokens_canjeados).
  // Es una sugerencia: el operador puede ajustarla. No bloquea el cierre si falla.
  useEffect(()=>{
    if(DEMO_MODE) return;
    const desde = (turno && turno.created_at) ? new Date(turno.created_at).getTime() : (Date.now()-12*3600*1000);
    vipApi({accion:'reporte_turno', operador, sede:vipSedeNombre(sede), fecha_desde:desde})
      .then(r=>{ if(r && r.ok && typeof r.tokens_canjeados==='number' && r.tokens_canjeados>0){
        setTokensMembresia(prev=> prev===""? String(r.tokens_canjeados) : prev); setMemAuto(true);
      }})
      .catch(()=>{});
  },[]);

  // automáticos desde las ventas del turno
  const productosVal=ventas.reduce((s,v)=>s+(v.productos||0),0);  // productos (NO tokens, NO membresías)
  const tokensVal=ventas.reduce((s,v)=>s+(v.tokens||0),0);        // solo tokens (fichas)
  const membresiasVal=ventas.reduce((s,v)=>s+(v.membresias||0),0); // membresías VIP vendidas
  const valor=productosVal+tokensVal+membresiasVal;                // total
  const qr=ventas.reduce((s,v)=>s+(v.pago.qr||0)+(v.pago.tarjeta||0),0);  // electrónico (QR/transf./tarjeta)
  const efectivo=ventas.reduce((s,v)=>s+(v.pago.efectivo||0),0);  // efectivo cobrado
  const dev=Number(devoluciones)||0;
  const efectivoEsperado=efectivo-dev;
  const tokensRestantes=(Number(tokensBase)||0)-(Number(tokensVendidos)||0)-(Number(devTokens)||0)-(Number(tokensMembresia)||0);
  const listo=tokensBase!=="" && tokensVendidos!=="";

  const payload=()=>({
    sede, operador, numRecibo,
    tokensBase:Number(tokensBase)||0, tokensVendidos:Number(tokensVendidos)||0,
    devTokens:Number(devTokens)||0, tokensMembresia:Number(tokensMembresia)||0, tokensRestantes,
    valor, valorProductos:productosVal, valorTokens:tokensVal, valorMembresias:membresiasVal,
    qr, efectivoVentas:efectivo, devoluciones:dev, efectivo:efectivoEsperado, observaciones,
  });

  const mensajeWA=()=>{
    const p=payload();
    return '*Liquidación Panzer — '+sede+'*\n'+
      'Operador: '+operador+'\n'+
      'Recibo: '+numRecibo+'\n'+
      'Fecha: '+new Date().toLocaleString('es-CO')+'\n'+
      '———\n'+
      'Productos: '+fmt(productosVal)+'\n'+
      'Tokens: '+fmt(tokensVal)+'\n'+
      (membresiasVal>0?('Membresías: '+fmt(membresiasVal)+'\n'):'')+
      'Total vendido: '+fmt(valor)+'\n'+
      'QR/Tarjeta: '+fmt(qr)+'\n'+
      'Efectivo: '+fmt(efectivo)+'\n'+
      '———\n'+
      'Tokens vendidos: '+p.tokensVendidos+' · Dev: '+p.devTokens+' · Membresía: '+p.tokensMembresia+'\n'+
      'Tokens restantes: '+p.tokensRestantes+'\n'+
      'Devoluciones: '+fmt(dev)+'\n'+
      '*Efectivo esperado: '+fmt(efectivoEsperado)+'*'+
      (observaciones?('\nObs: '+observaciones):'');
  };
  // Registra la liquidación (Supabase + Sheets) y devuelve el resultado. Usado por ambos botones.
  const registrarLiq=async()=>{
    try{ await db.enviarLiquidacion(payload()); }catch(e){}
    if(onPend){ onPend(); setTimeout(onPend,3000); }   // refresca el banner ahora y tras el envío en segundo plano
    showToast("Liquidación guardada ✓","ok");
  };
  // Botón WhatsApp: AHORA primero registra la liquidación y luego abre WhatsApp (así no se pierde).
  const registrarYWhatsApp=async()=>{
    setSending(true);
    await registrarLiq();
    window.open('https://api.whatsapp.com/send?text='+encodeURIComponent(mensajeWA()),'_blank');
    onCerrar();
  };
  const registrarYCerrar=async()=>{
    setSending(true);
    await registrarLiq();
    onCerrar();   // cierra caja igual — la liquidación no se pierde (queda en cola)
  };

  const tokenInput=(lbl,val,setter,extra)=>(
    <div style={{flex:1}}>
      <label className="label">{lbl}</label>
      <input className="input" type="number" inputMode="numeric" placeholder="0" value={val} onChange={e=>setter(e.target.value.replace(/[^0-9]/g,""))} style={extra}/>
    </div>
  );
  const row=(l,v,color,bold)=>(<div className="result-row"><span className="result-label" style={bold?{fontWeight:800,color:"var(--tb)"}:null}>{l}</span><span className="result-value" style={color?{color}:null}>{fmt(v)}</span></div>);

  return (
    <div className="sheet-bg" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle"/>
        <div className="card-t">🧾 Liquidación de turno</div>
        <div className="header-sub" style={{marginBottom:6}}>{sede} · {operador} · Recibo {numRecibo}</div>

        {/* Desglose automático */}
        <div className="result-row"><span className="result-label">Nº de ventas</span><span className="result-value">{ventas.length}</span></div>
        {row("Productos", productosVal)}
        {row("Tokens", tokensVal, "var(--amber)")}
        {membresiasVal>0 && row("Membresías", membresiasVal, "var(--amber)")}
        {row("Total vendido", valor, "var(--tb)", true)}
        {row("QR / Transferencia / Tarjeta", qr, "var(--blue)")}
        {row("Efectivo", efectivo, "var(--green)")}

        {/* Tokens (manual) */}
        <div className="card-t" style={{fontSize:14,marginTop:14}}>🪙 Control de tokens</div>
        <div style={{display:"flex",gap:10}}>
          {tokenInput("Base", tokensBase, setTokensBase)}
          {tokenInput("Vendidos", tokensVendidos, setTokensVendidos)}
        </div>
        <div style={{display:"flex",gap:10}}>
          {tokenInput("Dev. tokens", devTokens, setDevTokens)}
          {tokenInput("Membresía", tokensMembresia, setTokensMembresia, {borderColor:"var(--purple)"})}
        </div>
        {memAuto && <div style={{fontSize:11,color:"var(--purple)",marginBottom:6}}>💳 "Membresía" se trajo automático de los canjes VIP del turno. Puedes ajustarlo.</div>}
        <div style={{fontSize:12,color:"var(--amber)",fontWeight:700,marginBottom:10}}>🪙 Tokens restantes: {tokensRestantes}</div>

        {/* Devoluciones + observaciones (manual) */}
        <label className="label">Devoluciones $</label>
        <input className="input" type="number" inputMode="numeric" placeholder="$0" value={devoluciones} onChange={e=>setDevoluciones(e.target.value.replace(/[^0-9]/g,""))}/>
        <label className="label">Observaciones</label>
        <textarea className="input" style={{minHeight:60,resize:"vertical"}} placeholder="Notas del turno…" value={observaciones} onChange={e=>setObservaciones(e.target.value)}/>

        {/* Efectivo esperado */}
        <div className="result-row" style={{borderTop:"1px solid var(--bd)",marginTop:4}}>
          <span className="result-label" style={{fontWeight:800,fontSize:15,color:"var(--tb)"}}>Efectivo esperado</span>
          <span style={{fontWeight:800,fontSize:22,color:"var(--green)"}}>{fmt(efectivoEsperado)}</span>
        </div>

        {/* Acción principal: registra la liquidación Y la envía por WhatsApp (no se pierde) */}
        <button className="btn-primary" style={{marginTop:14,background:"#25D366",border:"none"}} disabled={!listo||sending} onClick={registrarYWhatsApp}>
          {sending?"Registrando…":(listo?"📲 Registrar y enviar por WhatsApp":"Completa el control de tokens")}
        </button>
        {/* Alternativa: registrar sin enviar WhatsApp */}
        <button className="btn-secondary" style={{marginTop:10}} disabled={!listo||sending} onClick={registrarYCerrar}>
          {listo?"Registrar y cerrar caja (sin WhatsApp)":"Completa el control de tokens"}
        </button>
        <button className="btn-secondary" style={{marginTop:10}} onClick={onClose}>Seguir vendiendo</button>
      </div>
    </div>
  );
}

function QtyInput({value,onSet}){
  const [v,setV]=React.useState(String(value));
  React.useEffect(()=>{ setV(String(value)); },[value]);
  const commit=()=>{ let n=parseInt(v,10); if(isNaN(n)||n<1) n=1; onSet(n); setV(String(n)); };
  return <input type="number" inputMode="numeric" value={v}
    onChange={e=>setV(e.target.value.replace(/[^0-9]/g,''))}
    onFocus={e=>e.target.select()}
    onBlur={commit}
    onKeyDown={e=>{ if(e.key==='Enter') e.target.blur(); }}
    style={{width:54,textAlign:"center",background:"var(--sf2)",border:"1px solid var(--bd)",borderRadius:8,color:"var(--tb)",fontSize:15,fontWeight:800,padding:"6px 2px"}}/>;
}
function CartSheet({cart,total,bruto,descTotal,busy,descuentos,descTicket,setDescTicket,onLineDesc,lineFull,lineNet,onClose,onQty,onSetQty,onSplit,onCobrar}){
  const [paso,setPaso]=useState("carrito"); // carrito | pago
  const hayDesc = (descuentos||[]).length>0;
  const selStyle={background:"var(--sf2)",border:"1px solid var(--bd)",borderRadius:8,color:"var(--blue)",fontSize:11,fontWeight:600,padding:"2px 4px",marginTop:2};
  const [metodo,setMetodo]=useState("efectivo"); // efectivo | qr | tarjeta | mixto
  const [ef,setEf]=useState(""); const [qr,setQr]=useState(""); const [tj,setTj]=useState("");

  const pago = ()=>{
    if(metodo==="efectivo") return {efectivo:total,qr:0,tarjeta:0};
    if(metodo==="qr") return {efectivo:0,qr:total,tarjeta:0};
    if(metodo==="tarjeta") return {efectivo:0,qr:0,tarjeta:total};
    return {efectivo:Number(ef)||0,qr:Number(qr)||0,tarjeta:Number(tj)||0};
  };
  const p=pago();
  const sumaMixto=p.efectivo+p.qr+p.tarjeta;
  const mixtoOk = metodo!=="mixto" || sumaMixto===total;

  return (
    <div className="sheet-bg" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle"/>
        {paso==="carrito" && (
          <div>
            <div className="card-t">🛒 Carrito</div>
            {cart.map(c=>{
              const key=c.key||c.producto_id;
              return (
              <div key={key} className="citem">
                <div style={{flex:1}}>
                  <div className="citem-name">
                    {c.nombre}
                    {c.descPct>0 && <span style={{marginLeft:6,fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:8,background:"var(--green-d)",color:"var(--green)"}}>−{c.descPct}%</span>}
                  </div>
                  <div className="citem-sub">{fmt(c.precio)} c/u</div>
                  {hayDesc && (
                    <select value={c.descId||""} style={selStyle}
                      onChange={e=>{ const d=descuentos.find(x=>x.id===e.target.value)||null; onLineDesc(key,d); }}>
                      <option value="">Sin descuento</option>
                      {descuentos.map(d=><option key={d.id} value={d.id}>{d.nombre} ({d.porcentaje}%)</option>)}
                    </select>
                  )}
                  {c.cantidad>1 && <button onClick={()=>onSplit(key)} style={{marginTop:6,background:"var(--sf3)",border:"1px solid var(--bd)",borderRadius:8,padding:"5px 9px",color:"var(--t)",fontSize:11,fontWeight:600,cursor:"pointer"}}>✂️ Separar 1 (descuento aparte)</button>}
                </div>
                <div className="qty">
                  <button onClick={()=>onQty(key,-1)}>−</button>
                  <QtyInput value={c.cantidad} onSet={n=>onSetQty(key,n)}/>
                  <button onClick={()=>onQty(key,1)}>+</button>
                </div>
                <div style={{minWidth:74,textAlign:"right"}}>
                  {c.descPct>0
                    ? <div><div style={{textDecoration:"line-through",color:"var(--td)",fontSize:11}}>{fmt(lineFull(c))}</div><div style={{fontWeight:800,color:"var(--tb)"}}>{fmt(lineNet(c))}</div></div>
                    : <div style={{fontWeight:800,color:"var(--tb)"}}>{fmt(lineFull(c))}</div>}
                </div>
              </div>
            );})}

            {hayDesc && (
              <div style={{marginTop:12}}>
                <label className="label">Descuento al ticket completo</label>
                <select className="select" value={descTicket?descTicket.id:""} style={{marginBottom:0}}
                  onChange={e=>{ const d=descuentos.find(x=>x.id===e.target.value)||null; setDescTicket(d?{id:d.id,nombre:d.nombre,porcentaje:d.porcentaje}:null); }}>
                  <option value="">Sin descuento</option>
                  {descuentos.map(d=><option key={d.id} value={d.id}>{d.nombre} ({d.porcentaje}%)</option>)}
                </select>
              </div>
            )}

            {descTotal>0 && (
              <div className="result-row" style={{marginTop:10}}>
                <span className="result-label">Subtotal</span><span className="result-value">{fmt(bruto)}</span>
              </div>
            )}
            {descTotal>0 && (
              <div className="result-row">
                <span className="result-label">Descuentos</span><span className="result-value" style={{color:"var(--red)"}}>-{fmt(descTotal)}</span>
              </div>
            )}
            <div className="result-row" style={{marginTop:descTotal>0?0:8,borderTop:"1px solid var(--bd)",borderBottom:"none"}}>
              <span className="result-label" style={{fontWeight:800,fontSize:15,color:"var(--tb)"}}>Total</span>
              <span style={{fontWeight:800,fontSize:22,color:"var(--green)"}}>{fmt(total)}</span>
            </div>
            <button className="btn-primary" style={{marginTop:14}} onClick={()=>setPaso("pago")}>Cobrar →</button>
            <button className="btn-secondary" style={{marginTop:10}} onClick={onClose}>Seguir vendiendo</button>
          </div>
        )}
        {paso==="pago" && (
          <div>
            <div className="card-t">💵 Método de pago</div>
            <div className="pay-opts">
              {[["efectivo","Efectivo"],["qr","QR/Transf."],["tarjeta","Tarjeta"]].map(([k,l])=>(
                <div key={k} className={"pay-opt"+(metodo===k?" active":"")} onClick={()=>setMetodo(k)}>{l}</div>
              ))}
            </div>
            <div className={"pay-opt"+(metodo==="mixto"?" active":"")} style={{marginBottom:12}} onClick={()=>setMetodo("mixto")}>Pago mixto</div>
            {metodo==="mixto" && (
              <div>
                <label className="label">Efectivo</label>
                <input className="input" type="number" inputMode="numeric" value={ef} onChange={e=>setEf(e.target.value)} placeholder="$0"/>
                <label className="label">QR / Transferencia</label>
                <input className="input" type="number" inputMode="numeric" value={qr} onChange={e=>setQr(e.target.value)} placeholder="$0"/>
                <label className="label">Tarjeta</label>
                <input className="input" type="number" inputMode="numeric" value={tj} onChange={e=>setTj(e.target.value)} placeholder="$0"/>
                <div className="result-row">
                  <span className="result-label">Suma</span>
                  <span className="result-value" style={{color:sumaMixto===total?"var(--green)":"var(--red)"}}>{fmt(sumaMixto)} / {fmt(total)}</span>
                </div>
              </div>
            )}
            <div className="result-row" style={{marginTop:6}}>
              <span className="result-label" style={{fontWeight:800,fontSize:15,color:"var(--tb)"}}>A cobrar</span>
              <span style={{fontWeight:800,fontSize:22,color:"var(--green)"}}>{fmt(total)}</span>
            </div>
            <button className="btn-primary" style={{marginTop:14}} disabled={busy||!mixtoOk}
              onClick={()=>onCobrar(p)}>
              {busy?"Registrando...":"✅ Confirmar venta"}
            </button>
            <button className="btn-secondary" style={{marginTop:10}} onClick={()=>setPaso("carrito")}>← Volver al carrito</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ============================================================
// SHEET: MÁQUINAS / REPORTE DE MANTENIMIENTO (operador)
// El operador reporta una falla: descripción OBLIGATORIA y apaga la máquina.
// Solo el supervisor la enciende desde el back office. Botón de WhatsApp.
// ============================================================
function MaquinasSheet({sede,operador,showToast,onClose}){
  const [equipos,setEquipos]=useState(null);
  const [sel,setSel]=useState(null);      // equipo elegido para reportar
  const [desc,setDesc]=useState("");
  const [busy,setBusy]=useState(false);
  const [enviado,setEnviado]=useState(null); // {equipo,desc} tras reportar, para ofrecer WhatsApp

  const load=()=>{ db.getEquipos(sede).then(setEquipos).catch(()=>setEquipos([])); };
  useEffect(load,[]);

  const mensajeWA=(eq,d)=>'*🔧 Reporte de máquina — '+sede+'*\n'+
    'Equipo: '+eq.nombre+'\n'+
    'Operador: '+operador+'\n'+
    'Fecha: '+new Date().toLocaleString('es-CO')+'\n'+
    '———\n'+
    'Falla: '+d+'\n'+
    '*Máquina APAGADA — pendiente de reparación por supervisor*';
  const enviarWhatsApp=(eq,d)=>{
    const url='https://api.whatsapp.com/send?text='+encodeURIComponent(mensajeWA(eq,d));
    window.open(url,'_blank');
  };

  const reportar=async()=>{
    const d=desc.trim();
    if(!d){ showToast("La descripción es obligatoria","err"); return; }
    setBusy(true);
    try{
      await db.reportarFalla(sel.id, operador, d);
      setEnviado({equipo:sel, desc:d});
      setSel(null); setDesc("");
      load();
      showToast("Máquina apagada y reportada","ok");
    }catch(e){ showToast("No se pudo reportar: "+(e.message||e),"err"); }
    finally{ setBusy(false); }
  };

  return (
    <div className="sheet-bg" onClick={()=>!busy&&onClose()}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle"/>
        <div className="card-t">🔧 Máquinas — {sede}</div>

        {/* Confirmación tras reportar: ofrecer WhatsApp */}
        {enviado && (
          <div className="card" style={{margin:"4px 0 14px",background:"var(--red-d)",borderColor:"var(--red)"}}>
            <div style={{fontWeight:700}}>✅ {enviado.equipo.nombre} apagada y reportada</div>
            <div className="header-sub" style={{margin:"4px 0 10px"}}>{enviado.desc}</div>
            <button className="btn-primary" style={{background:"#25D366",borderColor:"#25D366"}} onClick={()=>enviarWhatsApp(enviado.equipo,enviado.desc)}>📲 Enviar reporte por WhatsApp</button>
            <button className="btn-secondary" style={{marginTop:10}} onClick={()=>setEnviado(null)}>Listo</button>
          </div>
        )}

        {!enviado && (
          !equipos ? <div className="empty">Cargando…</div> :
          equipos.length===0 ? <div className="empty">No hay máquinas configuradas para esta sede.</div> :
          !sel ? (
            <div>
              <div className="header-sub" style={{marginBottom:10}}>Toca una máquina operativa para reportar una falla.</div>
              {equipos.map(eq=>{ const parada=eq.estado==='parada'; return (
                <div key={eq.id} onClick={()=>{ if(!parada) setSel(eq); }}
                  style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",marginBottom:8,borderRadius:12,border:"1px solid var(--bd)",background:"var(--sf2)",cursor:parada?"default":"pointer",opacity:parada?0.7:1}}>
                  <span style={{width:12,height:12,borderRadius:"50%",background:parada?"var(--red)":"var(--green)",flexShrink:0}}></span>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700}}>{eq.nombre}</div>
                    <div className="header-sub" style={{color:parada?"var(--red)":"var(--green)"}}>{parada?"Parada — reportada":"Operativa"}</div>
                  </div>
                  {!parada && <span style={{color:"var(--td)"}}>Reportar ›</span>}
                </div>
              );})}
            </div>
          ) : (
            <div>
              <div className="card" style={{marginBottom:12}}>
                <div className="header-sub">Reportando falla de</div>
                <div style={{fontWeight:800,fontSize:18}}>{sel.nombre}</div>
              </div>
              <label className="label">Descripción de la falla (obligatoria)</label>
              <textarea className="input" rows="4" style={{resize:"vertical"}} value={desc} onChange={e=>setDesc(e.target.value)} placeholder="¿Qué le pasa a la máquina?"></textarea>
              <button className="btn-primary" style={{marginTop:14,background:"var(--red)",borderColor:"var(--red)"}} disabled={busy||!desc.trim()} onClick={reportar}>{busy?"Reportando…":"🔌 Reportar y apagar máquina"}</button>
              <button className="btn-secondary" style={{marginTop:10}} disabled={busy} onClick={()=>{setSel(null);setDesc("");}}>← Volver</button>
            </div>
          )
        )}

        {!sel && !enviado && <button className="btn-secondary" style={{marginTop:6}} onClick={onClose}>Cerrar</button>}
      </div>
    </div>
  );
}

// ============================================================
// SHEET: MIS ÚLTIMOS RECIBOS (operador)
// El cajero consulta sus últimos 5 recibos por si cometió un error.
// Solo lectura — no puede editar ni anular (eso es del back office).
// ============================================================
function TareasSheet({sede,operador,showToast,onClose}){
  const [tareas,setTareas]=useState(null);
  const hoy=(()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');})();

  const load=()=>{ db.misTareas(sede,operador).then(setTareas).catch(()=>setTareas([])); };
  useEffect(()=>{ load(); },[]);

  const toggle=async t=>{
    const nuevo=t.estado!=='hecha';
    setTareas(prev=>prev.map(x=>x.id===t.id?{...x,estado:nuevo?'hecha':'pendiente',completado_at:nuevo?new Date().toISOString():null}:x));
    try{ await db.marcarMiTarea(t.id,nuevo); }
    catch(e){ showToast&&showToast("No se pudo guardar, reintenta","err"); load(); }
  };

  const all=tareas||[];
  const pend=all.filter(t=>t.estado!=='hecha');
  const hechas=all.filter(t=>t.estado==='hecha');
  const dueLabel=t=>{
    if(!t.fecha_limite) return <span style={{color:"var(--td)"}}>Sin fecha</span>;
    if(t.fecha_limite<hoy) return <span style={{color:"var(--red)",fontWeight:700}}>🔴 Vencida · {t.fecha_limite}</span>;
    if(t.fecha_limite===hoy) return <span style={{color:"var(--amber)",fontWeight:700}}>🟡 Para hoy</span>;
    return <span style={{color:"var(--td)"}}>⚪ {t.fecha_limite}</span>;
  };
  const Fila=({t})=>(
    <div onClick={()=>toggle(t)} style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:8,padding:"14px",borderRadius:12,border:"1px solid var(--bd)",background:"var(--sf2)",cursor:"pointer",opacity:t.estado==='hecha'?0.55:1}}>
      <div style={{width:26,height:26,borderRadius:8,flexShrink:0,marginTop:1,border:"2px solid "+(t.estado==='hecha'?"var(--green)":"var(--bd2)"),background:t.estado==='hecha'?"var(--green)":"transparent",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:900}}>{t.estado==='hecha'?"✓":""}</div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontWeight:700,fontSize:15,textDecoration:t.estado==='hecha'?"line-through":"none"}}>{t.titulo}{t.prioridad==='alta'?<span style={{fontSize:10,fontWeight:800,padding:"1px 7px",borderRadius:8,background:"var(--red-d)",color:"var(--red)",marginLeft:6}}>ALTA</span>:null}</div>
        {t.descripcion && <div style={{color:"var(--td)",fontSize:13,marginTop:3}}>{t.descripcion}</div>}
        <div style={{fontSize:12,marginTop:5}}>{t.estado==='hecha'?<span style={{color:"var(--green)"}}>✅ Hecha</span>:dueLabel(t)}{t.creado_por?<span style={{color:"var(--td)"}}> · asignó {t.creado_por}</span>:null}</div>
      </div>
    </div>
  );

  return (
    <div className="sheet-bg" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle"/>
        <div className="card-t">📋 Mis tareas</div>
        <div className="header-sub" style={{marginBottom:12}}>{operador} · {sede} · toca la casilla para marcar hecho</div>

        {tareas===null ? <div className="empty">Cargando…</div> : (
          <div>
            {pend.length>0
              ? pend.map(t=><Fila key={t.id} t={t}/>)
              : <div className="empty" style={{color:"var(--green)",fontWeight:700}}>✓ No tienes tareas pendientes 🎉</div>}
            {hechas.length>0 && <div className="header-sub" style={{margin:"14px 0 8px"}}>Hechas ({hechas.length})</div>}
            {hechas.map(t=><Fila key={t.id} t={t}/>)}
          </div>
        )}
      </div>
    </div>
  );
}

function RecibosSheet({sede,operador,onClose}){
  const [recibos,setRecibos]=useState(null);
  const [abierto,setAbierto]=useState(null); // id del recibo expandido

  useEffect(()=>{ db.misRecibos(sede,operador).then(setRecibos).catch(()=>setRecibos([])); },[]);

  const metodo=r=>{ const m=[]; if(r.pago_efectivo>0)m.push("Efectivo"); if(r.pago_qr>0)m.push("QR/Transf."); if(r.pago_tarjeta>0)m.push("Tarjeta"); return m.join(" + ")||"—"; };
  const fechaHora=iso=>{ const d=new Date(iso); return d.toLocaleDateString('es-CO')+" "+d.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'}); };

  return (
    <div className="sheet-bg" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle"/>
        <div className="card-t">🧾 Mis últimos recibos</div>
        <div className="header-sub" style={{marginBottom:10}}>{operador} · {sede} · solo consulta</div>

        {!recibos ? <div className="empty">Cargando…</div> :
         recibos.length===0 ? <div className="empty">Aún no has registrado ventas.</div> :
         recibos.map(r=>{ const exp=abierto===r.id; return (
          <div key={r.id} style={{marginBottom:8,borderRadius:12,border:"1px solid var(--bd)",background:"var(--sf2)",overflow:"hidden",opacity:r.anulada?0.6:1}}>
            <div onClick={()=>setAbierto(exp?null:r.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",cursor:"pointer"}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700}}>{r.numero_recibo||"(sin Nº)"} {r.anulada && <span style={{fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:8,background:"var(--red-d)",color:"var(--red)",marginLeft:4}}>ANULADO</span>}</div>
                <div className="header-sub">{fechaHora(r.created_at)} · {metodo(r)}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontWeight:800,fontSize:16}}>{fmt(r.total)}</div>
                <div className="header-sub">{exp?"▲":"▼"}</div>
              </div>
            </div>
            {exp && (
              <div style={{padding:"0 14px 12px",borderTop:"1px solid var(--bd)"}}>
                {(r.venta_items||[]).map((it,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",fontSize:13}}>
                    <span>{it.cantidad}× {it.nombre_producto}{it.descuento>0?<span style={{color:"var(--green)"}}> (−{fmt(it.descuento)})</span>:null}</span>
                    <span>{fmt(it.subtotal-(it.descuento||0))}</span>
                  </div>
                ))}
                {r.descuento>0 && <div style={{display:"flex",justifyContent:"space-between",padding:"6px 0",fontSize:13,color:"var(--green)"}}><span>Descuento total</span><span>−{fmt(r.descuento)}</span></div>}
                <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0 0",borderTop:"1px solid var(--bd)",fontWeight:800}}><span>Total</span><span>{fmt(r.total)}</span></div>
              </div>
            )}
          </div>
        );})}

        <button className="btn-secondary" style={{marginTop:10}} onClick={onClose}>Cerrar</button>
      </div>
    </div>
  );
}

// ============================================================
// SHEET: RECEPCIÓN DE MERCANCÍA (operador)
// Registra lo que llega directo del proveedor (snacks, bebidas…)
// y lo SUMA al inventario central de la sede (ajustar_inventario).
// ============================================================
function RecepcionSheet({sede,operador,productos,showToast,onClose,onSaved}){
  const [modo,setModo]=useState(null);          // 'transito' | 'proveedor'
  const [transitos,setTransitos]=useState(null); // transferencias en tránsito
  const [rec,setRec]=useState({});               // id → cantidad recibida (string)
  const [q,setQ]=useState("");
  const [cant,setCant]=useState({});             // proveedor: producto_id → string
  const [cantM,setCantM]=useState({});           // muestra: producto_id → string
  const [busy,setBusy]=useState(false);

  useEffect(()=>{
    db.transferenciasEnTransito(sede).then(ts=>{
      setTransitos(ts);
      const r={}; ts.forEach(t=>{ r[t.id]=String(t.cantidad_enviada); }); setRec(r);
      setModo(ts.length>0?'transito':'proveedor');   // si hay envíos pendientes, abre en esa pestaña
    }).catch(()=>{ setTransitos([]); setModo('proveedor'); });
  },[]);

  // ---- proveedor (a ciegas) ----
  const lista=(productos||[]).filter(p=>p.controla_stock);
  const visibles=lista.filter(p=>!q||p.nombre.toLowerCase().includes(q.toLowerCase()));
  const setC=(id,v)=>setCant(prev=>({...prev,[id]:v.replace(/[^0-9]/g,"")}));
  const items=Object.entries(cant).map(([producto_id,v])=>({producto_id,cantidad:Number(v)||0})).filter(it=>it.cantidad>0);
  const totalUds=items.reduce((s,it)=>s+it.cantidad,0);

  const guardarProveedor=async()=>{
    if(!items.length){ showToast("Escribe al menos una cantidad","err"); return; }
    setBusy(true);
    try{
      await db.recibirMercancia(sede, operador, items);
      showToast("Inventario actualizado ("+totalUds+" uds)","ok");
      if(onSaved) onSaved(); onClose();
    }catch(e){ showToast("No se pudo registrar: "+(e.message||e),"err"); setBusy(false); }
  };

  // ---- muestra (a ciegas: retira del inventario) ----
  const setM=(id,v)=>setCantM(prev=>({...prev,[id]:v.replace(/[^0-9]/g,"")}));
  const itemsM=Object.entries(cantM).map(([producto_id,v])=>({producto_id,cantidad:Number(v)||0})).filter(it=>it.cantidad>0);
  const totalM=itemsM.reduce((s,it)=>s+it.cantidad,0);
  const guardarMuestra=async()=>{
    if(!itemsM.length){ showToast("Escribe al menos una cantidad","err"); return; }
    setBusy(true);
    try{
      await db.retirarMuestra(sede, operador, itemsM);
      showToast("Retiro de muestra registrado ("+totalM+" uds)","ok");
      if(onSaved) onSaved(); onClose();
    }catch(e){ showToast("No se pudo registrar: "+(e.message||e),"err"); setBusy(false); }
  };

  // ---- tránsito (transferencias de Kemilabo) ----
  const setR=(id,v)=>setRec(prev=>({...prev,[id]:v.replace(/[^0-9]/g,"")}));
  const recibirTransito=async()=>{
    if(!transitos||!transitos.length) return;
    setBusy(true);
    try{
      const its=transitos.map(t=>({id:t.id, cantidad:Number(rec[t.id]??t.cantidad_enviada)||0}));
      await db.recibirTransferencias(its, operador);
      const faltantes=transitos.filter(t=>(Number(rec[t.id]??t.cantidad_enviada)||0) < Number(t.cantidad_enviada));
      showToast(faltantes.length?("Recibido — "+faltantes.length+" con faltante"):"Transferencia recibida ✓","ok");
      if(onSaved) onSaved(); onClose();
    }catch(e){ showToast("No se pudo recibir: "+(e.message||e),"err"); setBusy(false); }
  };

  const tab=(k,l)=>(<div onClick={()=>setModo(k)} style={{flex:1,textAlign:"center",padding:"9px 6px",borderRadius:10,cursor:"pointer",fontWeight:700,fontSize:13,background:modo===k?"var(--blue-d)":"transparent",color:modo===k?"var(--blue)":"var(--td)"}}>{l}</div>);

  return (
    <div className="sheet-bg" onClick={()=>!busy&&onClose()}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle"/>
        <div className="card-t">📦 Recibir mercancía</div>

        <div style={{display:"flex",gap:6,background:"var(--sf2)",borderRadius:12,padding:4,marginBottom:12}}>
          {tab('transito','🚚 Kemilabo'+(transitos&&transitos.length?(" ("+transitos.length+")"):""))}
          {tab('proveedor','🏪 Proveedor')}
          {tab('muestra','🧪 Muestra')}
        </div>

        {modo===null && <div className="empty">Cargando…</div>}

        {/* ---- TRÁNSITO ---- */}
        {modo==='transito' && (
          transitos===null ? <div className="empty">Cargando…</div> :
          transitos.length===0 ? <div className="empty">No hay transferencias en tránsito hacia {sede}.</div> : (
            <div>
              <div className="header-sub" style={{marginBottom:10}}>Llegó un envío desde la bodega. Escribe cuánto recibiste <b>de verdad</b> de cada producto (si llegó menos, queda registrado el faltante).</div>
              <div style={{maxHeight:"45vh",overflowY:"auto",marginBottom:10}}>
                {transitos.map(t=>{ const r=Number(rec[t.id]??t.cantidad_enviada)||0; const falta=Number(t.cantidad_enviada)-r; return (
                  <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid var(--bd)"}}>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:600}}>{t.producto_nombre}</div>
                      <div className="header-sub">Enviado: {Number(t.cantidad_enviada)}{falta>0?<span style={{color:"var(--amber)"}}> · faltan {falta}</span>:(falta<0?<span style={{color:"var(--amber)"}}> · sobran {-falta}</span>:<span style={{color:"var(--green)"}}> · ✓</span>)}</div>
                    </div>
                    <input className="input" type="number" inputMode="numeric" style={{width:90,textAlign:"center"}} value={rec[t.id]??""} onChange={e=>setR(t.id,e.target.value)}/>
                  </div>
                );})}
              </div>
              <button className="btn-primary" disabled={busy} onClick={recibirTransito}>{busy?"Recibiendo…":"✅ Confirmar recepción"}</button>
            </div>
          )
        )}

        {/* ---- PROVEEDOR (a ciegas) ---- */}
        {modo==='proveedor' && (
          <div>
            <div className="header-sub" style={{marginBottom:10}}>Lo que llega directo del proveedor (snacks, bebidas…). Escribe cuánto llegó de cada producto.</div>
            <div className="search" style={{marginBottom:10}}>
              <span className="ico">🔍</span>
              <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar producto…"/>
            </div>
            <div style={{maxHeight:"42vh",overflowY:"auto",marginBottom:10}}>
              {visibles.length===0 && <div className="empty">No hay productos con inventario en esta sede.</div>}
              {visibles.map(p=>{ const v=cant[p.id]||""; return (
                <div key={p.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid var(--bd)"}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600}}>{p.nombre}</div>
                    {p.categoria && <div className="header-sub">{p.categoria}</div>}
                  </div>
                  <input className="input" type="number" inputMode="numeric" style={{width:90,textAlign:"center"}} placeholder="Llegó…" value={v} onChange={e=>setC(p.id,e.target.value)}/>
                </div>
              );})}
            </div>
            {items.length>0 && <div className="header-sub" style={{marginBottom:8}}>Vas a ingresar <b>{totalUds}</b> unidades en <b>{items.length}</b> producto(s).</div>}
            <button className="btn-primary" disabled={busy||!items.length} onClick={guardarProveedor}>{busy?"Guardando…":"✅ Registrar entrada"}</button>
          </div>
        )}

        {/* ---- MUESTRA (retiro del inventario para demostración) ---- */}
        {modo==='muestra' && (
          <div>
            <div className="header-sub" style={{marginBottom:10}}>Producto que se retira del inventario para <b>muestra/demostración</b> (no es venta). Escribe cuánto sacaste de cada uno.</div>
            <div className="search" style={{marginBottom:10}}>
              <span className="ico">🔍</span>
              <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar producto…"/>
            </div>
            <div style={{maxHeight:"42vh",overflowY:"auto",marginBottom:10}}>
              {visibles.length===0 && <div className="empty">No hay productos con inventario en esta sede.</div>}
              {visibles.map(p=>{ const v=cantM[p.id]||""; return (
                <div key={p.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid var(--bd)"}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600}}>{p.nombre}</div>
                    {p.categoria && <div className="header-sub">{p.categoria}</div>}
                  </div>
                  <input className="input" type="number" inputMode="numeric" style={{width:90,textAlign:"center"}} placeholder="Retiré…" value={v} onChange={e=>setM(p.id,e.target.value)}/>
                </div>
              );})}
            </div>
            {itemsM.length>0 && <div className="header-sub" style={{marginBottom:8}}>Vas a retirar <b>{totalM}</b> unidad(es) en <b>{itemsM.length}</b> producto(s) para muestra.</div>}
            <button className="btn-primary" style={{background:"var(--amber)",borderColor:"var(--amber)"}} disabled={busy||!itemsM.length} onClick={guardarMuestra}>{busy?"Registrando…":"🧪 Registrar retiro de muestra"}</button>
          </div>
        )}

        <button className="btn-secondary" style={{marginTop:10}} disabled={busy} onClick={onClose}>Cerrar</button>
      </div>
    </div>
  );
}

// MÓDULO VIP — membresías (mismo backend Sheets que vip.panzercarwash.com)
