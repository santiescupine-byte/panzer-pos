        <button className="btn btn-ghost btn-sm" style={{marginLeft:"auto"}} onClick={()=>setModal('setclave')}>{existe?"Cambiar clave":"Definir clave"}</button>
      </div>

      {sub==="insumos"   && <Insumos showToast={showToast}/>}
      {sub==="recetas"   && <Recetas showToast={showToast} clave={clave} onUnlock={onUnlock}/>}
      {sub==="producir"  && <Producir showToast={showToast} clave={clave} onUnlock={onUnlock}/>}
      {sub==="historial" && <HistorialProd showToast={showToast} clave={clave} onUnlock={onUnlock}/>}

      {modal==='unlock' && <ClaveModal titulo="Desbloquear fórmulas" label="Clave de fórmulas" onClose={()=>setModal(null)}
        onOk={async(c)=>{ if(await db.verificarClaveFormulas(c)){ setClave(c); setModal(null); showToast("Fórmulas desbloqueadas"); } else { showToast("Clave incorrecta","err"); } }}/>}
      {modal==='setclave' && <SetClaveModal existe={existe} onClose={()=>setModal(null)}
        onOk={async(actual,nueva)=>{ try{ await db.setClaveFormulas(actual,nueva); setExiste(true); setClave(nueva); setModal(null); showToast("Clave guardada"); }catch(e){ showToast(""+(e.message||e),"err"); } }}/>}
    </div>
  );
}

function ClaveModal({titulo,label,onClose,onOk}){
  const [c,setC]=useState(""); const [busy,setBusy]=useState(false);
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:360}}>
        <div className="modal-t">🔒 {titulo}</div>
        <label className="label">{label}</label>
        <input className="input" type="password" autoFocus value={c} onChange={e=>setC(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&c){setBusy(true);onOk(c);}}}/>
        <div className="modal-actions">
          <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
          <button className="btn btn-amber" disabled={!c||busy} onClick={()=>{setBusy(true);onOk(c);}}>Entrar</button>
        </div>
      </div>
    </div>
  );
}

function SetClaveModal({existe,onClose,onOk}){
  const [actual,setActual]=useState(""); const [nueva,setNueva]=useState(""); const [n2,setN2]=useState("");
  const valido = nueva.length>=4 && nueva===n2 && (!existe || actual.length>0);
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:380}}>
        <div className="modal-t">🔑 {existe?"Cambiar clave de fórmulas":"Definir clave de fórmulas"}</div>
        <div className="muted" style={{marginBottom:10}}>Esta clave solo la conoces tú. Se guarda encriptada en el servidor; protege las recetas.</div>
        {existe && <><label className="label">Clave actual</label><input className="input" type="password" value={actual} onChange={e=>setActual(e.target.value)}/></>}
        <label className="label">Nueva clave (mín. 4)</label>
        <input className="input" type="password" value={nueva} onChange={e=>setNueva(e.target.value)}/>
        <label className="label">Repetir nueva clave</label>
        <input className="input" type="password" value={n2} onChange={e=>setN2(e.target.value)}/>
        {nueva && n2 && nueva!==n2 && <div className="muted" style={{color:"var(--red)"}}>No coinciden.</div>}
        <div className="modal-actions">
          <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
          <button className="btn btn-amber" disabled={!valido} onClick={()=>onOk(actual,nueva)}>Guardar clave</button>
        </div>
      </div>
    </div>
  );
}

function Insumos({showToast}){
  const [items,setItems]=useState(null);
  const [editing,setEditing]=useState(null);
  const [carga,setCarga]=useState(null);
  const load=async()=>{ try{ setItems(await db.listInsumos()); }catch(e){ showToast(""+(e.message||e),"err"); } };
  useEffect(()=>{ load(); },[]);
  const guardar=async(i)=>{ try{ await db.saveInsumo(i); setEditing(null); await load(); showToast("Insumo guardado"); }catch(e){ showToast(""+(e.message||e),"err"); } };
  const eliminar=async(i)=>{ if(!window.confirm("¿Eliminar \""+i.nombre+"\"?")) return; try{ await db.deleteInsumo(i.id); await load(); showToast("Insumo eliminado"); }catch(e){ showToast(""+(e.message||e),"err"); } };
  const cargar=async(c)=>{ try{ await db.entradaInsumo(c.id,Number(c.cantidad),c.costo?Number(c.costo):0,c.nota); setCarga(null); await load(); showToast("Entrada registrada"); }catch(e){ showToast(""+(e.message||e),"err"); } };
  if(!items) return <div className="empty">Cargando…</div>;
  const bajos=items.filter(i=>Number(i.stock)<=Number(i.stock_minimo) && Number(i.stock_minimo)>0).length;
  return (
    <div>
      <div className="toolbar">
        <div className="sec-title" style={{marginRight:"auto"}}>Insumos <span className="muted">({items.length})</span></div>
        {bajos>0 && <span className="pill pill-off">⚠ {bajos} bajo mínimo</span>}
        <button className="btn btn-amber" onClick={()=>setEditing({nombre:"",unidad:"g",costo:0,stock:0,stock_minimo:0,activo:true})}>+ Nuevo insumo</button>
      </div>
      <div className="card" style={{padding:0,overflowX:"auto"}}>
        <table className="tbl">
          <thead><tr><th>Insumo</th><th>Unidad</th><th className="num">Costo/u</th><th className="num">Stock</th><th className="num">Mínimo</th><th></th></tr></thead>
          <tbody>
            {items.length===0 && <tr><td colSpan="6"><div className="empty">Sin insumos. Crea uno.</div></td></tr>}
            {items.map(i=>{ const bajo=Number(i.stock)<=Number(i.stock_minimo)&&Number(i.stock_minimo)>0; return (
              <tr key={i.id} className={i.activo?"":"inactive"}>
                <td className="row-name">{i.nombre}</td>
                <td className="muted">{i.unidad}</td>
                <td className="num">{fmt(i.costo)}</td>
                <td className="num"><b style={{color:bajo?"var(--amber)":"var(--tb)"}}>{Number(i.stock)}</b></td>
                <td className="num muted">{Number(i.stock_minimo)}</td>
                <td><div className="actions">
                  <button className="btn btn-ghost btn-sm" onClick={()=>setCarga({id:i.id,nombre:i.nombre,unidad:i.unidad,cantidad:"",costo:i.costo,nota:""})}>+ Cargar</button>
                  <button className="btn btn-ghost btn-sm" onClick={()=>setEditing({...i})}>Editar</button>
                  <button className="btn btn-danger btn-sm" onClick={()=>eliminar(i)}>✕</button>
                </div></td>
              </tr>
            );})}
          </tbody>
        </table>
      </div>
      {editing && (
        <div className="modal-bg" onClick={()=>setEditing(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-t">{editing.id?"Editar insumo":"Nuevo insumo"}</div>
            <label className="label">Nombre</label>
            <input className="input" value={editing.nombre} onChange={e=>setEditing({...editing,nombre:e.target.value})}/>
            <div className="grid2">
              <div><label className="label">Unidad</label><select className="select" value={editing.unidad} onChange={e=>setEditing({...editing,unidad:e.target.value})}>{UNIDADES.map(u=><option key={u} value={u}>{u}</option>)}</select></div>
              <div><label className="label">Costo por unidad</label><input className="input" type="number" value={editing.costo} onChange={e=>setEditing({...editing,costo:Number(e.target.value)||0})}/></div>
            </div>
            <div className="grid2">
              <div><label className="label">Stock actual</label><input className="input" type="number" value={editing.stock} onChange={e=>setEditing({...editing,stock:Number(e.target.value)||0})}/></div>
              <div><label className="label">Stock mínimo (alerta)</label><input className="input" type="number" value={editing.stock_minimo} onChange={e=>setEditing({...editing,stock_minimo:Number(e.target.value)||0})}/></div>
            </div>
            <label className="check"><input type="checkbox" checked={editing.activo!==false} onChange={e=>setEditing({...editing,activo:e.target.checked})}/> Activo</label>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={()=>setEditing(null)}>Cancelar</button>
              <button className="btn btn-amber" disabled={!editing.nombre.trim()} onClick={()=>guardar(editing)}>Guardar</button>
            </div>
          </div>
        </div>
      )}
      {carga && (
        <div className="modal-bg" onClick={()=>setCarga(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-t">Cargar inventario — {carga.nombre}</div>
            <div className="muted" style={{marginBottom:10}}>Registra una entrada (compra) de este insumo. Suma al stock.</div>
            <label className="label">Cantidad ({carga.unidad})</label>
            <input className="input" type="number" value={carga.cantidad} onChange={e=>setCarga({...carga,cantidad:e.target.value})}/>
            <label className="label">Costo por unidad (opcional, actualiza el costo)</label>
            <input className="input" type="number" value={carga.costo} onChange={e=>setCarga({...carga,costo:e.target.value})}/>
            <label className="label">Nota (opcional)</label>
            <input className="input" value={carga.nota} onChange={e=>setCarga({...carga,nota:e.target.value})} placeholder="Proveedor, factura…"/>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={()=>setCarga(null)}>Cancelar</button>
              <button className="btn btn-amber" disabled={!(Number(carga.cantidad)>0)} onClick={()=>cargar(carga)}>Cargar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Recetas({showToast,clave,onUnlock}){
  const [prods,setProds]=useState([]);
  const [insumos,setInsumos]=useState([]);
  const [pid,setPid]=useState("");
  const [items,setItems]=useState([]);
  const [cargando,setCargando]=useState(false);
  useEffect(()=>{ db.listProductos().then(setProds).catch(()=>{}); db.listInsumos().then(setInsumos).catch(()=>{}); },[]);
  useEffect(()=>{ if(!pid||!clave){ setItems([]); return; } setCargando(true); db.getReceta(pid,clave).then(r=>{ setItems(r); setCargando(false); }).catch(e=>{ setCargando(false); showToast(""+(e.message||e),"err"); }); },[pid,clave]);
  const insNombre=id=>{ const i=insumos.find(x=>x.id===id); return i?i.unidad:""; };
  const add=()=>setItems(prev=>[...prev,{insumo_id:"",cantidad:0}]);
  const set=(i,k,v)=>setItems(prev=>{const a=[...prev];a[i]={...a[i],[k]:v};return a;});
  const del=i=>setItems(prev=>prev.filter((_,j)=>j!==i));
  const guardar=async()=>{ try{ await db.saveReceta(pid,items,clave); showToast("Receta guardada"); }catch(e){ showToast(""+(e.message||e),"err"); } };
  // cantidad = % en peso. Costo por kg = Σ costo_insumo × (%/100) × conv(unidad)
  const costoKg=items.reduce((s,it)=>{ const ins=insumos.find(x=>x.id===it.insumo_id); return s+(ins?Number(ins.costo)*(Number(it.cantidad||0)/100)*convInsumo(ins.unidad):0); },0);
  const totalPct=items.reduce((s,it)=>s+Number(it.cantidad||0),0);
  const fabricables=prods.filter(p=>p.fabricable);
  const [nuevoProd,setNuevoProd]=useState("");
  const [creando,setCreando]=useState(false);
  const crearProd=async()=>{
    const nombre=nuevoProd.trim(); if(!nombre) return; setCreando(true);
    try{
      await db.saveProducto({nombre,tipo:"producto",categoria:"PRODUCCIÓN",precio:0,costo:0,codigo_barras:null,controla_stock:true,activo:true,fabricable:true,vende_pos:false,stock:{},dispo:{},componentes:[]});
      const ps=await db.listProductos(); setProds(ps);
      const nuevo=ps.find(p=>p.nombre===nombre && p.fabricable && p.vende_pos===false);
      if(nuevo) setPid(nuevo.id);
      setNuevoProd(""); showToast("Producto de producción creado");
    }catch(e){ showToast(""+(e.message||e),"err"); }
    setCreando(false);
  };
  if(!clave) return (
    <div className="card" style={{textAlign:"center",padding:"36px 18px"}}>
      <div style={{fontSize:40,marginBottom:8}}>🔒</div>
      <div style={{fontWeight:800,color:"var(--tb)"}}>Recetas protegidas</div>
      <div className="muted" style={{margin:"6px 0 16px"}}>Ingresa tu clave de fórmulas para ver o editar las recetas.</div>
      <button className="btn btn-amber" onClick={onUnlock}>Desbloquear fórmulas</button>
    </div>
  );
  return (
    <div>
      <div className="toolbar"><div className="sec-title" style={{marginRight:"auto"}}>Recetas de producción</div></div>
      <div className="muted" style={{marginBottom:10}}>Define el <b>% en peso</b> de cada insumo (deben sumar 100%). Al fabricar, indicas los kilos y el sistema calcula cuánto tomar de cada uno.</div>
      <div className="card">
        <label className="label">Producto fabricable</label>
        <select className="select" value={pid} onChange={e=>setPid(e.target.value)}>
          <option value="">Seleccionar producto…</option>
          {fabricables.map(p=><option key={p.id} value={p.id}>{p.nombre}{p.vende_pos===false?" (solo producción)":""}</option>)}
        </select>
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          <input className="input" style={{margin:0,flex:1}} placeholder="Nuevo producto de producción (otras industrias)…" value={nuevoProd} onChange={e=>setNuevoProd(e.target.value)}/>
          <button className="btn btn-ghost" style={{whiteSpace:"nowrap"}} disabled={!nuevoProd.trim()||creando} onClick={crearProd}>+ Crear</button>
        </div>
        {pid && !cargando && (
          <div>
            {items.map((it,i)=>(
              <div key={i} style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
                <select className="select" style={{margin:0,flex:1}} value={it.insumo_id} onChange={e=>set(i,"insumo_id",e.target.value)}>
                  <option value="">Insumo…</option>
                  {insumos.map(x=><option key={x.id} value={x.id}>{x.nombre} ({x.unidad})</option>)}
                </select>
                <input className="input" type="number" style={{margin:0,width:80,textAlign:"center"}} value={it.cantidad} onChange={e=>set(i,"cantidad",Number(e.target.value)||0)} placeholder="0"/>
                <span className="muted" style={{width:14}}>%</span>
                <button className="btn btn-danger btn-sm" onClick={()=>del(i)}>✕</button>
              </div>
            ))}
            <button className="btn btn-ghost btn-sm" onClick={add}>+ Agregar insumo</button>
            <div className="result-row" style={{marginTop:10}}><span className="result-label">Suma de porcentajes</span><span className="result-value" style={{color:Math.abs(totalPct-100)<0.01?"var(--green)":"var(--red)"}}>{totalPct}% {Math.abs(totalPct-100)<0.01?"✓":"(debe ser 100%)"}</span></div>
            <div className="result-row" style={{borderTop:"1px solid var(--bd)"}}><span className="result-label">Costo por kilo producido</span><span className="result-value amber">{fmt(Math.round(costoKg))}</span></div>
            <button className="btn btn-amber" style={{width:"100%",marginTop:12}} onClick={guardar}>Guardar receta</button>
          </div>
        )}
      </div>
    </div>
  );
}

function Producir({showToast,clave,onUnlock}){
  const [prods,setProds]=useState([]);
  const [insumos,setInsumos]=useState([]);
  const [sedes,setSedes]=useState([]);
  const [pid,setPid]=useState("");
  const [cantidad,setCantidad]=useState(1);
  const [sede,setSede]=useState("");
  const [nota,setNota]=useState("");
  const [receta,setReceta]=useState([]);
  const [busy,setBusy]=useState(false);
  useEffect(()=>{ db.listProductos().then(setProds).catch(()=>{}); db.listInsumos().then(setInsumos).catch(()=>{}); db.listSedes().then(s=>{ setSedes(s); const b=s.find(x=>x.es_bodega)||s[0]; if(b) setSede(b.nombre); }).catch(()=>{}); },[]);
  useEffect(()=>{ if(pid&&clave) db.getReceta(pid,clave).then(setReceta).catch(()=>setReceta([])); else setReceta([]); },[pid,clave]);
  const ins=id=>insumos.find(x=>x.id===id)||{};
  const n=Number(cantidad)||0;
  const consumoDe=r=>{ const i=ins(r.insumo_id); return (Number(r.cantidad||0)/100)*n*convInsumo(i.unidad); };  // r.cantidad = % peso
  const costoTotal=receta.reduce((s,r)=>{ const i=ins(r.insumo_id); return s+(Number(i.costo||0)*consumoDe(r)); },0);
  const producir=async()=>{
    setBusy(true);
    try{ const costo=await db.producir(pid,n,sede,"ADMIN",nota); showToast("Producido "+n+" kg — costo "+fmt(Math.round(costo||0))); setNota(""); setCantidad(1); const ins2=await db.listInsumos(); setInsumos(ins2); }
    catch(e){ showToast(""+(e.message||e),"err"); }
    setBusy(false);
  };
  const valido = pid && n>0 && sede;
  return (
    <div>
      <div className="toolbar"><div className="sec-title" style={{marginRight:"auto"}}>Producir</div></div>
      <div className="card">
        <div className="grid2">
          <div><label className="label">Producto a fabricar</label>
            <select className="select" value={pid} onChange={e=>setPid(e.target.value)}>
              <option value="">Seleccionar…</option>
              {prods.filter(p=>p.fabricable).map(p=><option key={p.id} value={p.id}>{p.nombre}{p.vende_pos===false?" (solo producción)":""}</option>)}
            </select>
          </div>
          <div><label className="label">Kilos a fabricar</label><input className="input" type="number" min="0" step="0.1" value={cantidad} onChange={e=>setCantidad(e.target.value)}/></div>
        </div>
        <label className="label">Sede destino (dónde queda el producto)</label>
        <select className="select" value={sede} onChange={e=>setSede(e.target.value)}>{sedes.map(s=><option key={s.id} value={s.nombre}>{s.nombre}{s.es_bodega?" (bodega)":""}</option>)}</select>
        <label className="label">Nota (opcional)</label>
        <input className="input" value={nota} onChange={e=>setNota(e.target.value)} placeholder="Lote, observación…"/>

        {!clave && pid && (
          <div className="muted" style={{padding:"10px 0"}}>🔒 Detalle de fórmula oculto. <a style={{color:"var(--amber)",cursor:"pointer"}} onClick={onUnlock}>Desbloquear</a> para ver insumos y costo. Igual puedes producir (consume la receta automáticamente).</div>
        )}
        {clave && pid && receta.length===0 && <div className="muted" style={{padding:"8px 0",color:"var(--amber)"}}>Este producto no tiene receta. Defínela en la pestaña Recetas.</div>}
        {clave && receta.length>0 && (
          <div className="card" style={{padding:0,overflowX:"auto",marginTop:8}}>
            <table className="tbl">
              <thead><tr><th>Insumo</th><th className="num">Necesita</th><th className="num">Disponible</th></tr></thead>
              <tbody>
                {receta.map((r,i)=>{ const x=ins(r.insumo_id); const nec=Math.round(consumoDe(r)*1000)/1000; const falta=Number(x.stock||0)<nec; return (
                  <tr key={i}><td className="row-name">{x.nombre} <span className="muted">({Number(r.cantidad)}%)</span></td><td className="num">{nec} {x.unidad}</td><td className="num" style={{color:falta?"var(--red)":"var(--green)"}}>{Number(x.stock||0)} {x.unidad}</td></tr>
                );})}
              </tbody>
            </table>
          </div>
        )}
        {clave && <div className="result-row" style={{marginTop:10,borderTop:"1px solid var(--bd)"}}><span className="result-label" style={{fontWeight:800,color:"var(--tb)"}}>Costo del lote</span><span className="result-value amber" style={{fontSize:18}}>{fmt(Math.round(costoTotal))}</span></div>}
        <button className="btn btn-amber" style={{width:"100%",marginTop:12}} disabled={!valido||busy} onClick={producir}>{busy?"Produciendo…":"✅ Producir"}</button>
      </div>
    </div>
  );
}

            <div className="muted" style={{marginBottom:10}}>{fLocalDia(det.created_at)} {fLocalHora(det.created_at)} · {det.sede} · Costo {fmt(det.costo_total)}</div>
            <div className="card" style={{padding:0}}>
              <table className="tbl">
                <thead><tr><th>Insumo consumido</th><th className="num">Cantidad</th><th className="num">Costo</th></tr></thead>
                <tbody>{(det.insumos||[]).map((d,i)=>(
                  <tr key={i}><td className="row-name">{d.insumo_nombre}</td><td className="num">{Number(d.cantidad)}</td><td className="num">{fmt(d.costo)}</td></tr>

            <div className="modal-actions"><button className="btn btn-ghost" onClick={()=>setDet(null)}>Cerrar</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

function Mantenimiento({showToast}){
  const [sedes,setSedes]=useState([]);
  const [sede,setSede]=useState("");
  const [equipos,setEquipos]=useState(null);
  const [abiertos,setAbiertos]=useState([]);   // reportes 'abierto' de la sede
  const [hist,setHist]=useState([]);            // historial de mantenimientos
  const [nuevo,setNuevo]=useState("");          // nombre nuevo equipo
  const [edit,setEdit]=useState(null);          // equipo en edición de nombre
  const [rep,setRep]=useState(null);            // {equipo} a reparar
  const [supervisor,setSupervisor]=useState("");
  const [notaRep,setNotaRep]=useState("");
  const [busy,setBusy]=useState(false);
  const [vista,setVista]=useState('panorama');   // 'panorama' (todas las sedes) | 'sede'
  const [allEq,setAllEq]=useState(null);          // todos los equipos (panorama)
  const [allAb,setAllAb]=useState([]);            // todos los reportes abiertos (panorama)
  const [repuestos,setRepuestos]=useState([]);    // catálogo de repuestos (para el formulario)
  const [manoObra,setManoObra]=useState("");      // costo de mano de obra de la reparación
  const [repsUsados,setRepsUsados]=useState([]);  // repuestos consumidos en la reparación

  useEffect(()=>{ db.listRepuestos().then(setRepuestos).catch(()=>{}); },[]);
  useEffect(()=>{ if(rep){ setManoObra(""); setRepsUsados([]); } },[rep]);
  useEffect(()=>{ db.listSedes().then(s=>{ setSedes(s); const def=s.find(x=>!x.es_bodega)||s[0]; if(def) setSede(def.nombre); }).catch(()=>{}); },[]);
  const loadPanorama=async()=>{ try{ const [eq,ab]=await Promise.all([db.listEquipos(),db.mantAbiertos()]); setAllEq(eq); setAllAb(ab); }catch(e){ setAllEq([]); } };
  useEffect(()=>{ loadPanorama(); },[]);
  const load=async()=>{
    if(!sede) return;
    try{
      const [eq,ab,h]=await Promise.all([db.listEquipos(sede),db.mantAbiertos(sede),db.listMantenimientos(sede)]);
      setEquipos(eq); setAbiertos(ab); setHist(h);
    }catch(e){ showToast(""+(e.message||e),"err"); setEquipos([]); }
  };
  useEffect(()=>{ if(sede){ setEquipos(null); load(); } },[sede]);

  const reporteDe=id=>abiertos.find(m=>m.equipo_id===id);

  const agregar=async()=>{
    const n=nuevo.trim(); if(!n) return;
    try{ await db.saveEquipo({sede,nombre:n}); setNuevo(""); load(); showToast("Equipo agregado","ok"); }
    catch(e){ showToast(""+(e.message||e),"err"); }
  };
  const guardarNombre=async(eq)=>{
    const n=(edit&&edit.nombre||"").trim(); if(!n){ setEdit(null); return; }
    try{ await db.saveEquipo({id:eq.id,sede:eq.sede,nombre:n}); setEdit(null); load(); }
    catch(e){ showToast(""+(e.message||e),"err"); }
  };
  const borrar=async(eq)=>{
    if(eq.estado==='parada'){ showToast("No puedes borrar una máquina parada. Repárala primero.","err"); return; }
    if(!confirm("¿Borrar el equipo \""+eq.nombre+"\"?")) return;
    try{ await db.deleteEquipo(eq.id); load(); }catch(e){ showToast(""+(e.message||e),"err"); }
  };
  // ---- repuestos consumidos en el formulario de reparación ----
  const addRepUsado=()=>setRepsUsados(a=>[...a,{key:uid(),repuesto_id:"",nombre:"",cantidad:1,valor_unit:0,condicion:'nuevo'}]);
  const setRepUsado=(k,patch)=>setRepsUsados(a=>a.map(l=>l.key===k?{...l,...patch}:l));
  const delRepUsado=(k)=>setRepsUsados(a=>a.filter(l=>l.key!==k));
  const pickRepuesto=(k,id)=>{ const r=repuestos.find(x=>x.id===id); setRepUsado(k,{repuesto_id:id, nombre:r?r.nombre:"", valor_unit:r?(Number(r.costo)||0):0}); };
  const costoReps=repsUsados.reduce((a,l)=>a+(Number(l.cantidad)||0)*(Number(l.valor_unit)||0),0);
  const costoTotalRep=costoReps+(Number(manoObra)||0);

  const reparar=async()=>{
    if(!rep) return;
    const items=repsUsados
      .map(l=>({repuesto_id:l.repuesto_id||"", nombre:(l.nombre||"").trim(), cantidad:Number(l.cantidad)||1, valor_unit:Number(l.valor_unit)||0, condicion:l.condicion||'nuevo'}))
      .filter(i=>i.nombre);
    setBusy(true);
    try{
      await db.repararEquipo(rep.equipo.id, supervisor.trim(), notaRep.trim(), Number(manoObra)||0, items);
      setRep(null); setSupervisor(""); setNotaRep(""); showToast("Equipo reparado y encendido","ok"); load(); loadPanorama(); db.listRepuestos().then(setRepuestos).catch(()=>{});
    }catch(e){ showToast(""+(e.message||e),"err"); } finally{ setBusy(false); }
  };

  const cerrados=hist.filter(m=>m.estado==='cerrado'&&m.reparado_at);
  const promedio=cerrados.length? cerrados.reduce((a,m)=>a+(new Date(m.reparado_at)-new Date(m.reportado_at)),0)/cerrados.length : 0;
  const paradas=(equipos||[]).filter(e=>e.estado==='parada').length;

  // ---- datos del panorama (todas las sedes) ----
  const bySede={}; (allEq||[]).forEach(e=>{ (bySede[e.sede]=bySede[e.sede]||[]).push(e); });
  const panorama=Object.keys(bySede).map(s=>{ const eqs=bySede[s]; const par=eqs.filter(e=>e.estado==='parada'); return {sede:s,eqs,par}; })
    .sort((a,b)=>(b.par.length-a.par.length)||a.sede.localeCompare(b.sede));
  const gTotal=(allEq||[]).length, gParadas=(allEq||[]).filter(e=>e.estado==='parada').length, gSedesProb=panorama.filter(x=>x.par.length>0).length;
  const abiertoDe=id=>allAb.find(m=>m.equipo_id===id);

  return (
    <div>
      <div className="toolbar">
        <div className="sec-title" style={{marginRight:"auto"}}>Mantenimiento de equipos</div>
        <div style={{display:"flex",gap:6,background:"var(--sf2)",borderRadius:10,padding:4}}>
          <button className={"btn btn-sm "+(vista==='panorama'?'btn-amber':'btn-ghost')} onClick={()=>{setVista('panorama');loadPanorama();}}>🌐 Panorama</button>
          <button className={"btn btn-sm "+(vista==='sede'?'btn-amber':'btn-ghost')} onClick={()=>setVista('sede')}>🔧 Por sede</button>
        </div>
      </div>

      {/* ===== PANORAMA (todas las sedes) ===== */}
      {vista==='panorama' && (
        allEq===null ? <div className="empty">Cargando panorama…</div> : (
          <div>
            <div className="cards" style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:14}}>
              <div className="card" style={{flex:"1 1 160px"}}><div className="muted">Equipos totales</div><div style={{fontSize:24,fontWeight:800}}>{gTotal}</div></div>
              <div className="card" style={{flex:"1 1 160px"}}><div className="muted">Paradas ahora</div><div style={{fontSize:24,fontWeight:800,color:gParadas?"var(--red)":"var(--green)"}}>{gParadas}</div></div>
              <div className="card" style={{flex:"1 1 160px"}}><div className="muted">Sedes con problemas</div><div style={{fontSize:24,fontWeight:800,color:gSedesProb?"var(--red)":"var(--green)"}}>{gSedesProb}</div></div>
            </div>
            {gParadas===0 && <div className="card" style={{textAlign:"center",color:"var(--green)",fontWeight:700,marginBottom:14}}>✓ Todas las máquinas operativas en todas las sedes 🎉</div>}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(270px,1fr))",gap:12}}>
              {panorama.map(x=>{ const prob=x.par.length>0; return (
                <div key={x.sede} className="card" style={{borderStyle:"solid",borderWidth:prob?2:1,borderColor:prob?"var(--red)":"var(--bd)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{fontWeight:800,fontSize:16}}>{x.sede}</div>
                    {prob ? <span className="pill pill-off">{x.par.length} parada{x.par.length>1?"s":""}</span> : <span className="pill pill-prod">OK</span>}
                  </div>
                  <div className="muted" style={{fontSize:12,margin:"4px 0 8px"}}>{x.eqs.length-x.par.length}/{x.eqs.length} operativas</div>
                  {prob ? x.par.map(eq=>{ const r=abiertoDe(eq.id); return (
                    <div key={eq.id} style={{borderTop:"1px solid var(--bd)",padding:"8px 0"}}>
                      <div style={{fontWeight:700,color:"var(--red)"}}>🔴 {eq.nombre}</div>
                      <div className="muted" style={{fontSize:12,margin:"2px 0 6px"}}>{r?(r.descripcion||"(sin descripción)"):"(sin reporte)"}{r?(" · lleva "+fmtDur(r.reportado_at,new Date().toISOString())):""}</div>
                      <button className="btn btn-amber btn-sm" onClick={()=>setRep({equipo:eq,reporte:r})}>🔧 Reparar</button>
                    </div>
                  );}) : <div style={{color:"var(--green)",fontSize:13}}>Todo operativo ✓</div>}
                  <button className="btn btn-ghost btn-sm" style={{marginTop:8,width:"100%"}} onClick={()=>{setSede(x.sede);setVista('sede');}}>Gestionar →</button>
                </div>
              );})}
              {panorama.length===0 && <div className="empty">No hay equipos registrados todavía.</div>}
            </div>
          </div>
        )
      )}

      {/* ===== GESTIÓN POR SEDE ===== */}
      {vista==='sede' && (<div>
      <div className="toolbar">
        <select className="select" style={{maxWidth:220,marginLeft:"auto"}} value={sede} onChange={e=>setSede(e.target.value)}>
          {sedes.map(s=><option key={s.id} value={s.nombre}>{s.nombre}{s.es_bodega?" (bodega)":""}</option>)}
        </select>
      </div>

      <div className="cards" style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:14}}>
        <div className="card" style={{flex:"1 1 160px"}}><div className="muted">Equipos</div><div style={{fontSize:24,fontWeight:800}}>{(equipos||[]).length}</div></div>
        <div className="card" style={{flex:"1 1 160px"}}><div className="muted">Paradas ahora</div><div style={{fontSize:24,fontWeight:800,color:paradas?"var(--red)":"var(--green)"}}>{paradas}</div></div>
        <div className="card" style={{flex:"1 1 160px"}}><div className="muted">Tiempo prom. solución</div><div style={{fontSize:24,fontWeight:800}}>{cerrados.length?fmtDur(0,promedio):"—"}</div></div>
        <div className="card" style={{flex:"1 1 160px"}}><div className="muted">Costo mantenimiento</div><div style={{fontSize:24,fontWeight:800,color:"var(--amber)"}}>${hist.reduce((a,m)=>a+(Number(m.costo_total)||0),0).toLocaleString("es-CO")}</div></div>
      </div>

      <div className="toolbar">
        <input className="input" style={{maxWidth:280}} placeholder="Nombre del equipo (ej. Aspiradora 1)" value={nuevo} onChange={e=>setNuevo(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')agregar();}}/>
        <button className="btn btn-amber btn-sm" onClick={agregar}>＋ Agregar equipo</button>
      </div>

      {!equipos ? <div className="empty">Cargando…</div> : (
        <div className="card" style={{padding:0,overflowX:"auto"}}>
          <table className="tbl">
            <thead><tr><th>Estado</th><th>Equipo</th><th>Reporte abierto</th><th></th></tr></thead>
            <tbody>
              {equipos.length===0 && <tr><td colSpan="4"><div className="empty">No hay equipos en esta sede. Agrega el primero arriba.</div></td></tr>}
              {equipos.map(eq=>{ const r=reporteDe(eq.id); const parada=eq.estado==='parada'; return (
                <tr key={eq.id}>
                  <td><span style={{display:"inline-flex",alignItems:"center",gap:6,fontWeight:700,color:parada?"var(--red)":"var(--green)"}}><span style={{width:11,height:11,borderRadius:"50%",background:parada?"var(--red)":"var(--green)",display:"inline-block"}}></span>{parada?"Parada":"Operativa"}</span></td>
                  <td className="row-name">
                    {edit&&edit.id===eq.id
                      ? <input className="input" autoFocus value={edit.nombre} onChange={e=>setEdit({...edit,nombre:e.target.value})} onKeyDown={e=>{if(e.key==='Enter')guardarNombre(eq);if(e.key==='Escape')setEdit(null);}} onBlur={()=>guardarNombre(eq)}/>
                      : <span onClick={()=>setEdit({id:eq.id,nombre:eq.nombre})} style={{cursor:"pointer"}}>{eq.nombre} <span className="muted">✎</span></span>}
                  </td>
                  <td>{r? <span><b>{r.descripcion||"(sin descripción)"}</b><br/><span className="muted">{r.operador?("Reportó "+r.operador+" · "):""}{fLocalDia(r.reportado_at)} {fLocalHora(r.reportado_at)} · lleva {fmtDur(r.reportado_at,new Date().toISOString())}</span></span> : <span className="muted">—</span>}</td>
                  <td style={{whiteSpace:"nowrap"}}>
                    {parada
                      ? <button className="btn btn-amber btn-sm" onClick={()=>{setRep({equipo:eq,reporte:r});}}>🔧 Reparar / Encender</button>
                      : <button className="btn btn-ghost btn-sm" onClick={()=>borrar(eq)}>Borrar</button>}
                  </td>
                </tr>
              );})}
            </tbody>
          </table>
        </div>
      )}

      <div className="sec-title" style={{margin:"20px 0 8px"}}>Historial de mantenimientos <span className="muted">({hist.length})</span></div>
      <div className="card" style={{padding:0,overflowX:"auto"}}>
        <table className="tbl">
          <thead><tr><th>Equipo</th><th>Descripción</th><th>Reportó</th><th>Apagada</th><th>Reparada</th><th>Tiempo solución</th><th>Supervisor</th><th>Costo</th></tr></thead>
          <tbody>
            {hist.length===0 && <tr><td colSpan="8"><div className="empty">Sin registros.</div></td></tr>}
            {hist.map(m=>(
              <tr key={m.id}>
                <td className="row-name">{m.equipo_nombre}</td>
                <td>{m.descripcion}{m.nota_reparacion?<div className="muted">↳ {m.nota_reparacion}</div>:null}</td>
                <td className="muted">{m.operador||"—"}</td>
                <td className="muted">{fLocalDia(m.reportado_at)} {fLocalHora(m.reportado_at)}</td>
                <td className="muted">{m.reparado_at?(fLocalDia(m.reparado_at)+" "+fLocalHora(m.reparado_at)):<span style={{color:"var(--red)"}}>abierto</span>}</td>
                <td style={{fontWeight:700}}>{m.reparado_at?fmtDur(m.reportado_at,m.reparado_at):fmtDur(m.reportado_at,new Date().toISOString())}</td>
                <td className="muted">{m.supervisor||"—"}</td>
                <td style={{fontWeight:700}}>{Number(m.costo_total)>0?("$"+(Number(m.costo_total)).toLocaleString("es-CO")):"—"}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      </div>)}

      {rep && (
        <div className="modal-bg" onClick={()=>!busy&&setRep(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-t">🔧 Reparar y encender — {rep.equipo.nombre}</div>
            {rep.reporte && <div className="card" style={{marginBottom:10}}><div className="muted">Falla reportada</div><b>{rep.reporte.descripcion||"(sin descripción)"}</b><div className="muted" style={{marginTop:4}}>{rep.reporte.operador?("Por "+rep.reporte.operador+" · "):""}{fLocalDia(rep.reporte.reportado_at)} {fLocalHora(rep.reporte.reportado_at)} · lleva {fmtDur(rep.reporte.reportado_at,new Date().toISOString())} parada</div></div>}
            <label className="label">Supervisor que repara</label>
            <input className="input" value={supervisor} onChange={e=>setSupervisor(e.target.value)} placeholder="Tu nombre"/>
            <label className="label">Nota de reparación (opcional)</label>
            <input className="input" value={notaRep} onChange={e=>setNotaRep(e.target.value)} placeholder="Qué se hizo…"/>

            <label className="label">Repuestos usados</label>
            {repsUsados.length===0 && <div className="muted" style={{fontSize:12,marginBottom:6}}>Si no usaste repuestos, déjalo vacío.</div>}
            {repsUsados.map(l=>(
              <div key={l.key} style={{border:"1px solid var(--bd)",borderRadius:10,padding:8,marginBottom:8}}>
                <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:6}}>
                  <select className="select" style={{margin:0,flex:1}} value={l.repuesto_id} onChange={e=>pickRepuesto(l.key,e.target.value)}>
                    <option value="">— Otro (escribir) —</option>
                    {repuestos.map(r=><option key={r.id} value={r.id}>{r.nombre} (stock {Number(r.stock)||0})</option>)}
                  </select>
                  <button className="btn btn-ghost btn-sm" onClick={()=>delRepUsado(l.key)}>✕</button>
                </div>
                {!l.repuesto_id && <input className="input" style={{marginBottom:6}} value={l.nombre} onChange={e=>setRepUsado(l.key,{nombre:e.target.value})} placeholder="Nombre del repuesto (fuera de catálogo)"/>}
                <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"flex-end"}}>
                  <div style={{flex:"1 1 70px"}}><label className="label" style={{fontSize:11}}>Cantidad</label><input className="input" style={{margin:0}} type="number" value={l.cantidad} onChange={e=>setRepUsado(l.key,{cantidad:e.target.value})}/></div>
                  <div style={{flex:"1 1 100px"}}><label className="label" style={{fontSize:11}}>Valor unit.</label><input className="input" style={{margin:0}} type="number" value={l.valor_unit} onChange={e=>setRepUsado(l.key,{valor_unit:e.target.value})}/></div>
                  <div style={{flex:"1 1 130px"}}><label className="label" style={{fontSize:11}}>Condición</label>
                    <div style={{display:"flex",gap:6}}>
                      <button className={"btn btn-sm "+(l.condicion==='nuevo'?'btn-amber':'btn-ghost')} onClick={()=>setRepUsado(l.key,{condicion:'nuevo'})}>Nuevo</button>
                      <button className={"btn btn-sm "+(l.condicion==='usado'?'btn-amber':'btn-ghost')} onClick={()=>setRepUsado(l.key,{condicion:'usado'})}>Usado</button>
                    </div>
                  </div>
                </div>
              </div>
            ))}
            <button className="btn btn-ghost btn-sm" onClick={addRepUsado}>＋ Agregar repuesto</button>

            <label className="label" style={{marginTop:10}}>Mano de obra / otros ($)</label>
            <input className="input" type="number" value={manoObra} onChange={e=>setManoObra(e.target.value)} placeholder="0"/>
            <div className="card" style={{marginBottom:10,display:"flex",justifyContent:"space-between",fontWeight:700}}>
              <span>Costo total de la reparación</span>
              <span style={{color:"var(--amber)"}}>${costoTotalRep.toLocaleString("es-CO")}</span>
            </div>

            <div className="modal-actions">
              <button className="btn btn-ghost" disabled={busy} onClick={()=>setRep(null)}>Cancelar</button>
              <button className="btn btn-amber" disabled={busy} onClick={reparar}>{busy?"Encendiendo…":"✅ Encender máquina"}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ============================================================
// SECCIÓN: RECAUDO / TESORERÍA — ciclo de cierre por sede (migrado de Sheets)
// ============================================================
const MAQ_DEFAULT=['Máquina 1','Máquina 2','Máquina 3','Máquina 4','Máquina 5','Máquina 6','Aspiradora','Canillita'];
function Recaudo({showToast, quien, rol}){
  const [paso,setPaso]=useState('inicio');   // inicio|liquidaciones|maquinas|conteo|gastos|reparto|resumen|historial
  const [sedes,setSedes]=useState([]);
  const [emps,setEmps]=useState([]);
  const [sede,setSede]=useState("");
  const [tesorero,setTesorero]=useState("");
  const [pend,setPend]=useState([]);          // liquidaciones pendientes para importar
  const [liqs,setLiqs]=useState([]);          // liquidaciones del ciclo
  const [maquinas,setMaquinas]=useState([]);
  const [conteo,setConteo]=useState({tokens_fisicos:"",efectivo_total_monedas:""});
  const [gastos,setGastos]=useState([]);
  const [saldosPrev,setSaldosPrev]=useState({});  // operador -> saldo anterior
  const [reparto,setReparto]=useState({modo:'operadores',baseRecogida:"",baseNueva:"",ajusteTokens:"",ajusteMotivo:""});
  const [busy,setBusy]=useState(false);
  const [impSel,setImpSel]=useState({});      // ids seleccionados para importar
  const [manual,setManual]=useState(null);    // liquidación manual en edición
  const [histo,setHisto]=useState(null);
  const [detalle,setDetalle]=useState(null);

  useEffect(()=>{ Promise.all([db.listSedes(),db.listEmpleados()]).then(([s,e])=>{ setSedes(s); setEmps(e); }).catch(()=>{}); },[]);
  // los supervisores hacen de tesoreros
  const tesoreros=emps.filter(e=>e.rol==='supervisor'&&e.activo!==false);
  const sedeObj=sedes.find(s=>s.nombre===sede)||{};
  const baseConfigurada=Number(sedeObj.base_efectivo)||0;
  const cajerosDeSede=emps.filter(e=>e.activo!==false && (e.sedes||[]).includes(sede) && (e.rol==='cajero'));

  const efEsperado=l=>(Number(l.valor)||0)-(Number(l.qr)||0)-(Number(l.devoluciones)||0);
  const descuadreDe=l=>(l.efectivo_contado===""||l.efectivo_contado==null)?0:((Number(l.efectivo_contado)||0)-efEsperado(l));

  const iniciar=async()=>{
    if(!sede||!tesorero){ showToast("Elige sede y tesorero","err"); return; }
    setBusy(true);
    try{
      const [p,m,s]=await Promise.all([db.recLiqPendientes(sede), db.recMaquinas(sede), db.recSaldos(sede)]);
      setPend(p); setImpSel({});
      const prev={}; (s||[]).forEach(x=>prev[x.operador]=Number(x.saldo)||0); setSaldosPrev(prev);
      const byName={}; (m||[]).forEach(x=>byName[x.nombre]=x);
      const nombres=(m&&m.length)?m.map(x=>x.nombre):MAQ_DEFAULT;
      setMaquinas(nombres.map(nm=>({nombre:nm,
        gen_anterior:Number((byName[nm]||{}).gen_actual)||0,
        gen_token_anterior:Number((byName[nm]||{}).gen_token_actual)||0,
        gen_actual:"", gen_token_actual:"", token_dia:"", mone_dia:""})));
      setLiqs([]); setGastos([]); setConteo({tokens_fisicos:"",efectivo_total_monedas:""});
      setReparto({modo:'operadores',baseRecogida:"",baseNueva:String(baseConfigurada),ajusteTokens:"",ajusteMotivo:""});
      setPaso('liquidaciones');
    }catch(e){ showToast(""+(e.message||e),"err"); } finally{ setBusy(false); }
  };

  // importar pendientes seleccionadas
  const importar=()=>{
    const sel=pend.filter(p=>impSel[p.id]);
    const nuevas=sel.map(p=>({ id:p.id, operador:p.operador, num_recibo:p.num_recibo,
      tokens_base:p.tokens_base, tokens_vendidos:p.tokens_vendidos, dev_tokens:p.dev_tokens,
      tokens_membresia:p.tokens_membresia, tokens_restantes:p.tokens_restantes, valor:p.valor, qr:p.qr,

  const nuevaManual=()=>setManual({operador:"",num_recibo:"",tokens_base:0,tokens_vendidos:0,dev_tokens:0,tokens_membresia:0,valor:0,qr:0,devoluciones:0,efectivo_contado:"",observaciones:""});
  const guardarManual=()=>{
    const m=manual; if(!m.operador){ showToast("Elige operador","err"); return; }
    const tr=(Number(m.tokens_base)||0)-(Number(m.tokens_vendidos)||0)-(Number(m.dev_tokens)||0)-(Number(m.tokens_membresia)||0);
    setLiqs(l=>[...l,{...m, tokens_restantes:tr, efectivo:efEsperado(m)}]); setManual(null);
  };
  const setLiqContado=(i,v)=>setLiqs(l=>l.map((x,j)=>j===i?{...x,efectivo_contado:v}:x));
  const quitarLiq=(i)=>setLiqs(l=>l.filter((_,j)=>j!==i));

  const setMaq=(i,patch)=>setMaquinas(m=>m.map((x,j)=>j===i?{...x,...patch}:x));
  const addGasto=()=>setGastos(g=>[...g,{concepto:"",monto:0}]);
  const setGasto=(i,patch)=>setGastos(g=>g.map((x,j)=>j===i?{...x,...patch}:x));
  const delGasto=(i)=>setGastos(g=>g.filter((_,j)=>j!==i));

  // ---- cálculos ----
  const sumTokenDia=maquinas.reduce((a,m)=>a+(Number(m.token_dia)||0),0);
  const sumMoneDia=maquinas.reduce((a,m)=>a+(Number(m.mone_dia)||0),0);
  const tokensFis=Number(conteo.tokens_fisicos)||0;
  const monedasFis=Number(conteo.efectivo_total_monedas)||0;
  const difTokens=sumTokenDia-tokensFis;
  const difMonedas=sumMoneDia-monedasFis;
  const totalGastos=gastos.reduce((a,g)=>a+(Number(g.monto)||0),0);
  const baseEsperada=baseConfigurada-totalGastos;
  const difBase=(Number(reparto.baseRecogida)||0)-baseEsperada;
  const efLiquidaciones=liqs.reduce((a,l)=>a+(Number(l.efectivo_contado)||0),0);
  const totalRecaudo=efLiquidaciones+monedasFis;
  const aConsignar=totalRecaudo-totalGastos;
  const totalDescuadre=liqs.reduce((a,l)=>a+descuadreDe(l),0);

  // control de tokens por operador. tokensMaq = tokens FÍSICOS contados (no el contador).
  const normOp=s=>s?(s.charAt(0).toUpperCase()+s.slice(1).toLowerCase()):s;
  const baseSedeSaldo = saldosPrev['BASE_SEDE'];          // si el ciclo anterior fue "por sede"
  const prevSede = baseSedeSaldo!=null;
  const opsSet=[...new Set(liqs.map(l=>l.operador).filter(Boolean))];
  const controlTokens=opsSet.map(op=>{
    const sus=liqs.filter(l=>l.operador===op);
    const vendidos=sus.reduce((a,l)=>a+(Number(l.tokens_vendidos)||0),0);
    const devTokens=sus.reduce((a,l)=>a+(Number(l.dev_tokens)||0),0);
    const membresia=sus.reduce((a,l)=>a+(Number(l.tokens_membresia)||0),0);
    const saldoAnterior= prevSede ? 0 : (Number(saldosPrev[normOp(op)] ?? saldosPrev[op])||0);
    const saldoEsperado= prevSede ? null : (saldoAnterior-vendidos-devTokens-membresia);
    return {nombre:op, historial:{saldo:saldoAnterior}, saldoAnterior, vendidos,
            vendidosEsteC:vendidos, devTokens, devTokensEsteC:devTokens, membresia, membresiaEsteC:membresia, saldoEsperado};
  });
  const totVendidos=controlTokens.reduce((a,c)=>a+c.vendidos,0);
  const totDevTokens=controlTokens.reduce((a,c)=>a+c.devTokens,0);
  const totMembresia=controlTokens.reduce((a,c)=>a+c.membresia,0);
  const totSaldoAnt= prevSede ? (Number(baseSedeSaldo)||0) : controlTokens.reduce((a,c)=>a+c.saldoAnterior,0);
  const totSaldoEsp= prevSede ? (totSaldoAnt-totVendidos-totDevTokens-totMembresia) : controlTokens.reduce((a,c)=>a+(c.saldoEsperado||0),0);
  const ajusteNum=Number(reparto.ajusteTokens)||0;
  const tokensDisponibles=tokensFis+totSaldoEsp+ajusteNum;            // base nueva = saldo + físicos + ajuste
  // FALTANTES reales (reemplazan el "tokens perdidos" roto del app viejo):
  const faltanteMaqTokens=sumTokenDia-tokensFis;                      // contadores de máquina vs físico contado
  const opsNegativos=controlTokens.filter(c=>c.saldoEsperado!=null && c.saldoEsperado<0);
  const tokensPerdidos=Math.max(0,faltanteMaqTokens);                 // guardado en el ciclo

  const cerrar=async()=>{
    setBusy(true);
    try{
      // Lo que el tesorero DEJA para el próximo ciclo (lo que escribió en el reparto, no el auto).
      const nuevoSaldoSede = reparto.modo==='sede'
        ? ((reparto.baseTokensSede!=null && reparto.baseTokensSede!=="") ? (Number(reparto.baseTokensSede)||0) : tokensDisponibles)
        : null;
      // controlTokens con el saldo NUEVO asignado por operador (lo que arranca el próximo ciclo)
      const ctSend = controlTokens.map(c=>{ const def=c.saldoEsperado!=null?Math.max(0,c.saldoEsperado):0;
        const v=(reparto.ops&&reparto.ops[c.nombre]!=null&&reparto.ops[c.nombre]!=="")?(Number(reparto.ops[c.nombre])||0):def;
        return {...c, saldoNuevo:v}; });
      const repObj={ modoReparto:reparto.modo, ajusteTokens:ajusteNum, ajusteMotivo:reparto.ajusteMotivo||"",
        baseRecogida:Number(reparto.baseRecogida)||0, baseNueva:Number(reparto.baseNueva)||0,
        baseConfigurada, baseEsperada, difBase, tokensTotalBase:tokensDisponibles, totalGastosDeSede:totalGastos,
        controlTokens:ctSend, tokensMaq:tokensFis, totalSaldoAnterior:totSaldoAnt, totalVendidosCiclo:totVendidos,
        totalDevTokensCiclo:totDevTokens, totalSaldoEsperado:totSaldoEsp, tokensPerdidos,
        faltanteMaqTokens, opsNegativos:opsNegativos.map(o=>o.nombre), nuevoSaldoSede };
      const ciclo={ sede, tesorero, fecha:fLocalDia(new Date()),
        total_recaudo:totalRecaudo, a_consignar:aConsignar, total_descuadre:totalDescuadre,
        total_gastos:totalGastos, tokens_perdidos:tokensPerdidos, tokens_fisicos:tokensFis,
        efectivo_total_monedas:monedasFis, base_recogida:Number(reparto.baseRecogida)||0,
        base_nueva:Number(reparto.baseNueva)||0, base_configurada:baseConfigurada,
        resumen:{ sumTokenDia, sumMoneDia, difTokens, difMonedas, efLiquidaciones, tokensDisponibles,
          faltanteMaqTokens, operadoresNegativos:opsNegativos.length, modoReparto:reparto.modo } };
      const liquidaciones=liqs.map(l=>({ id:l.id||"", sede, operador:l.operador, num_recibo:l.num_recibo,
        tokens_base:l.tokens_base, tokens_vendidos:l.tokens_vendidos, dev_tokens:l.dev_tokens,
        tokens_membresia:l.tokens_membresia, tokens_restantes:l.tokens_restantes, valor:l.valor, qr:l.qr,
        devoluciones:l.devoluciones, efectivo:efEsperado(l), efectivo_contado:l.efectivo_contado, descuadre:descuadreDe(l),
        observaciones:l.observaciones }));
      const maqs=maquinas.map(m=>({ nombre:m.nombre, gen_anterior:m.gen_anterior, gen_actual:Number(m.gen_actual)||0,
        gen_token_anterior:m.gen_token_anterior, gen_token_actual:Number(m.gen_token_actual)||0,
        producido:(Number(m.gen_actual)||0)-m.gen_anterior, producido_tokens:(Number(m.gen_token_actual)||0)-m.gen_token_anterior,
        token_dia:Number(m.token_dia)||0, mone_dia:Number(m.mone_dia)||0 }));
      await db.cerrarCiclo({ ciclo, liquidaciones, maquinas:maqs, gastos:gastos.filter(g=>g.concepto||g.monto), reparto:repObj });
      showToast("Ciclo cerrado y guardado ✓","ok");
      setPaso('inicio'); setSede(""); setTesorero("");
    }catch(e){ showToast("No se pudo cerrar: "+(e.message||e),"err"); } finally{ setBusy(false); }
  };

  const verHistorial=async()=>{ setPaso('historial'); setHisto(null); setHisto(await db.recCiclos({})); };
  const verDetalle=async(c)=>{ const d=await db.recCicloDetalle(c.id); setDetalle({ciclo:c,...d}); };

  // ---- Contadores de máquina (editar, SOLO admin) ----
  const [contMaqs,setContMaqs]=useState(null);
  const [contSede,setContSede]=useState("");
  const cargarContadores=async(s)=>{
    setContMaqs(null);
    const m=await db.recMaquinas(s);
    const byName={}; (m||[]).forEach(x=>byName[x.nombre]=x);
    const nombres=(m&&m.length)?m.map(x=>x.nombre):MAQ_DEFAULT;

  };
  const abrirContadores=()=>{ const s=contSede || (sedes.find(x=>!x.es_bodega)||sedes[0]||{}).nombre || ""; setContSede(s); setPaso('contadores'); if(s) cargarContadores(s); };

  // ---- Liquidaciones pendientes (ver/borrar, SOLO admin) ----
  const [pendList,setPendList]=useState(null);

  const borrarTodasPend=async()=>{ if(!pendSede){ showToast("Elige una sede para borrar en bloque","err"); return; } const n=(pendList||[]).length; if(!confirm("⚠ Vas a BORRAR las "+n+" liquidaciones pendientes de "+pendSede+". Esto no se puede deshacer. ¿Continuar?")) return; try{ await db.borrarPendientesSede(pendSede); cargarPendientes(pendSede); showToast("Pendientes de "+pendSede+" borradas","ok"); }catch(e){ showToast(""+(e.message||e),"err"); } };
  const setCont=(i,patch)=>setContMaqs(a=>a.map((x,j)=>j===i?{...x,...patch}:x));
  const guardarContadores=async()=>{

    catch(e){ showToast(""+(e.message||e),"err"); }
    finally{ setBusy(false); }
  };

  // ============================================================
  //  RECAUDO DE FRANQUICIAS (formato mensual "ASI VA TU PANZER")
  // ============================================================
  const esFranquicia = !!sedeObj.es_franquicia;
  const MESES=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  const hoy=new Date();
  const [frMes,setFrMes]=useState(hoy.getMonth()+1);
  const [frAnio,setFrAnio]=useState(hoy.getFullYear());
  const [frMaqs,setFrMaqs]=useState(null);          // [{id,nombre,es_lavadora,anterior,actual,orden}]
  const [frDevol,setFrDevol]=useState("");
  const [frProds,setFrProds]=useState([]);          // [{concepto,cantidad,valor_unitario}]
  const [frNotas,setFrNotas]=useState("");

  const frPctFranq=Number(sedeObj.fr_pct_franquiciado)||0;

  const frAmortAcumPrev=Number(sedeObj.fr_amort_acumulado)||0;
  const frAmortObjetivo=Number(sedeObj.fr_amort_objetivo)||0;

  const iniciarFranquicia=async()=>{
    if(!sede){ showToast("Elige sede","err"); return; }

      const m=await db.frMaquinas(sede);
      setFrMaqs((m||[]).map(x=>({id:x.id, nombre:x.nombre, es_lavadora:x.es_lavadora!==false, anterior:Number(x.contador)||0, actual:"", orden:Number(x.orden)||0})));

  // cálculos franquicia
  const frRows=(frMaqs||[]).map(m=>({...m, dif:Math.max(0,(Number(m.actual)||0)-(Number(m.anterior)||0))}));

  const frOcupacion=frNLavado>0?((frRecaudo/frNLavado)/frCapacidad*100):0;
  const frValFranq=Math.round(frRecaudo*frPctFranq/100);

  const frValAmort=Math.round(frRecaudo*frPctAmort/100);
  const frDevolNum=Number(frDevol)||0;
  const frProductos=frProds.reduce((a,p)=>a+((Number(p.cantidad)||0)*(Number(p.valor_unitario)||0)),0);
  const frTotalPanzer=frValPanzer-frDevolNum+frProductos;

  const frSetProd=(i,patch)=>setFrProds(p=>p.map((x,j)=>j===i?{...x,...patch}:x));

  const frCerrar=async()=>{

    setBusy(true);

      const liq={ sede, anio:frAnio, mes:frMes, recaudo_total:frRecaudo,

        ocupacion:Math.round(frOcupacion), n_maquinas_lavado:frNLavado,
        total_panzer:frTotalPanzer, total_franquiciado:frTotalFranq,
        amort_acumulado:frAmortAcumNuevo,
        maquinas:frRows.map(m=>({nombre:m.nombre,anterior:Number(m.anterior)||0,actual:Number(m.actual)||0,dif:m.dif,es_lavadora:m.es_lavadora})),
        notas:frNotas, creado_por:quien };
      await db.frCerrarMes({ liq, maquinas:frRows.map(m=>({id:m.id,nombre:m.nombre,es_lavadora:m.es_lavadora,actual:Number(m.actual)||0,orden:m.orden})) });
      showToast("Liquidación de franquicia cerrada ✓","ok");
      setSedes(s=>s.map(x=>x.nombre===sede?{...x,fr_amort_acumulado:frAmortAcumNuevo}:x));
      await abrirReporte(sede, frAnio, frMes);   // muestra el reporte visual para enviar al franquiciado
    }catch(e){ showToast("No se pudo cerrar: "+(e.message||e),"err"); } finally{ setBusy(false); }
  };

  const verFrHistorial=async()=>{ setPaso('frhist'); setFrHist(null); setFrHist(await db.frLiquidaciones(sede||undefined)); };

  // ---- Reporte visual al franquiciado (imagen para WhatsApp) ----
  const [frReporte,setFrReporte]=useState(null);   // {sede,anio,mes,hist:[]}

  const compartirReporte=async()=>{

  // ---- Config de franquicia (máquinas + reparto, SOLO admin) ----
  const [frCfgSede,setFrCfgSede]=useState("");

    setFrCfgMaqs((m||[]).map(x=>({id:x.id, nombre:x.nombre, es_lavadora:x.es_lavadora!==false, contador:String(Number(x.contador)||0), orden:Number(x.orden)||0})));

  const frCfgSetMaq=(i,patch)=>setFrCfgMaqs(a=>a.map((x,j)=>j===i?{...x,...patch}:x));
  const frCfgDelMaq=async(i)=>{ const m=(frCfgMaqs||[])[i]; if(m&&m.id){ if(!confirm("¿Borrar la máquina "+m.nombre+"?")) return; try{ await db.frBorrarMaquina(m.id); }catch(e){ showToast(""+(e.message||e),"err"); return; } } setFrCfgMaqs(a=>a.filter((_,j)=>j!==i)); };
  const guardarFrConfig=async()=>{
