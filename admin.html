<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panzer — Back Office</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Panzer Admin">
  <meta name="apple-mobile-web-app-title" content="Panzer Admin">

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      /* TEMA CLARO (azules / blancos, acento azul del logo) */
      --bg:#eaf0f9;--sf:#ffffff;--sf2:#eef4fb;--sf3:#e1eaf7;
      --bd:#d9e2f0;--bd2:#c5d3e9;
      --amber:#2563eb;--amber-d:rgba(37,99,235,0.10);
      --blue:#2563eb;--blue-d:rgba(37,99,235,0.12);
      --green:#059669;--green-d:rgba(5,150,105,0.10);
      --red:#dc2626;--red-d:rgba(220,38,38,0.10);
      --purple:#7c3aed;
      --t:#334155;--td:#64748b;--tb:#0f172a;
      --font:'Outfit',system-ui,sans-serif;--r:14px;
      --shadow:0 1px 3px rgba(15,23,42,.06),0 1px 2px rgba(15,23,42,.04);
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    body{background:var(--bg);font-family:var(--font);color:var(--t);}
    input,select,button,textarea{font-family:inherit;}
    input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none;}
    input[type="number"]{-moz-appearance:textfield;}
    ::selection{background:rgba(37,99,235,0.18);}
    #loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s;}
    #loading.hide{opacity:0;pointer-events:none;}
    .loader{width:40px;height:40px;border:3px solid var(--bd);border-top-color:var(--amber);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .app{max-width:1000px;margin:0 auto;min-height:100vh;}
    .header{background:linear-gradient(135deg,var(--sf),var(--sf2));border-bottom:1px solid var(--bd);padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;}
    .header img{height:28px;}
    .header h1{font-size:17px;font-weight:800;color:var(--tb);}
    .header-sub{font-size:11px;color:var(--td);}
    .header-badge{margin-left:auto;padding:4px 12px;border-radius:20px;font-size:10px;font-weight:800;background:var(--amber-d);color:var(--amber);letter-spacing:.5px;}
    .demo-banner{background:var(--amber-d);border-bottom:1px solid rgba(37,99,235,.25);color:var(--amber);font-size:11px;font-weight:600;text-align:center;padding:6px;}
    /* Layout con barra lateral */
    .layout{display:flex;align-items:flex-start;}
    .sidebar{width:210px;flex-shrink:0;background:linear-gradient(180deg,var(--sf),var(--sf2));border-right:1px solid var(--bd);padding:14px 10px;display:flex;flex-direction:column;gap:3px;position:sticky;top:0;height:100vh;overflow-y:auto;scrollbar-width:thin;}
    .sidebar-logo{display:flex;align-items:center;gap:10px;padding:4px 8px 12px;border-bottom:1px solid var(--bd);margin-bottom:8px;}
    .sidebar-logo img{height:26px;}
    .nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;font-size:14px;font-weight:600;color:var(--td);cursor:pointer;border:1px solid transparent;white-space:nowrap;transition:background .12s;}
    .nav-item:hover{background:var(--sf2);color:var(--t);}
    .nav-item.active{background:var(--amber-d);color:var(--amber);border-color:rgba(37,99,235,.25);font-weight:800;}
    .nav-ico{width:20px;text-align:center;font-size:16px;flex-shrink:0;}
    .main{flex:1;min-width:0;}
    .topbar{display:flex;align-items:center;gap:12px;padding:13px 20px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--bg);z-index:40;}
    .hamburger{display:none;background:var(--sf2);border:1px solid var(--bd);border-radius:10px;width:42px;height:40px;color:var(--t);font-size:18px;cursor:pointer;flex-shrink:0;}
    .nav-overlay{display:none;}
    .page{padding:20px;}
    @media(max-width:820px){
      .app{max-width:100%;}
      .sidebar{position:fixed;left:0;top:0;height:100vh;z-index:100;transform:translateX(-105%);transition:transform .25s ease;box-shadow:0 0 30px rgba(0,0,0,.5);}
      .sidebar.open{transform:translateX(0);}
      .hamburger{display:block;}
      .nav-overlay.show{display:block;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:90;}
    }
    .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
    .toolbar .input{margin-bottom:0;flex:1;min-width:160px;}
    .toolbar .select{margin-bottom:0;width:auto;min-width:140px;}
    .card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:18px;margin-bottom:12px;box-shadow:var(--shadow);}
    .label{font-size:12px;font-weight:600;color:var(--td);margin-bottom:6px;display:block;letter-spacing:.3px;}
    .input,.select,.textarea{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:10px;padding:11px 13px;color:var(--tb);font-size:14px;outline:none;margin-bottom:12px;}
    .select{-webkit-appearance:none;}
    .input:focus,.select:focus,.textarea:focus{border-color:var(--amber);}
    .btn{border:none;border-radius:10px;padding:11px 18px;font-size:14px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:7px;}
    .btn-amber{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;}
    .btn-ghost{background:var(--sf2);border:1px solid var(--bd);color:var(--t);}
    .btn-danger{background:var(--red-d);border:1px solid rgba(239,68,68,.3);color:var(--red);}
    .btn:disabled{opacity:.4;cursor:default;}
    .btn-sm{padding:7px 11px;font-size:12px;border-radius:8px;}
    /* Tabla */
    .tbl{width:100%;border-collapse:collapse;}
    .tbl th{text-align:left;font-size:11px;font-weight:700;color:var(--td);text-transform:uppercase;letter-spacing:.5px;padding:10px 12px;border-bottom:1px solid var(--bd);}
    .tbl td{padding:11px 12px;border-bottom:1px solid var(--bd);font-size:14px;color:var(--t);vertical-align:middle;}
    .tbl tr:last-child td{border-bottom:none;}
    .tbl tr.inactive{opacity:.45;}
    .row-name{font-weight:700;color:var(--tb);}
    .pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;}
    .pill-token{background:var(--amber-d);color:var(--amber);}
    .pill-serv{background:rgba(139,92,246,.15);color:var(--purple);}
    .pill-prod{background:var(--blue-d);color:var(--blue);}
    .pill-bodega{background:var(--green-d);color:var(--green);}
    .pill-off{background:var(--red-d);color:var(--red);}
    .chip{display:inline-block;padding:3px 9px;border-radius:8px;font-size:11px;font-weight:600;background:var(--sf2);border:1px solid var(--bd);color:var(--t);margin:2px;}
    .actions{display:flex;gap:6px;justify-content:flex-end;}
    .empty{text-align:center;padding:48px 20px;color:var(--td);}
    .sec-title{font-size:18px;font-weight:800;color:var(--tb);}
    .muted{color:var(--td);font-size:12px;}
    /* Modal */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;}
    .modal{background:var(--sf);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;border:1px solid var(--bd);border-radius:18px;padding:22px;}
    .modal-t{font-size:18px;font-weight:800;color:var(--tb);margin-bottom:16px;}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 12px;}
    .check{display:flex;align-items:center;gap:9px;padding:10px 0;cursor:pointer;font-size:14px;color:var(--t);}
    .check input{width:18px;height:18px;accent-color:var(--amber);}
    .multi{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
    .multi-opt{padding:8px 13px;border-radius:9px;border:1px solid var(--bd);background:var(--sf2);color:var(--td);font-size:13px;font-weight:600;cursor:pointer;}
    .multi-opt.on{background:var(--amber-d);border-color:var(--amber);color:var(--amber);}
    .stockgrid{display:grid;grid-template-columns:1fr 90px;gap:8px;align-items:center;margin-bottom:8px;}
    .stockgrid .input{margin-bottom:0;}
    /* Informes */
    .filterbar{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:16px;box-shadow:var(--shadow);}
    .filterbar .fld{display:flex;flex-direction:column;}
    .filterbar .fld .label{margin-bottom:4px;}
    .filterbar .select,.filterbar .input{margin-bottom:0;width:auto;min-width:130px;}
    .kpis{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px;}
    .kpi{flex:1;min-width:160px;background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow);}
    .kpi-label{font-size:12px;color:var(--td);font-weight:600;margin-bottom:6px;}
    .kpi-value{font-size:24px;font-weight:800;color:var(--tb);line-height:1.1;}
    .kpi-value.green{color:var(--green);} .kpi-value.red{color:var(--red);} .kpi-value.amber{color:var(--amber);}
    .chart-wrap{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:18px;margin-bottom:16px;box-shadow:var(--shadow);}
    .chart{display:flex;align-items:flex-end;gap:3px;height:200px;overflow-x:auto;scrollbar-width:thin;}
    .bar{flex:1;min-width:10px;background:linear-gradient(180deg,#60a5fa,#2563eb);border-radius:3px 3px 0 0;position:relative;cursor:default;transition:opacity .15s;}
    .bar:hover{opacity:.75;}
    .bar-lbl{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--td);white-space:nowrap;}
    .subnav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
    .subnav-btn{padding:8px 13px;border-radius:8px;border:1px solid var(--bd);background:var(--sf2);color:var(--td);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
    .subnav-btn.on{background:var(--green-d);border-color:var(--green);color:var(--green);}
    .num{text-align:right;font-variant-numeric:tabular-nums;}
    /* Login PIN del back office */
    .login-wrap{max-width:360px;margin:0 auto;padding:48px 20px;}
    .pin-dots{display:flex;gap:12px;justify-content:center;margin:8px 0 20px;}
    .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--bd2);transition:.15s;}
    .pin-dot.on{background:var(--amber);border-color:var(--amber);}
    .pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
    .pin-key{padding:18px 0;border-radius:12px;border:1px solid var(--bd);background:var(--sf2);color:var(--tb);font-size:22px;font-weight:700;cursor:pointer;user-select:none;text-align:center;}
    .pin-key:active{background:var(--sf3);}
    .pin-key.back{background:transparent;border-color:transparent;color:var(--td);font-size:18px;}
    .pin-key.zero{grid-column:2;}
    .toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:400;padding:12px 18px;border-radius:12px;font-size:13px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.4);}
    .toast.ok{background:var(--green);color:#fff;}
    .toast.err{background:var(--red);color:#fff;}
    .modal-actions{display:flex;gap:10px;margin-top:18px;}
    .modal-actions .btn{flex:1;}
  </style>
</head>
<body>
  <div id="loading"><div class="loader"></div>

  <script type="text/babel">
const {useState,useEffect} = React;

// ============================================================
// CONFIGURACIÓN (igual que operador.html)
// ============================================================
const SUPABASE_URL = 'https://gmwqxqeiocjcpablxjcn.supabase.co';        // pega aquí cuando crees el proyecto
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdtd3F4cWVpb2NqY3BhYmx4amNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMzYwMDksImV4cCI6MjA5NTkxMjAwOX0.O_fSFAHUiZtDNIRShumewEqkPExITBRuxVO2qbMuzxY';
const DEMO_MODE = !(SUPABASE_URL && SUPABASE_ANON_KEY);
const sb = DEMO_MODE ? null : supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const fmt = n => "$"+(Number(n)||0).toLocaleString("es-CO");
// Fecha/hora en zona LOCAL (Colombia) a partir de un timestamp UTC de Supabase
const fLocalDia = f => { const d=new Date(f); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };
const fLocalHora = f => { const d=new Date(f); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); };
const uid = () => "tmp-"+Math.random().toString(36).slice(2,9);

// ---- VIP / Membresías ----
const VIP_APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyoTaC9iB1fm4s3hM4QQ9-1Zbo5cCzJQIn68YlczTTAXrYHBJK1rQsZmiIMo4CL9-S8Bg/exec';
const VIP_BACKEND = 'supabase';   // 'supabase' (nuevo) | 'google' (respaldo)
async function vipApiGoogle(params, timeoutMs=45000){
  const url = VIP_APPS_SCRIPT_URL + '?' + new URLSearchParams(params).toString();
  const ctrl = new AbortController(); const t = setTimeout(()=>ctrl.abort(), timeoutMs);
  try{ const r = await fetch(url,{signal:ctrl.signal}); clearTimeout(t); return await r.json(); }
  catch(e){ clearTimeout(t); return { ok:false, error: e.name==='AbortError'?'timeout':'Error de conexión' }; }
}
async function vipApiSupabase(params){
  if(DEMO_MODE) return { ok:false, error:'demo' };
  const a=params.accion;
  try{
    if(a==='listar_clientes'){
      const {data,error}=await sb.from('clientes_vip').select('id,nombre,telefono,membresia,saldo,activo').order('nombre');
      if(error) return {ok:false,error:error.message};
      return {ok:true, clientes:(data||[]).map(c=>({id:c.id,nombre:c.nombre,telefono:c.telefono,membresia:c.membresia,saldo:Number(c.saldo)}))};
    }
    if(a==='historial_cliente'){
      const {data,error}=await sb.from('transacciones_vip').select('created_at,tipo,monto,tokens,sede').eq('id_vip',params.id_vip).order('created_at',{ascending:false}).limit(30);
      if(error) return {ok:false,error:error.message};
      return {ok:true, transacciones:(data||[]).map(t=>({fecha:t.created_at,tipo:t.tipo,monto:Number(t.monto),tokens:Number(t.tokens),sede:t.sede}))};
    }
    const map={
      consultar_cliente:['vip_consultar',{p_id_vip:params.id_vip}],
      buscar_por_telefono:['vip_buscar_telefono',{p_tel:params.telefono}],
      descontar_saldo:['vip_descontar',{p_id_vip:params.id_vip,p_monto:Number(params.monto),p_tokens:Number(params.tokens||0),p_sede:params.sede||'Admin',p_operador:params.operador||'Admin',p_metodo:params.metodo||'AjusteAdmin'}],
      recargar_saldo:['vip_recargar',{p_id_vip:params.id_vip,p_monto:Number(params.monto),p_operador:params.operador||'Admin',p_sede:params.sede||'Admin',p_membresia:params.membresia||null}],
    };
    const m=map[a]; if(!m) return {ok:false,error:'acción no soportada: '+a};
    const {data,error}=await sb.rpc(m[0],m[1]); if(error) return {ok:false,error:error.message}; return data;
  }catch(e){ return {ok:false,error:'Error de conexión'}; }
}
const vipApi = (params, t) => VIP_BACKEND==='supabase' ? vipApiSupabase(params) : vipApiGoogle(params, t);
// ---- Gestión VIP desde el Admin (editar cliente + CRUD de cupones) — directo a Supabase ----
async function vipUpdateCliente(id, fields){
  if(DEMO_MODE) return {ok:true};
  const {error}=await sb.from('clientes_vip').update(fields).eq('id',id);
  return error?{ok:false,error:error.message}:{ok:true};
}
async function vipListCupones(){
  if(DEMO_MODE) return [];
  const {data,error}=await sb.from('cupones_vip').select('*').order('id_cupon');
  return error?[]:(data||[]);
}
async function vipSaveCupon(c){
  if(DEMO_MODE) return {ok:true};
  const row={id_cupon:c.id_cupon,nombre:c.nombre,descripcion:c.descripcion,emoji:c.emoji||'🎁',membresia:c.membresia||'Todos',activo:!!c.activo,
    producto_id:(c.producto_id||null)||null, cantidad:Number(c.cantidad)||1};
  const {error}=await sb.from('cupones_vip').upsert(row,{onConflict:'id_cupon'});
  return error?{ok:false,error:error.message}:{ok:true};
}
async function vipDeleteCupon(id){
  if(DEMO_MODE) return {ok:true};
  const {error}=await sb.from('cupones_vip').delete().eq('id_cupon',id);
  return error?{ok:false,error:error.message}:{ok:true};
}
async function vipUltimasTx(n=50){
  if(DEMO_MODE) return [];
  const {data,error}=await sb.from('transacciones_vip').select('created_at,id_vip,nombre,tipo,monto,tokens,sede,operador').order('created_at',{ascending:false}).limit(n);
  return error?[]:(data||[]);
}
// Todas las transacciones VIP en un rango (paginado, por si superan el tope de 1000 de PostgREST)
async function vipMovimientosRango(desdeISO, hastaISO){
  if(DEMO_MODE) return [];
  const all=[]; const page=1000; let from=0;
  for(;;){
    const {data,error}=await sb.from('transacciones_vip')
      .select('created_at,id_vip,nombre,tipo,monto,tokens,sede,operador')
      .gte('created_at',desdeISO).lt('created_at',hastaISO)
      .order('created_at',{ascending:false}).range(from, from+page-1);
    if(error) break;
    all.push(...(data||[]));
    if(!data || data.length<page) break;
    from+=page;
  }
  return all;
}

const DEMO_COMP = {};

let DEMO = {

    {id:"c4", nombre:"PRODUCTOS COMPLEMENTARIOS DE LAVADO", orden:4, activo:true},

  ],
  descuentos: [

    {id:"d2", nombre:"Promoción 5%", porcentaje:5, activo:true},

// ---- Generador de ventas DEMO (últimos 30 días) para que los informes muestren datos ----
let _demoVentas = null;
function demoVentas(){
  if(_demoVentas) return _demoVentas;
  const out=[];
  const vendibles = DEMO.productos.filter(p=>p.activo);
  const sedesVenta = DEMO.sedes.filter(s=>!s.es_bodega && s.activo).map(s=>s.nombre);
  const opsBySede={};
  DEMO.empleados.filter(e=>e.rol==='cajero'||e.rol==='tesorero').forEach(e=>e.sedes.forEach(s=>{(opsBySede[s]=opsBySede[s]||[]).push(e.nombre);}));
  const hoy=new Date(); hoy.setHours(12,0,0,0);
  let recibo=1000;
  const rnd=(a,b)=>a+Math.floor(Math.random()*(b-a+1));
  for(let d=29; d>=0; d--){
    const fecha=new Date(hoy); fecha.setDate(hoy.getDate()-d);
    for(const sede of sedesVenta){
      const nV=rnd(3,8);
      for(let v=0; v<nV; v++){
        const ops=opsBySede[sede]||['Operador'];
        const operador=ops[rnd(0,ops.length-1)];
        const items=[];
        const nItems=rnd(1,3);
        for(let it=0; it<nItems; it++){
          const p=vendibles[rnd(0,vendibles.length-1)];
          const precio=p.precio_variable?rnd(15,45)*1000:p.precio;
          if(precio<=0) continue;
          const cant=rnd(1,2);
          items.push({producto_id:p.id,nombre:p.nombre,categoria:p.categoria,tipo:p.tipo,cantidad:cant,precio_unit:precio,costo:p.costo||0,iva:!!p.iva,subtotal:precio*cant});
        }
        if(!items.length) continue;
        const bruto=items.reduce((s,i)=>s+i.subtotal,0);
        const descuento=Math.random()<0.15?Math.round(bruto*0.1/500)*500:0;
        const total=bruto-descuento;
        const r=Math.random();
        let ef=0,qr=0,tj=0;
        if(r<0.5) ef=total; else if(r<0.8) qr=total; else tj=total;
        out.push({id:'v'+recibo,recibo:'R-'+String(recibo).padStart(6,'0'),fecha:fecha.toISOString(),sede,operador,items,bruto,descuento,total,pago_efectivo:ef,pago_qr:qr,pago_tarjeta:tj});
        recibo++;
      }
    }
  }
  _demoVentas=out;
  return out;
}

  // ---- VENTAS (para informes) ----
  // f = {desde, hasta (ISO date), sede, operador, tipoPago}
  async getVentas(f){
    if(DEMO_MODE){
      return demoVentas().filter(v=>{
        const d=v.fecha.slice(0,10);
        if(f.desde && d<f.desde) return false;
        if(f.hasta && d>f.hasta) return false;
        if(f.sede && v.sede!==f.sede) return false;
        if(f.operador && v.operador!==f.operador) return false;
        if(f.tipoPago==='efectivo' && v.pago_efectivo<=0) return false;
        if(f.tipoPago==='qr' && v.pago_qr<=0) return false;
        if(f.tipoPago==='tarjeta' && v.pago_tarjeta<=0) return false;
        return true;
      });
    }
    // Convertir los límites del día LOCAL a instantes UTC (created_at se guarda en UTC).
    // Así una venta de la noche (que en UTC cae al día siguiente) no se pierde del informe.
    const desdeISO = f.desde ? new Date(f.desde+'T00:00:00').toISOString() : null;
    const hastaISO = f.hasta ? new Date(f.hasta+'T23:59:59.999').toISOString() : null;
    // PAGINAR: Supabase devuelve máx 1000 filas por consulta → traer todas las páginas.
    const PAGE=1000; let from=0; let data=[];
    while(true){
      let q=sb.from('ventas').select('*, venta_items(*, productos(categoria,costo))').eq('anulada',false).order('created_at').range(from, from+PAGE-1);
      if(desdeISO) q=q.gte('created_at', desdeISO);
      if(hastaISO) q=q.lte('created_at', hastaISO);
      if(f.sede) q=q.eq('sede', f.sede);
      if(f.operador) q=q.eq('operador', f.operador);
      const {data:page,error}=await q;
      if(error) throw error;
      data=data.concat(page||[]);
      if(!page || page.length<PAGE) break;
      from+=PAGE;
    }
    // normalizar a la forma que usan los informes
    return (data||[]).filter(v=>{
      if(f.tipoPago==='efectivo') return v.pago_efectivo>0;
      if(f.tipoPago==='qr') return v.pago_qr>0;
      if(f.tipoPago==='tarjeta') return v.pago_tarjeta>0;
      return true;
    }).map(v=>{
      const items=(v.venta_items||[]).map(i=>({producto_id:i.producto_id,nombre:i.nombre_producto,categoria:(i.productos&&i.productos.categoria)||'—',tipo:i.tipo,cantidad:Number(i.cantidad),precio_unit:Number(i.precio_unit),costo:Number((i.productos&&i.productos.costo)||0),iva:false,subtotal:Number(i.subtotal)}));
      const bruto=items.reduce((s,i)=>s+i.subtotal,0);
      return {id:v.id,recibo:v.numero_recibo||('#'+v.id.slice(0,6)),fecha:v.created_at,sede:v.sede,operador:v.operador,items,bruto,descuento:Math.max(0,bruto-Number(v.total)),total:Number(v.total),pago_efectivo:Number(v.pago_efectivo),pago_qr:Number(v.pago_qr),pago_tarjeta:Number(v.pago_tarjeta)};
    });
  },

  // Inventario VALORIZADO = Σ(costo × stock) de insumos, producto terminado y repuestos.
  async valorizado(sede){
    if(DEMO_MODE) return {insumos:[],productos:[],repuestos:[]};
    const [insR,repR,prodR]=await Promise.all([
      sb.from('insumos').select('nombre,unidad,costo,stock').eq('activo',true),
      sb.from('repuestos').select('nombre,categoria,unidad,costo,stock').eq('activo',true),
      sb.from('productos').select('id,nombre,categoria,costo').eq('controla_stock',true).eq('activo',true),
    ]);
    let invQ=sb.from('inventario').select('producto_id,sede,cantidad').limit(20000);
    if(sede) invQ=invQ.eq('sede',sede);
    const {data:inv}=await invQ;
    const byProd={}; (inv||[]).forEach(i=>{ byProd[i.producto_id]=(byProd[i.producto_id]||0)+(Number(i.cantidad)||0); });
    const mk=(nombre,extra,costo,stock)=>({nombre, ...extra, costo:Number(costo)||0, stock:Number(stock)||0, valor:(Number(costo)||0)*(Number(stock)||0)});
    const insumos=(insR.data||[]).map(i=>mk(i.nombre,{unidad:i.unidad},i.costo,i.stock));
    const repuestos=(repR.data||[]).map(r=>mk(r.nombre,{categoria:r.categoria,unidad:r.unidad},r.costo,r.stock));
    const productos=(prodR.data||[]).map(p=>mk(p.nombre,{categoria:p.categoria},p.costo,byProd[p.id]||0));
    return {insumos,productos,repuestos};

  async marcarRemisionPagada(id){
    if(DEMO_MODE){ const r=(DEMO.remisiones||[]).find(x=>x.id===id); if(r){r.estado='pagada';r.pagada_at=new Date().toISOString();} return; }
    // RPC: marca pagada + crea la venta de la franquicia destino (atómico)
    const {error}=await sb.rpc('marcar_remision_pagada',{p_id:id}); if(error) throw error;
  },
  async eliminarRemision(id){
    if(DEMO_MODE){ DEMO.remisiones=(DEMO.remisiones||[]).filter(x=>x.id!==id); return; }
    // RPC: devuelve el stock a la bodega + borra (y anula la venta si estaba pagada)
    const {error}=await sb.rpc('eliminar_remision',{p_id:id}); if(error) throw error;
  },
  async transferirStock(producto_id, origen, destino, cantidad){
    if(DEMO_MODE){
      const p=DEMO.productos.find(x=>x.id===producto_id);
      if(p){ p.stock=p.stock||{}; p.stock[origen]=(Number(p.stock[origen])||0)-cantidad; p.stock[destino]=(Number(p.stock[destino])||0)+cantidad; }
      return;
    }
    const {error}=await sb.rpc('transferir_stock',{p_producto_id:producto_id,p_origen:origen,p_destino:destino,p_cantidad:cantidad,p_operador:null});
    if(error) throw error;
  },
  // ---- TRANSFERENCIAS EN TRÁNSITO ----
  // Envía mercancía: resta de la bodega y queda EN TRÁNSITO (entra al destino solo cuando el operador recibe).
  async enviarTransferencia(items, origen, destino, operador){
    const envio_id = (crypto.randomUUID ? crypto.randomUUID() : 'env-'+Date.now()+'-'+Math.random().toString(16).slice(2));
    if(DEMO_MODE){
      DEMO.transferencias = DEMO.transferencias||[];
      items.forEach(it=>{
        const p=DEMO.productos.find(x=>x.id===it.producto_id);
        if(p){ p.stock=p.stock||{}; p.stock[origen]=(Number(p.stock[origen])||0)-it.cantidad; }
        DEMO.transferencias.push({id:uid(),envio_id,producto_id:it.producto_id,producto_nombre:p?p.nombre:'',origen,destino,cantidad_enviada:it.cantidad,cantidad_recibida:null,estado:'en_transito',enviado_por:operador||null,enviado_at:new Date().toISOString()});
      });
      return;
    }
    for(const it of items){
      const {error}=await sb.rpc('enviar_transferencia',{p_envio_id:envio_id,p_producto_id:it.producto_id,p_origen:origen,p_destino:destino,p_cantidad:it.cantidad,p_operador:operador||null});
      if(error) throw error;
    }
  },
  async listTransferencias(f={}){
    if(DEMO_MODE){
      return (DEMO.transferencias||[]).filter(t=>(!f.estado||t.estado===f.estado)&&(!f.destino||t.destino===f.destino))
        .sort((a,b)=>b.enviado_at.localeCompare(a.enviado_at));
    }
    let q=sb.from('transferencias').select('*').order('enviado_at',{ascending:false}).limit(300);
    if(f.estado) q=q.eq('estado',f.estado);
    if(f.destino) q=q.eq('destino',f.destino);
    const {data,error}=await q; if(error) return []; return data||[];
  },
  // ---- CHEQUEOS DE INVENTARIO ----
  async listChequeos(f={}){
    if(DEMO_MODE){
      return demoChequeosAll()
        .filter(c=>(!f.sede||c.sede===f.sede) && (!f.operador||c.operador===f.operador))
        .sort((a,b)=>b.created_at.localeCompare(a.created_at));
    }
    let q=sb.from('chequeos_inventario').select('*').order('created_at',{ascending:false});
    if(f.sede) q=q.eq('sede',f.sede);
    if(f.operador) q=q.eq('operador',f.operador);
    const {data,error}=await q; if(error) throw error; return data;
  },
  // ---- Eliminar recibo (solo back office): devuelve artículos al stock ----
  async anularVenta(venta, motivo){
    if(DEMO_MODE){
      // devolver stock a los productos de la sede
      venta.items.forEach(it=>{
        if(!it.controla_stock && it.tipo!=='producto') return;
        const p=DEMO.productos.find(x=>x.id===it.producto_id);
        if(p && p.controla_stock && p.stock){ p.stock[venta.sede]=(Number(p.stock[venta.sede])||0)+it.cantidad; }
      });
      _demoVentas=demoVentas().filter(v=>v.id!==venta.id);
      return;
    }
    const {error}=await sb.rpc('anular_venta',{p_venta_id:venta.id, p_operador:null, p_motivo:motivo||'Recibo eliminado'});
    if(error) throw error;
  },
  // ---- Login del back office (solo rol admin) ----
  async loginAdmin(pin){
    if(DEMO_MODE){
      const e=DEMO.empleados.find(x=>x.pin===pin && x.activo);
      return e ? {nombre:e.nombre, rol:e.rol} : null;
    }
    const {data,error}=await sb.from('empleados').select('nombre,rol').eq('pin',pin).eq('activo',true).maybeSingle();
    if(error||!data) return null;
    return {nombre:data.nombre, rol:data.rol};
  },
};

function Productos({showToast}){
  const [prods,setProds]=useState(null);
  const [cats,setCats]=useState([]);
  const [sedes,setSedes]=useState([]);
  const [q,setQ]=useState("");
  const [filtroCat,setFiltroCat]=useState("");
  const [editing,setEditing]=useState(null);

  const load=async()=>{
    try{
      const [p,c,s]=await Promise.all([db.listProductos(),db.listCategorias(),db.listSedes()]);
      setProds(p); setCats(c); setSedes(s);
    }catch(e){ showToast(""+(e.message||e),"err"); }
  };
  useEffect(()=>{ load(); },[]);

  const guardar=async(p)=>{
    try{ await db.saveProducto(p); setEditing(null); await load(); showToast("Producto guardado"); }
    catch(e){ showToast(""+(e.message||e),"err"); }
  };
  const eliminar=async(p)=>{
    if(!window.confirm("¿Eliminar \""+p.nombre+"\"?")) return;
    try{ await db.deleteProducto(p.id); await load(); showToast("Producto eliminado"); }
    catch(e){ showToast(""+(e.message||e),"err"); }
  };

  if(!prods) return <div className="empty">Cargando…</div>;
  const filtrados=prods.filter(p=>
    (!filtroCat||p.categoria===filtroCat) &&
    (!q||p.nombre.toLowerCase().includes(q.toLowerCase()) || (p.codigo_barras||"").includes(q))
  );

  return (
    <div>
      <div className="toolbar">
        <div className="sec-title" style={{marginRight:"auto"}}>Productos <span className="muted">({prods.length})</span></div>
        <button className="btn btn-amber" onClick={()=>setEditing({nombre:"",tipo:"producto",categoria:cats[0]?.nombre||"",precio:0,costo:0,codigo_barras:"",controla_stock:true,precio_variable:false,iva:true,activo:true,stock:{}})}>+ Nuevo producto</button>
      </div>
      <div className="toolbar">
        <input className="input" placeholder="Buscar por nombre o código…" value={q} onChange={e=>setQ(e.target.value)}/>
        <select className="select" value={filtroCat} onChange={e=>setFiltroCat(e.target.value)}>
          <option value="">Todas las categorías</option>
          {cats.map(c=><option key={c.id} value={c.nombre}>{c.nombre}</option>)}
        </select>
      </div>
      <div className="card" style={{padding:0,overflowX:"auto"}}>
        <table className="tbl">
          <thead><tr><th>Producto</th><th>Categoría</th><th>Tipo</th><th>Precio</th><th>Stock total</th><th></th></tr></thead>
          <tbody>
            {filtrados.length===0 && <tr><td colSpan="6"><div className="empty">Sin productos.</div></td></tr>}
            {filtrados.map(p=>{
              const stockTotal=p.controla_stock?Object.values(p.stock||{}).reduce((s,v)=>s+(Number(v)||0),0):null;
              return (
                <tr key={p.id} className={p.activo?"":"inactive"}>
                  <td><div className="row-name">{p.nombre}</div>{p.codigo_barras&&<div className="muted">#{p.codigo_barras}</div>}</td>
                  <td className="muted">{p.categoria}</td>
                  <td><span className={"pill pill-"+(p.tipo==="token"?"token":p.tipo==="servicio"?"serv":"prod")}>{p.tipo}</span></td>
                  <td>{p.precio_variable?<span className="muted">Variable</span>:fmt(p.precio)}</td>
                  <td>{stockTotal==null?<span className="muted">—</span>:<b style={{color:stockTotal<=0?"var(--red)":"var(--tb)"}}>{stockTotal}</b>}</td>
                  <td><div className="actions">
                    <button className="btn btn-ghost btn-sm" onClick={()=>setEditing({...p,stock:{...p.stock}})}>Editar</button>
                    <button className="btn btn-danger btn-sm" onClick={()=>eliminar(p)}>✕</button>
                  </div></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      {editing && <ProductoModal p={editing} cats={cats} sedes={sedes} allProds={prods} onClose={()=>setEditing(null)} onSave={guardar}/>}
    </div>
  );
}

  const setStock=(sede,v)=>setF(prev=>({...prev,stock:{...prev.stock,[sede]:v===""?null:Number(v)}}));
  const isDispo=s=>(f.dispo?.[s])!==false;   // disponible por defecto (si no hay dato)
  const setDispo=(sede,v)=>setF(prev=>({...prev,dispo:{...(prev.dispo||{}),[sede]:v}}));
  // ---- artículo compuesto (combo) ----
  const [esCompuesto,setEsCompuesto]=useState((p.componentes||[]).length>0);
  const comps=f.componentes||[];
  const addComp=()=>setF(prev=>({...prev,componentes:[...(prev.componentes||[]),{componente_id:"",cantidad:1}]}));
  const setComp=(i,k,v)=>setF(prev=>{const arr=[...(prev.componentes||[])];arr[i]={...arr[i],[k]:v};return {...prev,componentes:arr};});
  const delComp=i=>setF(prev=>({...prev,componentes:(prev.componentes||[]).filter((_,j)=>j!==i)}));
  const toggleCompuesto=on=>{ setEsCompuesto(on); if(!on){ setF(prev=>({...prev,componentes:[]})); } else if(!(f.componentes||[]).length){ addComp(); } };
  const valido=f.nombre.trim().length>0;
  return (
    <div className="modal-bg" onClick={onClose}>

              <option value="combo">Combo</option>
            </select>
          </div>
        </div>
        <div className="grid2">
          <div>
            <label className="label">Precio</label>
            <input className="input" type="number" value={f.precio} disabled={f.precio_variable} onChange={e=>set("precio",Number(e.target.value)||0)}/>
          </div>
          <div>
            <label className="label">Costo</label>
            <input className="input" type="number" value={f.costo} onChange={e=>set("costo",Number(e.target.value)||0)}/>
          </div>
        </div>
        <label className="label">Código de barras</label>
        <input className="input" value={f.codigo_barras||""} onChange={e=>set("codigo_barras",e.target.value)}/>
        <label className="check"><input type="checkbox" checked={!!f.precio_variable} onChange={e=>set("precio_variable",e.target.checked)}/> Precio variable (se pide al vender)</label>
        <label className="check"><input type="checkbox" checked={!!f.iva} onChange={e=>set("iva",e.target.checked)}/> Aplica IVA (19%)</label>
        <label className="check"><input type="checkbox" checked={!!f.controla_stock} onChange={e=>set("controla_stock",e.target.checked)}/> Controla inventario</label>
        <label className="check"><input type="checkbox" checked={!!f.activo} onChange={e=>set("activo",e.target.checked)}/> Activo</label>

        <label className="check"><input type="checkbox" checked={!!f.fabricable} onChange={e=>set("fabricable",e.target.checked)}/> Es fabricable (aparece en Producción)</label>
        <div style={{marginTop:10}}>
          <label className="label">Disponibilidad por sede{f.controla_stock?" y stock":""}</label>

            <div key={s.id} className="stockgrid" style={{gridTemplateColumns:f.controla_stock?"1fr 90px":"1fr"}}>
              <label className="check" style={{padding:"4px 0"}}>
                <input type="checkbox" checked={isDispo(s.nombre)} onChange={e=>setDispo(s.nombre,e.target.checked)}/>
                {s.nombre}{s.es_bodega&&<span className="pill pill-bodega" style={{marginLeft:6}}>bodega</span>}
              </label>

              <div key={i} style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>

                  <option value="">Componente…</option>
                  {(allProds||[]).filter(x=>x.id!==f.id).map(x=><option key={x.id} value={x.id}>{x.nombre}</option>)}
                </select>
                <input className="input" type="number" style={{margin:0,width:70,textAlign:"center"}} value={c.cantidad} onChange={e=>setComp(i,"cantidad",Number(e.target.value)||1)}/>
                <button className="btn btn-danger btn-sm" onClick={()=>delComp(i)}>✕</button>
              </div>
            ))}
            <button className="btn btn-ghost btn-sm" onClick={addComp}>+ Agregar componente</button>
          </div>
        )}

        <div className="modal-actions">
          <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
          <button className="btn btn-amber" disabled={!valido} onClick={()=>onSave(f)}>Guardar</button>
        </div>
      </div>
    </div>
  );
}

// SECCIÓN: CHEQUEOS DE INVENTARIO (historial + ranking de descuadres)
// ============================================================
function Chequeos({showToast}){
  const [sedes,setSedes]=useState([]);
  const [emps,setEmps]=useState([]);
  const [sede,setSede]=useState("");
  const [operador,setOperador]=useState("");
  const [lista,setLista]=useState(null);
  const [detalle,setDetalle]=useState(null);

  useEffect(()=>{ db.listSedes().then(setSedes).catch(()=>{}); db.listEmpleados().then(setEmps).catch(()=>{}); },[]);
  const cargar=async()=>{ setLista(null); try{ setLista(await db.listChequeos({sede,operador})); }catch(e){ showToast(""+(e.message||e),"err"); setLista([]); } };
  useEffect(()=>{ cargar(); },[sede,operador]);

  if(lista===null) return (
    <div><div className="filterbar"><div className="fld"><label className="label">Sede</label><select className="select" value={sede} onChange={e=>setSede(e.target.value)}><option value="">Todas</option>{sedes.map(s=><option key={s.id} value={s.nombre}>{s.nombre}</option>)}</select></div></div><div className="empty">Cargando…</div></div>
  );

  // ranking de operadores con más descuadres (suma de n_descuadres)
  const rank={};
  lista.forEach(c=>{ const o=rank[c.operador]||(rank[c.operador]={operador:c.operador,desc:0,chequeos:0}); o.desc+=c.n_descuadres; o.chequeos++; });
  const ranking=Object.values(rank).sort((a,b)=>b.desc-a.desc).slice(0,5);

  return (
    <div>
      <div className="filterbar">
        <div className="fld"><label className="label">Sede</label>
          <select className="select" value={sede} onChange={e=>setSede(e.target.value)}>
            <option value="">Todas las tiendas</option>
            {sedes.map(s=><option key={s.id} value={s.nombre}>{s.nombre}{s.es_bodega?" (bodega)":""}</option>)}
          </select>
        </div>
        <div className="fld"><label className="label">Colaborador</label>
          <select className="select" value={operador} onChange={e=>setOperador(e.target.value)}>
            <option value="">Todos</option>
            {emps.filter(e=>e.rol==='cajero'||e.rol==='tesorero'||e.rol==='supervisor').map(e=><option key={e.id} value={e.nombre}>{e.nombre}</option>)}
          </select>
        </div>
      </div>

      {ranking.length>0 && (
        <div className="card" style={{marginBottom:14}}>
          <div className="sec-title" style={{fontSize:15,marginBottom:10}}>⚠ Operadores con más descuadres</div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            {ranking.map((r,i)=>(
              <div key={r.operador} style={{flex:"1 1 150px",background:"var(--sf2)",border:"1px solid var(--bd)",borderRadius:10,padding:"10px 14px"}}>
                <div style={{fontWeight:700,color:"var(--tb)"}}>{i===0?"🥇 ":""}{r.operador}</div>
                <div className="muted"><b style={{color:r.desc>0?"var(--red)":"var(--green)"}}>{r.desc}</b> descuadres · {r.chequeos} chequeos</div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div className="card" style={{padding:0,overflowX:"auto"}}>
        <table className="tbl">
          <thead><tr><th>Fecha</th><th>Sede</th><th>Colaborador</th><th className="num">Base recibida</th><th className="num">Descuadres</th><th></th></tr></thead>
          <tbody>
            {lista.length===0 && <tr><td colSpan="6"><div className="empty">Sin chequeos en el periodo/filtros.</div></td></tr>}
            {lista.map(c=>(
              <tr key={c.id} style={{cursor:"pointer"}} onClick={()=>setDetalle(c)}>
                <td className="muted">{fLocalDia(c.created_at)} {fLocalHora(c.created_at)}</td>
                <td>{c.sede}</td>
                <td className="row-name">{c.operador}</td>
                <td className="num">{fmt(c.base_recibida)}</td>
                <td className="num">{c.n_descuadres>0 ? <span className="pill pill-off">{c.n_descuadres}</span> : <span className="pill pill-prod">0</span>}</td>
                <td><div className="actions"><button className="btn btn-ghost btn-sm" onClick={e=>{e.stopPropagation();setDetalle(c);}}>Ver</button></div></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {detalle && (
        <div className="modal-bg" onClick={()=>setDetalle(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-t">Chequeo — {detalle.sede}</div>
            <div className="muted" style={{marginBottom:12}}>{detalle.operador} · {fLocalDia(detalle.created_at)} {fLocalHora(detalle.created_at)}</div>
            <div className="kpis">
              <div className="kpi"><div className="kpi-label">Base recibida</div><div className="kpi-value green">{fmt(detalle.base_recibida)}</div></div>
              <div className="kpi"><div className="kpi-label">Descuadres</div><div className="kpi-value" style={{color:detalle.n_descuadres>0?"var(--red)":"var(--green)"}}>{detalle.n_descuadres}</div></div>
            </div>
            {detalle.n_descuadres>0 ? (
              <div className="card" style={{padding:0,overflowX:"auto",marginTop:6}}>
                <table className="tbl">
                  <thead><tr><th>Producto</th><th className="num">Sistema</th><th className="num">Contado</th><th className="num">Dif.</th></tr></thead>
                  <tbody>{(detalle.descuadres||[]).map((d,i)=>(
                    <tr key={i}><td className="row-name">{d.nombre}</td><td className="num">{d.sistema}</td><td className="num">{d.contado}</td><td className="num" style={{color:d.diferencia<0?"var(--red)":"var(--green)",fontWeight:800}}>{d.diferencia>0?"+":""}{d.diferencia}</td></tr>
                  ))}</tbody>
                </table>
              </div>
            ) : <div className="empty">Todo cuadró en este chequeo.</div>}
            <div className="modal-actions"><button className="btn btn-ghost" onClick={()=>setDetalle(null)}>Cerrar</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

  const [valorSede,setValorSede]=useState("");     // "" = todas las sedes (producto terminado)
  const [valorOpen,setValorOpen]=useState({insumos:false,productos:false,repuestos:false});

  useEffect(()=>{ db.listSedes().then(s=>{ setSedes(s); const def=s.find(x=>!x.es_bodega)||s[0]; if(def) setSede(def.nombre); }).catch(()=>{}); db.listCategorias().then(setCats).catch(()=>{}); },[]);
  const cargarValor=async(s)=>{ setValorData(null); try{ setValorData(await db.valorizado(s||undefined)); }catch(e){ showToast(""+(e.message||e),"err"); setValorData({insumos:[],productos:[],repuestos:[]}); } };
  const abrirValor=()=>{ setVerValor(true); cargarValor(valorSede); };
  const cargarTransitos=()=>{ db.listTransferencias({estado:'en_transito'}).then(setTransitos).catch(()=>setTransitos([])); };
  useEffect(()=>{ cargarTransitos(); },[]);
  const cargar=async()=>{ if(!sede) return; setInv(null); try{ setInv(await db.getInventario(sede)); }catch(e){ showToast(""+(e.message||e),"err"); setInv([]); } };
  useEffect(()=>{ cargar(); },[sede]);

  const bodega = sedes.find(s=>s.es_bodega);
  const estado = r => r.stock<=0 ? "agotado" : (r.minimo>0 && r.stock<=r.minimo) ? "bajo" : "ok";
  const guardarMin=async(r,val)=>{
    const m=Math.max(0,Number(val)||0);
    try{ await db.setMinimo(r.id,sede,m); setInv(prev=>prev.map(x=>x.id===r.id?{...x,minimo:m}:x)); }
    catch(e){ showToast(""+(e.message||e),"err"); }
  };
  const guardarIdeal=async(r,val)=>{
    const v=Math.max(0,Number(val)||0);
    try{ await db.setIdeal(r.id,sede,v); setInv(prev=>prev.map(x=>x.id===r.id?{...x,ideal:v}:x)); }
    catch(e){ showToast(""+(e.message||e),"err"); }
  };
  const guardarStock=async(r,nuevo)=>{
    const v=Number(nuevo)||0;          // permite negativo (sobreventa)
    const delta=v-(Number(r.stock)||0);
    if(delta===0) return;
    try{ await db.ajustarStock(r.id,sede,delta,v,admin); setInv(prev=>prev.map(x=>x.id===r.id?{...x,stock:v}:x)); showToast("Stock ajustado ("+(delta>0?"+":"")+delta+")","ok"); }
    catch(e){ showToast(""+(e.message||e),"err"); }
  };
  const faltante=r=> (Number(r.ideal)>0 && Number(r.stock)<Number(r.ideal)) ? (Number(r.ideal)-Number(r.stock)) : 0;
  const reportePreparacion=()=>{
    const list=(inv||[]).filter(r=>Number(r.ideal)>0 && faltante(r)>0).sort((a,b)=>a.nombre.localeCompare(b.nombre));
    const fechaTxt=new Date().toLocaleString('es-CO');
    const filas=list.map(r=>'<tr><td>'+r.nombre+'</td><td style="text-align:center">'+Number(r.stock)+'</td><td style="text-align:center">'+Number(r.ideal)+'</td><td style="text-align:center;font-weight:bold">'+faltante(r)+'</td></tr>').join('');
    const totalUds=list.reduce((s,r)=>s+faltante(r),0);
    const html='<!DOCTYPE html><html><head><meta charset="utf-8"><title>Preparación '+sede+'</title>'+
      '<style>body{font-family:Arial,sans-serif;color:#222;padding:24px} h1{margin:0 0 2px;font-size:20px} .sub{color:#666;margin:0 0 16px}'+
      'table{border-collapse:collapse;width:100%;font-size:14px} th{background:#f3f4f6;text-align:left;padding:8px 10px;border-bottom:2px solid #ddd} td{padding:7px 10px;border-bottom:1px solid #eee}'+
      '.tot{margin-top:14px;font-weight:bold} @media print{button{display:none}}</style></head><body>'+
      '<h1>Preparación de transferencia — '+sede+'</h1>'+
      '<p class="sub">Generado: '+fechaTxt+' · Productos a surtir: '+list.length+'</p>'+
      (list.length? '<table><tr><th>Producto</th><th style="text-align:center">Stock actual</th><th style="text-align:center">Ideal</th><th style="text-align:center">Transferir</th></tr>'+filas+'</table><p class="tot">Total unidades a transferir: '+totalUds+'</p>'
        : '<p>Todo está en su nivel ideal. No hay que transferir nada. 🎉</p>')+
      '<button onclick="window.print()" style="margin-top:18px;padding:10px 16px;font-size:14px;cursor:pointer">🖨 Imprimir</button>'+
      '</body></html>';
    const w=window.open('','_blank'); if(!w){ showToast("Permite las ventanas emergentes para ver el reporte","err"); return; }
    w.document.write(html); w.document.close();
  };
  const abrirTransfer=async()=>{
    if(!bodega) return;
    let bodegaStock={};
    try{ const bi=await db.getInventario(bodega.nombre); bi.forEach(r=>{ bodegaStock[r.id]=r.stock; }); }catch(e){}
    setTransfer({origen:bodega.nombre, destino: sede!==bodega.nombre?sede:"", cantidades:{}, bodegaStock});
  };
  const hacerTransfer=async(t)=>{
    const items=Object.entries(t.cantidades||{}).filter(([id,c])=>Number(c)>0).map(([producto_id,c])=>({producto_id,cantidad:Number(c)}));
    if(!t.destino || !items.length) return;
    try{
      await db.enviarTransferencia(items, t.origen, t.destino, null);
      setTransfer(null); await cargar(); cargarTransitos();
      showToast(items.length+" producto(s) enviado(s) a "+t.destino+" (en tránsito)");
    }catch(e){ showToast(""+(e.message||e),"err"); }
  };

  if(verValor){
    const d=valorData;
    const tot=arr=>(arr||[]).reduce((a,x)=>a+(Number(x.valor)||0),0);
    const totIns=tot(d&&d.insumos), totProd=tot(d&&d.productos), totRep=tot(d&&d.repuestos);
    const gran=totIns+totProd+totRep;
    const sinCosto=arr=>(arr||[]).filter(x=>!x.costo).length;
    const Seccion=(key,titulo,emoji,arr,total,extra)=>{
      const list=[...(arr||[])].sort((a,b)=>(Number(b.valor)||0)-(Number(a.valor)||0));
      const sc=sinCosto(arr); const open=valorOpen[key];
      return (
        <div className="card" style={{marginBottom:12}}>
          <div className="toolbar" style={{cursor:"pointer"}} onClick={()=>setValorOpen(o=>({...o,[key]:!o[key]}))}>
            <div className="sec-title" style={{marginRight:"auto"}}>{emoji} {titulo} <span className="muted">({list.length})</span></div>
            {sc>0 && <span className="pill pill-off" title="sin costo cargado" style={{marginRight:8}}>{sc} sin costo</span>}
            <b style={{fontSize:16,marginRight:8}}>{fmt(total)}</b>
            <span className="muted">{open?"▲":"▼"}</span>
          </div>
          {open && (
            <div style={{overflowX:"auto",marginTop:8}}>
              <table className="tbl">
                <thead><tr><th>Ítem</th>{extra&&<th>{extra}</th>}<th className="num">Costo unit.</th><th className="num">Stock</th><th className="num">Valor</th></tr></thead>
                <tbody>
                  {list.length===0 && <tr><td colSpan={extra?5:4}><div className="empty">Sin ítems.</div></td></tr>}
                  {list.map((x,i)=>(
                    <tr key={i}>
                      <td className="row-name">{x.nombre}</td>
                      {extra && <td className="muted">{x[extra==='Categoría'?'categoria':'unidad']||"—"}</td>}
                      <td className="num" style={{color:x.costo?"var(--tb)":"var(--red)"}}>{x.costo?fmt(x.costo):"sin costo"}</td>
                      <td className="num" style={{color:Number(x.stock)<0?"var(--red)":"var(--tb)"}}>{Number(x.stock)}</td>
                      <td className="num"><b>{fmt(x.valor)}</b></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      );
    };
    return (
      <div>
        <div className="filterbar">
          <button className="btn btn-ghost" style={{alignSelf:"flex-end"}} onClick={()=>setVerValor(false)}>← Volver al stock</button>
          <div className="fld">
            <label className="label">Sede (producto terminado)</label>
            <select className="select" value={valorSede} onChange={e=>{setValorSede(e.target.value);cargarValor(e.target.value);}}>
              <option value="">🏬 Todas las sedes</option>
              {sedes.map(s=><option key={s.id} value={s.nombre}>{s.nombre}{s.es_bodega?" (bodega)":""}</option>)}
            </select>
          </div>
          <button className="btn btn-ghost" style={{alignSelf:"flex-end"}} onClick={()=>cargarValor(valorSede)}>🔄 Actualizar</button>
        </div>
        <div className="muted" style={{marginBottom:12}}>Valor = costo × stock real. Insumos y repuestos son centrales (un solo stock); el producto terminado se suma {valorSede?("solo de "+valorSede):"de todas las sedes"}.</div>
        {d===null ? <div className="empty">Calculando…</div> : (
          <div>
            <div className="card" style={{marginBottom:12,background:"var(--amber-d)",border:"1px solid rgba(37,99,235,.3)",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
              <div style={{fontWeight:800,fontSize:16}}>💰 Total inventario valorizado</div>
              <div style={{fontSize:26,fontWeight:900,color:"var(--amber)"}}>{fmt(gran)}</div>
            </div>
            <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:14}}>
              {[["🧪 Insumos",totIns],["📦 Producto terminado",totProd],["🔩 Repuestos",totRep]].map(([l,v])=>(
                <div key={l} className="card" style={{flex:"1 1 180px"}}><div className="muted">{l}</div><div style={{fontSize:22,fontWeight:800}}>{fmt(v)}</div></div>
              ))}
            </div>
            {Seccion('insumos','Insumos','🧪',d.insumos,totIns,'Unidad')}
            {Seccion('productos','Producto terminado','📦',d.productos,totProd,'Categoría')}
            {Seccion('repuestos','Repuestos','🔩',d.repuestos,totRep,'Categoría')}
          </div>
        )}
      </div>
    );
  }

  if(inv===null && sede) return (
    <div>
      <div className="filterbar"><div className="fld"><label className="label">Sede</label><select className="select" value={sede} onChange={e=>setSede(e.target.value)}>{sedes.map(s=><option key={s.id} value={s.nombre}>{s.nombre}{s.es_bodega?" (bodega)":""}</option>)}</select></div></div>
      <div className="empty">Cargando inventario…</div>
    </div>
  );

  const rows=(inv||[]).filter(r=>(!q||r.nombre.toLowerCase().includes(q.toLowerCase())) && (!cat||r.categoria===cat) && (!soloBajo||estado(r)!=="ok"));
  const nBajo=(inv||[]).filter(r=>(!cat||r.categoria===cat) && estado(r)!=="ok").length;

  return (
    <div>
      <div className="filterbar">
        <div className="fld">
          <label className="label">Sede</label>
          <select className="select" value={sede} onChange={e=>setSede(e.target.value)}>
            {sedes.map(s=><option key={s.id} value={s.nombre}>{s.nombre}{s.es_bodega?" (bodega)":""}</option>)}
          </select>
        </div>
        <div className="fld">
          <label className="label">Categoría</label>
          <select className="select" value={cat} onChange={e=>setCat(e.target.value)}>
            <option value="">Todas las categorías</option>
            {cats.map(c=><option key={c.id} value={c.nombre}>{c.nombre}</option>)}
          </select>
        </div>
        <div className="fld" style={{flex:1,minWidth:160}}><label className="label">Buscar</label><input className="input" placeholder="Producto…" value={q} onChange={e=>setQ(e.target.value)}/></div>
        <label className="check" style={{alignSelf:"center"}}><input type="checkbox" checked={soloBajo} onChange={e=>setSoloBajo(e.target.checked)}/> Solo stock bajo {nBajo>0&&<span className="pill pill-off" style={{marginLeft:4}}>{nBajo}</span>}</label>
        <button className="btn btn-ghost" style={{alignSelf:"flex-end"}} onClick={reportePreparacion}>🖨 Reporte de preparación</button>
        <button className="btn btn-ghost" style={{alignSelf:"flex-end"}} onClick={()=>{cargarTransitos();setVerTransitos(true);}}>🚚 En tránsito {transitos.length>0&&<span className="pill pill-token" style={{marginLeft:4}}>{transitos.length}</span>}</button>
        <button className="btn btn-ghost" style={{alignSelf:"flex-end"}} onClick={abrirValor}>💰 Valorizado</button>
        {bodega && <button className="btn btn-amber" style={{alignSelf:"flex-end"}} onClick={abrirTransfer}>⇄ Enviar desde {bodega.nombre}</button>}
      </div>

      {nBajo>0 && !soloBajo && <div className="muted" style={{marginBottom:12}}>⚠ {nBajo} producto(s) en o por debajo del mínimo en {sede}. <a style={{color:"var(--amber)",cursor:"pointer"}} onClick={()=>setSoloBajo(true)}>Ver solo esos</a></div>}

      <div className="card" style={{padding:0,overflowX:"auto"}}>
        <table className="tbl">
          <thead><tr><th>Producto</th><th>Categoría</th><th className="num">Stock</th><th className="num">Mínimo</th><th className="num">Ideal</th><th className="num">Transferir</th><th>Estado</th><th></th></tr></thead>
          <tbody>
            {rows.length===0 && <tr><td colSpan="8"><div className="empty">Sin productos.</div></td></tr>}
            {rows.map(r=>{
              const st=estado(r);
              const falta=faltante(r);
              return (
                <tr key={r.id}>
                  <td className="row-name">{r.nombre}</td>
                  <td className="muted">{r.categoria}</td>
                  <td className="num"><StockCell value={r.stock} color={st==="agotado"?"var(--red)":st==="bajo"?"var(--amber)":"var(--tb)"} onCommit={v=>guardarStock(r,v)}/></td>
                  <td className="num"><input className="input" type="number" style={{margin:0,width:72,textAlign:"right",padding:"6px 8px"}} value={r.minimo} onChange={e=>guardarMin(r,e.target.value)}/></td>
                  <td className="num"><input className="input" type="number" style={{margin:0,width:72,textAlign:"right",padding:"6px 8px"}} value={r.ideal} placeholder="—" onChange={e=>guardarIdeal(r,e.target.value)}/></td>
                  <td className="num">{Number(r.ideal)>0 ? (falta>0 ? <b style={{color:"var(--amber)"}}>{falta}</b> : <span className="pill pill-prod">✓</span>) : <span className="muted">—</span>}</td>
                  <td>{st==="agotado"?<span className="pill pill-off">Agotado</span>:st==="bajo"?<span className="pill pill-token">Stock bajo</span>:<span className="pill pill-prod">OK</span>}</td>
                  <td><button className="btn btn-ghost btn-sm" title="Trazabilidad" onClick={()=>setTraza(r)}>📜</button></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {transfer && <TransferModal t={transfer} setT={setTransfer} bodega={bodega} sedes={sedes} inv={inv} onClose={()=>setTransfer(null)} onConfirm={hacerTransfer}/>}
      {verTransitos && <TransitosModal transitos={transitos} onClose={()=>setVerTransitos(false)}/>}
      {traza && <TrazaModal producto={traza} sede={sede} sedes={sedes} onClose={()=>setTraza(null)}/>}
    </div>
  );
}

// Celda de stock editable: guarda al salir (blur) o Enter; permite negativo.
function StockCell({value,color,onCommit}){
  const [v,setV]=useState(String(value));
  useEffect(()=>{ setV(String(value)); },[value]);
  const commit=()=>{ if(v.trim()==="" ) { setV(String(value)); return; } if(Number(v)!==Number(value)) onCommit(Number(v)); };
  return <input className="input" type="number" style={{margin:0,width:80,textAlign:"right",padding:"6px 8px",fontWeight:700,color}}
    value={v} onChange={e=>setV(e.target.value)} onBlur={commit} onKeyDown={e=>{ if(e.key==='Enter') e.target.blur(); }}/>;
}

// Modal de trazabilidad: historial de movimientos de un producto.
function TrazaModal({producto,sede,sedes,onClose}){
  const [movs,setMovs]=useState(null);
  const [filtroSede,setFiltroSede]=useState("");   // "" = todas
  useEffect(()=>{ setMovs(null); db.listMovimientos({producto_id:producto.id, sede:filtroSede||undefined}).then(setMovs).catch(()=>setMovs([])); },[filtroSede]);

  const tipoInfo={venta:["Venta","var(--blue)"],reabastecimiento:["Entrada","var(--green)"],transferencia:["Transferencia","var(--amber)"],muestra:["Muestra","var(--purple)"],merma:["Merma","var(--red)"],ajuste:["Ajuste","var(--td)"],devolucion:["Devolución","var(--green)"]};
  const resumen={};
  (movs||[]).forEach(m=>{ resumen[m.tipo]=(resumen[m.tipo]||0)+Number(m.cantidad); });

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:720}}>
        <div className="modal-t">📜 Trazabilidad — {producto.nombre}</div>
        <div className="toolbar" style={{marginBottom:10}}>
          <div className="fld"><label className="label">Sede</label>
            <select className="select" value={filtroSede} onChange={e=>setFiltroSede(e.target.value)}>
              <option value="">Todas las sedes</option>
              {sedes.map(s=><option key={s.id} value={s.nombre}>{s.nombre}</option>)}
            </select>
          </div>
        </div>
        {movs===null ? <div className="empty">Cargando…</div> : (
          <div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
              {Object.entries(resumen).map(([t,n])=>{ const inf=tipoInfo[t]||[t,"var(--td)"]; return (
                <div key={t} className="card" style={{padding:"8px 12px"}}><div className="muted" style={{fontSize:11}}>{inf[0]}</div><div style={{fontWeight:800,color:inf[1]}}>{n>0?"+":""}{n}</div></div>
              );})}
              {Object.keys(resumen).length===0 && <div className="muted">Sin movimientos registrados.</div>}
            </div>
            <div className="card" style={{padding:0,overflowX:"auto",maxHeight:"50vh",overflowY:"auto"}}>
              <table className="tbl">
                <thead><tr><th>Fecha</th><th>Sede</th><th>Tipo</th><th className="num">Cant.</th><th>Operador</th><th>Nota</th></tr></thead>
                <tbody>
                  {(movs||[]).length===0 && <tr><td colSpan="6"><div className="empty">Sin movimientos.</div></td></tr>}
                  {(movs||[]).map((m,i)=>{ const inf=tipoInfo[m.tipo]||[m.tipo,"var(--td)"]; const c=Number(m.cantidad); return (
                    <tr key={i}>
                      <td className="muted" style={{whiteSpace:"nowrap"}}>{fLocalDia(m.created_at)} {fLocalHora(m.created_at)}</td>
                      <td className="muted">{m.sede}</td>
                      <td><span style={{color:inf[1],fontWeight:700}}>{inf[0]}</span></td>
                      <td className="num" style={{color:c<0?"var(--red)":"var(--green)",fontWeight:700}}>{c>0?"+":""}{c}</td>
                      <td className="muted">{m.operador||"—"}</td>
                      <td className="muted" style={{fontSize:12}}>{m.nota||""}</td>
                    </tr>
                  );})}
                </tbody>
              </table>
            </div>
          </div>
        )}
        <div className="modal-actions"><button className="btn btn-ghost" onClick={onClose}>Cerrar</button></div>
      </div>
    </div>
  );
}

function TransitosModal({transitos,onClose}){
  // agrupar por envío
  const envios={};
  transitos.forEach(t=>{ (envios[t.envio_id]=envios[t.envio_id]||[]).push(t); });
  const grupos=Object.values(envios).sort((a,b)=>b[0].enviado_at.localeCompare(a[0].enviado_at));
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-t">🚚 Mercancía en tránsito ({transitos.length})</div>
        <div className="muted" style={{marginBottom:10}}>Envíos que salieron de la bodega y aún no han sido recibidos en la sede destino. Entran al stock cuando el operador les da "Recibir".</div>
        <div style={{maxHeight:"55vh",overflowY:"auto"}}>
          {grupos.length===0 && <div className="empty">No hay envíos en tránsito. 🎉</div>}
          {grupos.map((g,i)=>(
            <div key={i} className="card" style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",fontWeight:700}}>
                <span>{g[0].origen} → {g[0].destino}</span>
                <span className="muted" style={{fontWeight:400,fontSize:12}}>{fLocalDia(g[0].enviado_at)} {fLocalHora(g[0].enviado_at)}</span>
              </div>
              <table className="tbl" style={{marginTop:6}}>
                <tbody>
                  {g.map(t=>(<tr key={t.id}><td className="row-name">{t.producto_nombre}</td><td className="num">{Number(t.cantidad_enviada)} und.</td></tr>))}
                </tbody>
              </table>
            </div>
          ))}
        </div>
        <div className="modal-actions"><button className="btn btn-ghost" onClick={onClose}>Cerrar</button></div>
      </div>
    </div>
  );
}

function TransferModal({t,setT,bodega,sedes,inv,onClose,onConfirm}){
  const [q,setQ]=useState("");
  const prods=(inv||[]).filter(p=>!q||p.nombre.toLowerCase().includes(q.toLowerCase()));
  const setCant=(id,v)=>setT(prev=>({...prev,cantidades:{...(prev.cantidades||{}),[id]:v.replace(/[^0-9]/g,"")}}));
  const nSel=Object.values(t.cantidades||{}).filter(c=>Number(c)>0).length;
  const valido = t.destino && nSel>0;
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-t">⇄ Enviar desde {t.origen}</div>
        <div className="muted" style={{marginBottom:10}}>Elige la sede destino y escribe cuánto enviar de cada producto. Se descuenta de {t.origen} y queda <b>en tránsito</b>: entra al stock de la sede solo cuando el operador lo <b>recibe</b> en el POS.</div>
        <label className="label">Sede destino</label>
        <select className="select" value={t.destino} onChange={e=>setT(prev=>({...prev,destino:e.target.value}))}>
          <option value="">Seleccionar…</option>
          {sedes.filter(s=>s.nombre!==t.origen).map(s=><option key={s.id} value={s.nombre}>{s.nombre}</option>)}
        </select>
        <input className="input" placeholder="Buscar producto…" value={q} onChange={e=>setQ(e.target.value)}/>
        <div style={{maxHeight:"40vh",overflowY:"auto",border:"1px solid var(--bd)",borderRadius:10,padding:"4px 8px",marginBottom:12}}>
          {prods.map(p=>(
            <div key={p.id} className="stockgrid" style={{gridTemplateColumns:"1fr 78px",padding:"4px 0"}}>
              <span style={{fontSize:13}}>{p.nombre} <span className="muted">· bodega: {t.bodegaStock?.[p.id]??0}</span></span>
              <input className="input" type="number" inputMode="numeric" style={{margin:0,textAlign:"center"}} placeholder="0" value={t.cantidades?.[p.id]??""} onChange={e=>setCant(p.id,e.target.value)}/>
            </div>
          ))}
          {prods.length===0 && <div className="muted" style={{padding:"10px 0"}}>Sin productos.</div>}
        </div>
        <div className="modal-actions">
          <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
          <button className="btn btn-amber" disabled={!valido} onClick={()=>onConfirm(t)}>Enviar{nSel?(" "+nSel):""} (en tránsito)</button>
        </div>
      </div>
    </div>
  );
}

const isoDay = d => d.toISOString().slice(0,10);
function rangoPreset(preset){
  const hoy=new Date(); hoy.setHours(0,0,0,0);
  const d=new Date(hoy);
  if(preset==='hoy') return {desde:isoDay(hoy),hasta:isoDay(hoy)};
  if(preset==='ayer'){ d.setDate(d.getDate()-1); return {desde:isoDay(d),hasta:isoDay(d)}; }
  if(preset==='semana'){ d.setDate(d.getDate()-d.getDay()); return {desde:isoDay(d),hasta:isoDay(hoy)}; }
  if(preset==='mes'){ const x=new Date(hoy.getFullYear(),hoy.getMonth(),1); return {desde:isoDay(x),hasta:isoDay(hoy)}; }
  if(preset==='mes_pasado'){ const a=new Date(hoy.getFullYear(),hoy.getMonth()-1,1); const b=new Date(hoy.getFullYear(),hoy.getMonth(),0); return {desde:isoDay(a),hasta:isoDay(b)}; }
  if(preset==='30dias'){ d.setDate(d.getDate()-29); return {desde:isoDay(d),hasta:isoDay(hoy)}; }
  return {desde:isoDay(hoy),hasta:isoDay(hoy)};
}

  const [ventas,setVentas]=useState(null);

function ReporteVista({sub,ventas,showToast,recargar}){
  const [detalle,setDetalle]=useState(null);   // recibo abierto en el panel de detalle
  const [borrando,setBorrando]=useState(false);
  if(!ventas.length) return <div className="empty">No hay ventas en el periodo/filtros seleccionados.</div>;
  // neto por línea = subtotal ajustado por el descuento del ticket (repartido proporcional al subtotal).
  const allItems=ventas.flatMap(v=>{ const f=v.bruto>0?(Number(v.total)/v.bruto):1; return v.items.map(i=>({...i,sede:v.sede,operador:v.operador,neto:i.subtotal*f})); });
  const bruto=ventas.reduce((s,v)=>s+v.bruto,0);
  const descuentos=ventas.reduce((s,v)=>s+v.descuento,0);
  const netas=bruto-descuentos;
  const costo=allItems.reduce((s,i)=>s+i.costo*i.cantidad,0);
  const beneficio=netas-costo;

  if(sub==='resumen'){
    // agrupar bruto por día
    const porDia={};
    ventas.forEach(v=>{ const d=fLocalDia(v.fecha); porDia[d]=(porDia[d]||0)+v.bruto; });
    const dias=Object.keys(porDia).sort();
    const max=Math.max(...dias.map(d=>porDia[d]),1);
    return (
      <div>
        <div className="kpis">
          <div className="kpi"><div className="kpi-label">Ventas brutas</div><div className="kpi-value">{fmt(bruto)}</div></div>
          <div className="kpi"><div className="kpi-label">Descuentos</div><div className="kpi-value red">-{fmt(descuentos)}</div></div>
          <div className="kpi"><div className="kpi-label">Ventas netas</div><div className="kpi-value green">{fmt(netas)}</div></div>
          <div className="kpi"><div className="kpi-label">Beneficio bruto</div><div className="kpi-value amber">{fmt(beneficio)}</div></div>
          <div className="kpi"><div className="kpi-label">Nº de ventas</div><div className="kpi-value">{ventas.length}</div></div>
        </div>
        <div className="chart-wrap">
          <div className="label" style={{marginBottom:14}}>Ventas brutas por día</div>
          <div className="chart" style={{paddingBottom:20}}>
            {dias.map(d=>(
              <div key={d} className="bar" style={{height:(porDia[d]/max*100)+"%"}} title={d+": "+fmt(porDia[d])}>
                <span className="bar-lbl">{d.slice(8,10)}/{d.slice(5,7)}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  if(sub==='articulo' || sub==='categoria'){
    const key = sub==='articulo' ? 'nombre' : 'categoria';
    const g={};
    allItems.forEach(i=>{ const k=i[key]||'—'; const o=g[k]||(g[k]={nombre:k,cant:0,neto:0,costo:0}); o.cant+=i.cantidad; o.neto+=i.neto; o.costo+=i.costo*i.cantidad; });
    const rows=Object.values(g).sort((a,b)=>b.neto-a.neto);
    return (
      <div className="card" style={{padding:0,overflowX:"auto"}}>
        <table className="tbl">
          <thead><tr><th>{sub==='articulo'?'Artículo':'Categoría'}</th><th className="num">Cantidad</th><th className="num">Ventas netas</th><th className="num">Costo</th><th className="num">Beneficio</th></tr></thead>
          <tbody>{rows.map(r=>(
            <tr key={r.nombre}><td className="row-name">{r.nombre}</td><td className="num">{r.cant}</td><td className="num">{fmt(r.neto)}</td><td className="num" style={{color:"var(--red)"}}>{fmt(r.costo)}</td><td className="num" style={{color:"var(--green)"}}>{fmt(r.neto-r.costo)}</td></tr>
          ))}</tbody>
        </table>
      </div>
    );
  }

  if(sub==='empleado'){
    const g={};
    ventas.forEach(v=>{ const o=g[v.operador]||(g[v.operador]={nombre:v.operador,n:0,total:0}); o.n++; o.total+=v.total; });
    const rows=Object.values(g).sort((a,b)=>b.total-a.total);
    return (
      <div className="card" style={{padding:0,overflowX:"auto"}}>
        <table className="tbl">
          <thead><tr><th>Colaborador</th><th className="num">Nº ventas</th><th className="num">Total vendido</th><th className="num">Ticket prom.</th></tr></thead>
          <tbody>{rows.map(r=>(
            <tr key={r.nombre}><td className="row-name">{r.nombre}</td><td className="num">{r.n}</td><td className="num">{fmt(r.total)}</td><td className="num">{fmt(Math.round(r.total/r.n))}</td></tr>
          ))}</tbody>
        </table>
      </div>
    );
  }

  if(sub==='pago'){
    const ef=ventas.reduce((s,v)=>s+v.pago_efectivo,0);
    const qr=ventas.reduce((s,v)=>s+v.pago_qr,0);
    const tj=ventas.reduce((s,v)=>s+v.pago_tarjeta,0);
    const tot=ef+qr+tj||1;
    const row=(l,v)=>(<tr><td className="row-name">{l}</td><td className="num">{fmt(v)}</td><td className="num">{(v/tot*100).toFixed(1)}%</td></tr>);
    return (
      <div className="card" style={{padding:0,overflowX:"auto"}}>
        <table className="tbl">
          <thead><tr><th>Tipo de pago</th><th className="num">Total</th><th className="num">%</th></tr></thead>
          <tbody>{row("Efectivo",ef)}{row("QR / Transferencia",qr)}{row("Tarjeta",tj)}</tbody>
        </table>
      </div>
    );
  }

  if(sub==='recibos'){
    const rows=[...ventas].sort((a,b)=>b.fecha.localeCompare(a.fecha)).slice(0,200);
    const metodo=v=>v.pago_efectivo>0?"Efectivo":v.pago_qr>0?"QR":"Tarjeta";
    const eliminar=async(v)=>{
      if(!window.confirm("¿Eliminar el recibo "+v.recibo+" por "+fmt(v.total)+"?\n\nLos artículos volverán al stock de "+v.sede+" y la venta se quitará de los informes.")) return;
      setBorrando(true);
      try{ await db.anularVenta(v,"Recibo eliminado desde back office"); setDetalle(null); await recargar(); showToast("Recibo eliminado y stock devuelto"); }
      catch(e){ showToast(""+(e.message||e),"err"); }
      setBorrando(false);
    };
    return (
      <div>
        <div className="kpis">
          <div className="kpi"><div className="kpi-label">Recibos</div><div className="kpi-value">{ventas.length}</div></div>
          <div className="kpi"><div className="kpi-label">Total facturado</div><div className="kpi-value green">{fmt(ventas.reduce((s,v)=>s+v.total,0))}</div></div>
        </div>
        <div className="card" style={{padding:0,overflowX:"auto"}}>
          <table className="tbl">
            <thead><tr><th>Recibo</th><th>Fecha</th><th>Sede</th><th>Colaborador</th><th className="num">Total</th><th>Pago</th><th></th></tr></thead>
            <tbody>{rows.map(v=>(
              <tr key={v.id} style={{cursor:"pointer"}} onClick={()=>setDetalle(v)}>
                <td className="row-name" style={{color:"var(--green)"}}>{v.recibo}</td>
                <td className="muted">{fLocalDia(v.fecha)} {fLocalHora(v.fecha)}</td>
                <td>{v.sede}</td><td className="muted">{v.operador}</td>
                <td className="num">{fmt(v.total)}</td>
                <td><span className="chip">{metodo(v)}</span></td>
                <td><div className="actions"><button className="btn btn-danger btn-sm" onClick={e=>{e.stopPropagation();eliminar(v);}}>Eliminar</button></div></td>
              </tr>
            ))}</tbody>
          </table>
          {ventas.length>200 && <div className="muted" style={{padding:12}}>Mostrando los 200 más recientes de {ventas.length}.</div>}
        </div>
        {detalle && <ReciboDetalle v={detalle} metodo={metodo} borrando={borrando} onClose={()=>setDetalle(null)} onEliminar={()=>eliminar(detalle)}/>}
      </div>
    );
  }

  if(sub==='descuentos'){
    const conDesc=ventas.filter(v=>v.descuento>0).sort((a,b)=>b.descuento-a.descuento);
    return (
      <div>
        <div className="kpis"><div className="kpi"><div className="kpi-label">Total descuentos</div><div className="kpi-value red">-{fmt(descuentos)}</div></div><div className="kpi"><div className="kpi-label">Ventas con descuento</div><div className="kpi-value">{conDesc.length}</div></div></div>
        <div className="card" style={{padding:0,overflowX:"auto"}}>
          <table className="tbl">
            <thead><tr><th>Recibo</th><th>Fecha</th><th>Sede</th><th className="num">Bruto</th><th className="num">Descuento</th></tr></thead>
            <tbody>{conDesc.slice(0,200).map(v=>(
              <tr key={v.id}><td className="row-name">{v.recibo}</td><td className="muted">{fLocalDia(v.fecha)}</td><td>{v.sede}</td><td className="num">{fmt(v.bruto)}</td><td className="num" style={{color:"var(--red)"}}>-{fmt(v.descuento)}</td></tr>
            ))}</tbody>
          </table>
        </div>
      </div>
    );
  }

  if(sub==='impuestos'){
    // IVA incluido en el precio: base = subtotal/1.19, iva = subtotal - base
    let base=0,iva=0,exento=0;
    allItems.forEach(i=>{ if(i.iva){ const b=i.neto/1.19; base+=b; iva+=i.neto-b; } else { exento+=i.neto; } });
    return (
      <div>
        <div className="kpis">
          <div className="kpi"><div className="kpi-label">Base gravable</div><div className="kpi-value">{fmt(Math.round(base))}</div></div>
          <div className="kpi"><div className="kpi-label">IVA 19% recaudado</div><div className="kpi-value amber">{fmt(Math.round(iva))}</div></div>
          <div className="kpi"><div className="kpi-label">Ventas exentas</div><div className="kpi-value">{fmt(Math.round(exento))}</div></div>
        </div>
      </div>
    );
  }

  if(sub==='caja'){
    // efectivo recibido por sede y por día
    const g={};
    ventas.forEach(v=>{ if(v.pago_efectivo>0){ const o=g[v.sede]||(g[v.sede]={sede:v.sede,efectivo:0,n:0}); o.efectivo+=v.pago_efectivo; o.n++; } });
    const rows=Object.values(g).sort((a,b)=>b.efectivo-a.efectivo);
    const totalEf=rows.reduce((s,r)=>s+r.efectivo,0);
    return (
      <div>
        <div className="kpis"><div className="kpi"><div className="kpi-label">Efectivo recaudado</div><div className="kpi-value green">{fmt(totalEf)}</div></div></div>
        <div className="card" style={{padding:0,overflowX:"auto"}}>
          <table className="tbl">
            <thead><tr><th>Sede</th><th className="num">Ventas en efectivo</th><th className="num">Efectivo recaudado</th></tr></thead>
            <tbody>{rows.map(r=>(
              <tr key={r.sede}><td className="row-name">{r.sede}</td><td className="num">{r.n}</td><td className="num">{fmt(r.efectivo)}</td></tr>
            ))}</tbody>
          </table>
        </div>
      </div>
    );
  }
  return null;
}

const UNIDADES=["g","kg","ml","L","unidad"];
// factor para pasar de "kg equivalente" a la unidad del insumo (g/ml van en milésimas)
const convInsumo=u=>(u==='g'||u==='ml')?1000:1;
// duración legible entre dos fechas (para tiempo de solución de mantenimiento)
const fmtDur=(desde,hasta)=>{ if(!desde||!hasta) return '—'; let ms=new Date(hasta)-new Date(desde); if(ms<0) ms=0; const min=Math.floor(ms/60000); const d=Math.floor(min/1440), h=Math.floor((min%1440)/60), m=min%60; return (d?d+'d ':'')+(h?h+'h ':'')+m+'m'; };

  return (
    <div>

        {[["insumos","Insumos"],["recetas","Recetas"],["producir","Producir"],["historial","Historial"]].map(([k,l])=>(
