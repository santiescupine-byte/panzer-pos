// Modal para crear tareas (se usa en la pestaña Tareas).
function NuevaTareaModal({sedes, emps, quien, defSede, onClose, onCreated, showToast}){
  const sede0=(defSede || (sedes.find(s=>!s.es_bodega)||sedes[0]||{}).nombre) || "";
  const [n,setN]=useState({titulo:"",descripcion:"",prioridad:"normal",fecha_limite:"",modo:"persona",sede:sede0,persona:""});
  const [busy,setBusy]=useState(false);
  const activos=emps.filter(e=>e.activo!==false);                  // cualquier empleado activo (cajero, supervisor, etc.)
  const deSede=s=>activos.filter(e=>(e.sedes||[]).includes(s));    // los de una sede (para el modo "todos")

  const crear=async()=>{
    const titulo=(n.titulo||"").trim();
    if(!titulo){ showToast("Ponle un título a la tarea","err"); return; }
    if(!n.sede){ showToast("Elige la sede","err"); return; }
    let asignados=[];
    if(n.modo==='persona'){
      if(!n.persona){ showToast("Elige a quién se la asignas","err"); return; }
      const e=activos.find(x=>x.nombre===n.persona);
      asignados=[{nombre:n.persona, rol:e?e.rol:null}];
    } else {
      asignados=deSede(n.sede).map(e=>({nombre:e.nombre, rol:e.rol}));
      if(!asignados.length){ showToast("No hay empleados activos en "+n.sede,"err"); return; }
    }
    setBusy(true);
    try{
      await db.crearTareas({titulo, descripcion:(n.descripcion||"").trim(), sede:n.sede, fecha_limite:n.fecha_limite||null, prioridad:n.prioridad, creado_por:quien||null}, asignados);
      showToast(asignados.length>1?("Tarea asignada a "+asignados.length+" personas ✓"):"Tarea creada ✓","ok");
      onCreated&&onCreated();
      onClose();
    }catch(e){ showToast(""+(e.message||e),"err"); } finally{ setBusy(false); }
  };

  return (
    <div className="modal-bg" onClick={()=>!busy&&onClose()}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-t">✅ Nueva tarea</div>
        <label className="label">Título</label>
        <input className="input" autoFocus value={n.titulo} onChange={e=>setN({...n,titulo:e.target.value})} placeholder="Ej. Limpiar trampa de grasa"/>
        <label className="label">Descripción / instrucciones (opcional)</label>
        <input className="input" value={n.descripcion} onChange={e=>setN({...n,descripcion:e.target.value})} placeholder="Detalle de qué hacer…"/>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          <div style={{flex:"1 1 160px"}}>
            <label className="label">Sede</label>
            <select className="select" value={n.sede} onChange={e=>setN({...n,sede:e.target.value})}>
              {sedes.map(s=><option key={s.id} value={s.nombre}>{s.nombre}{s.es_bodega?" (bodega)":""}</option>)}
            </select>
          </div>
          <div style={{flex:"1 1 120px"}}>
            <label className="label">Fecha límite</label>
            <input className="input" type="date" value={n.fecha_limite} onChange={e=>setN({...n,fecha_limite:e.target.value})}/>
          </div>
          <div style={{flex:"1 1 120px"}}>
            <label className="label">Prioridad</label>
            <select className="select" value={n.prioridad} onChange={e=>setN({...n,prioridad:e.target.value})}>
              <option value="alta">Alta</option><option value="normal">Normal</option><option value="baja">Baja</option>
            </select>
          </div>
        </div>
        <label className="label">Asignar a</label>
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          <button className={"btn btn-sm "+(n.modo==='persona'?'btn-amber':'btn-ghost')} onClick={()=>setN({...n,modo:'persona'})}>👤 Una persona</button>
          <button className={"btn btn-sm "+(n.modo==='sede'?'btn-amber':'btn-ghost')} onClick={()=>setN({...n,modo:'sede'})}>👥 Todos los de la sede</button>
        </div>
        {n.modo==='persona'
          ? <select className="select" value={n.persona} onChange={e=>setN({...n,persona:e.target.value})}>
              <option value="">— Elige empleado —</option>
              {activos.map(e=><option key={e.id} value={e.nombre}>{e.nombre} ({e.rol})</option>)}
            </select>
          : <div className="card" style={{marginBottom:12,fontSize:13}}>Se creará una tarea (con su propia casilla) para cada uno de los <b>{deSede(n.sede).length}</b> empleados de <b>{n.sede}</b>: <span className="muted">{deSede(n.sede).map(e=>e.nombre).join(", ")||"(ninguno)"}</span></div>}
        <div className="modal-actions">
          <button className="btn btn-ghost" disabled={busy} onClick={onClose}>Cancelar</button>
          <button className="btn btn-amber" disabled={busy} onClick={crear}>{busy?"Creando…":"Crear tarea"}</button>
        </div>
      </div>
    </div>
  );
}

function Tareas({showToast, quien, rol, onTareasChange}){
  const [sedes,setSedes]=useState([]);
  const [emps,setEmps]=useState([]);
  const [sedeF,setSedeF]=useState("");        // filtro de sede ("" = todas)
  const [asigF,setAsigF]=useState("");        // filtro por persona ("" = todos)
  const [verHechas,setVerHechas]=useState(false);
  const [tareas,setTareas]=useState(null);
  const [nueva,setNueva]=useState(false);     // abre el modal de creación

  useEffect(()=>{ Promise.all([db.listSedes(),db.listEmpleados()]).then(([s,e])=>{ setSedes(s); setEmps(e); }).catch(()=>{}); },[]);
  const load=async()=>{
    try{ const t=await db.listTareas({sede:sedeF||undefined, asignado:asigF||undefined}); setTareas(t); }
    catch(e){ showToast(""+(e.message||e),"err"); setTareas([]); }
  };
  useEffect(()=>{ setTareas(null); load(); },[sedeF,asigF]);

  const hoy=fLocalDia(new Date());
  const all=tareas||[];
  const pend=all.filter(t=>t.estado!=='hecha');
  const hechas=all.filter(t=>t.estado==='hecha');
  const vencidas=pend.filter(t=>t.fecha_limite && t.fecha_limite<hoy);
  const deHoy=pend.filter(t=>t.fecha_limite===hoy);
  const prox=pend.filter(t=>!t.fecha_limite || t.fecha_limite>hoy);
  const total=all.length;
  const cumpl=total?Math.round(hechas.length/total*100):0;

  // personas que aparecen en el filtro por persona
  const personasFiltro=[...new Set(all.map(t=>t.asignado_a))].sort();

  const toggle=async t=>{
    const nuevo=t.estado!=='hecha';
    setTareas(prev=>prev.map(x=>x.id===t.id?{...x,estado:nuevo?'hecha':'pendiente',completado_at:nuevo?new Date().toISOString():null}:x));
    try{ await db.marcarTarea(t.id,nuevo); onTareasChange&&onTareasChange(); }
    catch(e){ showToast(""+(e.message||e),"err"); load(); }
  };
  const borrar=async t=>{
    if(t.grupo_id){
      if(!confirm("Esta tarea fue asignada a varias personas.\n\nAceptar = borrar la del grupo COMPLETO.\nCancelar = no borrar.")) return;
      try{ await db.deleteGrupoTarea(t.grupo_id); load(); showToast("Tarea (grupo) eliminada","ok"); }catch(e){ showToast(""+(e.message||e),"err"); }
    } else {
      if(!confirm("¿Borrar la tarea \""+t.titulo+"\" de "+t.asignado_a+"?")) return;
      try{ await db.deleteTarea(t.id); load(); showToast("Tarea eliminada","ok"); }catch(e){ showToast(""+(e.message||e),"err"); }
    }
  };

  const abrirNueva=()=>setNueva(true);

  const prioPill=p=> p==='alta'?<span className="pill pill-off" style={{marginLeft:6}}>Alta</span> : p==='baja'?<span className="pill" style={{marginLeft:6,background:"var(--sf3)",color:"var(--td)"}}>Baja</span> : null;
  const dueLabel=t=>{
    if(t.estado==='hecha') return <span style={{color:"var(--green)"}}>✅ Hecha{t.completado_at?(" · "+fLocalDia(t.completado_at)):""}</span>;
    if(!t.fecha_limite) return <span className="muted">Sin fecha</span>;
    if(t.fecha_limite<hoy) return <span style={{color:"var(--red)",fontWeight:700}}>🔴 Vencida · {t.fecha_limite}</span>;
    if(t.fecha_limite===hoy) return <span style={{color:"var(--amber)",fontWeight:700}}>🟡 Para hoy</span>;
    return <span className="muted">⚪ {t.fecha_limite}</span>;
  };

  const Fila=({t})=>(
    <div className="card" style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:8,padding:"12px 14px",opacity:t.estado==='hecha'?0.6:1}}>
      <div onClick={()=>toggle(t)} title="Marcar hecho/pendiente" style={{cursor:"pointer",width:24,height:24,borderRadius:7,flexShrink:0,marginTop:1,border:"2px solid "+(t.estado==='hecha'?"var(--green)":"var(--bd2)"),background:t.estado==='hecha'?"var(--green)":"transparent",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:900}}>{t.estado==='hecha'?"✓":""}</div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontWeight:700,color:"var(--tb)",textDecoration:t.estado==='hecha'?"line-through":"none"}}>{t.titulo}{prioPill(t.prioridad)}</div>
        {t.descripcion && <div className="muted" style={{fontSize:13,marginTop:2}}>{t.descripcion}</div>}
        <div className="muted" style={{fontSize:12,marginTop:4,display:"flex",gap:10,flexWrap:"wrap"}}>
          <span>👤 {t.asignado_a}</span>
          {!sedeF && <span>🏬 {t.sede}</span>}
          {t.grupo_id && <span title="Asignada a varias personas">👥 grupo</span>}
          <span>{dueLabel(t)}</span>
          {t.creado_por && <span>· creó {t.creado_por}</span>}
        </div>
      </div>
      <button className="btn btn-ghost btn-sm" style={{flexShrink:0}} onClick={()=>borrar(t)} title="Borrar">✕</button>
    </div>
  );

  return (
    <div>
      <div className="toolbar">
        <div className="sec-title" style={{marginRight:"auto"}}>Tareas</div>
        <button className="btn btn-amber btn-sm" onClick={abrirNueva}>＋ Nueva tarea</button>
      </div>

      <div className="cards" style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:14}}>
        <div className="card" style={{flex:"1 1 140px"}}><div className="muted">Pendientes</div><div style={{fontSize:24,fontWeight:800}}>{pend.length}</div></div>
        <div className="card" style={{flex:"1 1 140px"}}><div className="muted">Vencidas</div><div style={{fontSize:24,fontWeight:800,color:vencidas.length?"var(--red)":"var(--green)"}}>{vencidas.length}</div></div>
        <div className="card" style={{flex:"1 1 140px"}}><div className="muted">Para hoy</div><div style={{fontSize:24,fontWeight:800,color:deHoy.length?"var(--amber)":"var(--t)"}}>{deHoy.length}</div></div>
        <div className="card" style={{flex:"1 1 140px"}}><div className="muted">Cumplimiento</div><div style={{fontSize:24,fontWeight:800,color:cumpl>=80?"var(--green)":cumpl>=50?"var(--amber)":"var(--red)"}}>{cumpl}%</div></div>
      </div>

      <div className="toolbar" style={{gap:8,flexWrap:"wrap"}}>
        <select className="select" style={{maxWidth:220,margin:0}} value={sedeF} onChange={e=>setSedeF(e.target.value)}>
          <option value="">🏬 Todas las sedes</option>
          {sedes.map(s=><option key={s.id} value={s.nombre}>{s.nombre}{s.es_bodega?" (bodega)":""}</option>)}
        </select>
        <select className="select" style={{maxWidth:200,margin:0}} value={asigF} onChange={e=>setAsigF(e.target.value)}>
          <option value="">👤 Todos</option>
          {personasFiltro.map(p=><option key={p} value={p}>{p}</option>)}
        </select>
      </div>

      {tareas===null ? <div className="empty">Cargando…</div> : (
        <div>
          {vencidas.length>0 && <div className="sec-title" style={{margin:"14px 0 8px",color:"var(--red)"}}>🔴 Vencidas ({vencidas.length})</div>}
          {vencidas.map(t=><Fila key={t.id} t={t}/>)}

          {deHoy.length>0 && <div className="sec-title" style={{margin:"14px 0 8px",color:"var(--amber)"}}>🟡 Para hoy ({deHoy.length})</div>}
          {deHoy.map(t=><Fila key={t.id} t={t}/>)}

          {prox.length>0 && <div className="sec-title" style={{margin:"14px 0 8px"}}>⚪ Próximas / sin fecha ({prox.length})</div>}
          {prox.map(t=><Fila key={t.id} t={t}/>)}

          {pend.length===0 && <div className="card" style={{textAlign:"center",color:"var(--green)",fontWeight:700}}>✓ No hay tareas pendientes 🎉</div>}

          <div className="sec-title" style={{margin:"18px 0 8px",cursor:"pointer"}} onClick={()=>setVerHechas(v=>!v)}>{verHechas?"▾":"▸"} Hechas ({hechas.length})</div>
          {verHechas && hechas.map(t=><Fila key={t.id} t={t}/>)}
        </div>
      )}

      {nueva && <NuevaTareaModal sedes={sedes} emps={emps} quien={quien} defSede={sedeF} onClose={()=>setNueva(false)} onCreated={()=>{load(); onTareasChange&&onTareasChange();}} showToast={showToast}/>}
    </div>
  );
}

// SECCIÓN: MEMBRESÍAS VIP (solo lectura) — lee del backend VIP (Sheets)
// ============================================================
function Membresias({showToast, admin}){
  const [clientes,setClientes]=useState(null);
  const [q,setQ]=useState("");
  const [sel,setSel]=useState(null);     // {cliente, historial} en el modal
  const [cargandoDet,setCargandoDet]=useState(false);
  const [accionM,setAccionM]=useState(null);  // 'recargar' | 'descontar' (ajuste manual)
  const [montoM,setMontoM]=useState("");
  const [busyM,setBusyM]=useState(false);
  const [vista,setVista]=useState('clientes');   // 'clientes' | 'cupones' | 'bitacora'
  const [edC,setEdC]=useState(null);             // edición de ficha del cliente
  const [cupones,setCupones]=useState(null);
  const [edCup,setEdCup]=useState(null);         // cupón en edición
  const [busyC,setBusyC]=useState(false);
  const [bitacora,setBitacora]=useState(null);   // últimas transacciones
  const [mes,setMes]=useState(()=>{ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); });
  const [movs,setMovs]=useState(null);           // transacciones del mes (movimientos por sede)
  const [detSede,setDetSede]=useState(null);     // sede expandida en el detalle
  const [prodList,setProdList]=useState([]);     // productos (para ligar cupón → producto)
  useEffect(()=>{ if(!DEMO_MODE && sb){ sb.from('productos').select('id,nombre,categoria').eq('activo',true).order('nombre').then(({data})=>setProdList(data||[])); } },[]);

  useEffect(()=>{
    vipApi({accion:'listar_clientes'}).then(r=>{
      if(r&&r.ok) setClientes(r.clientes||[]); else { setClientes([]); if(r&&r.error) showToast('VIP: '+r.error,'err'); }
    }).catch(()=>setClientes([]));
  },[]);

  const cargarCupones=()=>vipListCupones().then(setCupones).catch(()=>setCupones([]));
  const cargarBitacora=()=>{ setBitacora(null); vipUltimasTx(50).then(setBitacora).catch(()=>setBitacora([])); };
  const cargarMovs=()=>{ setMovs(null); const [y,m]=mes.split('-').map(Number); const desde=new Date(y,m-1,1).toISOString(); const hasta=new Date(y,m,1).toISOString(); vipMovimientosRango(desde,hasta).then(setMovs).catch(()=>setMovs([])); };
  useEffect(()=>{ if(vista==='cupones' && cupones===null) cargarCupones(); if(vista==='bitacora') cargarBitacora(); if(vista==='movimientos') cargarMovs(); },[vista]);
  useEffect(()=>{ if(vista==='movimientos') cargarMovs(); },[mes]);

  // editar ficha del cliente
  const guardarCliente=async()=>{
    if(!edC) return;
    const f={nombre:(edC.nombre||'').trim(), telefono:(edC.telefono||'').toString().trim(), membresia:edC.membresia, activo:!!edC.activo};
    if(!f.nombre){ showToast("El nombre es obligatorio","err"); return; }
    setBusyM(true); const r=await vipUpdateCliente(sel.cliente.id, f); setBusyM(false);
    if(!r.ok){ showToast("Error: "+r.error,"err"); return; }
    showToast("Cliente actualizado","ok");
    setSel(s=>({...s, cliente:{...s.cliente, ...f}}));
    setClientes(cs=>cs.map(c=>c.id===sel.cliente.id?{...c,nombre:f.nombre,telefono:f.telefono,membresia:f.membresia}:c));
    setEdC(null);
  };

  // CRUD de cupones
  const nuevoCupon=()=>{
    const nums=(cupones||[]).map(c=>parseInt((c.id_cupon||'').replace(/\D/g,''))||0);
    const next='C'+String((Math.max(0,...nums)+1)).padStart(3,'0');
    setEdCup({id_cupon:next,nombre:'',descripcion:'',emoji:'🎁',membresia:'Todos',activo:true,producto_id:'',cantidad:1,_nuevo:true});
  };
  const guardarCupon=async()=>{
    if(!(edCup.nombre||'').trim()){ showToast("El nombre del cupón es obligatorio","err"); return; }
    setBusyC(true); const r=await vipSaveCupon(edCup); setBusyC(false);
    if(!r.ok){ showToast("Error: "+r.error,"err"); return; }
    showToast("Cupón guardado","ok"); setEdCup(null); cargarCupones();
  };
  const toggleCupon=async(c)=>{ const r=await vipSaveCupon({...c,activo:!c.activo}); if(!r.ok){showToast("Error: "+r.error,"err");return;} cargarCupones(); };
  const borrarCupon=async(c)=>{ if(!confirm('¿Borrar el cupón "'+c.nombre+'"?\n(No borra el historial de canjes ya hechos.)')) return; const r=await vipDeleteCupon(c.id_cupon); if(!r.ok){showToast("Error: "+r.error,"err");return;} showToast("Cupón borrado","ok"); cargarCupones(); };

  const verFicha=async(c)=>{
    setSel({cliente:c,historial:null}); setCargandoDet(true);
    try{
      const [det,hist]=await Promise.all([
        vipApi({accion:'consultar_cliente',id_vip:c.id}),
        vipApi({accion:'historial_cliente',id_vip:c.id})
      ]);
      setSel({ cliente: (det&&det.ok&&det.cliente)?det.cliente:c, historial: (hist&&hist.ok)?(hist.transacciones||[]):[] });
    }catch(e){ setSel(s=>s?{...s,historial:[]}:null); }
    setCargandoDet(false);
  };

  const aplicarAjuste=async()=>{
    const m=Math.round(Number(montoM)||0); if(m<=0){ showToast("Monto inválido","err"); return; }
    setBusyM(true);
    const req = accionM==='recargar'
      ? {accion:'recargar_saldo', id_vip:sel.cliente.id, monto:m, operador:admin||'Admin', sede:'Admin'}
      : {accion:'descontar_saldo', id_vip:sel.cliente.id, monto:m, tokens:0, operador:admin||'Admin', sede:'Admin', metodo:'AjusteAdmin'};
    const r=await vipApi(req); setBusyM(false);
    if(!r||!r.ok){ showToast("Error: "+((r&&r.error)||"no se pudo"),"err"); return; }
    const nuevo = (r.saldo_nuevo!=null)? Number(r.saldo_nuevo) : Number(sel.cliente.saldo);
    showToast((accionM==='recargar'?"Recargado ":"Descontado ")+fmt(m)+" · saldo "+fmt(nuevo),"ok");
    setSel(s=>({...s, cliente:{...s.cliente, saldo:nuevo}}));
    setClientes(cs=>cs.map(c=>c.id===sel.cliente.id?{...c,saldo:nuevo}:c));
    setAccionM(null); setMontoM("");
    vipApi({accion:'historial_cliente',id_vip:sel.cliente.id}).then(h=>{ if(h&&h.ok) setSel(s=>s?{...s,historial:h.transacciones||[]}:null); });
  };

  if(clientes===null) return <div className="empty">Cargando membresías…</div>;

  const filtro=q.trim().toLowerCase();
  const filtroDig=filtro.replace(/\D/g,'');
  const rows=clientes.filter(c=>{
    if(!filtro) return true;
    const tel=String(c.telefono||'').replace(/\D/g,'');
    return (c.nombre||'').toLowerCase().includes(filtro) || (c.id||'').toLowerCase().includes(filtro) || (filtroDig && tel.includes(filtroDig));
  });
  const tot=clientes.length;
  const VIP_FACTOR={Standard:0.8, Silver:0.7, Gold:2/3};  // dinero real = saldo × (precio/saldo del paquete)
  const porTipo={Standard:0,Silver:0,Gold:0}; let saldoTot=0, realTot=0;
  clientes.forEach(c=>{ if(porTipo[c.membresia]!==undefined) porTipo[c.membresia]++; const s=Number(c.saldo)||0; saldoTot+=s; realTot+=s*(VIP_FACTOR[c.membresia]??0.8); });

  return (
    <div>
      <div className="toolbar">
        <div className="sec-title" style={{marginRight:"auto"}}>Membresías VIP <span className="muted">({tot})</span></div>
        <div style={{display:"flex",gap:6,background:"var(--sf2)",borderRadius:10,padding:4}}>
          <button className={"btn btn-sm "+(vista==='clientes'?'btn-amber':'btn-ghost')} onClick={()=>setVista('clientes')}>👥 Clientes</button>
          <button className={"btn btn-sm "+(vista==='cupones'?'btn-amber':'btn-ghost')} onClick={()=>setVista('cupones')}>🎁 Cupones</button>
          <button className={"btn btn-sm "+(vista==='bitacora'?'btn-amber':'btn-ghost')} onClick={()=>setVista('bitacora')}>📋 Bitácora</button>
          <button className={"btn btn-sm "+(vista==='movimientos'?'btn-amber':'btn-ghost')} onClick={()=>setVista('movimientos')}>📍 Por sede</button>
        </div>
      </div>

      {vista==='clientes' && (<div>
      <div className="cards" style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:14}}>
        <div className="card" style={{flex:"1 1 130px"}}><div className="muted">Miembros activos</div><div style={{fontSize:24,fontWeight:800}}>{tot}</div></div>
        <div className="card" style={{flex:"1 1 130px"}}><div className="muted">⭐ Standard / 🥈 Silver / 🥇 Gold</div><div style={{fontSize:20,fontWeight:800}}>{porTipo.Standard} / {porTipo.Silver} / {porTipo.Gold}</div></div>
        <div className="card" style={{flex:"1 1 130px"}}><div className="muted">Saldo total en circulación</div><div style={{fontSize:22,fontWeight:800,color:"var(--amber)"}}>{fmt(saldoTot)}</div></div>
        <div className="card" style={{flex:"1 1 130px"}}><div className="muted">💵 Dinero real prepagado <span title="Saldo × factor por membresía (Gold 0,67 · Silver 0,70 · Standard 0,80). Es la plata real que los clientes te pagaron y aún no consumen.">ⓘ</span></div><div style={{fontSize:22,fontWeight:800,color:"var(--green)"}}>{fmt(Math.round(realTot))}</div></div>
      </div>

      <div className="toolbar"><input className="input" style={{maxWidth:320}} placeholder="Buscar por nombre, código VIP o teléfono…" value={q} onChange={e=>setQ(e.target.value)}/></div>

      <div className="card" style={{padding:0,overflowX:"auto"}}>
        <table className="tbl">
          <thead><tr><th>Código</th><th>Cliente</th><th>Teléfono</th><th>Membresía</th><th className="num">Saldo</th><th></th></tr></thead>
          <tbody>
            {rows.length===0 && <tr><td colSpan="6"><div className="empty">{tot===0?"No se pudieron cargar las membresías (revisa la conexión).":"Sin resultados."}</div></td></tr>}
            {rows.slice(0,300).map(c=>(
              <tr key={c.id} style={{cursor:"pointer"}} onClick={()=>verFicha(c)}>
                <td className="muted">{c.id}</td>
                <td className="row-name">{c.nombre}</td>
                <td className="muted">{c.telefono||"—"}</td>
                <td><span className="pill pill-prod">{c.membresia}</span></td>
                <td className="num"><b>{fmt(c.saldo)}</b></td>
                <td><button className="btn btn-ghost btn-sm" onClick={e=>{e.stopPropagation();verFicha(c);}}>Ver</button></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {rows.length>300 && <div className="muted" style={{marginTop:8}}>Mostrando 300 de {rows.length}. Usa el buscador para filtrar.</div>}
      </div>)}

      {/* ===== CUPONES ===== */}
      {vista==='cupones' && (
        <div>
          <div className="toolbar">
            <div className="muted" style={{marginRight:"auto"}}>Cupones que ven los clientes según su membresía.</div>
            <button className="btn btn-amber btn-sm" onClick={nuevoCupon}>＋ Nuevo cupón</button>
          </div>
          {cupones===null ? <div className="empty">Cargando cupones…</div> : (
            <div className="card" style={{padding:0,overflowX:"auto"}}>
              <table className="tbl">
                <thead><tr><th>Código</th><th>Cupón</th><th>Aplica a</th><th>Estado</th><th></th></tr></thead>
                <tbody>
                  {cupones.length===0 && <tr><td colSpan="5"><div className="empty">No hay cupones. Crea el primero.</div></td></tr>}
                  {cupones.map(c=>(
                    <tr key={c.id_cupon}>
                      <td className="muted">{c.id_cupon}</td>
                      <td className="row-name">{c.emoji} {c.nombre}<div className="muted" style={{fontSize:12}}>{c.descripcion}</div></td>
                      <td><span className="pill pill-prod">{c.membresia}</span></td>
                      <td>{c.activo?<span className="pill pill-prod">Activo</span>:<span className="pill pill-off">Inactivo</span>}</td>
                      <td style={{whiteSpace:"nowrap"}}>
                        <button className="btn btn-ghost btn-sm" onClick={()=>setEdCup({...c})}>Editar</button>
                        <button className="btn btn-ghost btn-sm" onClick={()=>toggleCupon(c)}>{c.activo?"Desactivar":"Activar"}</button>
                        <button className="btn btn-ghost btn-sm" style={{color:"var(--red)"}} onClick={()=>borrarCupon(c)}>🗑</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}

      {/* ===== BITÁCORA (últimas 50 transacciones) ===== */}
      {vista==='bitacora' && (
        <div>
          <div className="toolbar">
            <div className="muted" style={{marginRight:"auto"}}>Últimas 50 transacciones de todos los clientes (registros, recargas, canjes, cupones).</div>
            <button className="btn btn-ghost btn-sm" onClick={cargarBitacora}>🔄 Actualizar</button>
          </div>
          {bitacora===null ? <div className="empty">Cargando bitácora…</div> : (
            <div className="card" style={{padding:0,overflowX:"auto"}}>
              <table className="tbl">
                <thead><tr><th>Fecha</th><th>Cliente</th><th>Tipo</th><th className="num">Monto</th><th className="num">Tokens</th><th>Sede</th><th>Operador</th></tr></thead>
                <tbody>
                  {bitacora.length===0 && <tr><td colSpan="7"><div className="empty">Sin transacciones.</div></td></tr>}
                  {bitacora.map((t,i)=>{ const c=Number(t.monto)||0; return (
                    <tr key={i}>
                      <td className="muted" style={{whiteSpace:"nowrap"}}>{fLocalDia(t.created_at)} {fLocalHora(t.created_at)}</td>
                      <td className="row-name">{t.nombre||"—"}<div className="muted" style={{fontSize:11}}>{t.id_vip}</div></td>
                      <td>{t.tipo}</td>
                      <td className="num" style={{color:c<0?"var(--red)":"var(--green)",fontWeight:700}}>{fmt(c)}</td>
                      <td className="num">{Number(t.tokens)||0}</td>
                      <td className="muted">{t.sede}</td>
                      <td className="muted">{t.operador||"—"}</td>
                    </tr>
                  );})}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}

      {/* ===== MOVIMIENTOS POR SEDE ===== */}
      {vista==='movimientos' && (
        <div>
          <div className="toolbar">
            <div className="muted" style={{marginRight:"auto"}}>Movimientos VIP por sede en el mes: nuevas membresías, recargas, canjes y cupones. Toca una sede para el detalle.</div>
            <input type="month" className="input" style={{maxWidth:170,margin:0}} value={mes} onChange={e=>setMes(e.target.value)}/>
            <button className="btn btn-ghost btn-sm" onClick={cargarMovs}>🔄</button>
          </div>
          {movs===null ? <div className="empty">Cargando movimientos…</div> : (()=>{
            const porSede={};
            movs.forEach(t=>{ const s=(t.sede||'(sin sede)').trim(); const o=porSede[s]||(porSede[s]={sede:s,nuevas:0,recargas:0,montoRec:0,canjes:0,tokens:0,cupones:0}); const tk=Number(t.tokens)||0, mo=Number(t.monto)||0; if(t.tipo==='Recarga Inicial'){o.nuevas++;o.montoRec+=mo;} else if(t.tipo==='Recarga'){o.recargas++;o.montoRec+=mo;} else if(t.tipo==='Canje'){o.canjes++;o.tokens+=tk;} else if(t.tipo==='Cupon'){o.cupones++;} });
            const filas=Object.values(porSede).sort((a,b)=>(b.nuevas+b.recargas+b.canjes+b.cupones)-(a.nuevas+a.recargas+a.canjes+a.cupones)||a.sede.localeCompare(b.sede));
            const T=filas.reduce((a,r)=>({nuevas:a.nuevas+r.nuevas,recargas:a.recargas+r.recargas,montoRec:a.montoRec+r.montoRec,canjes:a.canjes+r.canjes,tokens:a.tokens+r.tokens,cupones:a.cupones+r.cupones}),{nuevas:0,recargas:0,montoRec:0,canjes:0,tokens:0,cupones:0});
            if(!filas.length) return <div className="empty">No hay movimientos VIP en este mes.</div>;
            return (
              <div className="card" style={{padding:0,overflowX:"auto"}}>
                <table className="tbl">
                  <thead><tr><th>Sede</th><th className="num">Nuevas memb.</th><th className="num">Recargas</th><th className="num">$ Recargado</th><th className="num">Canjes</th><th className="num">Tokens</th><th className="num">Cupones</th><th></th></tr></thead>
                  <tbody>
                    {filas.map(r=>(
                      <tr key={r.sede} style={{cursor:"pointer"}} onClick={()=>setDetSede(r.sede)}>
                        <td className="row-name">{r.sede}</td>
                        <td className="num">{r.nuevas}</td>
                        <td className="num">{r.recargas}</td>
                        <td className="num">{fmt(r.montoRec)}</td>
                        <td className="num">{r.canjes}</td>
                        <td className="num" style={{fontWeight:700,color:"var(--amber)"}}>{r.tokens}</td>
                        <td className="num">{r.cupones}</td>
                        <td><button className="btn btn-ghost btn-sm" onClick={e=>{e.stopPropagation();setDetSede(r.sede);}}>Ver</button></td>
                      </tr>
                    ))}
                    <tr style={{fontWeight:800,borderTop:"2px solid var(--bd2)"}}>
                      <td>TOTAL</td><td className="num">{T.nuevas}</td><td className="num">{T.recargas}</td><td className="num">{fmt(T.montoRec)}</td><td className="num">{T.canjes}</td><td className="num" style={{color:"var(--amber)"}}>{T.tokens}</td><td className="num">{T.cupones}</td><td></td>
                    </tr>
                  </tbody>
                </table>
              </div>
            );
          })()}
        </div>
      )}

      {/* detalle de movimientos de una sede */}
      {detSede && (()=>{
        const lst=(movs||[]).filter(t=>(t.sede||'(sin sede)').trim()===detSede).sort((a,b)=> a.created_at<b.created_at?1:-1);
        return (
          <div className="modal-bg" onClick={()=>setDetSede(null)}>
            <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:640}}>
              <div className="modal-t">📍 {detSede} — {mes}</div>
              <div className="card" style={{padding:0,overflowX:"auto",maxHeight:"60vh",overflowY:"auto"}}>
                <table className="tbl">
                  <thead><tr><th>Fecha</th><th>Cliente</th><th>Tipo</th><th className="num">Monto</th><th className="num">Tokens</th></tr></thead>
                  <tbody>
                    {lst.length===0 && <tr><td colSpan="5"><div className="empty">Sin movimientos.</div></td></tr>}
                    {lst.map((t,i)=>(
                      <tr key={i}>
                        <td className="muted" style={{whiteSpace:"nowrap"}}>{fLocalDia(t.created_at)} {fLocalHora(t.created_at)}</td>
                        <td className="row-name">{t.nombre||"—"}<div className="muted" style={{fontSize:11}}>{t.id_vip}</div></td>
                        <td>{t.tipo}</td>
                        <td className="num">{fmt(Number(t.monto)||0)}</td>
                        <td className="num">{Number(t.tokens)||0}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div className="modal-actions"><button className="btn btn-ghost" onClick={()=>setDetSede(null)}>Cerrar</button></div>
            </div>
          </div>
        );
      })()}

      {/* Editor de cupón */}
      {edCup && (
        <div className="modal-bg" onClick={()=>!busyC&&setEdCup(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-t">{edCup._nuevo?"Nuevo cupón":"Editar cupón"} <span className="muted" style={{fontSize:13,fontWeight:400}}>{edCup.id_cupon}</span></div>
            <label className="label">Emoji</label>
            <input className="input" style={{maxWidth:90,fontSize:18,textAlign:"center"}} value={edCup.emoji} onChange={e=>setEdCup({...edCup,emoji:e.target.value})}/>
            <label className="label">Nombre</label>
            <input className="input" value={edCup.nombre} onChange={e=>setEdCup({...edCup,nombre:e.target.value})} placeholder="ej. 1 Token Gratis"/>
            <label className="label">Descripción</label>
            <input className="input" value={edCup.descripcion} onChange={e=>setEdCup({...edCup,descripcion:e.target.value})} placeholder="Detalle del beneficio"/>
            <label className="label">Aplica a la membresía</label>
            <select className="select" value={edCup.membresia} onChange={e=>setEdCup({...edCup,membresia:e.target.value})}>
              {["Todos","Standard","Silver","Gold"].map(m=><option key={m} value={m}>{m}</option>)}
            </select>

            <div style={{borderTop:"1px solid var(--bd)",margin:"12px 0 8px",paddingTop:10}}>
              <label className="label">Producto que entrega (opcional — descuenta de inventario al canjear)</label>
              <select className="select" value={edCup.producto_id||""} onChange={e=>setEdCup({...edCup,producto_id:e.target.value})}>
                <option value="">— Ninguno (cupón sin producto: descuento, token, etc.) —</option>
                {prodList.map(p=><option key={p.id} value={p.id}>{p.nombre}{p.categoria?(" · "+p.categoria):""}</option>)}
              </select>
              {edCup.producto_id && <div style={{display:"flex",alignItems:"center",gap:8,marginTop:6}}>
                <label className="label" style={{margin:0}}>Cantidad a descontar</label>
                <input className="input" style={{margin:0,width:90}} type="number" min="1" value={edCup.cantidad||1} onChange={e=>setEdCup({...edCup,cantidad:e.target.value})}/>
              </div>}
              {edCup.producto_id && <div className="muted" style={{fontSize:12,marginTop:6}}>Al canjearlo, el POS descontará {edCup.cantidad||1} unidad(es) de este producto del inventario de la sede del cajero.</div>}
            </div>

            <label className="check" style={{marginTop:6}}><input type="checkbox" checked={!!edCup.activo} onChange={e=>setEdCup({...edCup,activo:e.target.checked})}/> Activo (visible para los clientes)</label>
            <div className="modal-actions">
              <button className="btn btn-ghost" disabled={busyC} onClick={()=>setEdCup(null)}>Cancelar</button>
              <button className="btn btn-amber" disabled={busyC} onClick={guardarCupon}>{busyC?"Guardando…":"Guardar"}</button>
            </div>
          </div>
        </div>
      )}

      {sel && (
        <div className="modal-bg" onClick={()=>{setSel(null);setEdC(null);}}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-t">{sel.cliente.nombre} {sel.cliente.activo===false && <span className="pill pill-off" style={{fontSize:10}}>INACTIVO</span>}</div>
            <div className="muted" style={{marginBottom:8}}>Código {sel.cliente.id} · {sel.cliente.membresia}{sel.cliente.telefono?(" · 📞 "+sel.cliente.telefono):""}</div>
            {!edC ? (
              <button className="btn btn-ghost btn-sm" style={{marginBottom:8}} onClick={()=>setEdC({nombre:sel.cliente.nombre,telefono:sel.cliente.telefono||'',membresia:sel.cliente.membresia,activo:sel.cliente.activo!==false})}>✏️ Editar datos</button>
            ) : (
              <div className="card" style={{marginBottom:10}}>
                <label className="label">Nombre</label>
                <input className="input" value={edC.nombre} onChange={e=>setEdC({...edC,nombre:e.target.value})}/>
                <label className="label">Teléfono</label>
                <input className="input" value={edC.telefono} onChange={e=>setEdC({...edC,telefono:e.target.value})}/>
                <label className="label">Membresía</label>
                <select className="select" value={edC.membresia} onChange={e=>setEdC({...edC,membresia:e.target.value})}>{["Standard","Silver","Gold"].map(m=><option key={m} value={m}>{m}</option>)}</select>
                <label className="check" style={{marginTop:8}}><input type="checkbox" checked={!!edC.activo} onChange={e=>setEdC({...edC,activo:e.target.checked})}/> Activo</label>
                <div style={{display:"flex",gap:8,marginTop:10}}>
                  <button className="btn btn-amber btn-sm" disabled={busyM} onClick={guardarCliente}>{busyM?"…":"Guardar cambios"}</button>
                  <button className="btn btn-ghost btn-sm" disabled={busyM} onClick={()=>setEdC(null)}>Cancelar</button>
                </div>
              </div>
            )}
            <div className="result-row" style={{borderTop:"1px solid var(--bd)"}}><span className="result-label" style={{fontWeight:800}}>Saldo</span><span className="result-value amber" style={{fontSize:18}}>{fmt(sel.cliente.saldo)}</span></div>
            <div className="sec-title" style={{fontSize:14,margin:"14px 0 6px"}}>Últimos movimientos</div>
            <div className="card" style={{padding:0,overflowX:"auto",maxHeight:"40vh",overflowY:"auto"}}>
              <table className="tbl">
                <thead><tr><th>Fecha</th><th>Tipo</th><th className="num">Monto</th><th className="num">Tokens</th><th>Sede</th></tr></thead>
                <tbody>
                  {cargandoDet && <tr><td colSpan="5"><div className="empty">Cargando…</div></td></tr>}
                  {!cargandoDet && sel.historial && sel.historial.length===0 && <tr><td colSpan="5"><div className="empty">Sin movimientos.</div></td></tr>}
                  {!cargandoDet && (sel.historial||[]).map((t,i)=>(
                    <tr key={i}>
                      <td className="muted">{fLocalDia(t.fecha)} {fLocalHora(t.fecha)}</td>
                      <td>{t.tipo}</td>
                      <td className="num" style={{color:Number(t.monto)<0?"var(--red)":"var(--green)"}}>{fmt(t.monto)}</td>
                      <td className="num">{t.tokens||0}</td>
                      <td className="muted">{t.sede}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            {/* Ajuste manual de saldo (recargar / descontar) */}
            <div style={{marginTop:12,borderTop:"1px solid var(--bd)",paddingTop:10}}>
              {!accionM ? (
                <div style={{display:"flex",gap:8}}>
                  <button className="btn btn-amber btn-sm" onClick={()=>{setAccionM('recargar');setMontoM('');}}>🔋 Recargar saldo</button>
                  <button className="btn btn-ghost btn-sm" onClick={()=>{setAccionM('descontar');setMontoM('');}}>➖ Descontar saldo</button>
                </div>
              ) : (
                <div>
                  <label className="label">{accionM==='recargar'?'Monto a recargar':'Monto a descontar'} (manual)</label>
                  <div style={{display:"flex",gap:8}}>
                    <input className="input" type="number" autoFocus value={montoM} onChange={e=>setMontoM(e.target.value)} placeholder="$" style={{flex:1}}/>
                    <button className="btn btn-amber" disabled={busyM} onClick={aplicarAjuste}>{busyM?"…":(accionM==='recargar'?"Recargar":"Descontar")}</button>
                    <button className="btn btn-ghost" disabled={busyM} onClick={()=>{setAccionM(null);setMontoM('');}}>Cancelar</button>
                  </div>
                  <div className="muted" style={{fontSize:11,marginTop:4}}>Queda registrado como movimiento a tu nombre ({admin||'Admin'}).</div>
                </div>
              )}
            </div>
            <div className="modal-actions"><button className="btn btn-ghost" onClick={()=>{setSel(null);setAccionM(null);setEdC(null);}}>Cerrar</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

// ============================================================
// SECCIÓN: REMISIONES (venta al por mayor Kemilabo → franquicias)
// ============================================================
function Remisiones({showToast, admin}){
  const [sedes,setSedes]=useState([]);
  const [prods,setProds]=useState([]);          // controla_stock (con precio del catálogo)
  const [bodegaStock,setBodegaStock]=useState({});
  const [remisiones,setRemisiones]=useState(null);
  const [nueva,setNueva]=useState(false);
  const [det,setDet]=useState(null);
  // formulario
  const [destino,setDestino]=useState("");
  const [q,setQ]=useState("");
  const [cant,setCant]=useState({});
  const [precio,setPrecio]=useState({});
  const [nota,setNota]=useState("");
  const [busy,setBusy]=useState(false);

  const bodega = sedes.find(s=>s.es_bodega);
  const origen = bodega ? bodega.nombre : 'Kemilabo';
  const load=()=>db.listRemisiones().then(setRemisiones).catch(()=>setRemisiones([]));
  useEffect(()=>{
    db.listSedes().then(setSedes).catch(()=>{});
    db.listProductos().then(ps=>setProds((ps||[]).filter(p=>p.controla_stock))).catch(()=>{});
    load();
  },[]);

  const abrirNueva=async()=>{
    setDestino(""); setCant({}); setPrecio({}); setNota(""); setQ("");
    if(bodega){ try{ const inv=await db.getInventario(bodega.nombre); const m={}; inv.forEach(r=>m[r.id]=r.stock); setBodegaStock(m); }catch(e){} }
    setNueva(true);
  };
  const setC=(id,v)=>setCant(prev=>({...prev,[id]:v.replace(/[^0-9]/g,"")}));
  const setP=(id,v)=>setPrecio(prev=>({...prev,[id]:v.replace(/[^0-9]/g,"")}));
  const precioDe=p=> (precio[p.id]!==undefined ? Number(precio[p.id]) : Number(p.precio))||0;
  const itemsForm=prods.filter(p=>Number(cant[p.id])>0).map(p=>({producto_id:p.id,nombre:p.nombre,cantidad:Number(cant[p.id]),precio_unit:precioDe(p)}));
  const totalForm=itemsForm.reduce((s,it)=>s+it.cantidad*it.precio_unit,0);

  const imprimirRemito=(rem)=>{
    const its=rem.remision_items||rem.items||[];
    const fecha=rem.created_at?new Date(rem.created_at).toLocaleString('es-CO'):new Date().toLocaleString('es-CO');
    const filas=its.map(i=>'<tr><td>'+(i.nombre_producto||i.nombre)+'</td><td style="text-align:center">'+Number(i.cantidad)+'</td><td style="text-align:right">$'+Number(i.precio_unit).toLocaleString('es-CO')+'</td><td style="text-align:right">$'+Number(i.subtotal!=null?i.subtotal:i.cantidad*i.precio_unit).toLocaleString('es-CO')+'</td></tr>').join('');
    const total=rem.total!=null?rem.total:its.reduce((s,i)=>s+(i.subtotal!=null?i.subtotal:i.cantidad*i.precio_unit),0);
    const html='<html><head><meta charset="utf-8"><title>Remisión '+rem.destino+'</title>'+
      '<style>body{font-family:Arial,sans-serif;padding:30px;color:#111}h1{font-size:20px}table{width:100%;border-collapse:collapse;margin-top:14px}th,td{border:1px solid #ccc;padding:8px;font-size:13px}th{background:#f3f4f6;text-align:left}.tot{font-size:18px;font-weight:bold;text-align:right;margin-top:14px}</style></head><body>'+
      '<h1>🚚 REMISIÓN — PANZER CARWASH</h1>'+
      '<div>Origen: <b>'+(rem.origen||origen)+'</b> → Destino: <b>'+rem.destino+'</b></div>'+
      '<div>Fecha: '+fecha+(rem.operador?(' · Generó: '+rem.operador):'')+'</div>'+
      '<div>Estado: <b>'+(rem.estado||'pendiente').toUpperCase()+'</b></div>'+
      '<table><thead><tr><th>Producto</th><th style="text-align:center">Cant.</th><th style="text-align:right">Precio</th><th style="text-align:right">Subtotal</th></tr></thead><tbody>'+filas+'</tbody></table>'+
      '<div class="tot">TOTAL: $'+Number(total).toLocaleString('es-CO')+'</div>'+
      (rem.nota?('<p>Nota: '+rem.nota+'</p>'):'')+
      '<button onclick="window.print()" style="margin-top:18px;padding:10px 16px;font-size:14px;cursor:pointer">🖨 Imprimir</button>'+
      '</body></html>';
    const w=window.open('','_blank'); if(!w){ showToast("Permite las ventanas emergentes","err"); return; }
    w.document.write(html); w.document.close();
  };

  const crear=async(imprimir)=>{
    if(!destino){ showToast("Elige la franquicia destino","err"); return; }
    if(!itemsForm.length){ showToast("Agrega al menos un producto con cantidad","err"); return; }
    setBusy(true);
    try{
      const snapshot={destino,origen,operador:admin,nota,total:totalForm,created_at:new Date().toISOString(),estado:'pendiente',remision_items:itemsForm.map(it=>({...it,nombre_producto:it.nombre,subtotal:it.cantidad*it.precio_unit}))};
      await db.crearRemision({destino, origen, operador:admin, nota, items:itemsForm});
      showToast("Remisión creada ("+fmt(totalForm)+")","ok");
      setNueva(false); load();
      if(imprimir) imprimirRemito(snapshot);
    }catch(e){ showToast(""+(e.message||e),"err"); }
    setBusy(false);
  };

  const pagar=async(rem)=>{
    if(!confirm("¿Marcar como PAGADA la remisión a "+rem.destino+" ("+fmt(rem.total)+")?\n\nSe registrará como venta facturada de "+rem.destino+" en los Informes.")) return;
    try{ await db.marcarRemisionPagada(rem.id); showToast("Remisión pagada · sumada a la facturación de "+rem.destino,"ok"); load(); if(det&&det.id===rem.id) setDet({...det,estado:'pagada'}); }
    catch(e){ showToast(""+(e.message||e),"err"); }
  };
  const eliminar=async(rem)=>{
    const extra = rem.estado==='pagada' ? "\n\n⚠️ Estaba PAGADA: también se anulará la venta que se le sumó a "+rem.destino+"." : "";
    if(!confirm("¿Eliminar la remisión a "+rem.destino+" ("+fmt(rem.total)+")?\n\nEl stock se devuelve a la bodega."+extra)) return;
    try{ await db.eliminarRemision(rem.id); showToast("Remisión eliminada · stock devuelto a la bodega","ok"); setDet(null); load(); }
    catch(e){ showToast(""+(e.message||e),"err"); }
  };

  const visibles=prods.filter(p=>!q||p.nombre.toLowerCase().includes(q.toLowerCase()));
  const pendientes=(remisiones||[]).filter(r=>r.estado==='pendiente');
  const carteraTotal=pendientes.reduce((s,r)=>s+Number(r.total||0),0);

  if(remisiones===null) return <div className="empty">Cargando remisiones…</div>;

  return (
    <div>
      <div className="toolbar">
        <div className="sec-title" style={{marginRight:"auto"}}>Remisiones <span className="muted">({remisiones.length})</span></div>
        <button className="btn btn-amber" onClick={abrirNueva}>＋ Nueva remisión</button>
      </div>

      <div className="cards" style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:14}}>
        <div className="card" style={{flex:"1 1 150px"}}><div className="muted">Remisiones</div><div style={{fontSize:24,fontWeight:800}}>{remisiones.length}</div></div>
        <div className="card" style={{flex:"1 1 150px"}}><div className="muted">Pendientes de pago</div><div style={{fontSize:24,fontWeight:800,color:pendientes.length?"var(--amber)":"var(--green)"}}>{pendientes.length}</div></div>
        <div className="card" style={{flex:"1 1 150px"}}><div className="muted">Cartera (por cobrar)</div><div style={{fontSize:24,fontWeight:800,color:"var(--amber)"}}>{fmt(carteraTotal)}</div></div>
      </div>

      <div className="card" style={{padding:0,overflowX:"auto"}}>
        <table className="tbl">
          <thead><tr><th>Fecha</th><th>Destino</th><th className="num">Total</th><th>Estado</th><th></th></tr></thead>
          <tbody>
            {remisiones.length===0 && <tr><td colSpan="5"><div className="empty">Aún no hay remisiones.</div></td></tr>}
            {remisiones.map(r=>(
              <tr key={r.id} style={{cursor:"pointer"}} onClick={()=>setDet(r)}>
                <td className="muted">{fLocalDia(r.created_at)} {fLocalHora(r.created_at)}</td>
                <td className="row-name">{r.destino}</td>
                <td className="num"><b>{fmt(r.total)}</b></td>
                <td>{r.estado==='pagada'?<span className="pill pill-prod">Pagada</span>:<span className="pill pill-token">Pendiente</span>}</td>
                <td style={{whiteSpace:"nowrap"}}>
                  <button className="btn btn-ghost btn-sm" onClick={e=>{e.stopPropagation();imprimirRemito(r);}}>🖨</button>
                  {r.estado!=='pagada' && <button className="btn btn-ghost btn-sm" onClick={e=>{e.stopPropagation();pagar(r);}}>✓ Pagada</button>}
                  <button className="btn btn-ghost btn-sm" style={{color:"var(--red)"}} onClick={e=>{e.stopPropagation();eliminar(r);}}>🗑</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* Crear remisión */}
      {nueva && (
        <div className="modal-bg" onClick={()=>!busy&&setNueva(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:720}}>
            <div className="modal-t">📄 Nueva remisión — desde {origen}</div>
            <label className="label">Franquicia / destino</label>
            <select className="select" value={destino} onChange={e=>setDestino(e.target.value)}>
              <option value="">Seleccionar…</option>
              {sedes.filter(s=>!s.es_bodega).map(s=><option key={s.id} value={s.nombre}>{s.nombre}</option>)}
            </select>
            <input className="input" placeholder="Buscar producto…" value={q} onChange={e=>setQ(e.target.value)}/>
            <div style={{maxHeight:"42vh",overflowY:"auto",border:"1px solid var(--bd)",borderRadius:10,padding:"4px 10px",marginBottom:10}}>
              <div style={{display:"flex",fontSize:11,color:"var(--td)",padding:"6px 0",borderBottom:"1px solid var(--bd)",fontWeight:700}}>
                <span style={{flex:1}}>Producto</span><span style={{width:70,textAlign:"center"}}>Cant.</span><span style={{width:90,textAlign:"center"}}>Precio</span>
              </div>
              {visibles.map(p=>{ const c=cant[p.id]||""; return (
                <div key={p.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:"1px solid var(--bd)"}}>
                  <div style={{flex:1,fontSize:13}}>{p.nombre} <span className="muted">· bodega: {bodegaStock[p.id]??0}</span></div>
                  <input className="input" type="number" style={{width:70,textAlign:"center",margin:0,padding:"6px"}} placeholder="0" value={c} onChange={e=>setC(p.id,e.target.value)}/>
                  <input className="input" type="number" style={{width:90,textAlign:"right",margin:0,padding:"6px"}} value={precio[p.id]!==undefined?precio[p.id]:p.precio} onChange={e=>setP(p.id,e.target.value)}/>
                </div>
              );})}
              {visibles.length===0 && <div className="muted" style={{padding:"10px 0"}}>Sin productos.</div>}
            </div>
            <input className="input" placeholder="Nota (opcional)" value={nota} onChange={e=>setNota(e.target.value)}/>
            <div className="result-row" style={{borderTop:"1px solid var(--bd)",marginTop:8}}><span className="result-label" style={{fontWeight:800}}>Total a cobrar</span><span className="result-value amber" style={{fontSize:20}}>{fmt(totalForm)}</span></div>
            <div className="muted" style={{fontSize:12,marginBottom:8}}>{itemsForm.length} producto(s) · se descuentan de {origen}</div>
            <div className="modal-actions">
              <button className="btn btn-ghost" disabled={busy} onClick={()=>setNueva(false)}>Cancelar</button>
              <button className="btn btn-ghost" disabled={busy||!itemsForm.length||!destino} onClick={()=>crear(true)}>Crear e imprimir</button>
              <button className="btn btn-amber" disabled={busy||!itemsForm.length||!destino} onClick={()=>crear(false)}>{busy?"Creando…":"Crear remisión"}</button>
            </div>
          </div>
        </div>
      )}

      {/* Detalle */}
      {det && (
        <div className="modal-bg" onClick={()=>setDet(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-t">Remisión → {det.destino}</div>
            <div className="muted" style={{marginBottom:10}}>{fLocalDia(det.created_at)} {fLocalHora(det.created_at)}{det.operador?(" · "+det.operador):""} · {det.estado==='pagada'?"PAGADA":"PENDIENTE"}</div>
            <div className="card" style={{padding:0}}>
              <table className="tbl">
                <thead><tr><th>Producto</th><th className="num">Cant.</th><th className="num">Precio</th><th className="num">Subtotal</th></tr></thead>
                <tbody>{(det.remision_items||[]).map((i,k)=>(
                  <tr key={k}><td className="row-name">{i.nombre_producto}</td><td className="num">{Number(i.cantidad)}</td><td className="num">{fmt(i.precio_unit)}</td><td className="num">{fmt(i.subtotal)}</td></tr>
                ))}</tbody>
              </table>
            </div>
            <div className="result-row" style={{borderTop:"1px solid var(--bd)",marginTop:8}}><span className="result-label" style={{fontWeight:800}}>Total</span><span className="result-value amber" style={{fontSize:18}}>{fmt(det.total)}</span></div>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={()=>setDet(null)}>Cerrar</button>
              <button className="btn btn-ghost" style={{color:"var(--red)"}} onClick={()=>eliminar(det)}>🗑 Eliminar</button>
              <button className="btn btn-ghost" onClick={()=>imprimirRemito(det)}>🖨 Imprimir</button>
              {det.estado!=='pagada' && <button className="btn btn-amber" onClick={()=>pagar(det)}>✓ Marcar pagada</button>}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
setTimeout(()=>document.getElementById('loading').classList.add('hide'),400);
  </script>
</body>
